<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Select Participants Round Page</ui:define>

<ui:define name="content">

    <h:form id="form_select_participants">

        <div class="login-container" style="min-height:auto; align-items:flex-start;">
            <p:panel styleClass="login-card form-card" style="max-width:100%;">
                <f:facet name="header">
                    <h1>#{msg['message.selectround']} #{msg['message.for.participants']}</h1>
                </f:facet>

                <p:dataTable id="player_has_played_round"
                             value="#{roundC.listRecentRounds()}"
                             var="c"
                             emptyMessage="#{msg['message.table.empty']}"
                             rowKey="#{c.round.idround}">

                    <p:column headerText="#{msg['round.selected']}"
                              width="10%">
                        <p:commandButton id="selectButton"
                                         action="#{roundC.listParticipantsStablefordRound(c)}"
                                         value="#{c.round.idround} - #{msg['button.select']}"
                                         icon="pi pi-pencil"/>
                    </p:column>

                    <p:column headerText="#{msg['round.date']}"
                              width="10%"
                              id="rdate">
                        <h:outputText value="#{c.round.roundDate}">
                            <f:convertDateTime type="localDate" pattern="dd/MM/yyyy"/>
                        </h:outputText>
                    </p:column>

                    <p:column headerText="#{msg['round.players']}"
                              width="8%"
                              id="teestart">
                        #{roundC.roundPlayersList().size()}
                    </p:column>

                    <p:column id="colclubname"
                              headerText="#{msg['club.name']}"
                              width="15%"
                              filterMatchMode="contains"
                              filterBy="#{c.club.clubName}">
                        #{c.club.clubName}
                    </p:column>

                    <p:column id="colcoursename"
                              headerText="#{msg['course.name']}"
                              width="15%"
                              filterMatchMode="contains"
                              filterBy="#{c.course.courseName}">
                        #{c.course.courseName}
                    </p:column>

                    <p:column headerText="#{msg['round.competition']}"
                              width="15%"
                              id="compet">
                        #{c.round.roundName}
                    </p:column>

                    <p:column headerText="#{msg['round.game']}"
                              width="8%"
                              id="game">
                        #{c.round.roundGame}
                    </p:column>

                </p:dataTable>

            </p:panel>
        </div>

    </h:form>

</ui:define>
</ui:composition>
