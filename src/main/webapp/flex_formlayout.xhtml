<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition 
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
       xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml" >
    
    <ui:define name="title">PanelGrid responsive </ui:define>

<ui:define name="content">

<style type="text/css">
   .customPanelGrid .ui-panelgrid-content {
            align-items: center;
            border:1px;
            border-color: red
    }
    .ui-panelgrid.showcase-text-align-center .ui-grid-responsive .ui-panelgrid-cell {
        text-align: center;
    }
</style>

<h:form id="panelgrid_test" >

<p:divider layout="horizontal" type="solid" />       
 <p:panelGrid id="panelgridFlex2"
                 columns="1"
                 layout="flex"
                 style="margin: 0 auto;width:80%"
                 styleClass="customPanelGrid"
                 contentStyleClass="ui-fluid">   
<div class="card">
    <h3>Advanced</h3>
    <div class="formgrid grid">
        <div class="field col-12 md:col-6">
            <label for="firstname6">Firstname</label>
            <input id="firstname6" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round appearance-none outline-none focus:border-primary w-full"/>
        </div>
        <div class="field col-12 md:col-6">
            <label for="lastname6">Lastname</label>
            <input id="lastname6" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
                   appearance-none outline-none focus:border-primary w-full"/>
        </div>
        <div class="field col-12">
            <label for="address">Address</label>
            <textarea id="address" type="text" rows="4" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round appearance-none outline-none focus:border-primary w-full"></textarea>
        </div>
        <div class="field col-12 md:col-6">
            <label for="city">City</label>
            <input id="city" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
                   appearance-none outline-none focus:border-primary w-full"/>
        </div>
        <div class="field col-12 md:col-3">
            <label for="state">State</label>
            <select id="state" class="w-full text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round outline-none 
                    focus:border-primary" style="appearance: auto">
                <option>Arizona</option>
                <option>California</option>
                <option>Florida</option>
                <option>Ohio</option>
                <option>Washington</option>
            </select>
        </div>
        <div class="field col-12 md:col-3">
            <label for="zip">Zip</label>
            <input id="zip" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid
                   surface-border border-round appearance-none outline-none focus:border-primary w-full"/>
        </div>
    </div>
</div>

<div class="card">
    <h3>Vertical</h3>
    <div class="field">
        <label for="firstname1">Firstname</label>
        <input id="firstname1" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
               appearance-none outline-none focus:border-primary w-full"/>
    </div>
    <div class="field">
        <label for="lastname1">Lastname</label>
        <input id="lastname1" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
               appearance-none outline-none focus:border-primary w-full"/>
    </div>
</div>

<div class="card">
    <h3>Vertical and Grid</h3>
    <div class="formgrid grid">
        <div class="field col">
            <label for="firstname2">Firstname</label>
            <input id="firstname2" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
                   appearance-none outline-none focus:border-primary w-full"/>
        </div>
        <div class="field col">
            <label for="lastname2">Lastname</label>
            <input id="lastname2" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
                   appearance-none outline-none focus:border-primary w-full"/>
        </div>
    </div>
</div>

<div class="field grid">
    <label for="firstname3" class="col-fixed" style="width:100px">Firstname</label>
    <div class="col">
        <input id="firstname3" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
               appearance-none outline-none focus:border-primary"/>
    </div>
</div>
<div class="field grid">
    <label for="lastname3" class="col-fixed" style="width:100px">Lastname</label>
    <div class="col">
        <input id="lastname3" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
               appearance-none outline-none focus:border-primary"/>
    </div>
</div>


<div class="card">
    <h3>Horizontal</h3>
    <div class="field grid">
        <label for="firstname4" class="col-12 mb-2 md:col-2 md:mb-0">Firstname</label>
        <div class="col-12 md:col-10">
            <input id="firstname4" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round
                   appearance-none outline-none focus:border-primary w-full"/>
        </div>
    </div>
    <div class="field grid">
        <label for="lastname4" class="col-12 mb-2 md:col-2 md:mb-0">Lastname</label>
        <div class="col-12 md:col-10">
            <input id="lastname4" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
                   appearance-none outline-none focus:border-primary w-full"/>
        </div>
    </div>
</div>

<div class="formgroup-inline">
    <div class="field">
        <label for="firstname5" class="p-sr-only">Firstname</label>
        <input id="firstname5" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
               appearance-none outline-none focus:border-primary" placeholder="Firstname"/>
    </div>
    <div class="field">
        <label for="lastname5" class="p-sr-only">Lastname</label>
        <input id="lastname5" type="text" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
               appearance-none outline-none focus:border-primary" placeholder="Lastname"/>
    </div>
    <button type="button" class="text-white bg-primary-500 border-primary-500 px-3 py-2 text-base border-1 border-solid border-round cursor-pointer transition-all transition-duration-200 hover:bg-primary-600 hover:border-primary-600 active:bg-primary-700 active:border-primary-700">Submit</button>
</div>


<div class="card">
    <h3>Vertical Checkbox</h3>
    <div class="field-checkbox">
        <input type="checkbox" id="city1"/>
        <label for="city1">Chicago</label>
    </div>
    <div class="field-checkbox">
        <input type="checkbox" id="city2"/>
        <label for="city2">Los Angeles</label>
    </div>

    <h3>Horizontal Checkbox</h3>
    <div class="formgroup-inline">
        <div class="field-checkbox">
            <input type="checkbox" id="city3"/>
            <label for="city3">Chicago</label>
        </div>
        <div class="field-checkbox">
            <input type="checkbox" id="city4"/>
            <label for="city4">Los Angeles</label>
        </div>
    </div>
</div>

<div class="card">
    <h3>Vertical RadioButton</h3>
    <div class="field-radiobutton">
        <input type="radio" name="vcity" id="city5"/>
        <label for="city5">Chicago</label>
    </div>
    <div class="field-radiobutton">
        <input type="radio" name="vcity" id="city6"/>
        <label for="city6">Los Angeles</label>
    </div>

    <h3>Horizontal RadioButton</h3>
    <div class="formgroup-inline">
        <div class="field-radiobutton">
            <input type="radio" name="hcity" id="city7"/>
            <label for="city7">Chicago</label>
        </div>
        <div class="field-radiobutton">
            <input type="radio" name="hcity" id="city8"/>
            <label for="city8">Los Angeles</label>
        </div>
    </div>
</div>

<div class="card">
    <h3>Help Text</h3>
    <div class="field">
        <label for="username">Username</label>
        <input id="username" type="username" class="text-base text-color surface-overlay p-2 border-1 border-solid surface-border border-round 
               appearance-none outline-none focus:border-primary w-full" aria-describedby="username-help"/>
        <small id="username-help">Enter your username to reset your password.</small>
    </div>
</div>

  </p:panelGrid>
   </h:form>
</ui:define>
</ui:composition>
