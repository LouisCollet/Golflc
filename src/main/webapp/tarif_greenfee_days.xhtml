<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
       xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Tarif Page Days</ui:define>
<ui:define name="content">
<h:graphicImage name="images/days1.jpg" alt="image missing :tarif1.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage name="images/days2.png" alt="image missing :tarif2.jpg" style="float: right;"></h:graphicImage>
<h:form id="tarifDays" enctype="application/x-www-form-urlencoded" >
<ui:include src="include/include_summary_greenfee.xhtml"/>
<p:panelGrid
    id="panel1"
    layout="tabular"
    columns="2"
    columnClasses="col1,col2"  >

<f:facet name="header">
     <h:outputText escape="false" value="#{msg['title.days.tarif']} DAYS" />
</f:facet>

            <h:panelGroup id="panelSeason" layout="block" >
            <h:outputText value="#{msg['tarif.season']} " />
                <i class="pi pi-cloud"></i>
                <i class="pi pi-sun"></i>
                #{courseC.tarifGreenfee.daysList.size()}
            </h:panelGroup>
        <p:selectOneButton id="Season_High-Medium-Low"
                          required="true"
                          value="#{courseC.tarifGreenfee.workSeason}" >
            <f:selectItem itemLabel="#{msg['tarif.all']}"     itemValue="A" />
            <f:selectItem itemLabel="#{msg['tarif.high']}"    itemValue="H" />
            <f:selectItem itemLabel="#{msg['tarif.medium']}"  itemValue="M" />
            <f:selectItem itemLabel="#{msg['tarif.low']}"     itemValue="L" />
       </p:selectOneButton>

         <h:outputText  value="#{msg['tarif.category']}" />
         <p:inputText   id="category"
                        size="20"
                        required="false"
                        title="#{msg['tooltip.tarif.item']}"
	                value="#{courseC.tarifGreenfee.workItem}"
                        placeholder="Enter category " />

       <h:outputText  value="#{msg['tarif.days.monday']} :"/>
         <p:inputNumber
                       id="monday"
                       value="#{courseC.tarifGreenfee.workDaysPrice[0]}"
                       title="#{msg['tooltip.tarif.price3']}"
                       size="5"
                       label="Tarif days : monday"
                       lang="#{languageC.locale}"
                       emptyValue="0"
                       required="true"
                       requiredMessage="#{msg['tarifGreenfee.notnull']} : line Monday"
                       decimalPlaces="1"
                       decimalSeparator="."
                       placeholder="999.9"
                       minValue="0"
                       maxValue="300"  >
          </p:inputNumber>
  <!-- si minValue utilisé, placeHolder n'apparait pas  -->
         <h:outputText  value="#{msg['tarif.days.week']} :"/>
            <p:inputNumber  label="Week"
                       id="week"
                       value="#{courseC.tarifGreenfee.workDaysPrice[1]}"
                       title="#{msg['tooltip.tarif.price3']}"
                       size="5"
                       lang="#{languageC.locale}"
                       emptyValue="0"
                       required="true"
                       requiredMessage="#{msg['tarifGreenfee.notnull']} : line Week "
                       decimalPlaces="1"
                       decimalSeparator="."
                       placeholder="999.9"
                       minValue="0"
                       maxValue="300"  >
            </p:inputNumber>

       <h:outputText  value="#{msg['tarif.days.friday']} :"/>
            <p:inputNumber  label="Friday"
                       id="friday"
                       value="#{courseC.tarifGreenfee.workDaysPrice[2]}"
                       title="#{msg['tooltip.tarif.price3']}"
                       size="5"
                       lang="#{languageC.locale}"
                       emptyValue="0"
                       required="true"
                       requiredMessage="#{msg['tarifGreenfee.notnull']} : line Friday"
                       decimalPlaces="1"
                       decimalSeparator="."
                       placeholder="999.9"
                       minValue="0"
                       maxValue="300"  >
            </p:inputNumber>
        
       <h:outputText  value="#{msg['tarif.days.weekend']} :"/>
       <p:inputNumber  label="Weekend Label"
                       id="weekend"
                       value="#{courseC.tarifGreenfee.workDaysPrice[3]}"
                       title="#{msg['tooltip.tarif.price3']}"
                       size="5"
                       emptyValue="0"
                       required="true"
                       requiredMessage="#{msg['tarifGreenfee.notnull']} : line Weekend"
                       decimalPlaces="1"
                       decimalSeparator="."
                       placeholder="999.9"
                       minValue="0"
                       maxValue="300"  >
         </p:inputNumber>
     
       <h:outputText  value="#{msg['tarif.days.holidays']} :"/>
          <p:inputNumber  label="Holidays"
                       id="holidays"
                       value="#{courseC.tarifGreenfee.workDaysPrice[4]}"
                       title="#{msg['tooltip.tarif.price3']}"
                       size="5"
                       emptyValue="0"
                       required="true"
                       requiredMessage="#{msg['tarifGreenfee.notnull']} : line Holidays"
                       decimalPlaces="1"
                       decimalSeparator="."
                       placeholder="999.9"
                       minValue="0"
                       maxValue="300" >
          </p:inputNumber>
<!-- new 27-05-2022    --> 
        <h:outputText  value="#{msg['tarif.twilight']} :"/>
        <p:selectOneButton id="ChoiceTwilight"
                          required="true"
                          value="#{courseC.tarifGreenfee.workTwilight}" >
            <f:selectItem itemLabel="No"  itemValue="N" />
            <f:selectItem itemLabel="#{msg['tarif.twilight']}" itemValue="Y" />
            <f:selectItem itemLabel="Previous"  itemValue="P"/>
        </p:selectOneButton>
       
<f:facet name="footer">
        <p:commandButton value="#{msg['tarif.days.create']}"
                         id="commandButtonCreate"
                         ajax="false"
                         update="growl-msg"
                         immediate="false"
                         style="float: left;"
                         icon="pi pi-database"
                         action="#{courseC.inputTarifGreenfee('DA')}"/>
         <p:commandButton value="#{msg['tarif.back']}"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         style="float: right;"
                         icon="pi pi-undo"
                         action="tarif_greenfee_menu.xhtml?faces-redirect=true" />
</f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
