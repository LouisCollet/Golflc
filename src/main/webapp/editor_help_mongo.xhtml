<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Editor Help Files </ui:define>
<ui:define name="head"> </ui:define>
<ui:define name="content">

<h:form id="editor_help_mongo" >

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header">
    <h1>Help File Editor (MongoDB)</h1>
</f:facet>

 <p:panelGrid
    id="panel"
    layout="flex"
    columns="1">

     <h2>Help File Handled =
         <h:outputText escape="false"
                       value="#{mongoHelpC.helpView.id}.xhtml" />
          Last modified =
         <h:outputText value="#{mongoHelpC.helpView.helpViewModificationDate}">
                <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm:ss" />
         </h:outputText>
     </h2>

    <p:textEditor id="help_editor"
                  widgetVar="editor"
                  value="#{mongoHelpC.helpView.helpViewText}"
                  height="450px"
                  style="width:800px;font-weight: normal;background-color: whitesmoke;" />

    <f:facet name="footer">
      <div class="btn-group">
         <p:commandButton value="Save to MongoDB"
                         id="buttonModify"
                         lang=""
                         update="help_editor, growl-msg"
                         icon="pi pi-database"
                         action="#{mongoHelpC.SaveHelpFile()}" />

         <p:commandButton id="ButtonClear"
                         value="Clear"
                         onclick="PF('editor').clear();"
                         icon="pi pi-times" />

         <p:commandButton value="Back to Current"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         icon="pi pi-undo"
                         action="#{mongoHelpC.BackCurrentHelpFile()}" />
      </div>
    </f:facet>
</p:panelGrid>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
