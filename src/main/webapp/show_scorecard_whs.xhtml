<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Show Scorecard Page </ui:define>
<ui:define name="content">

<h:form id="form_show_scorecard" enctype="application/x-www-form-urlencoded" >
<p:outputPanel id="outputpanelOne"
               deferred="true">
 <p:dataTable id="scorecard1"
             filteredValue="#{roundC.filteredCars}"
             value="#{roundC.ScoreCardList1WHS()}"
             emptyMessage="#{msg['message.table.empty']}"
             var="c" >

<f:facet name="header">
         <h1>#{msg['player.message']}</h1>
</f:facet>

<p:column headerText="#{msg['player.first']}" style="width:20%" >
    <h:outputText value="#{playerC.player.playerFirstName}"
                  styleClass="classFire"  /> 
</p:column>

<p:column headerText="#{msg['player.lastname']}" style="width:20%" >
    <h:outputText value="#{playerC.player.playerLastName} (#{playerC.player.idplayer})"/> 
</p:column>

<p:column headerText="#{msg['player.gender']}"
          width="20%">
    <h:outputText value="#{playerC.player.playerGender}"/> 
</p:column>

<p:column headerText="#{msg['player.birth']}" style="width:20%" >
    <h:outputText value="#{playerC.player.playerBirthDate}"> 
          <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
    </h:outputText>
</p:column>

  <ui:include src="include/include_thumbnails_scorecard.xhtml"/>

   
<p:column headerText="#{msg['handicap.player']}" width="20%" >
    <h:outputText value="#{c.handicapWHS}"/>
</p:column>

  <p:column  headerText="#{msg['handicap.sd']}" width="20%">
    <h:outputText value="#{c.handicapScoreDifferential}"/>
</p:column>

<p:column  headerText="#{msg['handicap.date']}"  width="10%">
    <h:outputText value="#{c.handicapDate}">
        <f:convertDateTime type="localDate" pattern="dd-MM-yyyy" />
   </h:outputText>
</p:column>
 
</p:dataTable>

<!--                                                                              -->
<p:divider layout="horizontal" type="solid" />
<p:spacer height="30" />

<p:dataTable id="scorecard2a"
             value="#{roundC.ScoreCardList2()}"
             emptyMessage="#{msg['message.table.empty']}"
             var="c" >
<f:facet name="header">
       <h1>#{msg['message.scorecard.course']}</h1>
</f:facet>

<p:column headerText="#{msg['round.competition']}" style="width:10%" >
   <h:outputText value="#{c.round.roundName} (#{c.round.idround})"/>
</p:column>

<p:column headerText="#{msg['round.game']}" style="width:10%" >
    <h:outputText value="#{c.round.roundGame} (#{c.round.roundQualifying})"/>
</p:column>

<p:column headerText="#{msg['round.date']}" style="width:10%" >
   <h:outputText value="#{c.round.roundDate}"> 
      <f:convertDateTime type="localDate" pattern="dd/MM/yyyy HH:mm" />
   </h:outputText>
</p:column>

<p:column headerText="#{msg['club.name']}" style="width:10%" >
   <h:outputText value="#{c.club.clubName} (#{c.club.idclub})"/>
</p:column>

<p:column headerText="#{msg['course.name']}" style="width:10%" >
   <h:outputText value="#{c.course.courseName} (#{c.course.idcourse})"/>
</p:column>
</p:dataTable>


<p:divider layout="horizontal" type="solid" />
<p:spacer height="30" />

<p:dataTable id="scorecard2b"
             value="#{roundC.ScoreCardList2()}"
             emptyMessage="#{msg['message.table.empty']}"
             var="c" >
<!--<f:facet name="header">
                  <h1>#{msg['message.scorecard.result']}</h1>
</f:facet> -->
<p:column headerText="#{msg['course.holes']}" style="width:10%" >
   <h:outputText value="#{c.round.roundHoles}"/>
</p:column>

<p:column headerText="#{msg['course.par']}" style="width:10%" >
   <h:outputText value="#{c.tee.teePar}"/>
</p:column>

<p:column headerText="#{msg['tee.slope']}" style="width:10%" >
   <h:outputText value="#{c.tee.teeSlope}"/>
</p:column>

<p:column headerText="#{msg['tee.rating']}" style="width:10%" >
   <h:outputText value="#{c.tee.teeRating}"/>
</p:column>

<p:column headerText="#{msg['tee.master']}" style="width:10%" >
    <h:outputText value="#{c.tee.teeMasterTee}"/>
</p:column> 

<!--  new 12-08-2023 insertion distance tee -->
<p:column headerText="#{msg['tee.distance']}"
          style="width:10%" >
    <h:outputText value="#{c.tee.teeDistanceTee}"/>
</p:column>    


<p:column headerText="#{msg['tee.start']}" style="width:10%" >
    <h:outputText value="#{c.inscription.inscriptionTeeStart} (idtee=#{c.tee.idtee})" />
</p:column>

<p:column headerText="#{msg['hole.start']}" style="width:10%" >
   <h:outputText value="#{c.round.roundStart}"/>
</p:column>
<!-- à modifier : afficher uniquement si 9 holes value="#{c.teeStart} rendered="#{c.teeStart eq 'F'}"-->
   
   <f:facet name="footer-header">
         <h1>#{msg['message.scorecard.detailed']} WHS</h1>
   </f:facet>
   
</p:dataTable>

</p:outputPanel>


<p:divider layout="horizontal" type="solid" />
<p:spacer height="30" />

<p:outputPanel id="outputpanelTwo"
               deferred="true"
               deferredMode="visible"   >
<hr/>
<!--            detail     -->
<c:if test="#{c.round.roundHoles eq 9}">
     <p style="page-break-before: always"/>
</c:if>

<!--  a faire les résultats statistiques  -->

<p:dataTable id="table4"
             var="c" 
             value="#{roundC.ScoreCardList4()}"
             emptyMessage="#{msg['message.table.empty']}"
             rowIndexVar="row"
             rowStyleClass="#{(row+1 == 9 or row+1 == 18) ? 'highlight' : null}"
             stripedRows="true">
<f:facet name="header">
         <h1>#{msg['message.scorecard.detailed']} WHS version 4 </h1>
</f:facet>

 <p:spacer height="30" rendered="#{row+1 == 9}" />
 <!--  https://stackoverflow.com/questions/4731622/insert-a-new-row-into-datatable  -->
<p:column headerText="#{msg['score.hole']}"
          width="3%" >
    <h:outputText value="#{c.hole}"/>
</p:column>

<p:column headerText="#{msg['score.par']}" 
          footerText="#{msg['score.par']} = #{roundC.ScoreCardList4().stream().map(o->o.getPar()).sum()}"
          width="3%" >
    <h:outputText value="#{c.par}"
                  style="text-align:center;font-size: 1.5em;font-weight: bold"/>
</p:column>

<p:column headerText="#{msg['hole.index']}"
          footerText="#{msg['hole.index']}"
          width="3%"
          style="white-space:pre-line" >
        <h:outputText value="#{c.index}"/>
</p:column>
 
<p:column headerText="#{msg['score.extra']}" 
          footerText="#{msg['score.extra']} = #{roundC.ScoreCardList4().stream().map(o->o.getExtra()).sum()}"
          style="text-align:center;font-size: 1.5rem;font-weight: bold;"
          width="3%">
      <h:outputText value="*"    rendered="#{c.extra eq 1}"/>
      <h:outputText value="**"   rendered="#{c.extra eq 2}"/>
      <h:outputText value="***"  rendered="#{c.extra eq 3}"/>
      <h:outputText value="****" rendered="#{c.extra eq 4}"/>
</p:column>
<!--
<p:column headerText="#{msg['score.fairway']}" 
          footerText="#{msg['score.fairway']} = #{roundC.ScoreCardList4().stream().map(o->o.getScoreStableford().getScoreFairway()).sum()}"
          style="white-space:pre-line;"
          width="3%" >
       <h:outputText value="#{c.scoreStableford.scoreFairway}"/>
</p:column>
    
<p:column headerText="#{msg['score.green']}"
          footerText="#{msg['score.green']} = #{roundC.ScoreCardList4().stream().map(o->o.getScoreStableford().getScoreGreen()).sum()}"
          style="white-space:pre-line;"
          width="3%" >
       <h:outputText value="#{c.scoreStableford.scoreGreen}"/>
</p:column>
    
<p:column headerText="#{msg['score.putts']}" 
          footerText="#{msg['score.putts']} = #{roundC.ScoreCardList3().stream().map(o->o.getScoreStableford().getScorePutts()).sum()}"
          style="white-space:pre-line"
          width="3%" >
       <h:outputText value="#{c.scoreStableford.scorePutts}"/>
</p:column>

<p:column headerText="#{msg['score.bunker']}"
          footerText="#{msg['score.bunker']} = #{roundC.ScoreCardList3().stream().map(o->o.getScoreStableford().getScoreBunker()).sum()}"
          style="white-space:pre-line"
          width="3%" >
       <h:outputText value="#{c.scoreStableford.scoreBunker}"/>
</p:column> 
    
 <p:column headerText="#{msg['score.penalty']}"
          footerText="#{msg['score.penalty']} = #{roundC.ScoreCardList3().stream().map(o->o.getScoreStableford().getScorePenalty()).sum()}"
          style="white-space:pre-line"
          width="3%" >
       <h:outputText value="#{c.scoreStableford.scorePenalty}"/>
</p:column> 
 -->
<c:set var="TotalDistanceOut" value="#{roundC.ScoreCardList4().stream().limit(9).map(o->o.getDistances()).sum()}"/> 
<c:set var="TotalDistance" value="#{roundC.ScoreCardList4().stream().map(o->o.getDistances()).sum()}"/>
<c:set var="break" value='&lt;BR/&gt;'/>
<p:column headerText="#{msg['hole.distance']}"
          width="4%" >
      <f:facet name="footer">
           <h:outputText value="#{msg['hole.distance']} = "/>
          <h:outputText value="#{TotalDistance}">
              <f:convertNumber pattern="#.###" />
          </h:outputText>
         
      </f:facet>
          <h:outputText value="#{c.distances}" />
          <h:outputText
                value="#{break} OUT = #{TotalDistanceOut}"
                escape="false"
                rendered="#{row+1 == 9}"
                style="font-size: 1.5em;" >
                    <f:convertNumber pattern="9.999" integerOnly="true"/>
           </h:outputText>

         <h:outputText
            value="#{break} IN = #{TotalDistance - TotalDistanceOut}"
            escape="false"
            rendered="#{row+1 == 18}"
            style="font-size: 1.5em;" >
                  <f:convertNumber pattern="#.###" />
        </h:outputText>
</p:column>

 <p:divider layout="horizontal" type="solid" 
           style="width:500px;height:20px"
           rendered="#{row+1 == 9}"/>
 
<p:column headerText="#{msg['score.gross']}" 
          footerText="#{msg['score.gross']} = #{roundC.ScoreCardList4().stream().map(o->o.getStrokes()).sum()}"
          style="white-space:pre-line;"
          width="5%" >
        <h:outputText
            value="X"
            rendered="#{c.strokes == 10}"
            style="white-space: nowrap;"/>
        <h:outputText
            value="#{c.strokes}"
            rendered="#{c.strokes != 0 and c.strokes != 10}"
            style="white-space: nowrap;margin-right: 10px;"/>
        <h:outputText
            value="PAR"
            rendered="#{c.strokes == c.par}"
            style="white-space: nowrap;color: blue; font-weight: bold;margin-right: 20px;"/>
        <h:graphicImage
            name="images/par.png"
            rendered="#{c.strokes == c.par}"
            width="60%" />
        <h:outputText
            value="BIRDIE"
            rendered="#{c.strokes == c.par - 1}"
            style="white-space: nowrap; color: red; font-weight: bold;width:10%"/>
        <h:graphicImage
            name="images/birdie.png"
            style="width:60%;"
            rendered="#{c.strokes == c.par - 1}" />
        <h:outputText
            value="EAGLE"
            rendered="#{c.strokes == c.par - 2}"
            style="white-space: nowrap;float: right; color: red; font-weight: bold;width:10%"/>
        <h:graphicImage
            name="images/eagle.png"
            title="Eagle Title"
            style="width:60%"
            rendered="#{c.strokes == c.par - 2}" />
</p:column>

 <p:column headerText="#{msg['score.net']}" 
          footerText="#{msg['score.net']} = #{roundC.ScoreCardList4().stream().map(o->o.getStrokes() - o.getExtra()).sum()}"
          width="3%">

     <h:outputText value="#{c.strokes - c.extra}"
                   rendered="#{c.strokes != 0 and c.strokes != 10}"
                   style="white-space: nowrap;" />
 
     <h:outputText value=" "
                   rendered="#{c.strokes == 10}"
                   style="white-space: nowrap;" />
</p:column>
 
 <p:column headerText="#{msg['score.points']}" 
           footerText="#{msg['score.points']} = #{roundC.ScoreCardList4().stream().map(o->o.getPoints()).sum()} "
           style="white-space:nowrap;"
           width="10%" >
        <h:outputText
            value="#{c.points}"
            rendered="#{c.points != 0}"
            style="font-size: 2em; font-weight:bold"/>

   <c:set var="TotalPointsOut" value="#{roundC.ScoreCardList4().stream().limit(9).map(o->o.getPoints()).sum()}"/>
        <h:outputText
            escape="false"
            value="#{break} Points OUT = #{TotalPointsOut}"
            rendered="#{row+1 == 9}"
            style="font-size: 1.5rem" />

    <c:set var="TotalPoints" value="#{roundC.ScoreCardList4().stream().map(o->o.getPoints()).sum()}"/> 
        <h:outputText
            value="#{break} Points IN = #{TotalPoints - TotalPointsOut}"
            escape="false"
            rendered="#{row+1 == 18}"
            style="font-size: 1.5em;" />

</p:column>

</p:dataTable>


</p:outputPanel>
</h:form>

<p:spacer height="30" /> 
<h:form id="form_scorecard_noprint" enctype="application/x-www-form-urlencoded" >
 <p:panel id="panelExportPF"
         header="Primefaces Solutions">
   <p:commandButton id="btnExportPdf"
                    value="Export as PDF">
        <p:dataExporter id="exporterPF"
                        type="pdf" 
                        target="form_show_scorecard:scorecard1,form_show_scorecard:scorecard2a,
                                form_show_scorecard:scorecard2b,form_show_scorecard:table4" 
                        fileName="ScoreCardDetails"
                        pageOnly="false"
                        encoding="windows-1252" />
 </p:commandButton>
     
       <p:commandButton icon="pi pi-file-excel"
                    value="Export as Pdf (PDF) with preprocess"
                    >
       <p:dataExporter id="dataexporterPDF"
                       type="pdf"
                       target="form_show_scorecard:scorecard1,form_show_scorecard:scorecard2a,
                               form_show_scorecard:scorecard2b,form_show_scorecard:table4"
                       encoding="windows-1252"
                       options="#{utilsC.pdfOpt}"
                       preProcessor="#{utilsC.preProcessPDF}"
                       fileName="ScoreCard"
                       />
   </p:commandButton>
     
    <p:commandButton id="btnExportExcel"
                     value="Export as Excel">
        <p:dataExporter id="exporterXLS"
                        type="xls" 
                        target="form_show_scorecard:scorecard1,form_show_scorecard:scorecard2a,
                                form_show_scorecard:scorecard2b,form_show_scorecard:table4" 
                        fileName="ScoreCardMessagesAndDetails"
                        pageOnly="false" 
                        encoding="UTF8"
                />
 </p:commandButton>

 <p:commandButton id="btnPrint1"
                  value="#{msg['button.print']}"
                  type="button"
                  icon="pi pi-print">
     <!-- configuration is new   --> 
        <p:printer id="printerForm"
                   configuration="title: 'Print Score Card', timeout: 1000"
                   target="form_show_scorecard" />
 </p:commandButton>
     
  <p:commandButton id="btnPrint2"
                   value="#{msg['button.print']} Detail only"
                   type="button"
                   icon="pi pi-print" >
        <p:printer id="printerDetailOnly"
                   configuration="title: 'Print Detail Score Card', timeout: 1000"
                   target="form_show_scorecard:table4" />
 </p:commandButton>    
 
 </p:panel>

</h:form>
</ui:define>
</ui:composition>
