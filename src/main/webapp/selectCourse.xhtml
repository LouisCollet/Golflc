<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Select Course Page</ui:define>

<ui:define name="metadata">
    <f:metadata>
    </f:metadata>
</ui:define>

<ui:define name="content">
<h:form id="form_select_course">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header">
    <h1>#{msg['message.selectcourse']}
        <h:outputText
            id="Rnd"
            rendered="#{appContext.inputSelectCourse eq 'CreateRound'}"
            value="#{msg['message.for.round']}" />
        <h:outputText
            id="tarif"
            rendered="#{appContext.inputSelectCourse eq 'CreateTarifGreenfee'}"
            value="#{msg['message.for.tarif']}" />
        <h:outputText
            id="tarifMembers"
            rendered="#{appContext.inputSelectCourse eq 'CreateTarifMember'}"
            value="#{msg['message.for.tarif.members']}" />
        <h:outputText
            id="unavailableS"
            rendered="#{appContext.inputSelectCourse eq 'CreateUnavailableStructure'}"
            value="#{msg['message.for.unavailable']}" />
        <h:outputText
            id="unavailableP"
            rendered="#{appContext.inputSelectCourse eq 'CreateUnavailablePeriod'}"
            value="#{msg['message.for.unavailable']}" />
        <h:outputText
            id="Det"
            rendered="#{appContext.inputSelectCourse eq 'ChartRound'}"
            value="#{msg['message.for.detail']}" />
        <h:outputText
            id="Avg"
            rendered="#{appContext.inputSelectCourse eq 'ChartCourse'}"
            value="#{msg['message.for.average']}" />
    </h1>
</f:facet>

<p:dataTable id="courses"
             value="#{clubC.listCoursesPublic()}"
             var="c"
             rowIndexVar="row"
             emptyMessage="#{msg['message.table.empty']}"
             filteredValue="#{clubC.filteredCourses}"
             styleClass="compact-table">

<p:column
     headerText="#"
     width="2%"
     id="colRow">
             #{row+1}
</p:column>

    <p:column headerText="#{msg['round.create']}"
              style="width:20%"
              rendered="#{appContext.inputSelectCourse eq 'CreateRound'}">
        <p:commandButton
            id="selectButtonCreateRound"
            action="#{clubC.selectCourse(c)}"
            value="#{c.course.idcourse} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column headerText="#{msg['round.tarif']}"
              style="width:20%"
              rendered="#{appContext.inputSelectCourse eq 'CreateTarifGreenfee'}">
        <p:commandButton
            id="selectButtonTarif"
            action="#{clubC.selectCourse(c)}"
            value="#{c.course.idcourse} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column headerText="#{msg['member.tarif']}"
              style="width:20%"
              rendered="#{appContext.inputSelectCourse eq 'CreateTarifMember'}">
        <p:commandButton
            id="selectButtonTarifMembers"
            action="#{clubC.selectCourse(c)}"
            value="#{c.club.idclub} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column headerText="#{msg['member.tarif.payment']}"
              style="width:20%"
              rendered="#{appContext.inputSelectCourse eq 'PaymentTarifMember'}">
        <p:commandButton
            id="selectButtonPaymentTarifMembers"
            action="#{clubC.selectCourse(c)}"
            value="#{c.club.idclub} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column headerText="#{msg['message.for.unavailable']}"
              style="width:20%"
              rendered="#{appContext.inputSelectCourse eq 'CreateUnavailableStructure'}">
        <p:commandButton
            id="selectButtonUnavailable"
            action="#{clubC.selectCourse(c)}"
            value="#{c.course.idcourse} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column headerText="#{msg['message.for.unavailable']} Period"
              style="width:20%"
              rendered="#{appContext.inputSelectCourse eq 'CreateUnavailablePeriod'}">
        <p:commandButton
            id="selectButtonUnavailablePeriod"
            action="#{clubC.selectCourse(c)}"
            value="#{c.course.idcourse} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column id="colClubName"
              headerText="#{msg['club.name']}"
              style="width:20%"
              filterMatchMode="contains"
              filterBy="#{c.club.clubName}"
              sortBy="#{c.club.clubName}">
        <h:outputText value="#{c.club.clubName} (#{c.club.idclub})" />
    </p:column>

    <p:column id="colCourseName"
              headerText="#{msg['course.name']}"
              style="width:20%"
              filterMatchMode="contains"
              filterBy="#{c.course.courseName}"
              sortBy="#{c.course.courseName}">
        <h:outputText value="#{c.course.courseName} (#{c.course.idcourse})" />
    </p:column>

    <p:column id="courseBegin"
              headerText="#{msg['course.begin']}"
              style="width:15%">
        <h:outputText value="#{c.course.courseBeginDate}">
            <f:convertDateTime type="date" pattern="dd-MM-yyyy"/>
        </h:outputText>
    </p:column>

    <p:column id="courseTimeZone"
              headerText="#{msg['googletime.timezone']}"
              style="width:15%">
        <h:outputText value="#{c.club.address.zoneId}" />
    </p:column>

    <p:column id="travel"
              headerText="#{msg['course.travel']}"
              style="width:10%">
        <p:commandButton
            id="selectTravel"
            action="#{clubC.selectTravel(c)}"
            value="Car"
            icon="pi pi-question" />
    </p:column>

    <p:column id="scorecard"
              headerText="#{msg['scorecard.show']}"
              style="width:10%"
              rendered="#{appContext.inputSelectCourse eq 'CreateRound'}">
        <p:commandButton
            id="selectScorecard"
            action="#{roundC.show_scorecard_empty(c)}"
            value="Scorecard"
            icon="pi pi-map" />
    </p:column>

    <p:column id="chart"
              headerText="#{msg['course.chart']}"
              style="width:10%">
        <p:commandButton
            id="selectChart"
            action="#{clubC.selectChart(c)}"
            value="Chart"
            icon="pi pi-chart-line" />
    </p:column>

</p:dataTable>
</p:panel>
</div>
</h:form>
</ui:define>
</ui:composition>
