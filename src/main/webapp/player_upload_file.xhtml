<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="metadata"> </ui:define>
<ui:define name="title">Upload Photo Player Page </ui:define>
<ui:define name="content">
<h:graphicImage name="images/upload01.jpg" alt="image missing :upload01.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage name="images/upload03.jpg" alt="image missing :upload03.jpg" style="float: right;"></h:graphicImage>

<h:form id="form_upload" 
        enctype="multipart/form-data">
<ui:include src="include/include_summary_player.xhtml"/>

 <p:panelGrid 
    id="panel2"
    layout="tabular"
    columns="2"
    style="width:70%"
    columnClasses="col1,col2" >

<f:facet name="header">
     <h1>#{msg['player.upload.photo']}</h1>
</f:facet>
     
<!-- <style>
    body .ui-inputfield.ui-state-drag {
        background: red;
    }
</style> Upload File -->
     
    
    <h:outputText value="Upload file" /> 
    <p:fileUpload id="uploader1"
               label="Choose the photo to upload, #{playerC.player.playerFirstName}"
               auto="false"
               update="growl-msg"
               listener="#{fileUploadC.handleFileUpload}"
               mode="advanced"
               uploadIcon="pi pi-upload"
               chooseIcon="pi pi-question"
               onupload="return confirm('Are you sure?')"
               displayFilename="true"
               uploadLabel="Upload this file !" >
  <!-- auto must be false was auto="true" version 14.8 dropzone https://primefaces.github.io/primefaces/14_0_0/#/validators/validateFile?id=validatefile -->
         <p:validateFile
             allowTypes="/(\.|\/)(gif|jpe?g|png|pdf)$/"
             contentType="true"
             sizeLimit="300000"
             fileLimit="3" >
         </p:validateFile>
    </p:fileUpload>
      
    <p:outputPanel id="tooltipsPanel">
            <p:tooltip id="uploaderChooseFileBeforeUploadToolTip"
                       widgetVar="chooseWV"
                       position="top"
                       for="@(#form_upload\:uploader1 > .ui-fileupload-buttonbar > .ui-fileupload-choose)"
                       value="Choose button tooltip"/>
            <p:tooltip id="uploaderUploadButtonToolTip"
                       position="right"
                       for="@(#form_upload\:uploader1 > .ui-fileupload-buttonbar > .ui-fileupload-upload)"
                       value="Upload button tooltip"
                       showEffect="clip"
                       hideEffect="explode"/>
            <p:tooltip id="uploaderCancelButtonToolTip"
                       position="bottom"
                       for="@(#form_upload\:uploader1 > .ui-fileupload-buttonbar > .ui-fileupload-cancel)"
                       value="Cancel button tooltip"/>
    </p:outputPanel>
      


 <!-- new 26-11-2024    --> 
  <h:outputText value="" />
  <h:outputText value="Drop Zone" />
       <p:inputTextarea id="customDropZone"
                        widgetVar="textarea"
                        cols="33"
                        rows="3" />
        <p:fileUpload widgetVar="uploadDnd"
                      label="Choose the photo to drop, #{playerC.player.playerFirstName}"
                      listener="#{fileUploadC.handleFileUpload}"
                      dropZone="customDropZone"
                      mode="advanced"
                      auto="true"
                      displayFilename="true"
                      uploadIcon="pi pi-upload"
                      chooseIcon="pi pi-question"
                      style="display: none"
                      update="growl-msg">
            <p:validateFile
                allowTypes="/(\.|\/)(gif|jpe?g|png|pdf)$/"
                contentType="true"
                sizeLimit="300000"
                fileLimit="1" >
         </p:validateFile>
        </p:fileUpload>

</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
