<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml" >

<ui:define name="title">Course Page</ui:define>

<ui:define name="content">

    <h:form id="form_course">

        <ui:include src="include/include_summary_club.xhtml"/>

        <p:focus for="CourseName" />

        <div class="login-container" style="min-height:auto; align-items:flex-start;">
            <p:panel styleClass="login-card form-card">
                <f:facet name="header">
                    <h1>#{msg['course.data']} #{request.getParameter('operation')}</h1>
                </f:facet>

                <p:panelGrid id="panel"
                             columns="2"
                             layout="flex"
                             columnClasses="col1Flex, col2Flex">

                    <p:outputLabel for="@next" value="#{msg['course.name']} :"/>
                    <p:inputText label="Coursename"
                                 id="CourseName"
                                 title="#{msg['tooltip.course.coursename']}"
                                 value="#{clubC.course.courseName}"
                                 size="45" />

                    <p:outputLabel for="@next" value="#{msg['course.enddate']} :"/>
                    <p:datePicker value="#{clubC.course.courseEndDate}"
                                  id="picker_endDate"
                                  locale="#{languageC.locale}"
                                  pattern="dd/MM/yyyy"
                                  showTime="true"
                                  showIcon="true"
                                  size="18"
                                  readonlyInput="false"
                                  showButtonBar="true"
                                  yearRange="#{utilsC.dateYear(-1)}:#{utilsC.dateYear(50)}"
                                  yearNavigator="true"
                                  monthNavigator="true" />

                </p:panelGrid>

                <f:facet name="footer">
                  <div class="btn-group">
                    <p:commandButton value="#{msg['button.course.create']}"
                                     id="ButtonCreateCourse"
                                     ajax="false"
                                     rendered="#{clubC.course.createModify eq true and clubC.tee.nextTee eq false}"
                                     update="growl-msg"
                                     icon="pi pi-database"
                                     action="#{clubC.createCourse()}" />

                    <p:commandButton value="#{msg['button.course.modify']}"
                                     id="buttonModify"
                                     ajax="false"
                                     rendered="#{clubC.course.createModify eq false}"
                                     update="growl-msg"
                                     icon="pi pi-database"
                                     action="#{clubC.modifyCourse()}" />

                    <p:commandButton value="#{msg['course.next']}"
                                     id="buttonNext"
                                     update="growl-msg"
                                     immediate="true"
                                     ajax="false"
                                     rendered="#{clubC.tee.nextTee}"
                                     icon="pi pi-arrow-right"
                                     action="tee.xhtml?faces-redirect=true"/>
                  </div>
                </f:facet>

            </p:panel>
        </div>

    </h:form>

</ui:define>
</ui:composition>
