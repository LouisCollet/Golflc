<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:pe="primefaces.extensions"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Creditcard Page </ui:define>
<ui:define name="content">

<h:form id="creditcard">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">

   <c:set var="type" value="#{appContext.creditcardType}"/>

<f:facet name="header">
    <c:if test="#{type eq 'SUBSCRIPTION'}"><h1>#{msg['title.payment.subscription']}</h1></c:if>
    <c:if test="#{type eq 'GREENFEE'}"><h1>#{msg['title.payment.round']}</h1></c:if>
    <c:if test="#{type eq 'COTISATION'}"><h1>#{msg['title.payment.cotisation']}</h1></c:if>
    <c:if test="#{type eq 'LESSON'}"><h1>#{msg['title.payment.lesson']}</h1></c:if>
</f:facet>

     <c:if test="#{type eq 'GREENFEE'}">
         <ui:include src="include/include_summary_round.xhtml"/>
    </c:if>
    <c:if test="#{type eq 'COTISATION'}">
         <ui:include src="include/include_summary_cotisation.xhtml"/>
    </c:if>
    <c:if test="#{type eq 'SUBSCRIPTION'}">
         <ui:include src="include/include_subscription.xhtml"/>
    </c:if>
    <c:if test="#{type eq 'LESSON'}">
         <ui:include src="include/include_lesson.xhtml"/>
    </c:if>

<p:panelGrid
    id="panelGrid1"
    layout="flex"
    columns="2"
    columnClasses="col1Flex,col2Flex">

    <h:outputText  id="Total"
                value="#{msg['creditcard.amounttobepaid']} :" />
    <h:outputText  id="TotalPrice"
                value="#{payC.creditcard.totalPrice}"
                style="font-size: 3em;" />

     <h:outputText
                value="#{msg['tarif.members.currency']} :" />
    <h:outputText id="Currency"
                  value="#{payC.creditcard.creditcardCurrency}"
                  style="font-size: 2em;" />

    <h:outputText value="#{msg['creditcard.communication']} :" />
    <h:outputText
                  id="Communication"
                  value="#{payC.creditcard.communication}"
                  title="#{msg['tooltip.club.clubaddress']}" />

   <h:panelGroup id="panelG2" layout="block" >
        <h:outputText value="#{msg['creditcard.type']} :"  />
                    <i class="pi pi-creditcard"></i>
   </h:panelGroup>
   <p:selectOneMenu id="TypeCreditcard"
                    value="#{payC.creditcard.creditcardType}"
                    required="true"
                    valueChangeListener="#{payC.creditCardTypeListener}"
                    title="#{msg['tooltip.creditcard.type']}" >
                <f:selectItems value="#{payC.creditcard.cards}"/>
                <p:ajax event="change" update="@form"/>
   </p:selectOneMenu>

</p:panelGrid>
</p:panel>
</div>

</h:form>

<h:form prependId="false">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <pe:creditCard id="creditCard"
             labelMonthYear="MM/YY" />
</f:facet>

<p:panelGrid id="pnlCreditCard"
                columns="2"
                layout="flex"
                columnClasses="col1Flex,col2Flex">

        <h:outputText value="#{msg['creditcard.number']} :"/>
        <p:inputText id="number"
                     value="#{payC.creditcard.creditcardNumber}"
                     placeholder="Card number"
                     inputmode="numeric"
                     required="true"/>

        <h:outputText value="#{msg['creditcard.holder']} :"/>
        <p:inputText id="name"
                     value="#{payC.creditcard.creditcardHolder}"
                     placeholder="Full name"
                     required="true"/>

        <h:outputText value="#{msg['creditcard.expirationdate']} :"/>
        <p:outputPanel id="expiration">
            <p:datePicker id="CreditcardExpirationDate"
                          showIcon="true"
                          required="true"
                          requiredMessage="Expiration Date must be completed"
                          placeholder="MM/YY"
                          size="6"
                          showButtonBar="true"
                          widgetVar="monthPicker"
                          view="month"
                          pattern="MM/yy"
                          monthNavigator="true"
                          yearNavigator="true"
                          yearRange="#{utilsC.dateMonth(0)}:#{utilsC.dateYear(5)}"
                          onchange="$('#expiry').val(PF('monthPicker').input.val()); $('#expiry')[0].dispatchEvent(new Event('change'));"/>
            <p:inputText id="expiry"
                         value="#{payC.creditcard.creditCardExpirationDateString}"
                         placeholder="MM/YY"
                         inputmode="numeric"
                         style="display:none"/>
        </p:outputPanel>

        <h:outputText value="CVC :"/>
        <p:inputText id="cvc"
                     value="#{payC.creditcard.creditcardVerificationCode}"
                     placeholder="CVC"
                     size="5"
                     inputmode="numeric"
                     required="true"/>

</p:panelGrid>

<f:facet name="footer">
    <div class="flex justify-content-center gap-2">
        <p:commandButton value="#{msg['inscription.back']}"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-undo"
                         rendered="#{payC.creditcard.typePayment eq 'GREENFEE'}"
                         action="inscription.xhtml?faces-redirect=true"/>
        <p:commandButton value="#{msg['payment.selected']}"
                         id="commandButtonPayment"
                         ajax="false"
                         update="growl-msg"
                         icon="pi pi-credit-card"
                         action="creditcard_accepted.xhtml?faces-redirect=true"/>
    </div>
</f:facet>

</p:panel>
</div>
</h:form>
</ui:define>
</ui:composition>
