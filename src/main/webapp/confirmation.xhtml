<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Confirmation Page </ui:define>

<ui:define name="content">

<h:form id="confirmation"  >
<p:panelGrid 
    id="panel1"
    columns="2"
    layout="tabular"
    columnClasses="col1, col2"
     >

<f:facet name="header">
    <h1>#{msg['message.confirmation']}</h1>
</f:facet>
        <h:outputText value="#{playerC.player.playerFirstName}" style="font-weight:bold" />
        <h:outputText value="#{playerC.player.playerLastName}" style="font-weight:bold" />
        <h:graphicImage library="images"
                name="#{playerC.player.playerPhotoLocation}"
                style="float: right;">
<!--  alt="image missing :#{playerC.player.playerLastName}" -->
        </h:graphicImage>
        <b>A confirmation mail has been sent to #{playerC.player.playerEmail}"... </b> 
       <br/>
       Click on the confirmation link in this  email to activate your account !!!!!!
<f:facet name="footer">
        <p:commandButton
             id="button01"
             value="#{msg['button.player.restart']}"
             ajax="false"
             immediate="true"
             icon="pi pi-power-off"
             action="#{playerC.logout('from confirmation.xhtml')}"
        />
</f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
