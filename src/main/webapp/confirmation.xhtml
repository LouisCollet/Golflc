<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Confirmation Page</ui:define>

<ui:define name="content">

<div class="login-container">
    <p:panel styleClass="login-card">
        <f:facet name="header">
            <h1>#{msg['message.confirmation']}</h1>
        </f:facet>

        <div class="info-grid">
            <div class="info-row">
                <span class="info-label">#{playerC.player.playerFirstName}</span>
                <span class="info-value">#{playerC.player.playerLastName}</span>
            </div>
        </div>

        <div style="text-align:center; margin:1rem 0;">
            <b>A confirmation mail has been sent to #{playerC.player.playerEmail}"...</b>
            <br/>
            Click on the confirmation link in this email to activate your account !!!!!!
        </div>

        <f:facet name="footer">
            <h:form id="confirmation">
                <p:commandButton
                    id="button01"
                    value="#{msg['button.player.restart']}"
                    ajax="false"
                    immediate="true"
                    icon="pi pi-power-off"
                    action="#{playerC.logout('from confirmation.xhtml')}"/>
            </h:form>
        </f:facet>
    </p:panel>
</div>

</ui:define>
</ui:composition>
