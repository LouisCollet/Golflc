<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml" >

<ui:define name="title">Create Professional </ui:define>
<ui:define name="content">

<h:form id="form_professional">

<div class="login-container form-top">
<p:panel styleClass="login-card form-card">
<f:facet name="header"><h1>#{msg['message.select.pro']}</h1></f:facet>

<ui:include src="include/include_summary_player.xhtml"/>
<ui:include src="include/include_summary_club.xhtml"/>

<p:panelGrid
    id="panelGrid2"
    layout="flex"
    columns="2"
    columnClasses="col1Flex, col2Flex">

        <ui:include src="/include/include_player_selector.xhtml" >
            <ui:param name="playerPurpose" value="professional"/>
            <ui:param name="playerLabel" value="#{msg['professional.title']}"/>
        </ui:include>

        <ui:include src="/include/include_club_selector.xhtml" />

    <p:outputLabel for="@next" value="#{msg['unavailable.period.start']} :"/>
    <p:datePicker value="#{appContext.professional.proStartDate}"
                  id="startDatePro"
                  locale="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  size="15"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  lang="#{languageC.locale}"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                  yearNavigator="true"
                  monthNavigator="true" />

      <p:outputLabel for="@next" value="#{msg['unavailable.period.end']} :"/>
      <p:datePicker value="#{appContext.professional.proEndDate}"
                  id="endDatePro"
                  locale="#{languageC.locale}"
                  lang="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  size="15"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(10)}"
                  yearNavigator="true"
                  monthNavigator="true" />

         <p:outputLabel for="@next" value="#{msg['professional.amount']} :"/>
         <p:inputNumber  label="lesson"
                       id="proAmount"
                       value="#{appContext.professional.proAmount}"
                       title="#{msg['tooltip.tarif.price3']}"
                       size="4"
                       lang="#{languageC.locale}"
                       decimalPlaces="1"
                       decimalSeparator="."
                       placeholder="99.9" />
   <p:outputLabel value="#{msg['professional.workdays']} :"/>
    <h:panelGroup layout="block" styleClass="p-mt-2">
         <p:selectManyCheckbox id="days1" 
                          value="#{appContext.professional.selectedDays}" 
                          layout="flex"
                          columns="4"> 
            <f:selectItems value="#{appContext.professional.days}"
                       var="day"
                       itemLabel="#{msg[day.labelKey]}"
                       itemValue="#{day.name}" />
        </p:selectManyCheckbox>
    </h:panelGroup>     
  

</p:panelGrid>

<f:facet name="footer">
        <p:commandButton
                         value="#{msg['button.professional.create']}"
                         id="createProfessional"
                         update=":growl-msg"
                         icon="pi pi-database"
                         action="#{clubC.createProfessional()}"/>
</f:facet>
</p:panel>
</div>
</h:form>
</ui:define>
</ui:composition>
