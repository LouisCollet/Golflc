<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml" >
    
<ui:define name="title">Create Professional </ui:define>
<ui:define name="content">

<h:form id="form_professional" enctype="application/x-www-form-urlencoded" >
<h:graphicImage id="graphic1" name="images/golf lesson2.jpg" alt="image missing :golf lesson2.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage id="graphic2" name="images/golf lesson2.jpg" alt="image missing :golf lesson2.jpg" style="float: right;"></h:graphicImage>
<ui:include src="include/include_summary_player.xhtml"/>
<ui:include src="include/include_summary_club.xhtml"/>
<p:panelGrid 
    id="panelGrid2"
    layout="tabular"
    columns="2"
    columnClasses="col1, col2"
    style="width:70%">
    
       <f:facet name="header">
        <h1>#{msg['message.select.pro']}</h1>
    </f:facet>
        <!-- =================== INCLUDE CLUB SELECTOR =================== -->
                <ui:include src="/include/include_player_selector.xhtml" >
                    <ui:param name="clubLabel" value="Club 1" />
                </ui:include>
        <!-- =================== INCLUDE COURSE SELECTOR =================== -->
                <ui:include src="/include/include_club_selector.xhtml" />
 
    <h:outputText  value="#{msg['unavailable.period.start']} :"/>
    <p:datePicker value="#{appContext.professional.proStartDate}"
                  id="startDatePro"
                  locale="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  size="15"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                  yearNavigator="true"
                  monthNavigator="true"
                  >
    </p:datePicker>

      <h:outputText  value="#{msg['unavailable.period.end']} :"/>
      <p:datePicker value="#{appContext.professional.proEndDate}"
                  id="endDatePro"
                  locale="#{languageC.locale}"
                  lang="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  size="15"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(10)}"
                  yearNavigator="true"
                  monthNavigator="true"
                  >
    </p:datePicker>
         <h:outputText  value="#{msg['professional.amount']} :"/>
         <p:inputNumber  label="lesson"
                       id="monday${i}"
                       value="#{appContext.professional.proAmount}"
                       title="#{msg['tooltip.tarif.price3']}"
                       size="4"
                       lang="#{languageC.locale}"
                       decimalPlaces="1"
                       decimalSeparator="."
                       placeholder="99.9" >
          </p:inputNumber>

<f:facet name="footer">
        <p:commandButton
                         value="#{msg['button.professional.create']}"
                         id="createPlayer"
                         ajax="false"
                         style="font-weight:normal "
                         update="growl-msg"
                          
                         icon="pi pi-database"
                         action="#{clubC.createProfessional()}"/>
</f:facet>
</p:panelGrid>

</h:form>
</ui:define>
</ui:composition>
