<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Select Scramble Rounds Page</ui:define>

<ui:define name="content">

<h:form id="form_select_scramble_round">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header">
    <h1>#{msg['message.selectround']} scramble #{msg['message.for.score']}</h1>
</f:facet>

<p:dataTable id="player_has_played_round"
             rowIndexVar="row"
             value="#{roundC.listScrambleRounds('scr')}"
             var="c"
             emptyMessage="#{msg['message.table.empty']}"
             filteredValue="#{roundC.filteredCars}"
             styleClass="compact-table">

    <p:column headerText="#"
              style="width:40px"
              id="rowColumn">
        #{row+1}
    </p:column>

    <p:column headerText="#{msg['round.selected']}" style="width:100px">
        <p:commandButton
            id="selectButtonColumn"
            action="#{roundC.listParticipants_scramble(c)}"
            value="#{c.idround} - #{msg['button.select']}"
            icon="pi pi-pencil" />
    </p:column>

    <p:column headerText="#{msg['round.date']}"
              style="width:70px"
              id="dateColumn">
        <h:outputText value="#{c.roundDate}">
            <f:convertDateTime type="localDate" pattern="dd/MM/yyyy" />
        </h:outputText>
    </p:column>

    <p:column id="colclubname"
              headerText="#{msg['club.name']}"
              style="width:100px"
              filterMatchMode="contains"
              filterBy="#{c.clubName}">
        #{c.clubName}
    </p:column>

    <p:column id="coursenameColumn"
              headerText="#{msg['course.name']}"
              style="width:100px"
              filterMatchMode="contains"
              filterBy="#{c.courseName}">
        #{c.courseName}
    </p:column>

    <p:column headerText="#{msg['round.competition']}"
              style="width:100px"
              id="competitionColumn">
        #{c.RoundName}
    </p:column>

    <p:column headerText="#{msg['round.team']}"
              style="width:100px">
        #{c.iroundTeam}
    </p:column>

    <p:column headerText="#{msg['round.game']}"
              style="width:100px"
              id="gameColumn">
        #{c.roundGame}
    </p:column>

</p:dataTable>
</p:panel>
</div>
</h:form>
</ui:define>
</ui:composition>
