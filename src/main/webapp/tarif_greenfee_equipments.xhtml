<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
       xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml"
>
<ui:define name="title">Tarif Page Equipments</ui:define>


<ui:define name="content">

<h:graphicImage name="images/tarif1.jpg" alt="image missing :tarif1.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage name="images/tarif2.jpg" alt="image missing :tarif2.jpg" style="float: right;"></h:graphicImage>
<h:form id="tarifEquipments" enctype="application/x-www-form-urlencoded" >

<ui:include src="include/include_summary_greenfee.xhtml"/>

<p:panelGrid
    id="panel1"
    layout="tabular"
    columns="2"
    columnClasses="col1, col2">

<f:facet name="header">
    <h:outputText escape="false" value="#{msg['title.equipments.tarif']} EQUIPMENTS" />
</f:facet>
            <h:panelGroup id="panelSeason" layout="block" >
            <h:outputText value="#{msg['tarif.season']} " />
                <i class="pi pi-cloud"></i>
                <i class="pi pi-sun"></i>
                #{courseC.tarifGreenfee.equipmentsList.size()}
            </h:panelGroup>
            
            <p:selectOneButton id="Season_High-Medium-Low"
                          required="true"
                          value="#{courseC.tarifGreenfee.workSeason}" >
                <f:selectItem itemLabel="#{msg['tarif.all']}"     itemValue="A" />
                <f:selectItem itemLabel="#{msg['tarif.high']}"    itemValue="H" />
                <f:selectItem itemLabel="#{msg['tarif.medium']}"  itemValue="M" />
                <f:selectItem itemLabel="#{msg['tarif.low']}"     itemValue="L" />
            </p:selectOneButton>
           
           
  <h:panelGroup id="panelItem" layout="block" >
     <h:outputText value="#{msg['tarif.members.equipments']} "/>
        <i class="pi pi-list"   ></i>
        <i class="pi pi-pencil" ></i>
  </h:panelGroup>  
    
   <p:inputText   id="EquipmentsText"
                  size="20"
                  title="#{msg['tooltip.tarif.item']}"
	          value="#{courseC.tarifGreenfee.workItem}" 
                        placeholder="Enter equipment "/>
  
  <h:panelGroup id="EquipmentsPrice" layout="block" >
     <h:outputText value="#{msg['tarif.members.price']} "/>
     <i class="pi pi-euro" ></i>
 </h:panelGroup>

    <p:inputNumber   id="EquipAmount"
                       value="#{courseC.tarifGreenfee.workPrice}"
                       title="#{msg['tooltip.tarif.price2']}"
                       size="6"
                       lang="#{languageC.locale}"
                       decimalSeparator="."
                       decimalPlaces="1"
                       placeholder="99.9" >
        </p:inputNumber> 

<f:facet name="footer">
        <p:commandButton value="#{msg['tarif.equipments.create']}"
                         id="commandButton1"
                         ajax="false"
                         update="growl-msg"
                         immediate="false"
                         icon="pi pi-database"
                         action="#{courseC.inputTarifGreenfee('EQ')}"/>
         <p:commandButton value="#{msg['tarif.back']}"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-undo"
                         style="float: right;"
                         action="tarif_greenfee_menu.xhtml?faces-redirect=true"
                         />
</f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
