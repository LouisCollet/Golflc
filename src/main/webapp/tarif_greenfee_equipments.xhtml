<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Tarif Page Equipments</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header"><h1>#{msg['title.equipments.tarif']} EQUIPMENTS</h1></f:facet>
<h:form id="tarifEquipments">

<ui:include src="include/include_summary_greenfee.xhtml"/>

<p:panelGrid
    id="panel1"
    layout="flex"
    columns="2"
    columnClasses="col1Flex,col2Flex">

            <h:panelGroup id="panelSeason" layout="block">
            <h:outputText value="#{msg['tarif.season']} " />
                <i class="pi pi-cloud"></i>
                <i class="pi pi-sun"></i>
                #{memC.tarifGreenfee.equipmentsList.size()}
            </h:panelGroup>

            <p:selectOneButton id="Season_High-Medium-Low"
                          required="true"
                          value="#{memC.tarifGreenfee.workSeason}">
                <f:selectItem itemLabel="#{msg['tarif.all']}"     itemValue="A" />
                <f:selectItem itemLabel="#{msg['tarif.high']}"    itemValue="H" />
                <f:selectItem itemLabel="#{msg['tarif.medium']}"  itemValue="M" />
                <f:selectItem itemLabel="#{msg['tarif.low']}"     itemValue="L" />
            </p:selectOneButton>

  <h:panelGroup id="panelItem" layout="block">
     <h:outputText value="#{msg['tarif.members.equipments']} "/>
        <i class="pi pi-list"></i>
        <i class="pi pi-pencil"></i>
  </h:panelGroup>

   <p:inputText   id="EquipmentsText"
                  size="20"
                  title="#{msg['tooltip.tarif.item']}"
                  value="#{memC.tarifGreenfee.workItem}"
                  placeholder="Enter equipment "/>

  <h:panelGroup id="EquipmentsPrice" layout="block">
     <h:outputText value="#{msg['tarif.members.price']} "/>
     <i class="pi pi-euro"></i>
 </h:panelGroup>

    <p:inputNumber   id="EquipAmount"
                       value="#{memC.tarifGreenfee.workPrice}"
                       title="#{msg['tooltip.tarif.price2']}"
                       size="6"
                       lang="#{languageC.locale}"
                       decimalSeparator="."
                       decimalPlaces="1"
                       placeholder="99.9">
        </p:inputNumber>

<f:facet name="footer">
        <p:commandButton value="#{msg['tarif.equipments.create']}"
                         id="commandButton1"
                         ajax="false"
                         update="growl-msg"
                         icon="pi pi-database"
                         action="#{memC.inputTarifGreenfee('EQ')}"/>
         <p:commandButton value="#{msg['tarif.back']}"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-undo"
                         action="tarif_greenfee_menu.xhtml?faces-redirect=true" />
</f:facet>
</p:panelGrid>
</h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
