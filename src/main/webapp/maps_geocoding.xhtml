<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Geocoding service</ui:define>
<ui:define name="head"></ui:define>
<ui:define name="content">

    <style type="text/css">
      html, body, #map-canvas {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      #panel {
        position: absolute;
        top: 5px;
        left: 50%;
        margin-left: -180px;
        z-index: 5;
        background-color: #fff;
        padding: 5px;
        border: 1px solid #999;
      }

      #panel, .panel {
        font-family: 'Roboto','sans-serif';
        line-height: 30px;
        padding-left: 10px;
      }

      #panel select, #panel input, .panel select, .panel input {
        font-size: 15px;
      }

      #panel select, .panel select {
        width: 100%;
      }

      #panel i, .panel i {
        font-size: 12px;
      }
    </style>

    <script type="text/javascript"
            src="https://maps.googleapis.com/maps/api/js?key=#{settings.getProperty('GOOGLE_MAPS_API_KEY')}"/>
    <script type="text/javascript">
var geocoder;
var map;
var google;
function initialize() {
  geocoder = new google.maps.Geocoder();
  var latlng = new google.maps.LatLng(-34.397, 150.644);
  var mapOptions = {
    zoom: 8,
    center: latlng
  };
  map = new google.maps.Map(document.getElementById('map-canvas'), mapOptions);
}

function codeAddress() {
  var address = document.getElementById('address').value;
  geocoder.geocode( { 'address': address}, function(results, status) {
    if (status === google.maps.GeocoderStatus.OK) {
      map.setCenter(results[0].geometry.location);
      var marker = new google.maps.Marker({
          map: map,
          position: results[0].geometry.location
      });
    } else {
      alert('Geocode was not successful for the following reason: ' + status);
    }
  });
}

google.maps.event.addDomListener(window, 'load', initialize);

    </script>

    <div class="login-container" style="min-height:auto; align-items:flex-start;">
        <p:panel styleClass="login-card form-card" style="max-width:100%;">
            <f:facet name="header">
                <h1>#{msg['title.score.results']}</h1>
            </f:facet>

            <div id="panel">
                <input id="address" type="text" value="Sydney, NSW"/>
                <input type="button" value="Geocode" onclick="codeAddress()"/>
            </div>
            <div id="map-canvas"></div>

            <p:panelGrid
                id="panelgrid1"
                layout="flex"
                columnClasses="col1Flex,col2Flex,col3,col4"
                columns="4">
                <h:outputText value="#{msg['round.competition']} :" />
            </p:panelGrid>
        </p:panel>
    </div>

</ui:define>
</ui:composition>
