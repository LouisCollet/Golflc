<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Travel domicile vers Club</ui:define>
<ui:define name="content">

<script async="async"
        defer="defer"
        type="text/javascript"
        src="https://maps.googleapis.com/maps/api/js?key=#{settings.getProperty('GOOGLE_MAPS_API_KEY')}&amp;language=#{languageC.locale}">
</script>
<h:outputScript library="js" name="maps_home_club.js"/>

<div class="login-container" style="min-height:auto; align-items:flex-start;">
    <p:panel styleClass="login-card form-card" style="max-width:100%;">
        <f:facet name="header">
            <h1>#{msg['google.distance']} — Calculate Route</h1>
        </f:facet>

        <h:form id="calculate_distance">
            <p:panelGrid id="panelgrid1"
                         layout="flex"
                         columns="2"
                         columnClasses="col1Flex, col2Flex">

                <p:outputLabel for="@next" value="#{msg['player.address']} :"/>
                <p:inputText id="txtSource"
                             value="#{playerC.player.address.city}"
                             size="40"/>

                <p:outputLabel value="Destination :"/>
                <h:panelGroup layout="block" styleClass="selector-row">
                    <h:outputText value="#{clubC.club.address.street}, #{clubC.club.address.city}, #{clubC.club.address.country.code}"/>
                    <input type="hidden" id="calculate_distance:txtDestination"
                           value="#{clubC.club.address.street}, #{clubC.club.address.city}, #{clubC.club.address.country.code}"/>
                </h:panelGroup>

                <p:outputLabel for="@next" value="#{msg['club.latitude']} :"/>
                <p:inputText id="ClubLatitude"
                             value="#{clubC.club.address.latLng.lat}"/>

                <p:outputLabel for="@next" value="#{msg['club.longitude']} :"/>
                <p:inputText id="ClubLongitude"
                             value="#{clubC.club.address.latLng.lng}"/>

                <f:facet name="footer">
                    <p:commandButton value="GetRoute"
                                     id="buttonCreate"
                                     type="button"
                                     icon="pi pi-map-marker"
                                     onclick="GetRoute()"/>
                </f:facet>
            </p:panelGrid>

            <p:divider layout="horizontal" type="solid"/>

            <p:panelGrid id="panelgrid2"
                         columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">
                <p:outputLabel value="#{msg['google.distance']} :"/>
                <p:inputText id="distance02" readonly="true"/>

                <p:outputLabel value="#{msg['google.duration']} :"/>
                <p:inputText id="duration02" readonly="true"/>
            </p:panelGrid>

            <div id="dvMap" class="mt-3" style="width:100%; height:500px;"/>
            <div id="dvPanel" class="mt-2" style="width:100%; max-height:300px; overflow:auto;"/>
        </h:form>
    </p:panel>
</div>

</ui:define>
</ui:composition>
