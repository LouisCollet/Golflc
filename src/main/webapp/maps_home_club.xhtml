<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Travel domicile vers Club</ui:define>
<ui:define name="head"></ui:define>
<ui:define name="content">

<script async="async"
        defer="defer"
        type="text/javascript"
        src="https://maps.googleapis.com/maps/api/js?key=#{settings.getProperty('GOOGLE_MAPS_API_KEY')}&amp;language=#{languageC.locale}">
</script>
<h:outputScript library="js" name="maps_home_club.js"/>

<div class="login-container" style="min-height:auto; align-items:flex-start;">
    <p:panel styleClass="login-card form-card" style="max-width:100%;">
        <f:facet name="header">
            <h1>Calculate Distance</h1>
        </f:facet>

        <h:form id="calculate_distance">
            <p:panelGrid id="panelgrid1"
                         layout="flex"
                         columns="2"
                         columnClasses="col1Flex, col2Flex">

                <h:outputText value="D\u00e9part"
                              style="width: 100px;"/>
                <h:inputText id="txtSource"
                             value="#{playerC.player.address.city}" size="40"/>

                <h:outputText value="Destination"
                              style="width: 100px;"/>
                <h:inputText id="txtDestination"
                             value="#{clubC.club.address.street},#{clubC.club.address.city},#{clubC.club.address.country.code}" size="60"/>

                <p:outputLabel for="@next" value="#{msg['club.latitude']} :"/>
                <p:inputText id="ClubLatitude"
                             value="#{clubC.club.clubLatitude}"/>

                <p:outputLabel for="@next" value="#{msg['club.longitude']} :"/>
                <p:inputText id="ClubLongitude"
                             value="#{clubC.club.clubLongitude}"/>

                <f:facet name="footer">
                    <p:commandButton value="GetRoute"
                                     id="buttonCreate"
                                     type="submit"
                                     icon="pi pi-shopping-cart"
                                     onclick="GetRoute()"/>
                </f:facet>
            </p:panelGrid>

            <p:panelGrid id="panelgrid2"
                         columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">
                <h:outputText value="#{msg['google.distance']} :"
                              id="distance01"/>
                <h:inputText id="distance02"/>
                <h:outputText value="#{msg['google.duration']} :"
                              id="duration01"/>
                <h:inputText id="duration02"/>
            </p:panelGrid>

            <div id="dvMap" style="width: 1000px; height: 1000px;"/>
            <div id="dvPanel" style="width: 500px; height: 100%; background-color: lightblue;"/>
        </h:form>
    </p:panel>
</div>

</ui:define>
</ui:composition>
