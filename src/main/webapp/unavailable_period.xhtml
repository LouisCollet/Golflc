<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Unavailable Period</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header"><h1>#{msg['title.unavailable.period']}</h1></f:facet>
<h:form id="form_unavailable_period">

<ui:include src="include/include_summary_club.xhtml"/>
<p:panelGrid
    id="panelGrid1"
    layout="flex"
    columns="2"
    columnClasses="col1Flex, col2Flex">

    <h:outputText  value="#{msg['unavailable.period.start']} :"/>
    <p:datePicker value="#{clubC.unavailable.period.startDate}"
                  id="startDateid"
                  locale="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  size="15"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  mindate="#{utilsC.localDateWeek(-1)}"
                  maxdate="#{utilsC.localDateYear(1)}"
                  yearNavigator="true"
                  monthNavigator="true" />

      <h:outputText value="#{msg['unavailable.period.end']} :"/>
      <p:datePicker value="#{clubC.unavailable.period.endDate}"
                  id="endDateid"
                  locale="#{languageC.locale}"
                  lang="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  size="15"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  mindate="#{utilsC.localDateWeek(-1)}"
                  maxdate="#{utilsC.localDateYear(1)}"
                  yearNavigator="true"
                  monthNavigator="true" />

     <h:panelGroup id="panelGroupComment" layout="block" >
        <h:outputText value="#{msg['handicap.comment']}" />
        <i class="pi pi-comment"></i>
     </h:panelGroup>

    <h:outputText id="comment"
              value="#{clubC.unavailable.period.comment}"
              escape="false"  />
</p:panelGrid>

<p:dataTable id="tablePeriod"
             value="#{clubC.unavailable.structure.structureList}"
             var="var"
             style="margin: 0 auto;width:50%"
             rowIndexVar="row"
             emptyMessage="#{msg['message.table.inscriptions.competition.empty']}"
             styleClass="compact-table" >
    <p:column headerText="#{msg['course.id']}"
              width="10%">
        <h:outputText value="#{var.courseId}"/>
    </p:column>

    <p:column headerText="#{msg['unavailable.structure.cause']}"
              width="15%">
        <h:outputText value="#{var.item}"/>
    </p:column>

    <p:column headerText="#{msg['unavailable.title']}"
              width="15%">
       <p:selectBooleanButton
                             id="ButtonChoix_yes_no${i}"
                             value="#{clubC.unavailable.period.itemPeriod[row]}"
                             onLabel="Yes"
                             offLabel="No"
                             onIcon="pi pi-check"
                             offIcon="pi pi-times"/>
    </p:column>

<f:facet name="footer">
    <p:commandButton value="#{msg['unavailable.period.create']}"
                     id="commandButtonCreate"
                     ajax="false"
                     update="growl-msg"
                     icon="pi pi-database"
                     action="#{clubC.createUnavailablePeriod()}"/>
    <p:commandButton value="#{msg['tarif.editor']}"
                     id="commandButtonBack"
                     ajax="false"
                     update="growl-msg"
                     icon="pi pi-comment"
                     disabled="#{clubC.unavailable.period.itemPeriod[0] eq null}"
                     action="unavailable_editor.xhtml?faces-redirect=true"/>
    <p:commandButton value="Visualisation"
                     id="commandButtonShow"
                     ajax="false"
                     update="growl-msg"
                     immediate="true"
                     icon="pi pi-info"
                     action="unavailable_show.xhtml?faces-redirect=true"/>
    <p:commandButton value="Show Structure"
                     id="commandButtonVisual"
                     ajax="false"
                     update="growl-msg"
                     immediate="true"
                     icon="pi pi-plus"
                     action="#{clubC.showUnavailableStructure}"/>
    <p:commandButton value="#{msg['tarif.back']}"
                     id="commandButtonMenu"
                     ajax="false"
                     update="growl-msg"
                     immediate="true"
                     icon="pi pi-undo"
                     action="unavailable_menu.xhtml?faces-redirect=true" />
</f:facet>
    </p:dataTable>
</h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
