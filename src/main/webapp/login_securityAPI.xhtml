<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="jakarta.faces.core"
    xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="primefaces"
    template="templates/masterTemplate.xhtml">
    <ui:define name="title">
        Login Soteria
    </ui:define>

    <ui:define name="content">

        <h:form id="login_security" >

        <div class="login-container" style="min-height:auto; align-items:flex-start;">
        <p:panel styleClass="login-card form-card">
        <f:facet name="header">
            <h1>Login Soteria</h1>
        </f:facet>

            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex,col2Flex">
                <h:outputText value="Username"/>
                <p:inputText id="userName"
                             value="#{loginBacking.username}"
                             />

                <h:outputText value="Password"/>
                <p:password id="password1"
                            value="#{loginBacking.password}"
                            />
            </p:panelGrid>
            <p:commandButton value="#{msg['login.user.old']}"
                             update="growl-msg"
                             ajax="false"
                             icon="pi pi-key"
                             action="#{loginBacking.submit}"
                             />

        </p:panel>
        </div>

        </h:form>
    </ui:define>
</ui:composition>
