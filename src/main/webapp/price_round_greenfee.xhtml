<ui:define name="title">Tarif Round</ui:define>
<ui:define name="content">
<h:graphicImage name="images/tarif1.jpg" alt="image missing :tarif1.jpg" style="float: left;"></h:graphicImage>

<h:form id="form_price_round_greenfee" enctype="application/x-www-form-urlencoded" >
<ui:include src="include/include_summary_round.xhtml"/>
<ui:include src="include/include_summary_greenfee.xhtml"/>

<c:set var="greenfeeType" value="#{courseC.tarifGreenfee.greenfeeType}"/>

<c:set var="tarif" value="#{courseC.tarifGreenfee}"/>
<c:set var="courseId" value="#{courseC.course.idcourse}"/>
      <c:choose>
         <c:when test="#{greenfeeType eq 'BA'}">
          <ui:include src="include/include_greenfee_basic.xhtml"/> 
         </c:when>
         <c:when test="#{greenfeeType eq 'DA' }">
             <ui:include src="include/include_greenfee_days.xhtml"/>
         </c:when>
         <c:when test="#{greenfeeType eq 'HO' }">
             <ui:include src="include/include_greenfee_hours.xhtml"/>
         </c:when>
         <c:otherwise>
            No comment sir...There is an error in greenfeeType
         </c:otherwise>
      </c:choose>

<ui:include src="include/include_greenfee_equipments.xhtml"/>
