<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Tarif Round</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card"
         xmlns:p="primefaces">
<f:facet name="header" xmlns:f="jakarta.faces.core"><h1>Tarif Round</h1></f:facet>
<h:form id="form_price_round_greenfee">
<ui:include src="include/include_summary_round.xhtml"/>
<ui:include src="include/include_summary_greenfee.xhtml"/>

<ui:include src="#{memC.greenfeeIncludeSrc}"/>

<ui:include src="include/include_greenfee_equipments.xhtml"/>

<p:panel id="totalPricePanel"
         styleClass="total-price-panel"
         style="margin-top:20px; text-align:right;">
    <h:outputText value="#{msg['tarif.total']} : "
                  style="font-weight:bold; font-size:1.5rem;"/>
    <h:outputText value="#{memC.tarifGreenfeeTotal}"
                  style="font-size:2rem; font-weight:bold; color:var(--primary-color);">
        <f:convertNumber maxFractionDigits="2" minFractionDigits="2"/>
    </h:outputText>
    <h:outputText value=" #{memC.tarifGreenfee.currency}"
                  style="font-size:1.5rem; margin-left:4px;"/>
</p:panel>

</h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
