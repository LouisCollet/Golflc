<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Simple Calculator (HTML-css-js)</ui:define>
<ui:define name="content">

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/14.0.1/math.min.js"
    integrity="sha512-PbOEC/cOHBQKshG/XgYoI+kff08IraowCgPlDT8NL91+ZPaeuvWVtC7jYTDua9Kow5QTpX+EMIM0RBKAA2Hsmg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer">
</script>

<h:outputStylesheet library="styles" name="Calculator.css"/>

<h:form id="calculator_form" >

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <h1>Calculator</h1>
</f:facet>

  <table class="container">
      <tr>Calculator css and js math.js version 2024-12-11, 14.0.1</tr>
        <tr>
            <td colspan="5">
                <input id="result"
                       class="display-box"
                       type="text"
                       placeholder="0"
                      />
            </td>
        </tr>
        <tr>
            <td><input class="button" type="button" value="1" onclick="display('1')" /> </td>
            <td><input class="button" type="button" value="2" onclick="display('2')" /> </td>
            <td><input class="button" type="button" value="3" onclick="display('3')" /> </td>
            <td><input class="button" type="button" value="&#247;" onclick="display('/')" /> </td>
            <td><input class="button" type="button" value="&#8592;" onclick="backSpace()" style="background-color: #fb0066;" /> </td>
        </tr>
        <tr>
            <td><input class="button" type="button" value="4" onclick="display('4')" /> </td>
            <td><input class="button" type="button" value="5" onclick="display('5')" /> </td>
            <td><input class="button" type="button" value="6" onclick="display('6')" /> </td>
            <td><input class="button" type="button" value="-" onclick="display('-')" /> </td>
            <td><input class="button" type="button" value="C" onclick="clearScreen()" style="background-color: #fb0066;" /> </td>
        </tr>
        <tr>
            <td><input class="button" type="button" value="7" onclick="display('7')" /> </td>
            <td><input class="button" type="button" value="8" onclick="display('8')" /> </td>
            <td><input class="button" type="button" value="9" onclick="display('9')" /> </td>
            <td><input class="button" type="button" value="+" onclick="display('+')" /> </td>
            <td><input class="button" type="button" value="(" onclick="display('(')" /> </td>
        </tr>
        <tr>
            <td><input class="button" type="button" value="." onclick="display('.')" /> </td>
            <td><input class="button" type="button" value="0" onclick="display('0')" /> </td>
            <td><input class="button" type="button" value="=" onclick="calculate()" style="background-color: #fb0066;" /> </td>
            <td><input class="button" type="button" value="*" onclick="display('*')" /> </td>
            <td><input class="button" type="button" value=")" onclick="display(')')" /> </td>
        </tr>
    </table>

<script type="text/javascript">
"use strict";
function clearScreen() {
    document.getElementById("result").value = "";
}

function display(value) {
    document.getElementById("result").value += value;
}
function backSpace() {
    document.getElementById("result").value = document.getElementById("result").value.slice(0, -1);
}
function calculate() {
  try{
    var q = math.evaluate(document.getElementById("result").value);
    document.getElementById("result").value = math.round(q,4);
  }catch(error){
       console.error(error);
       alert("we have the following error\n" + error);
    }
}
function myFunction(event) {
    if    (event.key === '0' || event.key === '1'
        || event.key === '2' || event.key === '3'
        || event.key === '4' || event.key === '5'
        || event.key === '6' || event.key === '7'
        || event.key === '8' || event.key === '9'
        || event.key === '+' || event.key === '-'
        || event.key === '*' || event.key === '/')
                document.getElementById("result").value += event.key;
}
</script>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
