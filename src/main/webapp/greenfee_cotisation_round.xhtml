<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="jakarta.faces.core"
    xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="primefaces"
    template="templates/masterTemplate.xhtml">

<ui:define name="title">Choice between greenfee and Annual Cotisation</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header"><h1>#{msg['title.cotisation.choice']}</h1></f:facet>
<h:form id="tarifRound">
<ui:include src="include/include_summary_round.xhtml"/>
<p:panelGrid
    id="panel1"
    layout="flex"
    columns="3"
    columnClasses="col1Flex,col2Flex">

<f:facet name="footer">
         <p:commandButton value="#{msg['greenfee.pay']}"
                         id="commandButtonGreenfee"
                         ajax="false"
                         update="growl-msg"
                         icon="pi pi-credit-card"
                         action="#{memC.findTarifGreenfee()}" />
         <p:commandButton value="#{msg['cotisation.member']}"
                         id="commandButtonCotisation"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-credit-card"
                         action="#{memC.findTarifCotisation()}" />
         <p:commandButton value="retour Welcome screen"
                         id="commandButton1"
                         ajax="false"
                         update="growl-msg"
                         icon="pi pi-database"
                         action="welcome.xhtml?faces-redirect=true" />
</f:facet>
</p:panelGrid>
</h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
