<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
       xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Tarif Member textEditor </ui:define>
<ui:define name="head"> </ui:define>
<ui:define name="content">
<h:graphicImage name="images/editor1.jpg" alt="image missing :tarif1.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage name="images/quilljs.png" alt="image missing :tarif2.jpg" style="float: right;"></h:graphicImage>
<h:form id="tarif_members_editor" enctype="application/x-www-form-urlencoded">
<ui:include src="include/include_summary_cotisation.xhtml"/>
<p:panelGrid
        id="panel"
        layout="tabular"
        columns="1" >

<f:facet name="header">
         <h:outputText escape="false" value="#{msg['title.cotisation.comment']}" />
</f:facet> 
    
<p:textEditor id="textEditor"
                  secure="false"
                  widgetVar="editorVar"
                  value="#{courseC.tarifMember.comment}"
                  height="70px" 
                  style="width:600px;background-color: whitesmoke;font-weight: normal;"
                  placeholder="Enter here your content" />

 <p:dialog id="dialog1"
           width="auto"
           height="auto"
           header="Content of comment"
           footer="this is the footer"
           widgetVar="dlg" 
           showEffect="fade" 
           hideEffect="fade"
           styleClass="ui-page-theme-a ui-bar-inherit" >
        <p:outputPanel id="displayComment">
            <h3> Comment registered !</h3>
            <h:outputText value="#{courseC.tarifMember.comment}" escape="false" />
 
    <!--        <h3>Custom</h3>
            <h:outputText value="#{courseC.tarifMember.comment}" escape="false" />
    -->
        </p:outputPanel>
</p:dialog>
 
 <f:facet name="footer">
         <p:commandButton id="commandButtonComment"
                     value="#{msg['tarif.members.add.comment']}"
                     update="displayComment"
                     oncomplete="PF('dlg').show()"
                     ajax="true"
                     icon="pi pi-database" />
         <p:commandButton value="Clear"
                     type="buttonClear"
                     onclick="PF('editorVar').clear();"
                     icon="pi pi-times" />
         <p:commandButton value="#{msg['tarif.back']}"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-replay"
                         action="tarif_members_menu.xhtml?faces-redirect=true"/>
 </f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
