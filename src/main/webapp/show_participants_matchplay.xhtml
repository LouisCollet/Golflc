<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Participants Matchplay Round Page </ui:define>

<ui:define name="content">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header"><h1>#{msg['round.result.matchplay']}</h1></f:facet>

<h:form id="participants_matchplay">
    <ui:include src="include/include_summary_round.xhtml"/>

<p:dataTable id="matchplay_table"
             value="#{roundC.calcMatchplayResult()}"
             var="c"
             rowIndexVar="rowIndex"
             emptyMessage="#{msg['message.table.empty']}"
             style="margin: 0 auto;width:40%;text-align:center;" >

 <c:set var="get"         value="#{calcMatchplayResult.getFinalResult().getFirst()}"/>
 <c:set var="player1Id"   value="#{get.getPlayer1().getPlayerId()}"/>
 <c:set var="player2Id"   value="#{calcMatchplayResult.getFinalResult().getFirst().getPlayer2().getPlayerId()}"/>
 <c:set var="player1Name" value="#{get.getPlayer1().getPlayerLastFirst()}"/>
 <c:set var="player2Name" value="#{get.getPlayer2().getPlayerLastFirst()}"/>

<f:facet name="header">
     #{msg['round.result.matchplay']}
</f:facet>

<p:columnGroup  type="header" >
      <p:row>
            <p:column headerText=""/>
            <p:column colspan="2">
                        <f:facet name="header">
                            <h:outputText value="PLAYER 1 = "/>
                            <h:outputText value="#{player1Name}" />
                            <h:outputText value=" (#{player1Id})" />
                        </f:facet>
           </p:column>
            <p:column colspan="2">
                        <f:facet name="header">
                            <h:outputText value="PLAYER 2 = "/>
                            <h:outputText value="#{player2Name}" />
                            <h:outputText value=" (#{player2Id})" />
                        </f:facet>
            </p:column>
      </p:row>
      <p:row>
            <p:column headerText="#{msg['hole.number']}"/>
            <p:column headerText="#{msg['score.gross']}"  style="white-space:pre-line;" />
            <p:column headerText="#{msg['hole.won']}"     style="white-space:pre-line;"/>
            <p:column headerText="#{msg['score.gross']}"  style="white-space:pre-line;" />
            <p:column headerText="#{msg['hole.won']}"     style="white-space:pre-line;" />
      </p:row>
</p:columnGroup>

<p:column>
   #{c.player1.hole}
</p:column>

<p:column>
   #{c.player1.strokes}
</p:column>

<p:column>
   <h:outputText rendered="#{c.player1.result eq 1}" value="#{c.player1.result}"   style="font-size:1.5em;color:blue;" />
   <h:outputText rendered="#{c.player1.result eq 0}" value=""  />
</p:column>

<p:column>
   #{c.player2.strokes}
</p:column>

<p:column>
   <h:outputText rendered="#{c.player2.result eq 1}" value="#{c.player2.result}" style="font-size:1.5em;color:blue;"  />
   <h:outputText rendered="#{c.player2.result eq 0}" value=""  />
</p:column>

            <p:columnGroup type="footer">
                <p:row>
                    <p:column colspan="2" style="text-align:right">
                        <f:facet name="footer">Total Player 1:</f:facet>
                    </p:column>
                    <p:column>
                        <f:facet name="footer">
                            <h:outputText value="#{calcMatchplayResult.getFinalResult().stream().map(o->o.getPlayer1().getResult()).sum()}"/>
                        </f:facet>
                    </p:column>
                     <p:column colspan="1" style="text-align:right">
                        <f:facet name="footer">Total Player 2:</f:facet>
                    </p:column>
                    <p:column>
                        <f:facet name="footer">
                            <h:outputText value="#{calcMatchplayResult.getFinalResult().stream().map(o->o.getPlayer2().getResult()).sum()}"/>
                        </f:facet>
                    </p:column>
                </p:row>
            </p:columnGroup>
</p:dataTable>

</h:form>

</p:panel>
</div>

</ui:define>
</ui:composition>
