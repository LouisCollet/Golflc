<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:path="http://www.w3.org/2000/svg"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/dialogTemplate.xhtml"
>
<ui:define name="title">DF Unavailable Show</ui:define>
<!--

-->
<ui:define name="content">

<h:form id="form_dialog_unavailable_show"  >
<p:outputPanel id="unavailableDetail"
               deferred="true"
               style="text-align:center;">
<p:panelGrid
    id="panel1"
    layout="flex"
    columns="2"
    columnClasses="col1Flex,col2Flex">

<f:facet name="header">
    <h1>Etat du terrain de votre Home Club</h1>
</f:facet>
    
    <h:outputText value="#{msg['club.name']} :" />
    <h:outputText
            id="clubsummary" 
            value="#{clubC.club.clubName} (#{clubC.unavailable.structure.idclub})"
            />
    <h:outputText value="Comment : "/>
    <h:outputText value="#{clubC.unavailable.period.comment}"
                  escape="false" />
    
    <h:panelGroup id="panelStartS" layout="block" >
        <h:outputText  value="#{msg['tarif.period.start']} S: "/>
        <i class="pi pi-calendar"></i>
    </h:panelGroup>
    <h:outputText value="#{clubC.unavailable.structure.startDate}">
         <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
    </h:outputText>
    

<h:panelGroup id="panelEndS" layout="block" >
    <h:outputText  value="#{msg['tarif.period.end']} S: "/>
          <i class="pi pi-calendar"></i>
</h:panelGroup>
    
    <h:outputText value="#{clubC.unavailable.structure.endDate}">
         <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
    </h:outputText>
    
     <h:panelGroup id="panelStartP" layout="block" >
        <h:outputText  value="#{msg['tarif.period.start']} P: "/>
        <i class="pi pi-calendar"></i>
    </h:panelGroup>
    <h:outputText value="#{clubC.unavailable.period.startDate}">
         <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
    </h:outputText>
    

<h:panelGroup id="panelEndP" layout="block" >
    <h:outputText  value="#{msg['tarif.period.end']} P: "/>
          <i class="pi pi-calendar"></i>
</h:panelGroup>
    
    <h:outputText value="#{clubC.unavailable.period.endDate}">
         <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
    </h:outputText>
    
    
<h:panelGroup id="panelItem" layout="block" >
     <h:outputText value="#{msg['tarif.members.item']} "
                   style="font-size: 1.5rem;"
                   />
      <i class="pi pi-list" style="font-size: 2rem" ></i>
</h:panelGroup>  

<h:panelGroup id="panelChoice" layout="block" >    
     <h:outputText value="#{msg['tarif.members.choice']} "
                   style="font-size: 1.5em;"
                   />
     <i class="pi pi-question"></i>

</h:panelGroup>

 <p:dataTable id="tableShow"
             value="#{clubC.unavailable.structure.structureList}"
             var="var"
             style="margin: 0 auto;width:400px"
             rowIndexVar="row"
             emptyMessage="#{msg['message.table.inscriptions.competition.empty']}" >
    <p:column headerText="#{msg['course.id']}"
              width="10%">
        <h:outputText value="#{var.courseId}"/>
    </p:column>
    
    <p:column headerText="#{msg['unavailable.structure.cause']}"
              width="15%">
        <h:outputText value="#{var.item}"/>
    </p:column>

<p:column headerText="#{msg['unavailable.title']}"
              width="15%">
   <h:panelGroup 
              rendered="#{clubC.unavailable.period.itemPeriod[row] eq true}">
      <h:outputText id="PeriodItemY${i}"
	              value="#{clubC.unavailable.period.itemPeriod[row]}"> 
      </h:outputText> 
      <i class="pi pi-check"     style="font-size:30px;color:green"> </i>
      <i class="pi pi-thumbs-up" style="font-size:30px;color:green;"> </i>
   </h:panelGroup> 
   <h:panelGroup id="panelN${i}"
              rendered="#{clubC.unavailable.period.itemPeriod[row] eq false}">
      <h:outputText id="PeriodItemN${i}"
	              value="#{clubC.unavailable.period.itemPeriod[row]}"> 
      </h:outputText> 
      <i class="pi pi-times"       style="font-size:30px;color:red;"> </i>
      <i class="pi pi-thumbs-down" style="font-size:3px;color:red;"> </i>
   </h:panelGroup>
</p:column>
     
     <f:facet name="footer">
         <p:commandButton value="Back"
                         id="commandButtonBack"
                         ajax="false"
                         update="growl-msg"
                        
                         icon="pi pi-undo"
                         action="unavailable_period.xhtml?faces-redirect=true"/>
</f:facet>
     
</p:dataTable>

<f:facet name="footer">
         <p:commandButton value="vers login"
                         id="commandButtonCreate"
                         ajax="false"
                         update="growl-msg"
                          
                         icon="pi pi-undo fa-2x"
                         action="login.xhtml"/>
</f:facet>
-->
</p:panelGrid>
    </p:outputPanel>
</h:form>
</ui:define>
</ui:composition>
