<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="metadata">
<f:metadata>
    <f:viewParam
        required="true"
        name="uuid"
        value="#{playerC.activation.activationKey}"
        requiredMessage="You did not specify a param. (The - activationKey - parameter is missing)"
        converterMessage="Invalid param. (The - activationKey - parameter is not a number)"
        validatorMessage="Invalid param. (The - activationKey - parameter is not a positive number, minimum 3 length, maximum 40)">
        <f:validateLength minimum="3" maximum="40"/>
    </f:viewParam>
    <f:viewParam
        required="true"
        name="language"
        requiredMessage="The 'language' parameter is missing" >
     </f:viewParam>
    <f:viewAction action="#{languageC.setLanguage(param.language)}"/>
    <f:viewAction action="#{playerC.completeActivation(param.uuid)}"/>
 </f:metadata>
</ui:define>
<ui:define name="title">Password check </ui:define>

<ui:define name="content">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <h1>#{msg['message.for.password.init']}</h1>
</f:facet>

<h:form id="password_check">
    <h3>Remaining time for your Password Reset : <span id="countdown">10</span></h3>

   <h:inputHidden value="#{param.time}" id="time" />
   <h:inputHidden value="#{param.millis}" id="millis" />
   <h:inputHidden value="#{param.uuid}" id="uuid" />
   <h:inputHidden value="#{param.language}" id="language" />

<p:panelGrid
    id="panel"
    layout="flex"
    columns="2"
    columnClasses="col1Flex, col2Flex">

   <h:outputText value="#{msg['player.first']}" />
   <h:outputText value="#{param.firstname}" />

   <h:outputText value="#{msg['player.lastname']}" />
   <h:outputText value="#{param.lastname}" />

   <h:outputText value="#{msg['player.language']}" />
   <h:outputText value="#{param.language}" />

   <h:outputText value="Param uuid" />
   <h:outputText value="#{param.uuid}" />

   <h:outputText value="Param Limit Time" />
   <h:outputText id="timeToShow" value="#{param.time}" />

<f:facet name="footer">
        <p:commandButton id="command1"
                         value="#{msg['button.reset.password']}"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-pencil"
                         onclick="javascript_abort();"
                         action="#{playerC.resetPassword()}" >
         </p:commandButton>
</f:facet>
</p:panelGrid>

 <script type="text/javascript">
      console.log("we start js within .xhtml");
      var seconds = 0;
      var time = "";
      var millis = 0;
      var now = new Date().getTime();
      var uuid = "";
   try{
    time = document.getElementById('password_check:time').value;
       console.log("password_check:time = " + time);
    millis = document.getElementById('password_check:millis').value;
       console.log("password_check:millis = " + millis);
       console.log("now  = " + now);
    uuid = document.getElementById('password_check:uuid').value;
    console.log("uuid = " + uuid);
    if(millis &gt; now) {
        seconds = (millis - now) / 1000;
    }else{
        console.log("millis plus petit que now");
        seconds = -1;
    }
        console.log("calculated seconds to wait = " + seconds);

window.onerror = function (errorMsg, url, lineNumber, column, errorObj) {
    console.info('There is an Error: ' + errorMsg + ' in the Script: ' + url + ' at Line: ' + lineNumber
        + ' at Column: ' + column + ' StackTrace: ' +  errorObj);
};

function countdown() {
        seconds = seconds - 1;
        if(seconds &lt; 0) {
            alert("You are too late : we will redirect you to login.xhtml");
            window.location = "login.xhtml";
            javascript_abort();
        }else{
            var s = Math.floor(seconds/60) + " minute(s) " + Math.floor(seconds%60) + " seconds";
            document.getElementById('countdown').innerHTML = s;
            window.setTimeout("countdown()", 1000);
        }
    }
function javascript_abort(){
    console.log("from function user abort js");
   throw new Error('This is not an error. This is just to abort javascript');
}
    window.onload = countdown();
    countdown();
   }catch(exception){
        console.error("js - LC Exception = " + exception.message);
}
</script>

</h:form>
</p:panel>
</div>

</ui:define>
</ui:composition>
