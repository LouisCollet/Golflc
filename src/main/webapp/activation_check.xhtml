<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:my="jakarta.faces.composite/components"
      template="templates/masterTemplate.xhtml">
<ui:define name="metadata">
    <f:metadata>
        <f:viewParam
            required="true"
            name="uuid"
            value="#{courseC.activation.activationKey}"
            requiredMessage="You did not specify a cmd. (The - activationKey - parameter is missing)"
            converterMessage="Invalid cmd. (The - activationKey - parameter is not a number)"
            validatorMessage="Invalid cmd. (The - activationKey - parameter is not a positive number, minimum 3 length, maximum 40 length)">
            <f:validateLength minimum="3" maximum="40" />
        </f:viewParam>
        <f:viewAction action="#{languageC.setLanguage(param.language)}"/>
        <f:viewAction action="#{courseC.completeActivation(param.uuid)}"/>
     </f:metadata>    
    <!-- https://stackoverflow.com/questions/6377798/what-can-fmetadata-fviewparam-and-fviewaction-be-used-for -->
</ui:define>
<ui:define name="title">Activation check </ui:define>

<ui:define name="content">
<h:graphicImage name="images/activate1.jpg" alt="image missing :golf_register.jpg" style="float:left;"></h:graphicImage>
<h:graphicImage name="images/activate2.jpg" alt="image missing :golf_register.jpg" style="float:right;"></h:graphicImage>
    <!-- -->
<h:form id="activation_check" >
<!--<c:set var="uuidLC" value="#{param.uuid}"/>  -->

<p:panelGrid
    id="panel"
    columns="2"
    layout="tabular"
    columnClasses="col1, col2">
<f:facet name="header">
    <h1>#{msg['message.for.activation']}</h1>
</f:facet>

   <h:outputText value="#{msg['player.first']}" />
   <h:outputText value="#{param.firstname}" />

   <h:outputText value="#{msg['player.lastname']}"   />
   <h:outputText value="#{param.lastname}" /> 

   <h:outputText value="#{msg['player.language']}"   />
   <h:outputText value="#{param.language}" /> 
   
   <h:outputText value="uuid ="   />
   <h:outputText value="#{param.uuid}" /> 

<f:facet name="footer">
        <p:commandButton value="#{msg['button.activate']}"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-pencil"
                         action="#{courseC.activateNewPlayer()}"/>
</f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
