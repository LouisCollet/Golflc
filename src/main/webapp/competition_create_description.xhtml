<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:p="primefaces"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:f="jakarta.faces.core"
    xmlns:h="jakarta.faces.html"
    xmlns:pt="jakarta.faces.passthrough"
    xmlns:cc="jakarta.faces.composite"
    xmlns:my="jakarta.faces.component"
    xmlns:c="jakarta.tags.core"
    xmlns:fn="jakarta.tags.functions"
    template="templates/masterTemplate.xhtml" >
<ui:define name="title">Competition Description Registration</ui:define>

<ui:define name="content">
<h:graphicImage name="images/site unavailable.jpg" alt="image missing :site unavailable.jpg" style="float: left;"> </h:graphicImage>
<h:graphicImage name="images/temporarily unavailable.jpg" alt="image missing :temporarily unavailable.jpg" style="float: right;"> </h:graphicImage>
<h:form id="competition_description"  >

<!-- <ui:include src="include/include_summary_club.xhtml"/> -->
<p:panelGrid
    id="panel1"
    layout="tabular"
    columns="2"
    columnClasses="col1, col2" >

<f:facet name="header">
     <h:outputText escape="false" value="#{msg['title.create.competition']}" />
</f:facet>

     <p:outputLabel for="@next" value="#{msg['competition.name']} :" />
     <p:inputText id="CompName"
                   size="50"
                   title="#{msg['tooltip.competition.name']}"
                   value="#{courseC.competition.competitionDescription.competitionName}" />

    <p:outputLabel for="@next"  value="#{msg['competition.date']} :"/>
    <p:datePicker value="#{courseC.competition.competitionDescription.competitionDate}"
                  id="competDateid"
                  locale="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  showTime="true"
                  showIcon="true"
                  size="18"
                  readonlyInput="true"
                  showButtonBar="true"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                  yearNavigator="true"
                  monthNavigator="true"
                  >
    </p:datePicker>

    <p:outputLabel for="@next"  value="#{msg['competition.start.inscription']} :"/>
    <p:datePicker value="#{courseC.competition.competitionDescription.startInscriptionDate}"
                  id="startDateid"
                  locale="#{languageC.locale}"
                  lang="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                  yearNavigator="true"
                  monthNavigator="true"
                  >
    </p:datePicker>
    
<!-- rendered="#{courseC.player.playerRole eq 'ADMIN' or courseC.player.playerRole eq 'admin'}">   -->

      <p:outputLabel for="@next"  value="#{msg['competition.end.inscription']} :"/>
      <p:datePicker value="#{courseC.competition.competitionDescription.endInscriptionDate}"
                  id="endDateid"
                  locale="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                  yearNavigator="true"
                  monthNavigator="true"
                  >
    </p:datePicker>

         <p:outputLabel for="inputHomeClub" value="#{msg['player.homeclub']}" />
            <h:panelGroup layout="block" id="containerClub">
                <p:inputNumber
                       id="inputHomeClub"
                       label="HomeClub"
                       styleClass="mystyle"
                       value="#{courseC.competition.competitionDescription.competitionClubId}"
                       size="5"
                       decimalPlaces="0"
                       emptyValue="0"
                       style="margin-left:1.5em; margin-right:1.5em;" />
                <p:commandButton 
                         id="ButtonHomeClub"
                         ajax="true"
                         immediate="true"
                         value="#{msg['button.player.homeclub']}"
                         actionListener="#{dialogC.showSelectClub('competition_description')}"
                         style="float:left;"
                         icon="pi pi-search" >
    <!--  dialogReturn gets triggered when the dialog is being closed. in  -->
                    <p:ajax event="dialogReturn"
                         update=":competition_description:inputHomeClub,clubName,competitionClubId" />
                 </p:commandButton>
      
                <h:outputText id="clubName"
                              value="#{courseC.club.clubName}"
                              style="font-style:italic"/>
                <h:outputText id="competitionClubId"
                              value=" #{courseC.competition.competitionDescription.competitionClubId}"
                              style="font-weight:bold;font-size: 2em;font-style:italic;color: red" />  
            </h:panelGroup>
  <!-- new 16-10-2020          -->
          <p:outputLabel for="inputCourseId" value="#{msg['course.id']} :" />
          <h:panelGroup layout="block" id="containerCourse">
           <p:inputNumber
               id="inputCourseId"
               label="inputCourse"
               value="#{courseC.competition.competitionDescription.competitionCourseId}"
               size="5"
               decimalPlaces="0"
               emptyValue="0"
               style="margin-left:1.5em;margin-right:1.5em;"
                />
           <p:commandButton 
                id="ButtonCourse"
                ajax="true"
                immediate="true"
                value="#{msg['button.course.list']}"
                actionListener="#{dialogC.showSelectCourse('competition',courseC.competition.competitionDescription.competitionClubId)}"
                style="float:left;"
                icon="pi pi-search" >
                    <p:ajax event="dialogReturn"
                            listener="#{dialogC.handleReturnCourse}"
                            update=":competition_description:inputCourseId, courseName,courseId" />
           </p:commandButton>

           <h:outputText id="courseName"
                          value=" #{courseC.course.courseName}"
                          style="font-style:italic"/>
            <h:outputText id="courseId"
                          value=" #{courseC.course.idcourse}"
                          style="font-weight:bold;font-size: 2em;font-style:italic;color: red"/>
       </h:panelGroup>
  <!--    ne fonctionne pas non plus !!
  https://subscription.packtpub.com/book/web_development/9781849519281/1/ch01lvl1sec10/ajax-basics-with-process-and-update
  https://github.com/ova2/primefaces-cookbook/blob/second-edition/src/main/java/org/primefaces/cookbook/controller/chapter1/PartialProcessingBean.java
  -->
      <h:panelGroup id="panelGender" layout="block" >
                 <p:outputLabel for="gender" value="#{msg['player.gender']}" style="font-weight:bold"  />
                 <span class="ui-inputgroup-addon"><i class="pi pi user-minus"></i></span>
       </h:panelGroup>
                <p:selectOneButton id="gender"
                                   value="#{courseC.competition.competitionDescription.competitionGender}" >
                    <f:selectItem itemLabel="#{msg['player.gent']}" itemValue="M"/>
                    <f:selectItem itemLabel="#{msg['player.lady']}" itemValue="L" />
                    <f:selectItem itemLabel="#{msg['player.intersex']}" itemValue="X" />
                </p:selectOneButton> 

        <p:outputLabel for="@next" value="#{msg['round.game']} * " />
        <p:selectOneMenu id="game2"
                         value="#{courseC.competition.competitionDescription.competitionGame}">
            <f:selectItems value="#{courseC.gameList}"
                           var="role" 
                           itemLabel="#{role}"
                           itemValue="#{role}" />
        </p:selectOneMenu>
 
        <p:outputLabel for="@next" value="#{msg['round.qualifying']}"   />
        <p:selectOneButton id="qualifying"
                           value="#{courseC.competition.competitionDescription.competitionQualifying}"
                           styleClass="oneradio" >
               <f:selectItems value="#{courseC.availableQualifying}" />
        </p:selectOneButton>
        
        <p:outputLabel for="@next" value="#{msg['competition.starthole']} :" />
        <p:inputNumber
			id="startHole"
                        value="#{courseC.competition.competitionDescription.competitionStartHole}"
			minValue="1"
                        emptyValue="1"
                        maxValue="10"
                        required="true"
                        decimalPlaces="0"
                  
                        size="2"
                        title="#{msg['tooltip.tarif.choice']}"
                        > 
             </p:inputNumber>  
        <p:outputLabel for="@next" value="#{msg['competition.players']} :" />
        <p:inputNumber
			id="FlightnumberPlayers"
                        value="#{courseC.competition.competitionDescription.flightNumberPlayers}"
                        size="1"
                        title="#{msg['tooltip.tarif.choice']}"
                        decimalPlaces="0"
                        > 
         </p:inputNumber>
        
    <p:outputLabel for="@next"  value="#{msg['competition.pricegiving']} :"/>
    <p:datePicker value="#{courseC.competition.competitionDescription.priceGivingTime}"
                  id="givingtimeid"
                  locale="#{languageC.locale}"
                  pattern="HH:mm"
                  showTime="true"
                  showIcon="true"
                  mindate="#{utilsC.localTime(18,30)}"
                  maxdate="#{utilsC.localTime(21,45)}"
                  readonlyInput="true"
                  showButtonBar="true"
                  timeOnly="true"
                  size="6"
                  >
    </p:datePicker>
  <!--  mindate="#{courseC.competition.competitionDescription.minTime}"
                  maxdate="#{courseC.competition.competitionDescription.maxTime}"  -->
  
    <p:outputLabel for="@next"  value="#{msg['competition.startinglist.publication']} :"/>
    <p:datePicker value="#{courseC.competition.competitionDescription.startingListDate}"
                  id="startListDateid"
                  locale="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                  yearNavigator="true"
                  monthNavigator="true"
                  >
    </p:datePicker>

<!-- rendered="#{courseC.player.playerRole eq 'ADMIN' or courseC.player.playerRole eq 'admin'}">   -->

      <p:outputLabel for="@next"  value="#{msg['competition.classment']} :"/>
      <p:datePicker value="#{courseC.competition.competitionDescription.classmentDate}"
                  id="classDateid"
                  locale="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                  yearNavigator="true"
                  monthNavigator="true"
                  >
    </p:datePicker>
 <h:outputText value="#{msg['competition.series']}"   />
 <!-- on enregistre les résultats dans une table style="font-style:italic"
 on doit utiliser les validations locales car autres validations ne fonctionnent que
 avec String et non avec une table !! 
   <h:panelGrid columns="1" cellpadding="10"
  style="font-size:2.0em;color:blue;border:solid 5px; width:50%">
 -->
 <h:panelGroup id="panelGroupGlobal" layout="block" >
    <c:forEach var="v" begin="1" end="3" step="1">
        <h:panelGroup id="panelGroupDetail" layout="block"
                      style="border:solid 1px;width:65%">
        <p:outputLabel for="@next" value="Série ${v} : "/>
        <p:inputNumber id="serie1${v}"
                label="series"
                value="#{courseC.competition.competitionDescription.seriesHandicap[v-1][0]}"
                size="5"
                decimalPlaces="1"
                emptyValue="00.0"
                maxValue="36.0"
                leadingZero="allow"
                decimalSeparator="."
                placeholder="99.9" >
          </p:inputNumber>
         <h:outputText value=" - "/>
         <p:inputNumber id="serie2${v}"
                label="series"
                value="#{courseC.competition.competitionDescription.seriesHandicap[v-1][1]}"
                size="5"
                decimalPlaces="1"
                emptyValue="00.0"
                maxValue="36.0"
                leadingZero="allow"
                decimalSeparator="."
                placeholder="99.9" >
        </p:inputNumber>
        </h:panelGroup>
    </c:forEach>
 </h:panelGroup>
 
        <p:outputLabel for="@next" value="#{msg['competition.age.ladies']} :" />
        <p:inputNumber
			id="AgeLadies"
                        value="#{courseC.competition.competitionDescription.competitionAgeLadies}"
                        required="true"
                        size="2"
                        title="#{msg['tooltip.tarif.choice']}"
                        decimalPlaces="0"
                        > 
         </p:inputNumber>
 
         <p:outputLabel for="@next" value="#{msg['competition.age.men']} :" />
        <p:inputNumber	id="AgeMens"
                        value="#{courseC.competition.competitionDescription.competitionAgeMens}"
                        required="true"
                        size="2"
                        title="#{msg['tooltip.tarif.choice']}"
                        decimalPlaces="0"  > 
         </p:inputNumber>
         <p:outputLabel for="@next" value="#{msg['competition.maximum.inscriptions']} :" />
        <p:inputNumber
			id="CompetitionmaximumPlayers"
                        value="#{courseC.competition.competitionDescription.competitionMaximumPlayers}"
                        required="true"
                        size="2"
                        title="#{msg['tooltip.tarif.choice']}"
                        decimalPlaces="0" > 
         </p:inputNumber>
<f:facet name="footer">
            <p:commandButton value="#{msg['competition.create']}"
                         id="ButtonCreate"
                         ajax="false"
                         update="growl-msg"
                         immediate="false"
                         icon="pi pi-plus"
                         style="width:140px"
                         action="#{courseC.createCompetitionDescription()}"/>
    <!--
            <p:commandButton value="Visualisation"
                         id="commandButtonVisual"
                         ajax="false"
                         update="growl-msg"
                         immediate="true" 
                         icon="pi pi-plus"
                         action="#{courseC.showUnavailableStructure}"/>
   immediate=true for skip validations    
         <p:commandButton value="#{msg['unavailable.structure.create']}"
                         id="commandButtonCreate"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-plus"
                         style="float: right;color:red;"
                         action="#{courseC.modifyClubAvailableStructure()}"/>
-->
</f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
