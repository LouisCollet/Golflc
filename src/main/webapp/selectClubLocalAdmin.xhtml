<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Select Club Page</ui:define>

<ui:define name="content">
<h:form id="form_select_club">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header">
    <h1>#{msg['message.selectclub']}
        <h:outputText
            id="Rnd"
            rendered="#{appContext.inputSelectCourse eq 'CreateRound'}"
            value="#{msg['message.for.round']}" />
        <h:outputText
            id="tarif"
            rendered="#{appContext.inputSelectCourse eq 'CreateTarifGreenfee'}"
            value="#{msg['message.for.tarif.greenfee']}" />
        <h:outputText
            id="tarifMembers"
            rendered="#{appContext.inputSelectCourse eq 'CreateTarifMember'}"
            value="#{msg['message.for.tarif.members']}" />
        <h:outputText
            id="createPro"
            rendered="#{appContext.inputSelectCourse eq 'CreatePro'}"
            value="#{msg['create.pro']}" />
        <h:outputText
            id="unavailableS"
            rendered="#{appContext.inputSelectCourse eq 'CreateUnavailableStructure'}"
            value="#{msg['message.for.unavailable']}" />
        <h:outputText
            id="unavailableP"
            rendered="#{appContext.inputSelectCourse eq 'CreateUnavailablePeriod'}"
            value="#{msg['message.for.unavailable']}" />
        <h:outputText
            id="Det"
            rendered="#{appContext.inputSelectCourse eq 'ChartRound'}"
            value="#{msg['message.for.detail']}" />
        <h:outputText
            id="Avg"
            rendered="#{appContext.inputSelectCourse eq 'ChartCourse'}"
            value="#{msg['message.for.average']}" />
    </h1>
</f:facet>

 <c:set var="select" value="#{appContext.inputSelectCourse}"/>
 <c:set var="selectClub" value="#{appContext.inputSelectClub}"/>

<p:dataTable id="courses"
             value="#{memC.listLocalAdminClubsList()}"
             var="c"
             rowIndexVar="row"
             emptyMessage="#{msg['message.table.empty']}"
             filteredValue="#{clubC.filteredCourses}">

<p:column
     headerText="#"
     width="2%"
     id="colRow">
             #{row+1}
</p:column>

    <p:column headerText="#{msg['round.create']}"
              style="width:20%"
              rendered="#{appContext.inputSelectCourse eq 'CreateRound'}">
        <p:commandButton
            id="selectButtonCreateRound"
            action="#{clubC.selectClub(c, select)}"
            value="#{c.idclub} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column headerText="#{msg['round.tarif']}"
              width="20%"
              rendered="#{appContext.inputSelectCourse eq 'CreateTarifGreenfee'}">
        <p:commandButton
            id="selectButtonTarifGreenfee"
            action="#{clubC.selectClub(c, select)}"
            value="#{c.idclub} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column headerText="#{msg['member.tarif']}"
              width="20%"
              rendered="#{appContext.inputSelectCourse eq 'CreateTarifMember'}">
        <p:commandButton
            id="selectButtonTarifMembers"
            action="#{clubC.selectClub(c, select)}"
            value="#{c.idclub} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column headerText="#{msg['create.pro']}"
              width="20%"
              rendered="#{appContext.inputSelectClub eq 'CreatePro'}">
        <p:commandButton
            id="selectButtonCreatePro"
            action="#{clubC.selectClub(c, select)}"
            value="#{c.idclub} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column headerText="#{msg['message.for.unavailable']}"
              style="width:20%"
              rendered="#{appContext.inputSelectCourse eq 'CreateUnavailableStructure'}">
        <p:commandButton
            id="selectButtonUnavailable"
            action="#{clubC.selectClub(c, select)}"
            value="#{c.idclub} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column headerText="#{msg['message.for.unavailable']} Period"
              style="width:20%"
              rendered="#{appContext.inputSelectCourse eq 'CreateUnavailablePeriod'}">
        <p:commandButton
            id="selectButtonUnavailablePeriod"
            action="#{clubC.selectClub(c, select)}"
            value="#{c.idclub} - #{msg['button.select']}"
            icon="pi pi-check" />
    </p:column>

    <p:column id="colClubName"
              headerText="#{msg['club.name']}"
              style="width:20%"
              filterMatchMode="contains"
              filterBy="#{c.clubName}"
              sortBy="#{c.clubName}">
        <h:outputText value="#{c.clubName} (#{c.idclub})" />
    </p:column>

    <p:column id="courseTimeZone"
              headerText="#{msg['googletime.timezone']}"
              style="width:15%">
        <h:outputText value="#{c.address.zoneId}" />
    </p:column>

</p:dataTable>
</p:panel>
</div>
</h:form>
</ui:define>
</ui:composition>
