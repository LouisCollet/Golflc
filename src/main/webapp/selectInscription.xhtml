<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Select Recent Rounds Page</ui:define>
<ui:define name="content">

<h:form id="select_inscription_round">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header">
    <h1>#{msg['message.selectround']} #{msg['message.for.inscription']}</h1>
</f:facet>

<p:dataTable id="recent_round"
             value="#{roundC.listInscriptions()}"
             rowIndexVar="row"
             resizableColumns="true"
             var="c"
             emptyMessage="#{msg['message.table.empty']}"
             rowKey="#{c.round.idround}">

<p:ajax event="rowToggle"
        listener="#{roundC.onRowToggleCompetition}" />

<p:column
     headerText="#"
     width="3%"
     id="rrow">
             #{row+1}
</p:column>

<p:column
    headerText="T"
    width="4%">
    <p:rowToggler />
</p:column>

    <p:column headerText="#{msg['round.selected']}"
              width="20%">
        <p:commandButton
            id="selectButton"
            action="#{roundC.selectRecentInscription(c)}"
            value="#{c.round.idround} - Round"
            icon="pi pi-angle-right" />
    </p:column>

    <p:column headerText="Etat du terrain"
              width="20%">
        <p:commandButton
            id="selectButton2"
            action="#{clubC.showUnavailablePeriods(c)}"
            value="#{c.round.idround} - #{msg['button.select']}"
            icon="pi pi-forward" />
    </p:column>

    <p:column headerText="#{msg['round.date']}"
              width="20%"
              id="rdate">
        <h:outputText value="#{c.round.roundDate}">
            <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
        </h:outputText>
    </p:column>

    <p:column headerText="#{msg['round.name']}"
              width="20%"
              id="competitionColumn">
        #{c.round.roundName}
    </p:column>

    <p:column headerText="#{msg['round.canceled']}"
              width="18%"
              style="color:red"
              rendered="#{playerC.isAdmin()}"
              id="cancelround">
        <p:commandButton
            id="cancelButton"
            action="#{roundC.cancelRound(c)}"
            value="#{msg['button.delete']} - #{c.round.idround}"
            icon="pi pi-trash"
            style="color:red">
            <p:confirm header="#{msg['message.confirm.delete']}"
                       message="#{msg['message.confirm.delete.round']} #{c.round.idround}"
                       icon="pi pi-exclamation-triangle" />
        </p:commandButton>
    </p:column>

    <p:column id="colclubname"
              headerText="#{msg['club.name']}"
              width="25%"
              filterMatchMode="contains"
              filterBy="#{c.club.clubName}">
        #{c.club.clubName} (#{c.club.idclub})
    </p:column>

    <p:column id="colcoursename"
              headerText="#{msg['course.name']}"
              width="25%"
              filterMatchMode="contains"
              filterBy="#{c.course.courseName}">
        #{c.course.courseName} (#{c.course.idcourse})
    </p:column>

<p:rowExpansion>
    <div class="info-grid">
        <div class="info-row">
            <span class="info-label">Round:</span>
            <span class="info-value"><h:outputText id="reround" value="#{c.round.idround}" /></span>
        </div>
        <div class="info-row">
            <span class="info-label">Game:</span>
            <span class="info-value"><h:outputText id="regame" value="#{c.round.roundGame}" /></span>
        </div>
        <div class="info-row">
            <span class="info-label">Holes:</span>
            <span class="info-value"><h:outputText id="reholes" value="#{c.round.roundHoles}" /></span>
        </div>
        <div class="info-row">
            <span class="info-label">Start:</span>
            <span class="info-value"><h:outputText id="restart" value="#{c.round.roundStart}" /></span>
        </div>
        <div class="info-row">
            <span class="info-label">Competition:</span>
            <span class="info-value"><h:outputText id="recompetition" value="#{c.round.roundName}" /></span>
        </div>
        <div class="info-row">
            <span class="info-label">Nombre de joueurs:</span>
            <span class="info-value"><h:outputText id="zonedDate1" value="#{roundC.roundPlayersList().size()}" /></span>
        </div>
        <div class="info-row">
            <span class="info-label">Qualifying:</span>
            <span class="info-value"><h:outputText id="zonedDate2" value="#{c.round.roundQualifying}" /></span>
        </div>
    </div>
</p:rowExpansion>

</p:dataTable>
   <ui:include src="include/include_confirmDialog.xhtml"/>
</p:panel>
</div>
</h:form>
</ui:define>
</ui:composition>
