<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">System Administrator Subscriptions</ui:define>
<ui:define name="content">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header">
    <h1>
        <h:outputText value="#{msg['message.for.paiement.subscription']}"/>
    </h1>
</f:facet>

<h:form id="form_local_admin_cotisations">
   <ui:include src="/include/include_summary_player.xhtml"/>

<c:set var="select" value="#{appContext.inputSelectPaiement}"/>

   <p:dataTable id="TableSubscriptions"
                var="c"
                widgetVar="subscriptionTable"
                value="#{memC.listSystemAdminSubscription(select)}"
                filteredValue="#{memC.filteredCars}"
                multiViewState="true"
                styleClass="compact-table" >

            <p:column headerText="#{msg['player.lastname']}"
                      width="20%">
                       <h:outputText value="#{c.player.playerLastName} (#{c.player.idplayer})" />
            </p:column>

            <p:column id="StartDate"
                  field="subscription.startDate"
                  headerText="#{msg['subscription.startdate']}"
                  filterMatchMode="between"
                  width="20%">
                <h:outputText value="#{c.subscription.startDate}" >
                        <f:convertDateTime type="localDate" pattern="dd/MM/yyyy" />
                 </h:outputText>
                <f:facet name="filter">
                    <p:datePicker
                        selectionMode="range"
                        rangeSeparator=":"
                        size="20"
                        onchange="PF('subscriptionTable').filter()"
                        locale="#{languageC.locale}"
                        lang="#{LanguageC.locale}"
                        pattern="dd-MM-yyyy"
                        yearNavigator="true"
                        monthNavigator="true"
                        yearRange="#{utilsC.dateYear(-3)}:#{utilsC.dateYear(0)}"
                        readonlyInput="false">
                        <f:convertDateTime type="localDateTime"/>
                    </p:datePicker>
                </f:facet>
            </p:column>

            <p:column id="EndDate"
                  field="subscription.endDate"
                  headerText="#{msg['subscription.enddate']}"
                  filterMatchMode="between"
                  width="20%">
                <h:outputText value="#{c.subscription.endDate}" >
                        <f:convertDateTime type="localDate" pattern="dd/MM/yyyy" />
                </h:outputText>
                <f:facet name="filter">
                    <p:datePicker
                        selectionMode="range"
                        rangeSeparator=":"
                        size="20"
                        onchange="PF('subscriptionTable').filter()"
                        locale="#{languageC.locale}"
                        lang="#{LanguageC.locale}"
                        pattern="dd-MM-yyyy"
                        yearNavigator="true"
                        monthNavigator="true"
                        yearRange="#{utilsC.dateYear(-3)}:#{utilsC.dateYear(0)}"
                        readonlyInput="false">
                        <f:convertDateTime type="localDateTime"/>
                    </p:datePicker>
                </f:facet>
            </p:column>

           <p:column headerText="#{msg['subscription.communication']}"
                      field="subscription.communication"
                      sortable="false"
                      filterable="false"
                      width="20%"/>

            <p:column headerText="#{msg['subscription.amount']}"
                      field="subscription.subscriptionAmount"
                      sortable="false"
                      filterable="false"
                      width="5%">
                <f:facet name="footer">
                    TOTAL #{msg['subscription.amount']} = #{SASubscription.getListe().stream().map(o->o.getSubscription().getSubscriptionAmount()).sum()}
                </f:facet>
            </p:column>

            <p:column headerText="#{msg['subscription.paymentdate']}">
                    <h:outputText value="#{c.subscription.paymentDate}" >
                        <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
                    </h:outputText>
            </p:column>

 <f:facet name="footer">
   <p:commandButton icon="pi pi-file-excel"
                    value="Export as Excel (XLSX)" >
       <p:dataExporter type="xlsx"
                       target="TableSubscriptions"
                       fileName="Subscriptions_GolfLC" />
   </p:commandButton>
</f:facet>
</p:dataTable>
</h:form>

</p:panel>
</div>

</ui:define>
</ui:composition>
