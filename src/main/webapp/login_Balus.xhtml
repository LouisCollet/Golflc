<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">

<ui:composition template="templates/masterTemplate.xhtml">

<ui:define name="title">
    Login
</ui:define>

<ui:define name="content">
 <a href="login.xhtml"></a>
<h:link id="link01"
        title="#{msg['login.user.old']}"
        outcome="views/selectPlayer.xhtml"
        style="float:left;" >
        <h:graphicImage 
                    rendered="true"
                    name="images/login.jpg"
                    alt="image missing : login.jpg"
                    style="float:left;">
        </h:graphicImage>
</h:link>

<h:link id="link02"
        title="#{msg['login.user.new']}"
        outcome="register.xhtml"
        style="float:right;" > 
        <h:graphicImage 
                rendered="true"
                name="images/register.jpg"
                alt="image missing :golf_register.jpg"
                style="float:right;">
        </h:graphicImage>
</h:link>
<!--  https://stackoverflow.com/questions/2206911/performing-user-authentication-in-java-ee-jsf-using-j-security-check/2207147#2207147 -->
<h:form id="login_balus" >
            <p:panelGrid layout="tabular"
                columns="2">
                <h:outputText value="Username"/>
                <p:inputText id="userName"
                             value="#{courseC.login.username}"
                             required="true"
                             />

                <h:outputText value="Password"/>
                <h:inputSecret id="password"
                               value="#{courseC.login.password}"
                               required="true"
                               />
            </p:panelGrid>
    <p:commandButton value="#{msg['login.user.old']}"
                         update="growl-msg"
                         immediate="true"
                         ajax="false"
                         icon="pi pi-key"
                         action="#{courseC.loginAPI}" 
                         />

 </h:form>
</ui:define>
</ui:composition>
</html>
