<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Select Round</ui:define>
<ui:define name="content">

<h:form id="select_round">
    <div class="login-container" style="min-height:auto; align-items:flex-start;">
    <p:panel styleClass="login-card form-card">
        <f:facet name="header">
            <h1>#{msg[selectionContextBean.purpose.dialogTitleKey]}</h1>
        </f:facet>

        <p:panelGrid id="panelGrid1"
                     layout="flex"
                     columns="2"
                     columnClasses="col1Flex, col2Flex">

            <ui:include src="/include/include_round_selector.xhtml">
                <ui:param name="autoSubmitButton" value="select_round:selectButton"/>
            </ui:include>

        </p:panelGrid>

        <div class="btn-group" style="margin-top:1rem;">
            <p:commandButton
                value="#{msg['button.select']}"
                id="selectButton"
                icon="pi pi-check"
                ajax="false"
                action="#{roundC.roundSelectorAction()}"/>
        </div>

    </p:panel>
    </div>
</h:form>

</ui:define>
</ui:composition>
