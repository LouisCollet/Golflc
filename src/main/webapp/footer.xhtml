<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:of="omnifaces"
      xmlns:p="primefaces">

    <h:form id="form_footer">

        <!-- Production footer — always visible -->
        <div class="header-footer" style="display:flex; justify-content:space-between; align-items:center;">
            <span>
                <i class="pi pi-shield" style="margin-right:0.3rem;"/>
                <h:outputText value="Copyright &#169;2012-#{of:formatDate(now, 'yyyy')} GolfLC" escape="false" />
                <span style="margin-left:1rem;">
                    <i class="pi pi-tag" style="margin-right:0.2rem;"/>
                    #{infoC.applicationVersion}
                </span>
            </span>
            <span>
                <i class="pi pi-upload" style="margin-right:0.2rem;"/>
                <h:outputText value="#{infoC.deployVersion()}" escape="false" />
            </span>
        </div>

        <!-- Dev footer — visible only in Development mode -->
        <h:panelGroup rendered="#{settings.getProperty('EXECUTION') eq 'Development'}">
            <div class="header-footer summary-bar" style="margin-top:2px; font-size:0.68rem; padding:0.3rem 1rem;">
                <span class="summary-item">
                    <span class="summary-label">View</span>
                    <span class="summary-value">#{view.viewId}</span>
                </span>
                <span class="summary-sep">|</span>
                <span class="summary-item">
                    <span class="summary-label">Modified</span>
                    <span class="summary-value"><h:outputText escape="false" value="#{utilsC.ViewModificationDate()}" /></span>
                </span>
                <span class="summary-sep">|</span>
                <span class="summary-item">
                    <span class="summary-label">Server</span>
                    <span class="summary-value">#{faces.serverInfo}</span>
                </span>
                <span class="summary-sep">|</span>
                <span class="summary-item">
                    <span class="summary-label">PF</span>
                    <span class="summary-value">#{infoC.primefacesVersion}</span>
                </span>
                <span class="summary-sep">|</span>
                <span class="summary-item">
                    <span class="summary-label">URL</span>
                    <span class="summary-value">#{faces.requestBaseURL}</span>
                </span>
            </div>
        </h:panelGroup>

    </h:form>
</ui:composition>
