<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml" >
<ui:define name="title">Tarif Members Equipments</ui:define>
<ui:define name="content">

<h:graphicImage name="images/tarif1.jpg" alt="image missing :tarif1.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage name="images/tarif2.jpg" alt="image missing :tarif2.jpg" style="float: right;"></h:graphicImage>
<h:form id="tarif_members_equipments" enctype="application/x-www-form-urlencoded" >

<ui:include src="include/include_summary_cotisation.xhtml"/>

<p:panelGrid
    id="panel1"
    layout="tabular"
    columns="2"
    columnClasses="col1, col2">

<f:facet name="header">
    <h:outputText escape="false" value="#{msg['title.equipments.tarif']}" />
    <h:outputText value="#{courseC.tarifMember.equipmentsList.size()}" />
</f:facet>
    
<h:panelGroup id="panelItem" layout="block" >
     <h:outputText value="#{msg['tarif.members.item']} "
                   style="font-size: 1.5em;" />
     <i class="pi pi-list" style="font-size: 2rem"></i>
     <i class="pi pi-pencil"></i>
</h:panelGroup>  
    
<h:panelGroup id="panelChoice" layout="block" > 
     <h:outputText value="#{msg['tarif.members.price']} "
                   style="font-size: 1.5em;" />
     <i class="pi pi-cloud" style="font-size: 2rem"></i>
     <i class="pi pi-euro" style="font-size: 2rem"></i>
</h:panelGroup>
        <p:inputText   id="MembersText"
                        size="20"
                        title="#{msg['tooltip.tarif.item']}"
	                value="#{courseC.tarifMember.workItem}" />
        <p:inputNumber   id="MembersAmount"
                       value="#{courseC.tarifMember.workPrice}"
                       title="#{msg['tooltip.tarif.price3']}"
                       size="6"
                       decimalPlaces="1"
                       decimalSeparator="."
                       thousandSeparator=""
                 
                       placeholder="999.9"
                       minValue="0"
                       maxValue="400.0" >
        </p:inputNumber> 

<f:facet name="footer">
        <p:commandButton value="#{msg['tarif.equipments.create']}"
                         id="commandButton1"
                         ajax="false"
                         update="growl-msg"
                         immediate="false"
                         icon="pi pi-database"
                         action="#{courseC.inputTarifMembersEquipments()}"/>
         <p:commandButton value="#{msg['tarif.back']}"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-arrow-left"
                         style="float: right;"
                         action="tarif_members_menu.xhtml?faces-redirect=true" />
</f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
