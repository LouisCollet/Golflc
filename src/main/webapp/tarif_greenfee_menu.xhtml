<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Tarif Greenfee Menu Page</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header"><h1>#{msg['title.equipments.tarif']}</h1></f:facet>
<h:form id="tarif_greenfee_menu">

<ui:include src="include/include_summary_greenfee.xhtml"/>

<p:panelMenu id="panel_menu"
             style="font-size: 1.0em; width:400px; margin:auto;"
             statefulGlobal="true">
    <p:submenu label="Input Data Greenfee Tarif"
               icon="ui-icon-wrench"
               expanded="true"
               style="font-size: .8em;font-weight:bold;">
         <p:submenu label="1. Create Periods"
                    expanded="true"
                    style="font-size: 1.2em;font-weight:bold;"
                    rendered="#{memC.tarifGreenfee.updateReady ne true}">
              <p:menuitem value ="Periods = #{memC.tarifGreenfee.datesSeasonsList.size()}"
                    icon="pi pi-calendar"
                    outcome="tarif_greenfee_periods.xhtml" />
         </p:submenu>

         <p:submenu label="2. Create Equipments"
                    expanded="true"
                    style="font-size: 1.2em;"
                    rendered="#{memC.tarifGreenfee.datesSeasonsList.size() gt 0}">
              <p:menuitem value="Equipments = #{memC.tarifGreenfee.equipmentsList.size()}"
                     rendered="#{memC.tarifGreenfee.datesSeasonsList.size() gt 0}"
                     icon="pi pi-cog"
                     outcome="tarif_greenfee_equipments.xhtml" />
         </p:submenu>

         <p:submenu label="3. Create Greenfee"
                    expanded="true"
                    style="font-size: 1.2em;"
                    rendered="#{memC.tarifGreenfee.equipmentsReady eq true
                           and memC.tarifGreenfee.updateReady eq false}">
            <p:menuitem value ="Basic = #{memC.tarifGreenfee.basicList.size()}"
                     icon="pi pi-check"
                     outcome="tarif_greenfee_basic.xhtml" />
            <p:menuitem value ="Hours = #{memC.tarifGreenfee.teeTimesList.size()}"
                     icon="pi pi-clock"
                     outcome="tarif_greenfee_hours.xhtml" />
            <p:menuitem value="Days of Week = #{memC.tarifGreenfee.daysList.size()}"
                     icon="pi pi-sun"
                     outcome="tarif_greenfee_days.xhtml" />
         </p:submenu>

         <p:submenu label="4. Create Twilight"
               rendered="#{memC.tarifGreenfee.twilightReady eq true}"
               expanded="true"
               style="font-size: 1.2em;">
            <p:menuitem value="Twilight"
                     icon="pi pi-database"
                     outcome="tarif_greenfee_twilight.xhtml" />
         </p:submenu>

    <p:submenu label="5. Create Greenfee Tarif"
               rendered="#{memC.tarifGreenfee.updateReady eq true
                        and memC.tarifGreenfee.twilightDone eq true}"
               expanded="true"
               style="font-size: 1.2em;">
            <p:menuitem value="Create all tarifs in one shot"
                     icon="pi pi-database"
                     rendered="#{memC.tarifGreenfee.updateReady eq true}"
                     action="#{memC.createTarifGreenfee}"/>
    </p:submenu>

       <p:submenu label="6. Delete Greenfee Tarif"
                  style="font-size: 1.2em; margin:auto;color:red">
       <p:menuitem value="Delete tarifs in one shot">

    <c:set var="year" value="#{utilsC.dateYear(0)}"/>
    <p:commandButton
                id="deleteButton"
                style="color:red"
                action="#{memC.deleteTarifGreenfee(year)}"
                value="#{msg['button.delete']} #{clubC.course.courseName} (#{clubC.course.idcourse}) - year = #{utilsC.dateYear(0)}"
                icon="pi pi-trash">
                <p:confirm icon="pi pi-exclamation-triangle" />
    </p:commandButton>
        </p:menuitem>
       </p:submenu>
   </p:submenu>

</p:panelMenu>

<ui:include src="include/include_confirmDialog.xhtml"/>
</h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
