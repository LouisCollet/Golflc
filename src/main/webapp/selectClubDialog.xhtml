<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Select One Club</ui:define>
<ui:define name="content">
<h:form id="form_selectClubDelete">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
    <f:facet name="header">
        <h1>#{msg[selectionContextBean.purpose.dialogTitleKey]}</h1>
    </f:facet>

    <p:panelGrid columns="2" layout="flex" columnClasses="col1Flex,col2Flex">
        <ui:include src="/include/include_club_selector.xhtml">
            <ui:param name="clubLabel" value="Club"/>
        </ui:include>
    </p:panelGrid>

    <f:facet name="footer">
        <p:commandButton value="#{msg['button.club.choice']}"
                         id="createPlayer"
                         ajax="false"
                         icon="pi pi-database"
                         action="#{clubC.selectorClubNextView()}" />
    </f:facet>
</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
