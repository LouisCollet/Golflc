<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Mail Persistent</ui:define>

<ui:define name="content">
<h:graphicImage name="images/activate1.jpg" alt="image missing :golf_register.jpg" style="float:left;"></h:graphicImage>
<h:graphicImage name="images/activate2.jpg" alt="image missing :golf_register.jpg" style="float:right;"></h:graphicImage>
    <!-- -->
<h:form id="mailForm">

<p:blockUI block="@(body)" 
           widgetVar="blockPage">
    <h:panelGrid columns="1" style="text-align:center">
        <p:graphicImage name="spinner.svg"/>
        <h:outputText value="Traitement en cours..."/>
    </h:panelGrid>
</p:blockUI>


    <!-- Bouton envoi -->
    <p:commandButton
        value="Envoyer un mail"
        icon="pi pi-envelope"
        action="#{mailBean.sendTestMail}"
        update="badge counter"
        styleClass="ui-button-success"/>

    <p:commandButton
        value="Envoyer"
        icon="pi pi-envelope"
        action="#{mailBean.sendTestMail}"
        update="badge counter"
        onstart="PF('blockPage').show()"
        oncomplete="PF('blockPage').hide()"/>
    

    <!-- Bouton refresh manuel -->
    <p:commandButton
            value="Rafraîchir"
            icon="pi pi-refresh"
            actionListener="#{mailBean.refresh}"
            update="badge counter"
            styleClass="ui-button-secondary"
            style="margin-left:10px"/>
    


    <!-- Badge compteur -->
    <p:badge id="badge"
             value="#{mailBean.pendingMails}"
             severity="info"
             style="margin-left:15px"/>

    <!-- Texte lisible -->
    <h:outputText id="counter"
                  value=" Mails en attente : #{mailBean.pendingMails}"
                  style="margin-left:10px"/>

</h:form>
</ui:define>
</ui:composition>
