<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Job Submitter</ui:define>

<ui:define name="content">

<h:form id="jobsubmitter"  >

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <h1>Batch Job Submission</h1>
</f:facet>

<p:panelGrid
    id="panel"
    layout="flex"
    columns="2"
    columnClasses="col1Flex,col2Flex">

<h:outputText value="Batch ID" />
<h:outputText value="#{batchC.execID}" />

<c:set var="myVar" value="#{batchC.execID}" scope="request" />

<h:outputText value="Batch Status"/>
<h:outputText value="#{batchC.jobStatus} - #{myVar}" />

<h:outputText value="Job Execution Detail"/>
<p:commandButton value="Get Details Info"
                 icon="po pi-check"
                 update="growl-msg"
                 action="jobExecution.xhtml?faces-redirect=true" />

<f:facet name="footer">
        <p:commandButton value="Start Batch Players"
                         update="growl-msg"
                         immediate="true"
                         ajax="false"
                         icon="pi pi-arrow-right"
                         action="#{batchC.startBatchJobPlayers()}"/>
        <p:commandButton value="Start Batch Rounds"
                         update="growl-msg"
                         immediate="true"
                         ajax="false"
                         icon="pi pi-arrow-right"
                         action="#{batchC.startBatchJobRounds()}"/>
        <p:commandButton value="Start Batch Inscriptions"
                         update="growl-msg"
                         immediate="true"
                         ajax="false"
                         icon="pi pi-arrow-right"
                         action="#{batchC.startBatchJobInscriptions()}"/>

</f:facet>
</p:panelGrid>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
