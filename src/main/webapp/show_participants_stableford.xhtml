<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Participants Stableford Round Page </ui:define>

<ui:define name="content">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header"><h1>#{msg['round.result.stableford']}</h1></f:facet>

<h:form id="participants_stableford">
    <ui:include src="include/include_summary_round.xhtml"/>

<p:dataTable id="stableford_table"
             value="#{roundC.listStableford}"
             rowIndexVar="rowIndex"
             emptyMessage="#{msg['message.table.empty']}"
             var="c"
             styleClass="compact-table" >
<f:facet name="header">
    <h:panelGroup layout="block" style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
     <p:commandButton
                        id="handicapButton"
                        value="Résultats Matchplay"
                        action="show_participants_matchplay.xhtml?faces-redirect=true"
                        icon="pi pi-external-link" >
     </p:commandButton>
    <span style="margin:0; font-weight:bold;">#{msg['round.result.stableford']}</span>
    </h:panelGroup>
</f:facet>

<p:column
     headerText="#"
     style="width:2%;text-align:center"
     id="rrow">
             #{rowIndex+1}
</p:column>
<p:column headerText="#{msg['player.id']}"
          style="width:10%" >
   #{c.player.idplayer}
</p:column>

<p:column headerText="#{msg['player.first']}"
          style="width:20%" >
    <h:outputText
         value = "#{c.player.playerFirstName} - #{c.player.playerLastName}"  >
    </h:outputText>
</p:column>

        <p:column headerText="#{msg['inscription.canceled']}"
                  style="width:20%" >
            <p:commandButton
                id="cancelButton"
                rendered="#{c.classment.totalPoints eq 0}"
                action="#{roundC.cancelInscription(c)}"
                value="#{msg['button.delete']} - #{c.player.idplayer} - #{c.round.idround}"
                icon="pi pi-trash"
                style="color:red;font-weight:bold;">

                <p:confirm header="#{msg['message.confirm.delete']}"
                     message="#{msg['message.confirm.delete']} #{c.player.playerLastName} - Round #{c.round.idround}"
                     icon="pi pi-exclamation-triangle" />
            </p:commandButton>

             <h:outputText value="No delete possible : score already registered"
                rendered="#{c.classment.totalPoints gt 0}"
                style="font-weight:bold;color:red" />

	</p:column>

<p:column headerText="#{msg['score.extra']}"
          style="width:5%" >
   #{c.classment.totalExtraStrokes}
</p:column>

<p:column headerText="#{msg['playerhasround.result']}"
          style="width:10%" >
     <h:outputText  id="TotalPointsrice"
                    value="  #{c.classment.totalPoints}"
                    style="font-size: 2.5em;"
              />
    (#{c.classment.last9}
     #{c.classment.last6}
     #{c.classment.last3}
     #{c.classment.last1})
</p:column>

<ui:include src="include/include_thumbnail.xhtml">
    <ui:param name="th_photo" value="#{c.player.playerPhotoLocation}"/>
    <ui:param name="th_name"  value="#{c.player.playerLastName}"/>
</ui:include>

</p:dataTable>
   <ui:include src="include/include_confirmDialog.xhtml"/>
</h:form>

</p:panel>
</div>

</ui:define>
</ui:composition>
