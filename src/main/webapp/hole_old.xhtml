<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
    
<ui:define name="title">Hole Page </ui:define>

<ui:define name="content">
<h:graphicImage 
                name="images/hole#{courseC.hole.holeNumber}.png"
                alt="image missing :golf_hole.png"
                style="float: left;">
</h:graphicImage>

<h:graphicImage 
                name="images/hole#{courseC.hole.holeNumber}.jpg"
                alt="image missing :golf_hole.jpg"
                style="float: right;">
</h:graphicImage>
    
<h:form id="hole"  >
<ui:include src="include/include_summary_club.xhtml"/>
<!--
<p:focus for="dist" /> ultérieurement
-->
<p:panelGrid
    id="panel1"
    layout="tabular"
    columns="2"
    columnClasses="col1,col2">

<f:facet name="header">
    <h1>#{msg['hole.data']}</h1>
</f:facet>

       <p:outputLabel for="@next" value="#{msg['hole.number']} :"   />
       <p:inputNumber  label="Hole Number"
                       id="holenumb"
                       value="#{courseC.hole.holeNumber}"
                       title="#{msg['tooltip.hole.holenumber']}"
                       size="2"
                       decimalPlaces="0"
                       maxValue="18"
                       minValue="1" />

       <p:outputLabel for="@next" value="#{msg['hole.par']} :"   />
       <p:selectOneButton id="par"
                         value="#{courseC.hole.holePar}" >
            <f:selectItem itemLabel="Par 3"  itemValue="3" />
            <f:selectItem itemLabel="Par 4"  itemValue="4" />
            <f:selectItem itemLabel="Par 5"  itemValue="5" />
       </p:selectOneButton>
       
       <p:outputLabel for="@next"  value="#{msg['hole.index']} :"
                      title="#{msg['tooltip.hole.holeindex']}"
                      style="font-weight:bold"  />
           <p:selectOneMenu id="index"
                            value="#{courseC.hole.holeStrokeIndex}">
               <f:selectItem itemLabel="??"
                             itemValue="#{null}" />
               <f:selectItems value="#{courseC.indexNumbers(18)}"/>
           </p:selectOneMenu>
       <h:outputText
                       id="distance"
                       value="#{msg['hole.distance']} :" />
      <h:panelGroup id="panelgroup1">
                <p:inputNumber
                       label="Hole Distance"
                       id="holeDistance"
                       value="#{courseC.hole.holeDistance}"
                       title="#{msg['tooltip.hole.holedistance']}"
                       size="4"
                  
                       minValue="90"
                       maxValue="550"
                       emptyValue="0"
                       decimalPlaces="0"
                       />
       <p:commandButton
                         value="#{msg['button.hole.convert']}"
                         id="commandButtonDistance"
                         update="holeDistance"
                         ajax="false"
                         style="margin-left:1.5em;"
                         immediate="false"
                         icon="pi pi-chevron-right"
                         action="#{courseC.convertYtoM}">
                 </p:commandButton>
     </h:panelGroup>
       
<f:facet name="footer">
        <p:commandButton value="#{msg['button.hole.create']}"
                         id="commandButtonCreate"
                         ajax="false"
                         update="growl-msg"
                         immediate="false"
                         icon="pi pi-database"
                         action="#{courseC.createHole}"/>
<!--  rendered="#{not courseC.nextStep}" 
        -->
</f:facet>

</p:panelGrid>

</h:form>
</ui:define>
</ui:composition>
