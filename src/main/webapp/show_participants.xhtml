<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
 <ui:define name="metadata">
    <f:metadata>
        <f:viewParam
            required="true"
            name="cmd"
            value="#{roundC.inputcmdParticipants}"
            requiredMessage="You did not specify a cmd. (The cmd parameter is missing)"
            converterMessage="Invalid cmd. (The cmd parameter is not a number)"
            validatorMessage="Invalid cmd. (The cmd parameter is not a positive number, minimum 3 length)">
            <f:validateLength minimum="3" />
        </f:viewParam>
        <f:viewParam
            required="false"
            name="operation"
            value="#{roundC.inputClubOperation}"
            requiredMessage="You did not specify a operation. (The id parameter is missing)"
            converterMessage="Invalid operation. (The id parameter is not a number)"
            validatorMessage="Invalid operation. (The operation parameter is not a positive number, minimum 6 length)">
            <f:validateLength minimum="6" />
        </f:viewParam>
    </f:metadata>
</ui:define>

<ui:define name="title">Participants Rounds Page </ui:define>

<ui:define name="content">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header"><h1>Participants Rounds</h1></f:facet>

<h:form id="participants_rounds">

<p:dataTable id="played_rounds_table1"
             value="#{roundC.listmatchplay}"
             emptyMessage="#{msg['message.table.empty']}"
             var="c" >
<f:facet name="header">
    Round Description
</f:facet>

<p:column headerText="#{msg['round.date']}" style="width:100px" >
   <h:outputText value="#{c.roundDate}">
    <f:convertDateTime type="localDate" pattern="dd/MM/yyyy" />
   </h:outputText>
</p:column>

<p:column headerText="#{msg['round.competition']}" style="width:100px" >
        #{c.roundName}
</p:column>

<p:column headerText="#{msg['round.game']}" style="width:100px" >
   #{c.roundGame}
</p:column>

<p:column headerText="#{msg['course.name']}" style="width:100px" >
   #{c.courseName}
</p:column>

</p:dataTable>

<p:dataTable id="played_rounds_table2"
             value="#{roundC.listmatchplay}"
             emptyMessage="#{msg['message.table.empty']}"
             var="c" >
<f:facet name="header">
     #{msg['round.players']}
</f:facet>

<p:column headerText="#{msg['player.first']}"
          style="width:100px" >
   #{c.playerFirstName} -  #{c.playerLastName} ( #{c.idplayer})
</p:column>

    <p:column headerText="#{msg['playerhasround.team']}"
              style="width:100px" >
   #{c.inscriptionTeam}
</p:column>

<ui:include src="include/include_thumbnails.xhtml"/>

<f:facet name="footer">
        <p:commandButton id="button01"
                         value="#{msg['button.score.create']} #{roundC.inputcmdParticipants} Matchplay"
                         update="growl-msg"
                         immediate="true"
                         ajax="false"
                         rendered="#{roundC.inputcmdParticipants eq 'MP_'}"
                         icon="pi pi-database"
                         action="score_matchplay.xhtml?faces-redirect=true"/>

        <p:commandButton id="button02"
                         value="#{msg['button.score.create']} #{roundC.inputcmdParticipants} Scramble"
                         update="growl-msg"
                         immediate="true"
                         ajax="false"
                         rendered="#{roundC.inputcmdParticipants eq 'SCR'}"
                         icon="pi pi-database"
                         action="score_scramble.xhtml?faces-redirect=true"/>
</f:facet>
</p:dataTable>

</h:form>

</p:panel>
</div>

</ui:define>
</ui:composition>
