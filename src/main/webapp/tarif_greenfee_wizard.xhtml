<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Tarif Greenfee Wizard Page</ui:define>
<ui:define name="content">
<div class="card">
<h:form id="tarif_greenfee_wizard" enctype="application/x-www-form-urlencoded">

<ui:include src="include/include_summary_greenfee.xhtml"/>

<p:wizard id="wizardTarifGreenfee"
          widgetVar="tarifWizard"
          styleClass="tarif-wizard"
          flowListener="#{memC.onTarifGreenfeeFlow}"
          onnext="$('.ui-growl-item').remove(); $('.ui-messages').empty();"
          onback="$('.ui-growl-item').remove(); $('.ui-messages').empty();">

    <!-- =================== TAB 1: PERIODS =================== -->
    <p:tab id="PeriodsTab"
           title="Periods (#{memC.tarifGreenfee.datesSeasonsList.size()})"
           titletip="Define tarif periods (seasons)">
        <p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h:outputText escape="false" value="#{msg['title.period.tarif']}"/>
                <p:badge value="#{memC.tarifGreenfee.datesSeasonsList.size()}" severity="info"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.season']} "/>
                    <i class="pi pi-cloud"/>
                    <i class="pi pi-sun"/>
                    #{memC.tarifGreenfee.datesSeasonsList.size()}
                </h:panelGroup>
                <p:selectOneButton id="seasonPeriod"
                                   value="#{memC.tarifGreenfee.season}">
                    <f:selectItem itemLabel="#{msg['tarif.high']}"   itemValue="H"/>
                    <f:selectItem itemLabel="#{msg['tarif.medium']}" itemValue="M"/>
                    <f:selectItem itemLabel="#{msg['tarif.low']}"    itemValue="L"/>
                    <f:validateBean disabled="true"/>
                </p:selectOneButton>

                <h:outputText value="#{msg['tarif.period.start']} :"/>
                <p:datePicker id="periodStart"
                              value="#{memC.tarifGreenfee.startDate}"
                              size="10"
                              lang="#{languageC.locale}"
                              label="Tarif periods : startDate"
                              locale="#{languageC.locale}"
                              pattern="dd/MM/yyyy HH:mm"
                              yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                              readonlyInput="true"
                              showTime="false"
                              monthNavigator="true"
                              yearNavigator="true"
                              showIcon="true"
                              showButtonBar="true">
                    <f:validateBean disabled="true"/>
                </p:datePicker>

                <h:outputText value="#{msg['tarif.period.end']} :"/>
                <p:datePicker id="periodEnd"
                              value="#{memC.tarifGreenfee.endDate}"
                              size="10"
                              label="Tarif periods : endDate"
                              locale="#{languageC.locale}"
                              pattern="dd/MM/yyyy HH:mm"
                              monthNavigator="true"
                              yearNavigator="true"
                              yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                              readonlyInput="true"
                              showTime="false"
                              showIcon="true"
                              showButtonBar="true">
                    <f:validateBean disabled="true"/>
                </p:datePicker>
            </p:panelGrid>
            <f:facet name="footer">
                <p:commandButton value="#{msg['tarif.period.create']}"
                                 id="btnAddPeriod"
                                 icon="pi pi-plus"
                                 action="#{memC.inputTarifGreenfeeWizard('PE')}"
                                 update="tarif_greenfee_wizard"
                                 styleClass="p-button-outlined"/>
            </f:facet>
        </p:panel>
    </p:tab>

    <!-- =================== TAB 2: EQUIPMENTS =================== -->
    <p:tab id="EquipmentsTab"
           title="Equipments (#{memC.tarifGreenfee.equipmentsList.size()})"
           titletip="Define equipment items and prices">
        <p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h:outputText escape="false" value="#{msg['title.equipments.tarif']}"/>
                <p:badge value="#{memC.tarifGreenfee.equipmentsList.size()}" severity="info"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.season']} "/>
                    <i class="pi pi-cloud"/>
                    <i class="pi pi-sun"/>
                    #{memC.tarifGreenfee.equipmentsList.size()}
                </h:panelGroup>
                <p:selectOneButton id="seasonEquip"
                                   value="#{memC.tarifGreenfee.workSeason}">
                    <f:selectItem itemLabel="#{msg['tarif.all']}"    itemValue="A"/>
                    <f:selectItem itemLabel="#{msg['tarif.high']}"   itemValue="H"/>
                    <f:selectItem itemLabel="#{msg['tarif.medium']}" itemValue="M"/>
                    <f:selectItem itemLabel="#{msg['tarif.low']}"    itemValue="L"/>
                    <f:validateBean disabled="true"/>
                </p:selectOneButton>

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.members.equipments']} "/>
                    <i class="pi pi-list"/>
                    <i class="pi pi-pencil"/>
                </h:panelGroup>
                <p:inputText id="equipText"
                             size="20"
                             title="#{msg['tooltip.tarif.item']}"
                             value="#{memC.tarifGreenfee.workItem}"
                             placeholder="Enter equipment">
                    <f:validateBean disabled="true"/>
                </p:inputText>

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.members.price']} "/>
                    <i class="pi pi-euro"/>
                </h:panelGroup>
                <p:inputNumber id="equipAmount"
                               value="#{memC.tarifGreenfee.workPrice}"
                               title="#{msg['tooltip.tarif.price2']}"
                               size="6"
                               lang="#{languageC.locale}"
                               decimalSeparator="."
                               decimalPlaces="1"
                               placeholder="99.9">
                    <f:validateBean disabled="true"/>
                </p:inputNumber>
            </p:panelGrid>
            <f:facet name="footer">
                <p:commandButton value="#{msg['tarif.equipments.create']}"
                                 id="btnAddEquipment"
                                 icon="pi pi-plus"
                                 action="#{memC.inputTarifGreenfeeWizard('EQ')}"
                                 update="tarif_greenfee_wizard"
                                 styleClass="p-button-outlined"/>
            </f:facet>
        </p:panel>
    </p:tab>

    <!-- =================== TAB 3: PRICING (Basic / Hours / Days — exclusive) =================== -->
    <p:tab id="PricingTab"
           title="Pricing"
           titletip="Define greenfee pricing (choose one type)">
        <p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h:outputText escape="false" value="#{msg['title.greenfee.tarif']}"/>
                <span> — Pricing</span>
            </f:facet>

            <!-- Pricing type selector -->
            <h:panelGroup layout="block" style="text-align:center; margin-bottom:1rem;">
                <p:selectOneButton id="pricingType"
                                   styleClass="pricing-type-selector"
                                   value="#{memC.tarifGreenfee.greenfeeType}">
                    <f:selectItem itemLabel="Basic"  itemValue="BA"
                                 itemDisabled="#{memC.tarifGreenfee.teeTimesList.size() gt 0 or memC.tarifGreenfee.daysList.size() gt 0}"/>
                    <f:selectItem itemLabel="Hours"  itemValue="HO"
                                 itemDisabled="#{memC.tarifGreenfee.basicList.size() gt 0 or memC.tarifGreenfee.daysList.size() gt 0}"/>
                    <f:selectItem itemLabel="Days"   itemValue="DA"
                                 itemDisabled="#{memC.tarifGreenfee.basicList.size() gt 0 or memC.tarifGreenfee.teeTimesList.size() gt 0}"/>
                    <p:ajax update="pricingContent"/>
                </p:selectOneButton>
            </h:panelGroup>

            <h:panelGroup id="pricingContent" layout="block">

                <!-- ===== BASIC ===== -->
                <h:panelGroup rendered="#{memC.tarifGreenfee.greenfeeType eq 'BA'}" layout="block">
                    <p:panelGrid columns="2"
                                 layout="flex"
                                 columnClasses="col1Flex, col2Flex">

                        <h:panelGroup layout="block">
                            <h:outputText value="#{msg['tarif.season']} "/>
                            <i class="pi pi-cloud"/>
                            <i class="pi pi-sun"/>
                        </h:panelGroup>
                        <p:selectOneButton id="seasonBasic"
                                           required="false"
                                           value="#{memC.tarifGreenfee.workSeason}">
                            <f:selectItem itemLabel="#{msg['tarif.all']}"    itemValue="A"/>
                            <f:selectItem itemLabel="#{msg['tarif.high']}"   itemValue="H"/>
                            <f:selectItem itemLabel="#{msg['tarif.medium']}" itemValue="M"/>
                            <f:selectItem itemLabel="#{msg['tarif.low']}"    itemValue="L"/>
                        </p:selectOneButton>

                        <h:panelGroup layout="block">
                            <h:outputText value="#{msg['tarif.members.item']} "/>
                            <i class="pi pi-list"/>
                            <i class="pi pi-pencil"/>
                        </h:panelGroup>
                        <p:inputText id="basicText"
                                     size="20"
                                     title="#{msg['tarif.item']}"
                                     value="#{memC.tarifGreenfee.workItem}"
                                     placeholder="Enter basic item"/>

                        <h:panelGroup layout="block">
                            <h:outputText value="#{msg['tarif.members.price']} "/>
                            <i class="pi pi-euro"/>
                        </h:panelGroup>
                        <p:inputNumber id="basicPrice"
                                       value="#{memC.tarifGreenfee.workPrice}"
                                       title="#{msg['tooltip.tarif.price3']}"
                                       size="6"
                                       lang="#{languageC.locale}"
                                       decimalSeparator="."
                                       decimalPlaces="1"
                                       placeholder="999.9"
                                       maxValue="300"/>
                    </p:panelGrid>
                    <p:commandButton value="#{msg['tarif.greenfee.create']}"
                                     id="btnAddBasic"
                                     icon="pi pi-plus"
                                     action="#{memC.inputTarifGreenfeeWizard('BA')}"
                                     update="tarif_greenfee_wizard"
                                     styleClass="p-button-outlined"
                                     style="margin-top:0.5rem;"/>
                </h:panelGroup>

                <!-- ===== HOURS ===== -->
                <h:panelGroup rendered="#{memC.tarifGreenfee.greenfeeType eq 'HO'}" layout="block">
                    <p:panelGrid columns="2"
                                 layout="flex"
                                 columnClasses="col1Flex, col2Flex">

                        <h:panelGroup layout="block">
                            <h:outputText value="#{msg['tarif.season']} "/>
                            <i class="pi pi-cloud"/>
                            <i class="pi pi-sun"/>
                        </h:panelGroup>
                        <p:selectOneButton id="seasonHours"
                                           required="false"
                                           value="#{memC.tarifGreenfee.workSeason}">
                            <f:selectItem itemLabel="#{msg['tarif.all']}"    itemValue="A"/>
                            <f:selectItem itemLabel="#{msg['tarif.high']}"   itemValue="H"/>
                            <f:selectItem itemLabel="#{msg['tarif.medium']}" itemValue="M"/>
                            <f:selectItem itemLabel="#{msg['tarif.low']}"    itemValue="L"/>
                        </p:selectOneButton>

                        <h:outputText value="#{msg['tarif.item']}"/>
                        <p:inputText id="hoursCategory"
                                     size="20"
                                     title="#{msg['tooltip.tarif.item']}"
                                     value="#{memC.tarifGreenfee.workItem}"
                                     placeholder="Enter item"/>

                        <h:panelGroup layout="block">
                            <h:outputText value="#{msg['tarif.hours.start']} :"/>
                            <i class="pi pi-clock"/>
                        </h:panelGroup>
                        <p:datePicker id="hoursStart"
                                      value="#{memC.tarifGreenfee.startHour}"
                                      timeOnly="true"
                                      pattern="HH:mm"
                                      label="Tarif hours : startHour"
                                      lang="#{languageC.locale}"
                                      locale="#{languageC.locale}"
                                      showIcon="true"
                                      size="6"
                                      mindate="#{utilsC.localTime(07,30)}"
                                      maxdate="#{utilsC.localTime(20,45)}"/>

                        <h:outputText value="#{msg['tarif.hours.end']} :"/>
                        <p:datePicker id="hoursEnd"
                                      value="#{memC.tarifGreenfee.endHour}"
                                      timeOnly="true"
                                      pattern="HH:mm"
                                      label="Tarif hours : endHour"
                                      lang="#{languageC.locale}"
                                      locale="#{languageC.locale}"
                                      showIcon="true"
                                      size="6"
                                      mindate="#{utilsC.localTime(07,30)}"
                                      maxdate="#{utilsC.localTime(20,45)}"/>

                        <h:outputText value="#{msg['tarif.members.price']} :"/>
                        <p:inputNumber id="hoursPrice"
                                       value="#{memC.tarifGreenfee.workPrice}"
                                       title="#{msg['tooltip.tarif.price3']}"
                                       size="6"
                                       lang="#{languageC.locale}"
                                       decimalPlaces="1"
                                       decimalSeparator="."
                                       placeholder="999.9"
                                       maxValue="300"/>

                        <h:outputText value="#{msg['tarif.twilight']} :"/>
                        <p:selectOneButton id="hoursTwilight"
                                           required="false"
                                           value="#{memC.tarifGreenfee.workTwilight}">
                            <f:selectItem itemLabel="No"                      itemValue="N"/>
                            <f:selectItem itemLabel="#{msg['tarif.twilight']}" itemValue="Y"/>
                            <f:selectItem itemLabel="Previous"                itemValue="P"/>
                        </p:selectOneButton>
                    </p:panelGrid>
                    <p:commandButton value="#{msg['tarif.hours.create']}"
                                     id="btnAddHours"
                                     icon="pi pi-plus"
                                     action="#{memC.inputTarifGreenfeeWizard('HO')}"
                                     update="tarif_greenfee_wizard"
                                     styleClass="p-button-outlined"
                                     style="margin-top:0.5rem;"/>
                </h:panelGroup>

                <!-- ===== DAYS ===== -->
                <h:panelGroup rendered="#{memC.tarifGreenfee.greenfeeType eq 'DA'}" layout="block">
                    <p:panelGrid columns="2"
                                 layout="flex"
                                 columnClasses="col1Flex, col2Flex">

                        <h:panelGroup layout="block">
                            <h:outputText value="#{msg['tarif.season']} "/>
                            <i class="pi pi-cloud"/>
                            <i class="pi pi-sun"/>
                        </h:panelGroup>
                        <p:selectOneButton id="seasonDays"
                                           required="false"
                                           value="#{memC.tarifGreenfee.workSeason}">
                            <f:selectItem itemLabel="#{msg['tarif.all']}"    itemValue="A"/>
                            <f:selectItem itemLabel="#{msg['tarif.high']}"   itemValue="H"/>
                            <f:selectItem itemLabel="#{msg['tarif.medium']}" itemValue="M"/>
                            <f:selectItem itemLabel="#{msg['tarif.low']}"    itemValue="L"/>
                        </p:selectOneButton>

                        <h:outputText value="#{msg['tarif.category']}"/>
                        <p:inputText id="daysCategory"
                                     size="20"
                                     title="#{msg['tooltip.tarif.item']}"
                                     value="#{memC.tarifGreenfee.workItem}"
                                     placeholder="Enter category"/>

                        <h:outputText value="#{msg['tarif.days.monday']} :"/>
                        <p:inputNumber id="monday"
                                       value="#{memC.tarifGreenfee.workDaysPrice[0]}"
                                       title="#{msg['tooltip.tarif.price3']}"
                                       size="5" label="Monday"
                                       lang="#{languageC.locale}"
                                       emptyValue="0" required="false"
                                       decimalPlaces="1" decimalSeparator="."
                                       placeholder="999.9" minValue="0" maxValue="300"/>

                        <h:outputText value="#{msg['tarif.days.week']} :"/>
                        <p:inputNumber id="week"
                                       value="#{memC.tarifGreenfee.workDaysPrice[1]}"
                                       title="#{msg['tooltip.tarif.price3']}"
                                       size="5" label="Week"
                                       lang="#{languageC.locale}"
                                       emptyValue="0" required="false"
                                       decimalPlaces="1" decimalSeparator="."
                                       placeholder="999.9" minValue="0" maxValue="300"/>

                        <h:outputText value="#{msg['tarif.days.friday']} :"/>
                        <p:inputNumber id="friday"
                                       value="#{memC.tarifGreenfee.workDaysPrice[2]}"
                                       title="#{msg['tooltip.tarif.price3']}"
                                       size="5" label="Friday"
                                       lang="#{languageC.locale}"
                                       emptyValue="0" required="false"
                                       decimalPlaces="1" decimalSeparator="."
                                       placeholder="999.9" minValue="0" maxValue="300"/>

                        <h:outputText value="#{msg['tarif.days.weekend']} :"/>
                        <p:inputNumber id="weekend"
                                       value="#{memC.tarifGreenfee.workDaysPrice[3]}"
                                       title="#{msg['tooltip.tarif.price3']}"
                                       size="5" label="Weekend"
                                       emptyValue="0" required="false"
                                       decimalPlaces="1" decimalSeparator="."
                                       placeholder="999.9" minValue="0" maxValue="300"/>

                        <h:outputText value="#{msg['tarif.days.holidays']} :"/>
                        <p:inputNumber id="holidays"
                                       value="#{memC.tarifGreenfee.workDaysPrice[4]}"
                                       title="#{msg['tooltip.tarif.price3']}"
                                       size="5" label="Holidays"
                                       emptyValue="0" required="false"
                                       decimalPlaces="1" decimalSeparator="."
                                       placeholder="999.9" minValue="0" maxValue="300"/>

                        <h:outputText value="#{msg['tarif.twilight']} :"/>
                        <p:selectOneButton id="daysTwilight"
                                           required="false"
                                           value="#{memC.tarifGreenfee.workTwilight}">
                            <f:selectItem itemLabel="No"                      itemValue="N"/>
                            <f:selectItem itemLabel="#{msg['tarif.twilight']}" itemValue="Y"/>
                            <f:selectItem itemLabel="Previous"                itemValue="P"/>
                        </p:selectOneButton>
                    </p:panelGrid>
                    <p:commandButton value="#{msg['tarif.days.create']}"
                                     id="btnAddDays"
                                     icon="pi pi-plus"
                                     action="#{memC.inputTarifGreenfeeWizard('DA')}"
                                     update="tarif_greenfee_wizard"
                                     styleClass="p-button-outlined"
                                     style="margin-top:0.5rem;"/>
                </h:panelGroup>

            </h:panelGroup>
        </p:panel>
    </p:tab>

    <!-- =================== TAB 6: TWILIGHT =================== -->
    <p:tab id="TwilightTab"
           title="Twilight (#{memC.tarifGreenfee.twilightList.size()})"
           titletip="Define twilight pricing">
        <p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h:outputText escape="false" value="#{msg['title.hours.tarif']}"/>
                <span> — Twilight</span>
                <p:badge value="#{memC.tarifGreenfee.twilightList.size()}" severity="info"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:outputText value="#{msg['tarif.hours.start']} :"/>
                <p:datePicker id="twilightStart"
                              value="#{memC.tarifGreenfee.startHour}"
                              timeOnly="true"
                              pattern="HH:mm"
                              label="Tarif twilight : startHour"
                              lang="#{languageC.locale}"
                              locale="#{languageC.locale}"
                              showIcon="true"
                              size="6"
                              required="false"
                              mindate="#{utilsC.localTime(12,30)}"
                              maxdate="#{utilsC.localTime(20,45)}">
                    <f:validateBean disabled="true"/>
                </p:datePicker>

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.season']} "/>
                    <i class="pi pi-cloud"/>
                    <i class="pi pi-sun"/>
                    #{memC.tarifGreenfee.twilightList.size()}
                </h:panelGroup>
                <p:selectOneButton id="seasonTwilight"
                                   value="#{memC.tarifGreenfee.workSeasonTwilight}">
                    <f:selectItem itemLabel="#{msg['tarif.all']}"    itemValue="A"/>
                    <f:selectItem itemLabel="#{msg['tarif.high']}"   itemValue="H"/>
                    <f:selectItem itemLabel="#{msg['tarif.medium']}" itemValue="M"/>
                    <f:selectItem itemLabel="#{msg['tarif.low']}"    itemValue="L"/>
                </p:selectOneButton>

                <h:outputText value="#{msg['tarif.twilight.months']}"/>
                <p:datePicker id="twilightMonths"
                              selectionMode="multiple"
                              value="#{memC.tarifGreenfee.multiTwilight}"
                              readonlyInput="true"
                              view="month"
                              pattern="MM/d/yyyy"
                              showIcon="true"
                              yearNavigator="false"
                              size="30"
                              required="false"
                              locale="#{languageC.locale}"
                              lang="#{languageC.locale}"
                              yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(0)}">
                    <f:validateBean disabled="true"/>
                    <f:convertDateTime pattern="MM/d/yyyy" type="localDate"/>
                </p:datePicker>
            </p:panelGrid>
            <f:facet name="footer">
                <p:commandButton value="#{msg['tarif.twilight.create']}"
                                 id="btnAddTwilight"
                                 icon="pi pi-plus"
                                 action="#{memC.inputTarifGreenfeeWizard('TW')}"
                                 update="tarif_greenfee_wizard"
                                 styleClass="p-button-outlined"/>
            </f:facet>
        </p:panel>
    </p:tab>

    <!-- =================== TAB 7: CONFIRMATION =================== -->
    <p:tab id="ConfirmationTab"
           title="Confirm"
           titletip="Review and create tarif">
        <p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h:outputText value="Confirmation"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:outputText value="#{msg['club.name']} :"/>
                <h:outputText value="#{appContext.club.clubName} (#{appContext.club.idclub})"/>

                <h:outputText value="#{msg['course.name']} :"/>
                <h:outputText value="#{appContext.course.courseName} (#{appContext.course.idcourse})"/>

                <h:outputText value="Periods :"/>
                <h:outputText value="#{memC.tarifGreenfee.datesSeasonsList.size()}"/>

                <h:outputText value="Equipments :"/>
                <h:outputText value="#{memC.tarifGreenfee.equipmentsList.size()}"/>

                <h:outputText value="Basic :"/>
                <h:outputText value="#{memC.tarifGreenfee.basicList.size()}"/>

                <h:outputText value="Hours :"/>
                <h:outputText value="#{memC.tarifGreenfee.teeTimesList.size()}"/>

                <h:outputText value="Days :"/>
                <h:outputText value="#{memC.tarifGreenfee.daysList.size()}"/>

                <h:outputText value="Twilight :"/>
                <h:outputText value="#{memC.tarifGreenfee.twilightList.size()}"/>
            </p:panelGrid>
            <f:facet name="footer">
                <p:commandButton value="Create all tarifs"
                                 id="btnCreateAll"
                                 icon="pi pi-database"
                                 action="#{memC.createTarifGreenfee()}"
                                 styleClass="p-button-success"/>

                <c:set var="year" value="#{utilsC.dateYear(0)}"/>
                <p:commandButton id="btnDeleteAll"
                                 value="#{msg['button.delete']} - year = #{utilsC.dateYear(0)}"
                                 icon="pi pi-trash"
                                 action="#{memC.deleteTarifGreenfee(year)}"
                                 styleClass="p-button-danger">
                    <p:confirm icon="pi pi-exclamation-triangle"/>
                </p:commandButton>
            </f:facet>
        </p:panel>
    </p:tab>

</p:wizard>

<ui:include src="include/include_confirmDialog.xhtml"/>
</h:form>
</div>
</ui:define>
</ui:composition>
