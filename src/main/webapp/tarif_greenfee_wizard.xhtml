<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Tarif Greenfee Wizard Page</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
    <f:facet name="header"><h1>#{msg['title.greenfee.tarif']}</h1></f:facet>
<h:form id="tarif_greenfee_wizard" >

<ui:include src="include/include_summary_greenfee.xhtml"/>

<p:wizard id="wizardTarifGreenfee"
          widgetVar="tarifWizard"
          styleClass="tarif-wizard"
          flowListener="#{memC.onTarifGreenfeeFlow}"
          onnext="$('.ui-growl-item').remove(); $('.ui-messages').empty();"
          onback="$('.ui-growl-item').remove(); $('.ui-messages').empty();">

    <ui:include src="include/include_tarif_wizard_periods.xhtml"/>
    <ui:include src="include/include_tarif_wizard_pricing.xhtml"/>
    <ui:include src="include/include_tarif_wizard_twilight.xhtml"/>
    <ui:include src="include/include_tarif_wizard_equipments.xhtml"/>
    <ui:include src="include/include_tarif_wizard_confirm.xhtml"/>

</p:wizard>

<!-- =================== DIALOG : VISUALISATION =================== -->
<p:dialog id="vizDialog" widgetVar="vizDialog"
          header="#{appContext.club.clubName} — #{memC.tarifGreenfeeCourseDisplay} — #{memC.tarifGreenfee.tarifHolesDisplay}"
          modal="false" resizable="true" draggable="true"
          style="width:90vw; max-width:1400px;">

    <div style="overflow-y:auto; max-height:75vh;">
    <div style="display:flex; gap:1.5rem; align-items:flex-start;">

        <!-- GAUCHE : EN CONSTRUCTION -->
        <div style="flex:1; background:var(--surface-ground,#f4f4f4); border:2px solid var(--primary-color,#4CAF50); border-radius:8px; padding:1rem; overflow-y:auto; max-height:65vh;">
            <h3 style="margin-top:0; color:var(--primary-color,#4CAF50);">In construction</h3>
            <ui:include src="include/include_tarif_greenfee_detail.xhtml">
                <ui:param name="tarif" value="#{memC.tarifGreenfee}"/>
                <ui:param name="showDelete" value="true"/>
            </ui:include>
        </div>

        <!-- DROITE : EN BASE DE DONNÉES -->
        <div style="flex:1; background:var(--surface-ground,#f4f4f4); border:2px solid var(--blue-500,#2196F3); border-radius:8px; padding:1rem; overflow-y:auto; max-height:65vh;">
            <h3 style="margin-top:0; color:var(--blue-500,#2196F3);">In database (today)</h3>
            <ui:include src="include/include_tarif_greenfee_detail.xhtml">
                <ui:param name="tarif" value="#{memC.tarifGreenfeeDB}"/>
            </ui:include>
        </div>

    </div>
    </div>

    <f:facet name="footer">
        <p:commandButton value="Raw ArrayLists"
                         icon="pi pi-list"
                         onclick="PF('rawDialog').show();"
                         styleClass="p-button-outlined p-button-secondary"/>
        <p:commandButton value="#{msg['button.close']}"
                         icon="pi pi-times"
                         onclick="PF('vizDialog').hide(); return false;"
                         styleClass="p-button-secondary"/>
    </f:facet>
</p:dialog>

<!-- =================== DIALOG : RAW ARRAYLISTS =================== -->
<p:dialog id="rawDialog" widgetVar="rawDialog"
          header="&#128295; Raw ArrayLists — #{appContext.club.clubName} / #{memC.tarifGreenfeeCourseDisplay}"
          modal="false" resizable="true" draggable="true"
          style="width:90vw; max-width:1300px;">
    <div style="overflow-y:auto; max-height:78vh;">
        <ui:include src="include/include_raw_greenfee.xhtml">
            <ui:param name="tarif" value="#{memC.tarifGreenfee}"/>
        </ui:include>
    </div>
    <f:facet name="footer">
        <p:commandButton value="#{msg['button.close']}"
                         icon="pi pi-times"
                         onclick="PF('rawDialog').hide(); return false;"
                         styleClass="p-button-secondary"/>
    </f:facet>
</p:dialog>

<ui:include src="include/include_confirmDialog.xhtml"/>

</h:form>
</p:panel>
</div>

</ui:define>
</ui:composition>
