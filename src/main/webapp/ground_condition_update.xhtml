<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">#{msg['menu.ground.condition.update']}</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:480px;">
    <f:facet name="header"><h1>#{msg['menu.ground.condition.update']}</h1></f:facet>

<h:form id="ground_update_form">

    <p:panelGrid columns="2"
                 layout="flex"
                 columnClasses="col1Flex, col2Flex"
                 style="margin-bottom:1.2rem;">
        <p:outputLabel for="updateClub" value="#{msg['club.name']} :"/>
        <p:selectOneMenu id="updateClub"
                         value="#{groundC.workClubId}"
                         filter="true"
                         filterMatchMode="contains"
                         style="width:100%">
            <f:selectItem itemLabel="-- #{msg['message.selectclub']} --"
                          itemValue="#{null}"
                          noSelectionOption="true"/>
            <f:selectItems value="#{unavailableClubC.clubsForUnavailableWizard}"
                           var="cl"
                           itemLabel="#{cl.clubName} (#{cl.idclub})"
                           itemValue="#{cl.idclub}"/>
            <f:validateBean disabled="true"/>
            <p:ajax event="change"
                    listener="#{groundC.onClubChangeUpdate}"
                    update=":ground_update_form:itemsPanel"
                    process="@this"/>
        </p:selectOneMenu>
    </p:panelGrid>

    <p:outputPanel id="itemsPanel">
        <h:panelGroup layout="block" rendered="#{groundC.workClubId != null}">

            <p:divider layout="horizontal" type="solid"/>

            <ui:repeat value="#{groundC.groundConditionItems}" var="mitem">
                <div class="ground-display-row #{groundC.itemStatus[mitem] ? 'ground-row-open' : 'ground-row-closed'}">
                    <p:commandButton icon="#{groundC.itemStatus[mitem] ? 'pi pi-check-circle' : 'pi pi-times-circle'}"
                                     styleClass="p-button-text p-button-sm"
                                     style="padding:0; min-width:unset; color:inherit; font-size:0.9rem;"
                                     title="#{groundC.itemStatus[mitem] ? msg['ground.condition.available'] : msg['ground.condition.unavailable']}"
                                     action="#{groundC.toggleItemStatus(mitem)}"
                                     process="@this"
                                     update=":ground_update_form:itemsPanel"/>
                    <span style="font-size:0.88rem;">#{mitem}</span>
                </div>
            </ui:repeat>

            <h:panelGroup rendered="#{groundC.groundCondition.lastUpdate != null}"
                          style="display:block; margin-top:0.8rem;
                                 font-size:0.78rem; color:#6c757d;">
                <i class="pi pi-clock" style="margin-right:0.3rem;"/>
                #{msg['ground.condition.last.update']} :
                <h:outputText value="#{groundC.groundCondition.lastUpdate}">
                    <f:convertDateTime pattern="dd/MM/yyyy HH:mm" type="localDateTime"/>
                </h:outputText>
            </h:panelGroup>

            <div style="margin-top:1rem;">
                <p:commandButton value="#{msg['ground.condition.save']}"
                                 icon="pi pi-save"
                                 action="#{groundC.saveGroundConditionUpdate()}"
                                 process="@form"
                                 update=":ground_update_form:itemsPanel growl-msg"
                                 styleClass="p-button-success"/>
                <p:commandButton value="#{groundC.showPreview ? msg['ground.condition.preview.hide'] : msg['ground.condition.preview.show']}"
                                 icon="#{groundC.showPreview ? 'pi pi-eye-slash' : 'pi pi-eye'}"
                                 action="#{groundC.togglePreview()}"
                                 process="@this"
                                 update=":ground_update_form:itemsPanel :previewPanel"
                                 styleClass="p-button-info p-button-outlined"
                                 style="margin-left:0.5rem;"/>
            </div>

        </h:panelGroup>
    </p:outputPanel>

</h:form>

<p:outputPanel id="previewPanel">
    <h:panelGroup rendered="#{groundC.showPreview}" layout="block" style="margin-top:1rem;">
        <ui:include src="include/include_ground_condition_display.xhtml"/>
    </h:panelGroup>
</p:outputPanel>

</p:panel>
</div>

</ui:define>
</ui:composition>
