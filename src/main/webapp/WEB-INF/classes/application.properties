
# ============================================================================
# Configuration GeoIP - application.properties
# ============================================================================

# --- Database Configuration ---
# Chemin vers la base de donn\u00e9es GeoIP2
# T\u00e9l\u00e9chargeable depuis: https://dev.maxmind.com/geoip/geolite2-free-geolocation-data/
geoip.database.path=/opt/geo/GeoLite2-City.mmdb

# Taille du cache (nombre d'entr\u00e9es IP en m\u00e9moire)
# Plus \u00e9lev\u00e9 = meilleure performance, plus de m\u00e9moire utilis\u00e9e
# Recommand\u00e9: 4096 pour usage normal, 16384 pour fort trafic
geoip.cache.size=4096

# Mode de lecture du fichier
# MEMORY: Charge tout le fichier en RAM (rapide mais consomme ~100MB)
# MEMORY_MAPPED: Mapping m\u00e9moire (recommand\u00e9, \u00e9quilibre performance/m\u00e9moire)
geoip.file.mode=MEMORY_MAPPED

# --- Locale Configuration ---
# Langue pour les noms de localisation (ISO 639-1)
# Langues support\u00e9es par GeoIP2: de, en, es, fr, ja, pt-BR, ru, zh-CN
geoip.locale.language=fr

# Pays pour la locale (optionnel, ISO 3166-1 alpha-2)
# Si non d\u00e9fini, seule la langue sera utilis\u00e9e
geoip.locale.country=FR

# --- Display Configuration ---
# Format d'affichage: simple, detailed, coordinates
# - simple: "Ville, Pays" ou "Ville, Pays (XX)" si include-country-code=true
# - detailed: "Ville, R\u00e9gion, Pays (XX) - Code postal"
# - coordinates: "Ville, Pays [lat, lon]"
geoip.display.format=simple

# Inclure le code pays ISO dans l'affichage (true/false)
geoip.display.include-country-code=false

# ============================================================================
# Exemples de configuration pour diff\u00e9rents environnements
# ============================================================================

# --- D\u00e9veloppement (utilise moins de m\u00e9moire) ---
#geoip.database.path=/Users/dev/geoip/GeoLite2-City.mmdb
#geoip.cache.size=1024
#geoip.file.mode=MEMORY_MAPPED

# --- Production (performance optimale) ---
#geoip.database.path=/opt/geo/GeoLite2-City.mmdb
#geoip.cache.size=16384
#geoip.file.mode=MEMORY

# --- Docker/Container ---
#geoip.database.path=/app/data/GeoLite2-City.mmdb
#geoip.cache.size=4096
#geoip.file.mode=MEMORY_MAPPED

# ============================================================================
# Exemples de configuration pour diff\u00e9rentes locales
# ============================================================================

# Configuration pour l'espagnol
#geoip.locale.language=es
#geoip.locale.country=ES

# Configuration pour l'anglais am\u00e9ricain
#geoip.locale.language=en
#geoip.locale.country=US

# Configuration pour l'allemand
#geoip.locale.language=de
#geoip.locale.country=DE

# Configuration pour le portugais br\u00e9silien
#geoip.locale.language=pt
#geoip.locale.country=BR

# ============================================================================
# Variables d'environnement alternatives (pour Docker/Kubernetes)
# ============================================================================
# GEOIP_DATABASE_PATH=/opt/geo/GeoLite2-City.mmdb
# GEOIP_CACHE_SIZE=4096
# GEOIP_FILE_MODE=MEMORY_MAPPED
# GEOIP_LOCALE_LANGUAGE=fr
# GEOIP_LOCALE_COUNTRY=FR
