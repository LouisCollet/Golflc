<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Local Administrator</ui:define>

<ui:define name="content">

    <h:form id="form_local_admin">

        <div class="login-container" style="min-height:auto; align-items:flex-start;">
            <p:panel styleClass="login-card form-card">
                <f:facet name="header">
                    <h1>#{msg['message.selectLA']}</h1>
                </f:facet>

                <p:panelGrid id="panel2"
                             layout="flex"
                             columns="2"
                             columnClasses="col1Flex, col2Flex">

                    <!-- =================== INCLUDE PLAYER SELECTOR =================== -->
                    <ui:include src="/include/include_player_selector.xhtml">
                        <ui:param name="playerPurpose" value="local_admin"/>
                        <ui:param name="playerLabel" value="#{msg['professional.title']}"/>
                    </ui:include>

                    <!-- =================== INCLUDE CLUB SELECTOR =================== -->
                    <ui:include src="/include/include_club_selector.xhtml"/>

                </p:panelGrid>

                <f:facet name="footer">
                    <p:commandButton value="#{msg['button.localadmin.create']}"
                                     id="createPlayer"
                                     ajax="false"
                                     update="growl-msg"
                                     icon="pi pi-database"
                                     action="#{playerC.createLocalAdministrator()}"/>
                </f:facet>

            </p:panel>
        </div>

    </h:form>

</ui:define>
</ui:composition>
