<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml" >
<ui:define name="title">Create Professional </ui:define>
<ui:define name="content">

<h:form id="form_professional" enctype="application/x-www-form-urlencoded" >
<h:graphicImage id="graphic1" name="images/golf lesson2.jpg" alt="image missing :golf lesson2.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage id="graphic2" name="images/golf lesson2.jpg" alt="image missing :golf lesson2.jpg" style="float: right;"></h:graphicImage>
<ui:include src="include/include_summary_player.xhtml"/>
<ui:include src="include/include_summary_club.xhtml"/>
<p:panelGrid 
    id="panelGrid2"
    layout="tabular"
    columns="2"
    columnClasses="col1, col2"
    style="width:70%">
         <h:outputText value="#{msg['professional.title']}" />
         <h:panelGroup id="container4" layout="block" >
             <!--  value="#{courseC.professional.proPlayerId}" 
             decimalPlaces="0"<! Cohérent avec les outputText was professional
                       emptyValue="0"-->
                <p:inputNumber
                       id="inputPlayer"
                       value="#{courseC.localAdmin.idplayer}" 
                       size="7"
                       
                       style="margin-right: 10px;" />
                <p:commandButton 
                         id="ButtonPro"
                          
                         immediate="true"
                         value="#{msg['button.player.list']}"
                         actionListener="#{dialogC.showSelectPlayer('professional')}"
                         style="margin-right: 10px;"
                         icon="pi pi-search" >
                    <p:ajax event="dialogReturn"
                            update="inputPlayer,playerName,localAdminId,growl-msg" />
                  </p:commandButton>

                <h:outputText id="playerName"
                              value="#{courseC.localAdmin.playerLastName}" 
                              style="font-style:italic;margin-right: 10px;" />
                <h:outputText id="localAdminId"
                              value="#{courseC.localAdmin.idplayer}"
                              style="font-weight:bold;font-size: 2rem;font-style:italic;color: red;"/>
          </h:panelGroup>
   <!--********************************* --> 
         <h:outputText value="#{msg['club.name']}" />
         <h:panelGroup layout="block" id="container2">
                <p:inputNumber
                       id="inputClub"
                       value="#{courseC.localAdmin.playerHomeClub}"
                       size="5"
                       style="margin-right: 10px;"
                       decimalPlaces="0"
                       emptyValue="null" />
                <!-- minValue="1" -->
                <p:commandButton 
                         id="ButtonClub"
                         immediate="true"
                         value="#{msg['button.player.homeclub']}"
                         actionListener="#{dialogC.showSelectClub('professional')}"
                         style="margin-right: 10px;"
                         icon="pi pi-search" >
                    <p:ajax event="dialogReturn"
                         update="inputClub,clubName,playerClub,growl-msg"  />
                  </p:commandButton>
                <h:outputText id="clubName"
                              value=" #{courseC.club.clubName}" 
                              style="font-style:italic"/>  
                <h:outputText id="playerClub"
                              value=" #{courseC.localAdmin.playerHomeClub}"
                              style="font-weight:bold;font-size: 2em;font-style:italic;color: red" />  
          </h:panelGroup> 
         
    <h:outputText  value="#{msg['unavailable.period.start']} :"/>
    <p:datePicker value="#{courseC.professional.proStartDate}"
                  id="startDatePro"
                  locale="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  size="15"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                  yearNavigator="true"
                  monthNavigator="true"
                  >
    </p:datePicker>

      <h:outputText  value="#{msg['unavailable.period.end']} :"/>
      <p:datePicker value="#{courseC.professional.proEndDate}"
                  id="endDatePro"
                  locale="#{languageC.locale}"
                  lang="#{languageC.locale}"
                  pattern="dd/MM/yyyy HH:mm"
                  size="15"
                  showTime="true"
                  showIcon="true"
                  readonlyInput="true"
                  showButtonBar="true"
                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(10)}"
                  yearNavigator="true"
                  monthNavigator="true"
                  >
    </p:datePicker>
         <h:outputText  value="#{msg['professional.amount']} :"/>
         <p:inputNumber  label="lesson"
                       id="monday${i}"
                       value="#{courseC.professional.proAmount}"
                       title="#{msg['tooltip.tarif.price3']}"
                       size="4"
                       lang="#{languageC.locale}"
                       decimalPlaces="1"
                       decimalSeparator="."
                       placeholder="99.9" >
          </p:inputNumber>

<f:facet name="footer">
        <p:commandButton
                         value="#{msg['button.professional.create']}"
                         id="createPlayer"
                         ajax="false"
                         style="font-weight:normal "
                         update="growl-msg"
                          
                         icon="pi pi-database"
                         action="#{courseC.createProfessional}"/>
</f:facet>
</p:panelGrid>

</h:form>
</ui:define>
</ui:composition>
