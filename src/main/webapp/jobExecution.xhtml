<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Job Execution</ui:define>

<ui:define name="content">

<h:form id="jobexecution"  >

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <h1>Batch Job Execution</h1>
</f:facet>

<p:panelGrid
    id="panel"
    layout="flex"
    columns="2"
    columnClasses="col1Flex,col2Flex">

<h:outputText value="Last Batch ID" />
<h:outputText value="#{batchC.execID}" />

<h:outputText value="Last Batch Status"/>
<h:outputText value="#{batchC.jobStatus}" />

<c:forEach items="#{batchC.listeBatch}" var="c" varStatus="loop">
   <h:outputText value="Job Execution Details" />
   <h:outputText value="#{batchC.getJobExecutionDetails(c.execID)} / #{loop.index+1}" />
</c:forEach>

<f:facet name="footer">
        <p:commandButton value="Back to Job Submission"
                         update="growl-msg"
                         immediate="true"
                         ajax="false"
                         icon="pi pi-arrow-left"
                         action="jobSubmitter.xhtml?faces-redirect=true" />
</f:facet>
</p:panelGrid>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
