<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">

<h:form id="form_header">

    <div class="p-3 border-bottom-1 surface-border"
        
         rendered="#{playerC != null and playerC.player != null and playerC.player.idplayer != null}">
        <!-- ===================== -->
        <!-- 1️⃣ ACTION BAR -->
        <!-- ===================== rendered="#{playerC.player != null and playerC.player.idplayer != null}"> -->
        <div class="grid align-items-center">

            <!-- LEFT -->
            <div class="col-12 md:col-6 flex align-items-center gap-3">

                <!-- Hamburger menu — visible only on mobile (hidden on md+) -->
                <p:commandButton icon="pi pi-bars"
                                 type="button"
                                 styleClass="md:hidden"
                                 style="font-size:1.3rem;"
                                 aria-label="Menu"
                                 onclick="PF('sidebarMenu').show()" />

                <p:commandButton id="buttonLogout"
                                 value="Logout"
                                 icon="pi pi-power-off"
                                 immediate="true"
                                 action="#{navC.logout('from button Logout')}"
                                 rendered="#{appContext.connected}" />

                <p:selectOneMenu id="selectOneMenu"
                                 value="#{activeLocale.languageTag}">
                    <f:selectItem itemLabel="#{msg['choose.language']}" itemValue="" noSelectionOption="true"/>
                    <f:selectItems value="#{activeLocale.availableLocales}"
                                   var="language"
                                   itemValue="#{language.toLanguageTag()}"
                                   itemLabel="#{activeLocale.getDisplayLanguage(language)}"/>
                    <p:ajax listener="#{activeLocale.reload()}" />
                </p:selectOneMenu>

                <p:idleMonitor timeout="500000">
                    <p:ajax event="idle"   listener="#{utilC.onIdleMonitor()}" />
                    <p:ajax event="active" listener="#{utilC.onActiveMonitor()}" />
                </p:idleMonitor>

            </div>

            <!-- RIGHT -->
            <div class="col-12 md:col-6 flex justify-content-end gap-3">

                <p:commandButton value="HelpRead"
                                 icon="pi pi-book"
                                 type="button"
                                 onclick="PF('sidebarRight').show()" />

                <p:commandButton value="HelpWrite"
                                 icon="pi pi-pencil"
                                 rendered="#{playerC.isAdmin()}"
                                 ajax="false"
                                 action="#{mongoHelpC.showHelpFile()}" />

                <p:commandButton value="Footer"
                                 icon="pi pi-arrow-down"
                                 type="button"
                                 rendered="#{settings.getProperty('EXECUTION') eq 'Development'}"
                                 onclick="PF('sidebarDown').show()" />

                <!-- Dark/Light mode toggle -->
                <p:commandButton id="themeToggle"
                                 icon="pi pi-moon"
                                 type="button"
                                 aria-label="Toggle dark mode"
                                 onclick="toggleDarkMode(this)" />

                <!-- screenShot removed 2026-02-28 — method was dead (Selenium test-only, removed 2026-01-10)
                <p:commandButton value="Screenshot"
                                 icon="pi pi-camera"
                                 ajax="false"
                                 action="#{navC.screenShot(view.viewId)}" />
                -->

            </div>
        </div>

        <!-- ===================== -->
        <!-- 2️⃣ DEBUG BAR — 1 ligne, admin + connected only -->
        <!-- ===================== -->
        <h:panelGroup layout="block" styleClass="summary-bar mt-2"
                      rendered="#{appContext.connected and playerC.isAdmin()}">
            <span class="summary-item">
                <span class="summary-label">Player</span>
                <span class="summary-value">#{playerC.player.idplayer} #{playerC.player.playerFirstName} #{playerC.player.playerLastName} (#{playerC.player.playerRole})</span>
            </span>
            <span class="summary-sep">|</span>
            <span class="summary-item">
                <span class="summary-label">View</span>
                <span class="summary-value">#{view.viewId}</span>
            </span>
            <span class="summary-sep">|</span>
            <span class="summary-item">
                <span class="summary-label">Locale</span>
                <span class="summary-value">#{languageC.locale}</span>
            </span>
            <span class="summary-sep">|</span>
            <span class="summary-item">
                <span class="summary-label">Exec</span>
                <span class="summary-value">#{settings.getProperty('EXECUTION')}</span>
            </span>
            <span class="summary-sep">|</span>
            <span class="summary-item">
                <span class="summary-label">Sessions</span>
                <span class="summary-value">#{advancedAdmin.activeSessionCount}</span>
            </span>
        </h:panelGroup>

        <!-- ===================== -->
        <!-- 3️⃣ AJAX STATUS -->
        <!-- ===================== -->
        <div class="mt-3">

            <p:ajaxStatus onstart="PF('statusDialog').show()"
                          onsuccess="PF('statusDialog').hide()"/>

            <p:dialog widgetVar="statusDialog"
                      modal="true"
                      draggable="false"
                      closable="false"
                      resizable="false"
                      showHeader="false"
                      style="border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.15);">
                <div style="text-align:center; padding:1.5rem 2rem;">
                    <i class="pi pi-spin pi-spinner" style="font-size:2.5rem; color:var(--golf-primary);"></i>
                    <div style="margin-top:0.75rem; font-size:0.85rem; color:var(--golf-text-light);">Loading...</div>
                </div>
            </p:dialog>

        </div>

    </div>

</h:form>
</ui:composition>
