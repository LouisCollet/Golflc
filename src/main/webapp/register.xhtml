<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Register </ui:define>

<ui:define name="content">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <h1>#{msg['login.welcome']}</h1>
</f:facet>

<h:form id="register">
<p:panelGrid id="panel"
             columns="2"
             layout="flex"
             columnClasses="col1Flex, col2Flex">

     <h:outputText value="eID card holder" />
     <h:outputText value="Manual registration" />
     <h:link title="#{msg['login.user.belgian']}"
             outcome="register_eID_player.xhtml">
        <h:graphicImage name="images/arrow-left-3D.jpg"/>
     </h:link>
     <h:link title="#{msg['login.user.nonbelgian']}"
             outcome="player.xhtml}">
        <h:graphicImage name="images/arrow-right-3D.jpg"/>
     </h:link>
</p:panelGrid>

</h:form>
</p:panel>
</div>

</ui:define>
</ui:composition>
