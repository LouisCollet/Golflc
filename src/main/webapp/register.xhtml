<?xml version="1.0" encoding="UTF-8"?>

<!DOCTYPE html>
<html
      xmlns="http://www.w3.org/1999/xhtml"
       xmlns:f="jakarta.faces.core"

      xmlns:p="primefaces"
>

<ui:composition template="templates/masterTemplate.xhtml">
<ui:define name="title">Register </ui:define>

<ui:define name="content">
    
<h:link title="#{msg['login.user.belgian']}"
        outcome="register_eID_player.xhtml"
        style="float:left;"
        >
    <h:graphicImage 
                    rendered="true"
                    name="images/eIDcard.jpg"
                    alt="image missing : eIDcard.jpg"
                    style="float:left;">
    </h:graphicImage>
</h:link>

<h:link title="#{msg['login.user.nonbelgian']}"
        outcome="player.xhtml"
        style="float:right;"
        >    
<h:graphicImage 
                rendered="true"
                name="images/registration.jpg"
                alt="image missing :registration.jpg"
                style="float:right;">
</h:graphicImage>
    
    <!--  outcome="#{courseC.to_player_xhtml('non_belgian')}"  -->
</h:link>
    
<h:form id="register" enctype="application/x-www-form-urlencoded" >
<p:panelGrid id="panel"
             columns="2"
             layout="tabular"
             columnClasses="col1, col2"
             >
<f:facet name="header">
    <h:outputText escape="false" value="#{msg['login.welcome']}" />
</f:facet>
     <h:outputText value="eID card holder" />
     <h:outputText value="Manual registration" />
     <h:link title="#{msg['login.user.belgian']}"
             outcome="register_eID_player.xhtml"
             style="float:left;"
        >
        <h:graphicImage name="images/arrow-left-3D.jpg" style="float:left;"/>
     </h:link>
     <h:link title="#{msg['login.user.nonbelgian']}"
             outcome="player.xhtml}"
             style="float:right;"
        >
     <h:graphicImage name="images/arrow-right-3D.jpg" style="float:right;"/>
   </h:link>
     <!--  outcome="#{courseC.to_player_xhtml('non_belgian')}"   -->
 </p:panelGrid>

</h:form>
</ui:define>
