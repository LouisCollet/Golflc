<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Score Scramble Page </ui:define>
<ui:define name="content">

<h:form id="score_scramble">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header">
    <h1>#{msg['title.score.results']} scramble</h1>
</f:facet>

<p:panelGrid
    id="panelgrid1"
    layout="flex"
    columnClasses="col1Flex, col2Flex"
    columns="2">

      <h:outputText value="#{msg['round.id']} :" />
      <h:outputText
            id="idround"
            value="#{roundC.round.Roundname} (#{roundC.round.idround})"
            title="This tooltip is displayed when input gets the focus" />

      <h:outputText value="#{msg['player.id']} :" />
      <h:outputText
            id="idplayer1"
            value="#{playerC.player.playerLastName} (#{playerC.player.idplayer})"
            title="This tooltip is displayed when input gets the focus" />

      <h:outputText value="#{msg['club.name']} :" />
      <h:outputText
            id="clubn"
            value="#{clubC.club.clubName} (#{clubC.club.idclub})" />

      <h:outputText value="#{msg['course.name']} :" />
      <h:outputText
            id="idcourse"
            value="#{clubC.course.courseName} (#{clubC.course.idcourse})" />

      <h:outputText value="#{msg['round.date']} :" />
      <h:outputText
            id="rounddate"
            value="#{roundC.round.roundDate}">
              <f:convertDateTime type="localDate" pattern="dd/MM/yyyy" />
      </h:outputText>

</p:panelGrid>
<p:divider layout="horizontal" type="solid" />

<p:panelGrid id="panelgrid2"
             columns="10"
             layout="flex"
             style="text-align:center;"
             rendered="#{roundC.round.roundHoles eq 18 or roundC.round.roundStart eq 1}">
    <h:outputText value="  #{msg['score.aller']}"
              style="background-color: lightskyblue;" />
   <c:forEach var="i" begin="01" end="09" step="1">
      <h:outputText value="${i}"
              style="font-size:1.5em;" />
   </c:forEach>

    <h:outputText value="  #{msg['par.par']}"
              style="background-color: lightskyblue;" />
   <c:forEach var="i" begin="01" end="09" step="1">
       <h:outputText value="#{roundC.parArray[i-1]}"
                     style="font-style: italic" />
   </c:forEach>

    <h:outputText value="#{msg['score.gross']}" />
    <c:forEach var="i" begin="01" end="09" step="1">
        <h:inputText  id="score01-09${i}"
                label="ScoreLC"
                value="#{roundC.scoreStableford.holes[i-1]}"
                size="2"
                onchange="repl(this);"
                required="true"
                requiredMessage="#{msg['score.hole.notnull']} : #{i}"
                validatorMessage="#{msg['score.hole.minMAX']} : #{i}">
            <f:validateLongRange minimum="0" maximum="12" />
        </h:inputText>
    </c:forEach>

</p:panelGrid>

<p/>
<p:panelGrid id="panelgrid3"
             columns="10"
             layout="flex"
             style="text-align:center;"
             rendered="#{roundC.round.roundHoles eq 18 or roundC.round.roundStart eq 10}">
    <h:outputText value="#{msg['score.return']}" />
    <c:forEach var="i" begin="10" end="18" step="1">
         <h:outputText value="${i}"
                       style="font-size:1.5em;" />
    </c:forEach>

    <h:outputText value="  #{msg['par.par']}"
              style="background-color: lightskyblue;" />
   <c:forEach var="i" begin="10" end="18" step="1">
       <h:outputText value="${roundC.parArray[i-1]}"
                     style="font-style: italic"/>
   </c:forEach>

    <h:outputText value="#{msg['score.gross']}" />
    <c:forEach var="i" begin="10" end="18" step="1">
            <h:inputText  id="score10-18${i}"
                    label="ScoreLC"
                    value="#{roundC.scoreStableford.holes[i-1]}"
                    size="2"
                    onchange="repl(this);"
                    required="true"
                    requiredMessage="#{msg['score.hole.notnull']} : #{i}"
                    validatorMessage="#{msg['score.hole.minMAX']} : #{i}">
            <f:validateLongRange minimum="0" maximum="12" />
      </h:inputText>
    </c:forEach>

</p:panelGrid>

<f:facet name="footer">
</f:facet>
</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
