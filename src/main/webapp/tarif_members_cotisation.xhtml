<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml" >
<ui:define name="title">Tarif Members Cotisation</ui:define>
<ui:define name="content">
<h:graphicImage name="images/tarif1.jpg" alt="image missing :tarif1.jpg" style="float: left;"> </h:graphicImage>
<h:graphicImage name="images/tarif2.jpg" alt="image missing :tarif2.jpg" style="float: right;"> </h:graphicImage>
<h:form id="tarif_members_cotisation" enctype="application/x-www-form-urlencoded" >

<ui:include src="include/include_summary_cotisation.xhtml"/>
<p:panelGrid
    id="panel1"
    layout="tabular"
    columns="3"
    columnClasses="col1,col2,col2"
    >

<f:facet name="header">
     <h:outputText escape="false" value="#{msg['title.members.tarif']}" />
     <h:outputText value="#{memC.tarifMember.basicList.size()}"/>
</f:facet>
       <h:outputText  value="#{msg['tarif.period.start']} :" />
                <p:datePicker id="startPeriod"
                        value="#{memC.tarifMember.workStartDate}"
                        size="10"
                        showIcon="true"
                        showTime="false"
                        locale="#{languageC.locale}"
                        lang="#{LanguageC.locale}"
                        pattern="dd-MM-yyyy"
                        yearNavigator="true"
                        monthNavigator="true"
                        yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                        readonlyInput="true"
                 />
       <h:outputText value=""/>
       <h:outputText  value="#{msg['tarif.period.end']} :"/>
            <p:datePicker value="#{memC.tarifMember.workEndDate}"
                        id="endPeriod"
                        locale="#{languageC.locale}"
                        lang="#{LanguageC.locale}"
                        showIcon ="true"
                        showTime="false"
                        pattern="dd-MM-yyyy"
                        yearNavigator="true"
                        monthNavigator="true"
                        yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(2)}"
                        readonlyInput="true"
                        size="10"
                        
                 >
               </p:datePicker>
       <!-- required="true"
                        requiredMessage="End Date is a required input"  -->
      <h:outputText value=""/>

   <h:panelGroup id="panelItem" layout="block" >
     <h:outputText value="#{msg['tarif.members.item']} "
                   style="font-size: 1.5em;"
                   />
     <i class="pi pi-list" style="font-size: 1.5rem"></i>
     <i class="pi pi-pencil"></i>
</h:panelGroup>  
<h:panelGroup id="panelChoice" layout="block" >    
     <h:outputText value="#{msg['tarif.members.price']} "
                   style="font-size: 1.5em;"
                   />
     <i class="pi pi-euro" style="font-size: 1.5rem"></i>

</h:panelGroup>
    <h:panelGroup id="panelAge" layout="block" >
        <h:outputText value="Age: "
                      style="font-size: 1.5rem;"/>
    </h:panelGroup>

        <p:inputText    id="MembersText"
                        size="20"
                        title="#{msg['tooltip.tarif.item']}"
	                value="#{memC.tarifMember.workItem}"/>
        <p:inputNumber   id="MembersAmount"
                       value="#{memC.tarifMember.workPrice}"
                       title="#{msg['tooltip.tarif.price4']}"
                       size="6"
                       decimalPlaces="1"
                       decimalSeparator="."
                    
                       placeholder="9999.9"
                       thousandSeparator=""
                       minValue="0"
                       maxValue="2000.0"
                       lang="#{languageC.locale}" >
        </p:inputNumber>
     <!--   -->   
        
        <p:inputMask   id="MembersAge"
                       value="#{memC.tarifMember.workRangeAge}"
                       title="#{msg['tooltip.tarif.age']}"
                       size="6"
                       lang="#{languageC.locale}"
                   
                       mask="99-99"
                  >
        </p:inputMask>

<f:facet name="footer">
        <p:commandButton value="#{msg['tarif.members.add']}"
                         id="commandButtonInput"
                         ajax="false"
                         update="growl-msg"
                          
                         icon="pi pi-plus"
                         action="#{memC.inputTarifMembersCotisation}"/>
        <p:commandButton value="#{msg['tarif.back']}"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-undo"
                         style="float: right;"
                         action="tarif_members_menu.xhtml?faces-redirect=true" />
</f:facet>

</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
