<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Unavailable Menu Page</ui:define>
<ui:define name="content">

<h:form id="unavailable_menu">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
    <p:panel styleClass="login-card form-card" style="max-width:100%;">
        <f:facet name="header">
            <h1>#{msg['title.unavailable.structure']}</h1>
        </f:facet>

        <!-- Club/Course selectors -->
        <p:panelGrid id="panel1"
                     layout="flex"
                     columns="2"
                     columnClasses="col1Flex, col2Flex">
            <ui:include src="/include/include_club_selector.xhtml"/>
            <ui:include src="/include/include_course_selector.xhtml"/>
        </p:panelGrid>

        <div class="btn-group" style="margin-top:1rem;">
            <p:commandButton value="#{msg['button.select']}"
                             id="buttonInit"
                             icon="pi pi-check"
                             action="#{clubC.initUnavailableMenu()}"
                             update="summaryPanel menuPanel growl-msg"/>
        </div>

        <p:divider layout="horizontal" type="solid"/>

        <!-- Summary — visible after init -->
        <h:panelGroup id="summaryPanel" layout="block">
            <h:panelGroup rendered="#{clubC.unavailable.structure.menuLaunched eq true}">
                <ui:include src="include/include_summary_club.xhtml"/>
            </h:panelGroup>
        </h:panelGroup>

        <!-- Menu cards — visible after init -->
        <h:panelGroup id="menuPanel" layout="block">
            <h:panelGroup rendered="#{clubC.unavailable.structure.menuLaunched eq true}"
                          layout="block">
                <div class="account-menu">

                    <div class="account-menu-section-label">
                        <i class="pi pi-cog"/> #{msg['title.unavailable.structure']}
                    </div>
                    <div class="account-menu-grid">
                        <h:link id="btnStructure"
                                styleClass="account-card"
                                outcome="unavailable_structure.xhtml">
                            <i class="account-card-icon pi pi-calendar"/>
                            <span class="account-card-label">1. Create Structure</span>
                            <span class="account-card-desc">Define unavailability structure for the course</span>
                        </h:link>

                        <h:link id="btnPeriods"
                                styleClass="account-card"
                                outcome="unavailable_period.xhtml"
                                disabled="#{not clubC.unavailable.structure.structureExists}">
                            <i class="account-card-icon pi pi-clock"/>
                            <span class="account-card-label">2. Create Periods</span>
                            <span class="account-card-desc">Define unavailability periods</span>
                        </h:link>

                        <p:commandLink id="btnDelete"
                                       styleClass="account-card"
                                       action="#{clubC.modifyClubUnavailableStructure('delete')}"
                                       update="growl-msg">
                            <i class="account-card-icon pi pi-trash" style="color:var(--golf-danger);"/>
                            <span class="account-card-label">3. Delete Structure</span>
                            <span class="account-card-desc">#{msg['button.delete']} #{clubC.club.clubName}</span>
                            <p:confirm type="popup"
                                       header="#{msg['message.confirm.delete']}"
                                       message="Delete unavailable structure for #{clubC.club.clubName}?"
                                       icon="pi pi-exclamation-triangle"/>
                        </p:commandLink>
                    </div>

                </div>
            </h:panelGroup>
        </h:panelGroup>

        <ui:include src="include/include_confirmDialog.xhtml"/>
    </p:panel>
</div>
</h:form>

</ui:define>
</ui:composition>
