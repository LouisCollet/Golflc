<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core">

    <p:column id="thumbnail"
              headerText="Thumbnail"
              width="10%"
              style="text-align:center">
        <c:set var="thumbnail"
               value="#{c.player.playerPhotoLocation}"/>
        <p:graphicImage id="image_thumbnail"
                        stream="false"
                        value="#{imageView.getThumbnail(thumbnail)}"
                        title="Player's Photo"
                        rendered="#{thumbnail ne 'no photo.jpeg'}"
                        alt="Thumbnail missing for : #{c.player.playerLastName}"/>
        <h:graphicImage id="image_thumbnail_unknown"
                        title="this is the thumbnail !!"
                        name="images/thumbnails/thumbnail.unknown.jpg"
                        rendered="#{thumbnail eq 'no photo.jpeg'}"
                        alt="nophoto.jpeg for : #{c.player.playerLastName}"/>
    </p:column>

</ui:composition>
