<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:h="jakarta.faces.html"
      template="templates/masterTemplate.xhtml">
    
    <!-- mod 03-03-2024 xmlns:jsf="http://xmlns.jcp.org/jsf/" -->
<ui:define name="head" />
<ui:define name="title">Player Page </ui:define>
<ui:define name="content">
<style>
.grid-container {
   display: grid;
   grid-template-columns: auto auto auto;
   background-color: #2196F3;
   padding: 10px;
}
.grid-item {
   background-color: rgba(255, 255, 255, 0.8);
   border: 1px solid rgba(0, 0, 0, 0.8);
   padding: 20px;
   font-size: 30px;
   text-align: center;
}
</style>
 <!--  <div class="card"> -->

<h:graphicImage name="images/jack_nicklaus.png" alt="image missing :nicklaus.jpg"  style="float: left;"></h:graphicImage>
<h:graphicImage name="images/jack_nicklaus.png" alt="image missing :nicklaus.jpg"  style="float: right;"></h:graphicImage>
<p:separator/>
<h:outputStylesheet library="styles" name="flags/flags.css" />
 <p:divider layout="horizontal" type="solid" />
<h:form id="form_player" >  

<p:panel id ="panelGlobal" >
    <f:facet name="header" >
      <h:outputText escape="false" value="#{msg['player.create.data']}"> </h:outputText>
    </f:facet>
    <p:wizard id="wizardPlayer" 
              widgetVar="myWizard"
              style="width:50%; margin:auto;"
              flowListener="#{playerWizard.onFlowProcess}">
  <!--  https://www.w3schools.com/css/tryit.asp?filename=trycss_grid    -->       
     <p:tab id="IdentificationTab"
            title="Identification"
            menuTitle="menutitle ??"
            
            titletip="These are the Identification Infos"
            titleStyle="font-size: 1.0rem;color:green">
          <p:focus for="PlayerId" />
          <p:panel id ="panelIdentification"
                   header="#{msg['player.id']}">
       <!-- default = was grid tabular  class="grid-container"class="grid-item"-->
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">
                <p:outputLabel for="@next" value="#{msg['player.id']}" />
            <!--     <h:outputText value="#{msg['player.id']}" />
                  label="PlayerIdentification" -->
                <p:inputNumber
                        id="PlayerId"
			value="#{playerC.player.idplayer}"
                        title="#{msg['tooltip.player.id']}"
                        size="7"
                        decimalPlaces="0"
                        thousandSeparator=""
                        decimalSeparator="."
                        placeholder="999999"
                        maxValue="999999" />
              </p:panelGrid>
          </p:panel>
    </p:tab>
 
    <p:tab id="PersonalTab"
           title="Personal"
           menuTitle="this is menuTitle"
           titletip="These are the Personal Infos"
           titleStyle="font-size: 1.0rem;color:red">
  
        <p:panel id="panelPersonal" 
                 header="#{msg['player.personal']}">
  <!-- PF13 flex is default !! layout="flex" tabular was default in PF <13 -->
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex"
                         styleClass="ui-panelgrid-blank"
                         style="width:80%">
                <p:outputLabel for="@next" value="#{msg['player.firstname']}"
                               class="h-auto" />
		<p:inputText  id="PlayerFirstName"
                              value="#{playerC.player.playerFirstName}" 
                              placeholder="Enter the player first name here"
                              title="#{msg['tooltip.player.firstname']}"
                              class="border-round"
                              size="45" />
		<p:outputLabel for="@next" value="#{msg['player.lastname']}" />
		<p:inputText  id="PlayerLastName"
                              value="#{playerC.player.playerLastName}"
                              size="45"
                              placeholder="Enter the player last name here"
                              title="#{msg['tooltip.player.lastname']}" />
            <h:panelGroup id="panelBirth" layout="block" >
                 <p:outputLabel for="PlayerBirthDate" value="#{msg['player.birth']}"  />
                 <i class="pi pi-calendar"></i>
            </h:panelGroup>
                <p:datePicker 
                    id="PlayerBirthDate"
                    value="#{playerC.player.playerBirthDate}"
                    
                   
                    size="10"
                    showButtonBar="true"
                    showIcon="true"
                    showTime="false"
                    title="#{msg['tooltip.player.birthdate']}"
                    pattern="dd-MM-yyyy HH:mm"
                    yearRange="#{utilsC.dateYear(-80)}:#{utilsC.dateYear(-10)}"
                    yearNavigator="true"
                    monthNavigator="true"
                    readonlyInput="false">
                </p:datePicker>

                <p:outputLabel for="@next" value="#{msg['player.gender']}" />
                <p:selectOneButton id="PlayerGender"
                                   required="true"
                                   value="#{playerC.player.playerGender}" >
                    <f:selectItem itemLabel="#{msg['player.gent']}" itemValue="M"/>
                    <f:selectItem itemLabel="#{msg['player.lady']}" itemValue="L" />
                </p:selectOneButton> 
         
                <p:outputLabel for="@next" value="#{msg['player.language']}" />
                <p:selectOneMenu id="PlayerLanguage"
                                 title="Select your language"
                                 value="#{playerC.player.playerLanguage}"
                                 immediate="true"
                                 required="true"
                                 valueChangeListener="#{playerC.player.playerLanguageListener}" >
                    <f:selectItem itemLabel="?? Select Language ??" itemValue=""/> 
                    <f:selectItems value="#{playerC.player.LanguageType()}"
                                   var="v"
                                   itemValue="#{v.label}"
                                   itemLabel="#{v}" />
     <!--    retourne début de page sur first tab  <p:ajax listener="#{activeLocale.reload()}" />  -->
                </p:selectOneMenu>
           </p:panelGrid>
         </p:panel>
      </p:tab>
         
      <p:tab id="AddressTab"
             title="Address"
             titletip="These are the Address Infos"
             titleStyle="font-size: 1.0rem;color:blue">
       
                <p:panel id="panelAddress"
                         header="#{msg['player.address']}">
                <p:panelGrid columns="2"
                             layout="tabular"
                             columnClasses="col1, col2"
                             style="width:90%">
   		<p:outputLabel for="@next" value="#{msg['address.street']}" />
		<p:inputText  id="PlayerStreet"
                              value="#{playerC.player.address.street}"
                              size="45"
                              immediate="true"
                              valueChangeListener="#{playerC.player.playerStreetListener}" />

                <p:outputLabel for="@next" value="#{msg['address.zipcode']}" />
		<p:inputText  id="PlayerZipcode"
                              value="#{playerC.player.address.zipCode}"
                              size="15"
                              immediate="true"
                              valueChangeListener="#{playerC.player.playerZipCodeListener}"  />

		<p:outputLabel for="@next" value="#{msg['address.city']}" />
		<p:inputText  id="PlayerCity"
                              value="#{playerC.player.address.city}"
                              size="45"
                              immediate="true"
                              valueChangeListener="#{playerC.player.playerCityListener}"  />
                        
   <!--     enlevé 21-02-2024 : inutile ?        valueChangeListener="#{playerC.player.playerCountryListener}"
     --> 
                <h:panelGroup >
                    <h:outputText value="#{msg['address.country.code']}" />
                    <i class="pi pi-globe"/>
                </h:panelGroup>
                <p:autoComplete id="PlayerCountry"
                                label="CountryLabel"
                                showEmptyMessage="this is an empty message"
                                value="#{playerC.player.address.country.code}"
                                completeMethod="#{countryC.completeCountry}"
                                var="country"
                                itemLabel="#{country}" 
                                itemValue="#{country.code}"
                                forceSelection="false"
                                dropdown="true"
                                dropdownMode="current"
                                required="true"
                                title="#{msg['tooltip.club.clubcountry']}"
                                scrollHeight="150">
                    <p:column>
                        <span class="flag flag-#{country.code}"
                              style="width: 30px; height: 20px"/>
                        <h:outputText style="vertical-align: middle; margin-left: .5rem"
                                      value="#{country.name} - #{country.code} - #{country.locale} " />
                    </p:column>
               <!--  new on 15.10.2024 
                    <p:ajax event="itemSelect" listener="#{courseC.onCountrySelect}" update="growl-msg"/>  -->
                </p:autoComplete>

                <h:panelGroup id="panelMail1" layout="block" >
                  <p:outputLabel for="PlayerEmailOne" value="#{msg['player.email']}" />
                  <span class="ui-inputgroup-addon">
                     <i class="pi pi-envelope"></i>
                  </span>
                </h:panelGroup>
		<p:inputText  label="email"
                              id="PlayerEmailOne"
                              size="45"
                              title="#{msg['tooltip.player.email']}"
			      value="#{playerC.player.playerEmail}" />
 
                <!-- new 06-08-2023  -->
                <h:panelGroup id="panelMail2" layout="block" >
                  <p:outputLabel for="PlayerEmailTwo" value="#{msg['player.email.confirmation']}" />
                  <span class="ui-inputgroup-addon">
                     <i class="pi pi-envelope"></i></span>
                </h:panelGroup>
		<p:inputText  label="email"
                              id="PlayerEmailTwo"
                              size="45"
                              title="#{msg['tooltip.player.email.confirmation']}"
			      value="#{playerC.player.playerEmailConfirmation}" />
                

                <h:panelGroup  rendered="#{playerC.player.address.zoneId ne null}">
                    <h:outputText value="#{msg['player.zoneid']}" />
                    <i class="pi pi-clock"/>
            </h:panelGroup>
        
        <h:outputText id="zone"
                      style="font-weight: normal;"
                      value="#{playerC.player.address.zoneId}"
                      rendered="#{playerC.player.address.zoneId ne null}"/>

        <h:outputText value="#{msg['player.latlng']}"
                      rendered="#{playerC.player.address.latLng ne null}"/>
	<h:outputText id="latlng"
                      value="#{playerC.player.address.latLng}" 
                      style="font-weight: normal;"
                      rendered="#{playerC.player.address.latLng ne null}"/>
        
         <p:commandButton
                         value="#{msg['button.player.validate.address']}"
                         id="ButtonCompletePlayerAddress"
                         ajax="false"
                         update="growl-msg"
                          
                         icon="pi pi-question"
                         action="#{courseC.findPlayerCoordinates}"/>
 
        <h:outputText id="formattedAddress1"
                      value="#{playerC.player.formattedAddress}" 
                      rendered="#{playerC.player.formattedAddress ne null}"/>
        <h:outputText id="formattedAddress2"
                      value=" " 
                      rendered="#{playerC.player.formattedAddress eq null}"/>
     </p:panelGrid>
     </p:panel>
   </p:tab>

   <p:tab id="GolfinfoTab" 
          title="Golf Info"
          titletip="These are the Global Infos"
          titleStyle="font-size: 1.0rem;">
   
        <p:panel id="panelGolfinfo"
                         header="#{msg['player.golfinfo']}">
            <p:panelGrid columns="2"
                         layout="tabular"
                         columnClasses="col1, col2"
                         style="width:90%">
                <p:outputLabel for="@next" value="#{msg['handicap.whs']}" />
                <p:inputNumber
                           id="PlayerHandicap"
                           label="Handicap"
                           value="#{courseC.handicapIndex.handicapWHS}"
                           size="4"
                           title="#{msg['tooltip.player.handicap']}"
                           decimalPlaces="1"
                           decimalSeparator="."
                           placeholder="99.9"
                           required="true" />
                <p:outputLabel for="@next" value="#{msg['player.datehandicap']}" />
          <!--   decimalPlaces="1"  decimalSeparator="."placeholder="99.9" -->      
                
                <p:datePicker 
                        id="PlayerHandicapDate"
                        label="HandicapDate"
                        value="#{courseC.handicapIndex.handicapDate}"
                        locale="#{languageC.locale}"
                        lang="#{languageC.locale}"
                        pattern="dd-MM-yyyy HH:mm"
                        showIcon="true"
                        showTime="false"
                        size="10"
                        immediate="true"
                        readonlyInput="false"
                        showButtonBar="true"
                        yearRange="#{utilsC.dateYear(-10)}:#{utilsC.dateYear(0)}"
                        yearNavigator="true"
                        monthNavigator="true" >
                </p:datePicker>

                <p:outputLabel for="PlayerHomeClub" value="#{msg['player.homeclub']}" />
                <h:panelGroup layout="block" id="container3">
                    <p:inputNumber
                       id="PlayerHomeClub"
                       label="PlayerHomeClub"
                       required="true"
                       value="#{playerC.player.playerHomeClub}"
                       size="5"
                       decimalPlaces="0"
                       thousandSeparator=""
                       minValue="0"
                       emptyValue="0"
                       placeholder="9999" />
                    <p:commandButton 
                         id="ButtonHomeClub"
                          
                         immediate="true"
                         value="#{msg['button.player.homeclub']}"
                         actionListener="#{dialogC.showSelectClub('player_create')}"
                         style="margin-left:1.5em;"
                         icon="pi pi-search"  >
                       <p:ajax event="dialogReturn"
                         update=":form_player:PlayerHomeClub,clubName,playerClub"/>
                    </p:commandButton>
  
                <h:outputText id="clubName"
                              value=" #{courseC.club.clubName}" 
                              style="font-style:italic; margin-left:1.5em;"/>  
                <h:outputText id="playerClub"
                              value=" #{playerC.player.playerHomeClub}"
                              style="font-weight:bold;font-size: 2em;font-style:italic;color: red" />  
                    
                </h:panelGroup>
             </p:panelGrid>
        </p:panel>
       </p:tab>

<p:tab id="ConfirmationTab"
       title="Confirmation"
       titletip="titletipConfirmation"
       titleStyle="font-size: 1.0rem;">
    <p:panel id="panelConfirmataion"
             
             header="#{msg['player.recapitulation']}">
        <p:panelGrid
                id="panelgridSummaryPlayer"
                layout="tabular"
                columnClasses="col1,col2,col3,col4"
                columns="4" >
            <f:facet name="header">
                <h1>#{msg['button.player.create']}</h1>
            </f:facet>

      <h:outputText value="#{msg['player.id']} :"/>
      <h:outputText value="#{playerC.player.idplayer}"/>

      <h:outputText value="#{msg['player.firstname']} " />
      <h:outputText value="#{playerC.player.playerFirstName}" />

      <h:outputText value="#{msg['player.lastname']} " />
      <h:outputText value="#{playerC.player.playerLastName}" />
      
      <h:outputText value="#{msg['player.birth']} "/>
      <h:outputText value="#{playerC.player.playerBirthDate}" >
          <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
      </h:outputText>
      
      <h:outputText value="#{msg['player.gender']} " />
      <h:outputText value="#{playerC.player.playerGender}" />

      <h:outputText value="#{msg['player.language']} " />
      <h:outputText value="#{playerC.player.playerLanguage}" />
      
      <h:outputText value="#{msg['address.street']} " />
      <h:outputText value="#{playerC.player.address.street}" />
      
      <h:outputText value="#{msg['address.zipcode']} " />
      <h:outputText value="#{playerC.player.address.zipCode}" />
      
      <h:outputText value="#{msg['address.city']} " />
      <h:outputText value="#{playerC.player.address.city}" />
      
      <h:outputText value="#{msg['address.country.code']} "/>
      <h:outputText value="#{playerC.player.address.country.code}" />
      
      <h:outputText value="#{msg['player.email']} "/>
      <h:outputText value="#{playerC.player.playerEmail}" />

      <h:outputText value="#{msg['player.zoneid']}"/> 
      <h:outputText value="#{playerC.player.address.zoneId}"/>

      <h:outputText value="#{msg['player.latlng']}"/>
      <h:outputText value="#{playerC.player.address.latLng}" />

      <h:outputText value="#{msg['handicap.whs']}" />
      <h:outputText value="#{courseC.handicapIndex.handicapWHS}" />

      <h:outputText value="#{msg['player.datehandicap']}" />
      <h:outputText value="#{courseC.handicapIndex.handicapDate}">
              <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
      </h:outputText> 

      <h:outputText value="#{msg['player.homeclub']}" />
      <h:outputText value="#{playerC.player.playerHomeClub} (#{courseC.club.clubName})" />
    </p:panelGrid>
          <f:facet name="footer">
                 <p:commandButton
                         value="#{msg['button.player.create']}"
                         id="ButtonCreatePlayer"
                         ajax="false"
                         update="growl-msg"
                          
                         icon="pi pi-database"
                         style="font-size: 1.0rem;"
                         action="#{clubC.createPlayer}"/>
         </f:facet> 
      </p:panel>
  </p:tab>

</p:wizard>
</p:panel>
</h:form>  
<!--</div>-->
</ui:define>
</ui:composition>
