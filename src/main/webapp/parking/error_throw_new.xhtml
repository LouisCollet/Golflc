<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>

<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="primefaces"
    template="templates/masterTemplate.xhtml">

    <ui:define name="title">Erreur Application</ui:define>

    <ui:define name="content">

        <!-- ================= STYLES ================= -->
        <style>
            body {
                background: linear-gradient(120deg, #f0f4f8, #e2e8f0);
                min-height: 100vh;
            }
            .shadow-lg {
                transition: transform 0.3s, box-shadow 0.3s;
            }
            .shadow-lg:hover {
                transform: translateY(-4px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            }
            pre {
                background-color: #0d1b2a;   /* fond bleu nuit */
                color: #00B0FF;
            }
/* ✅ Bleu électrique très visible */
            .error-highlight {
             color: #00B0FF;
             font-weight: bold;
            }
        </style>

        <!-- ================= CONTENT ================= -->
        <h:form>

            <p:card styleClass="shadow-lg border-round-lg p-shadow-6 p-mb-4"
                    style="max-width:700px;margin:auto">

                <f:facet name="title">
                    <i class="pi pi-exclamation-triangle" style="font-size:3rem;color:#d32f2f"></i>
                    <span style="font-weight:bold;font-size:1.5rem;margin-left:0.5rem">
                        Une erreur est survenue
                    </span>
                </f:facet>

                <p style="margin-top:1rem;text-align:center">
                    <h:outputText value="#{errorC.message}" />
                </p>

                <!-- Badge HTTP -->
                <h:panelGroup layout="block" style="text-align:center;margin-top:1rem">
                    <p:badge value="HTTP #{errorC.status}" 
                             severity="#{errorC.status ge 500 ? 'danger' : 'warning'}"
                             styleClass="p-mr-2 p-mb-2"/>
                </h:panelGroup>

                <!-- Stack trace (DEV uniquement) -->
                <h:panelGroup rendered="#{not empty errorC.stackTrace}" style="margin-top:1rem">
                    <h3>Stack trace (DEV)</h3>
                    <pre>#{errorC.stackTrace}</pre>
                </h:panelGroup>

                <!-- Bouton retour accueil -->
                <h:panelGroup layout="block" style="text-align:center;margin-top:1.5rem">
                    <p:commandButton value="Retour accueil"
                                     icon="pi pi-home"
                                     ajax="false"
                                     action="welcome.xhtml?faces-redirect=true"
                                     styleClass="p-button-raised p-button-rounded p-button-primary"/>
                </h:panelGroup>

            </p:card>

        </h:form>

    </ui:define>

</ui:composition>
