<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Local Administrator </ui:define>
<ui:define name="content">
<h:form id="form_local_admin"  >
<h:graphicImage id="graphic1" name="images/administrator1.png" alt="image missing :tarif1.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage id="graphic2" name="images/administrator2.png" alt="image missing :tarif2.jpg" style="float: right;"></h:graphicImage>
<!--
<ui:include src="include/include_subscription.xhtml"/>(for club = #{param.clubId}
-->

<p:panelGrid 
    id="panel2"
    layout="tabular"
    columns="2"
    columnClasses="col1, col2">

    <f:facet name="header">
        <h1>#{msg['message.selectLA']}</h1>
    </f:facet>
         <h:outputText value="#{msg['player.localAdmin']}" />
         <h:panelGroup layout="block" id="container4">
                <p:inputNumber
                       id="inputPlayer"
                       value="#{courseC.localAdmin.idplayer}"
                       size="7"
                       required="true"
                       requiredMessage="Player must be completed !"
                       decimalPlaces="0"
                       emptyValue="0"
                       style="margin-right: 10px;"  />
              <p:commandButton 
                         id="ButtonPlayer"
                         ajax="true"
                         immediate="true"
                         value="#{msg['button.player.list']}"
                         actionListener="#{dialogC.showSelectPlayer('local_administrator')}"
                         style="margin-right: 10px;"
                         icon="pi pi-search"  >
                    <p:ajax event="dialogReturn"
                            update=":form_local_admin:inputPlayer,playerName,localid" />
           <!--         <p:ajax update="inputPlayer" />  -->
                  </p:commandButton>

                <h:outputText id="playerName"
                              value="#{courseC.localAdmin.playerLastName}" 
                              style="font-style:italic;margin-right: 10px;" />
                <h:outputText id="localid"
                              value="#{courseC.localAdmin.idplayer}"
                              style="font-weight:bold;font-size: 2em;font-style:italic;color: red;"/>
          </h:panelGroup>
         
         
         <h:outputText value="#{msg['club.name']}" />
         <h:panelGroup layout="block" id="container2">
                <p:inputNumber
                       id="inputClub"
                       value="#{courseC.localAdmin.playerHomeClub}"
                       size="5"
                       style="margin-right: 10px;"
                       decimalPlaces="0"
                       minValue="1"
                       emptyValue="0" />
                <p:commandButton 
                         id="ButtonClub"
                         immediate="true"
                         value="#{msg['button.player.homeclub']}"
                         actionListener="#{dialogC.showSelectClub('local_administrator')}"
                         style="margin-right: 10px;"
                         icon="pi pi-search" >
                    <p:ajax event="dialogReturn"
                         update="form_local_admin:inputClub,clubName,playerClub" />
                  </p:commandButton>
    <!-- enlevé car = default ajax="true"
                         immediate="true"  -->        
                <h:outputText id="clubName"
                              value=" #{courseC.club.clubName}" 
                              style="font-style:italic"/>  

                <h:outputText id="playerClub"
                              value=" #{courseC.localAdmin.playerHomeClub}"
                              style="font-weight:bold;font-size: 2em;font-style:italic;color: red" />  
          </h:panelGroup>

<f:facet name="footer">
        <p:commandButton
                         value="#{msg['button.localadmin.create']}"
                         id="createPlayer"
                         ajax="false"
                         style="font-weight:normal "
                         update="growl-msg"
                         immediate="false"
                         icon="pi pi-database"
                         action="#{courseC.createLocalAdministrator()}"/>
</f:facet>
</p:panelGrid>

</h:form>
</ui:define>
</ui:composition>
