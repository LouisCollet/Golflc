<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core">

    <p:column id="thumbnail"
              headerText="Thumbnail"
              width="10%"
              style="text-align:center">
        <c:set var="th_photo" value="#{c.player.playerPhotoLocation}"/>
        <p:graphicImage id="image_thumbnail"
                        name="images/thumbnails/thumbnail.#{th_photo}"
                        rendered="#{th_photo ne 'nophoto.jpeg'}"
                        alt="Photo missing for : #{c.player.playerLastName}"/>
        <p:graphicImage id="image_thumbnail_unknown"
                        name="images/thumbnails/thumbnail.unknown.jpg"
                        rendered="#{th_photo eq 'nophoto.jpeg'}"
                        alt="image missing for : #{c.player.playerLastName}"/>
    </p:column>

</ui:composition>
