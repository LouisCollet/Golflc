<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:p="primefaces">
  <h:head>
    <title>Place Player Autocomplete Address Form</title>

    <meta charset="utf-8"/>
    <style type="text/css" >
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #map {
        height: 100%;
      }
    </style>
    <link type="text/css" rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500"/>
    <style>
      #locationField, #controls {
        position: relative;
        width: 480px;
      }
      #autocomplete {
        position: absolute;
        top: 0px;
        left: 0px;
        width: 99%;
      }
      .label {
        text-align: right;
        font-weight: bold;
        width: 100px;
        color: #303030;
      }
      #address {
        background-color: #f0f0ff;
        width: 480px;
        padding-right: 2px;
      }
      #address td {
        font-size: 10pt;
      }
      .field {
        width: 99%;
      }
      .slimField {
        width: 80px;
      }
      .wideField {
        width: 200px;
      }
      #locationField {
        height: 20px;
        margin-bottom: 2px;
      }
    </style>
  </h:head>

  <h:body>
  <f:view id="view">
  <h:form id="form">

    <div id="locationField">
      <input id="autocomplete"
             type="text"
             placeholder="Enter here your address"
             onFocus="geolocate()" ></input>
    </div>

    <table id="address">
      <tr>
        <td class="label">Street address</td>
        <td class="wideField" colspan="2">
            <input class="field"
                   id="route"
                   disabled="true">
            </input>
        </td>
        <td class="slimField">
            <input class="field"
                   id="street_number"
                   disabled="true">
            </input>
        </td>
      </tr>
      <tr>
        <td class="label">City</td>
        <td class="wideField" colspan="3">
            <input class="field"
                   id="locality"
                   disabled="true">
            </input>
        </td>
      </tr>
      <tr>
        <td class="label">State</td>
        <td class="wideField">
            <input class="field"
                   id="postal_code"
                   disabled="true">
            </input>
        </td>
        <td class="slimField">
            <input class="field"
              id="administrative_area_level_1"
              disabled="true">
            </input>
        </td>
        <td class="label">Zip code</td>

      </tr>
      <tr>
        <td class="label">Country</td>
        <td class="wideField" colspan="3">
            <input class="field"
              id="country"
              disabled="true">
             </input></td>
      </tr>
    </table>
    <p:panelGrid columns="2" layout="flex" columnClasses="col1Flex,col2Flex">
        <p:outputLabel value="Enter latitude" />
        <h:inputText id="latitude2"  value="#{playerC.player.playerFirstName}" size="20"/>
        <p:outputLabel value="Enter longitude" />
        <h:inputText id="longitude"  value="#{playerC.player.playerLastName}" size="20"/>

    </p:panelGrid>
    <script type="text/javascript">
alert("start of main");
var google; //fake
var placeSearch, autocomplete;
var componentForm = {
  street_number: 'short_name',
  route: 'long_name',
  locality: 'long_name',
  administrative_area_level_1: 'short_name',
  country: 'long_name',
  postal_code: 'short_name'
};

function initAutocomplete() {
  alert("start of initautocomplete");
  autocomplete = new google.maps.places.Autocomplete(
      /** @type {!HTMLInputElement} */(document.getElementById('autocomplete')),
      {types: ['geocode']});

  autocomplete.addListener('place_changed', fillInAddress);
}

function fillInAddress() {
    alert("start of fillInAddress");
  var place = autocomplete.getPlace();

  for (var component in componentForm) {
    document.getElementById(component).value = '';
    document.getElementById(component).disabled = false;
  }

  for (var i = 0; i < place.address_components.length; i++) {
    var addressType = place.address_components[i].types[0];
    if(componentForm[addressType]) {
      var val = place.address_components[i][componentForm[addressType]];
      document.getElementById(addressType).value = val;
    }
  }
}

function geolocate() {
    alert("start of geolocate");
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      var geolocation = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };
      var circle = new google.maps.Circle({
        center: geolocation,
        radius: position.coords.accuracy
      });
      autocomplete.setBounds(circle.getBounds());
    });
  }
}

    </script>
    <script type="text/javascript">
        alert("start of initautocomplete");
   src="https://maps.googleapis.com/maps/api/js?libraries=places&amp;callback=initAutocomplete">
          </script>
  </h:form>
  </f:view>
  </h:body>
</html>
