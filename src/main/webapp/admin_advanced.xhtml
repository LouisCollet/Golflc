<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="jakarta.faces.core"
    xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="primefaces"
    template="templates/masterTemplate.xhtml">
<ui:define name="title">Local Administrator </ui:define>
<ui:define name="content">

<h:form id="adminForm">
<h:graphicImage id="graphic1" name="images/technical02.jpg" alt="image missing :golf_club.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage id="graphic2" name="images/technical04.jpg" alt="image missing :golf_club.jpg" style="float: right;"></h:graphicImage>
    <p:toolbar>
        <p:toolbarGroup>
            <p:commandButton value="Reload" icon="pi pi-refresh" action="#{advancedAdmin.reloadAll}" update=":adminForm" />
    <!--  bug jakarta ee 11     <p:commandButton value="Run AJAX Test" icon="pi pi-bolt" action="#{advancedAdmin.runAjaxTest}" update="adminForm:ajaxTestPanel" />  -->
        </p:toolbarGroup>

        <p:toolbarGroup align="right">
            <p:commandButton value="Clear Resource Cache" icon="pi pi-trash" action="#{advancedAdmin.clearResourceCache}" update="@form" />
            <p:commandButton value="Export System CSV" icon="pi pi-file" ajax="false">
                <p:dataExporter type="csv" target="systemTable" fileName="system-info"/>
            </p:commandButton>
        </p:toolbarGroup>
    </p:toolbar>

    <p:divider />

    <p:tabView dynamic="true" cache="false">
        <!-- SUMMARY -->
        <p:tab title="Summary">
             <f:facet name="actions">
                    summary facet Options I
             </f:facet>
            <p:panelGrid columns="3" style="width:100%"  layout="tabular" columnClasses="col1, col1, col1">
                <p:panel header="PrimeFaces" >
                    <p:dataList value="#{advancedAdmin.primefacesInfo.entrySet()}" var="i" >
                        <h:outputText value="#{i.key}: #{i.value}" />
                    </p:dataList>
                </p:panel>

                <p:panel header="JVM / Memory" >
                    <p:dataList value="#{advancedAdmin.jvmMemoryMetrics.entrySet()}" var="m">
                        <h:outputText value="#{m.key}: #{m.value}" />
                    </p:dataList>
                </p:panel>

                <p:panel header="Sessions" >
                    <h:panelGrid columns="1">
                        <h:outputText value="Active sessions: #{advancedAdmin.activeSessionCount}" />
                        <h:outputText value="Current session info: #{advancedAdmin.currentSessionInfo}" escape="false"/>
                    </h:panelGrid>
                </p:panel>
            </p:panelGrid>
        </p:tab><!-- comment -->
    </p:tabView>
<p:divider />
        <!-- CONTEXT and SYSTEM -->
      <p:tabView dynamic="true" cache="false">
        <p:tab title="System and Context">
          <p:panelGrid columns="3" style="width:100%"  layout="tabular" columnClasses="col1, col1, col1">
            
            <p:panel header="System Properties">
                <p:dataTable id="systemTable" value="#{advancedAdmin.systemProperties.entrySet()}" var="prop" rows="12" paginator="true" >
                    <p:column headerText="Key"><h:outputText value="#{prop.key}"/></p:column>
                    <p:column headerText="Value"><h:outputText value="#{prop.value}"/></p:column>
                </p:dataTable>
            </p:panel>

            <p:panel header="Environment Variables" style="margin-top:1em">
                <p:dataTable value="#{advancedAdmin.environmentVariables.entrySet()}" var="env" rows="10" paginator="true" >
                    <p:column headerText="Key"><h:outputText value="#{env.key}"/></p:column>
                    <p:column headerText="Value"><h:outputText value="#{env.value}"/></p:column>
                </p:dataTable>
            </p:panel>
          </p:panelGrid>    
        </p:tab>
          
            </p:tabView>
          <p:divider />  
         <!-- CONTEXT PARAMS -->  
             <p:tabView dynamic="true" cache="false">
                <p:tab title="WEB.XML PARAMS">
          <p:panelGrid columns="3" style="width:100%"  layout="tabular" columnClasses="col1, col1, col1">
            <p:dataTable value="#{advancedAdmin.contextParameters}" var="param" rows="15" paginator="true" filterBy="#{param.key}" >
                <p:column headerText="Parameter" ><h:outputText value="#{param.key}"/></p:column>
                <p:column headerText="Value"><h:outputText value="#{param.value}"/></p:column>
            </p:dataTable>
          </p:panelGrid>    
        </p:tab>

        <!-- RESOURCE CHECK -->
        <p:tab title="Resources">
            <h:panelGrid columns="2" cellpadding="6">
                <h:outputLabel for="resPath" value="Resource path (ex: /resources/themes/saga/theme.css)" />
                <p:inputText id="resPath" value="#{resourceChecker.path}" />
                <p:commandButton value="Check" actionListener="#{resourceChecker.check}" update="resResult" />
            </h:panelGrid>

            <p:panel id="resResult">
                <h:outputText value="#{resourceChecker.lastResult}" rendered="#{not empty resourceChecker.lastResult}" />
            </p:panel>

            <p:panel header="Common theme files check">
                <p:dataTable value="#{resourceChecker.commonChecks.entrySet()}" var="c" >
                    <p:column headerText="Resource"><h:outputText value="#{c.key}"/></p:column>
                    <p:column headerText="Exists"><h:outputText value="#{c.value}"/></p:column>
                </p:dataTable>
            </p:panel>
        </p:tab>

        <!-- AJAX TEST -->
        <p:tab title="AJAX Test">
            <p:panel id="ajaxTestPanel" header="AJAX Test Result">
                <p:growl id="growl" showDetail="true" life="4000"/>
                <p:outputPanel id="ajaxTestInfo">
                    <h:panelGrid columns="2">
                        <h:outputText value="Status:" /><h:outputText value="#{advancedAdmin.lastAjaxTest['status']}" />
                        <h:outputText value="Server time:" /><h:outputText value="#{advancedAdmin.lastAjaxTest['serverTime']}" />
                        <h:outputText value="Thread:" /><h:outputText value="#{advancedAdmin.lastAjaxTest['thread']}" />
                        <h:outputText value="Heap used:" /><h:outputText value="#{advancedAdmin.lastAjaxTest['heapUsed']}" />
                    </h:panelGrid>
                </p:outputPanel>
            </p:panel>
        </p:tab>

    </p:tabView>

</h:form>
</ui:define>

</ui:composition>
