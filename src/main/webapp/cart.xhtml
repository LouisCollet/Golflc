<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Payment Cart</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:960px;">
    <f:facet name="header">
        <div style="text-align:center; padding:0.5rem 0;">
            <i class="pi pi-shopping-cart" style="font-size:3rem; color:#ffffff; display:block; margin-bottom:0.4rem;"/>
            <h1>
                <h:outputText value="#{msg['title.payment.cotisation']}" rendered="#{payC.cotisation}"/>
                <h:outputText value="#{msg['title.payment.lesson']}"     rendered="#{payC.lesson}"/>
                <h:outputText value="#{msg['title.payment.round']}"      rendered="#{payC.greenfee}"/>
                <h:outputText value="#{msg['title.payment.subscription']}" rendered="#{payC.subscription}"/>
                <h:outputText value="#{msg['title.payment.mixed']}"      rendered="#{payC.mixed}"/>
            </h1>
        </div>
    </f:facet>

    <h:form id="form_cart">
        <f:event type="preRenderView" listener="#{payC.onCartLoad}"/>

        <!-- ============== RESTORE BLOCK — visible quand badge > 0 et aucun panier actif ============== -->
        <h:panelGroup rendered="#{payC.cartBadgeCount gt 0 and not payC.hasMixedCart()}"
                      layout="block"
                      style="text-align:center; padding:1.5rem; background:var(--golf-primary-bg,#f0fdf4); border-radius:8px; margin-bottom:1rem;">
            <i class="pi pi-history" style="font-size:2rem; color:var(--golf-primary,#1a5632); display:block; margin-bottom:0.5rem;"/>
            <p:commandButton value="#{msg['cart.restore.button']}"
                             icon="pi pi-refresh"
                             ajax="false"
                             action="#{payC.restoreCartFromDb()}"
                             styleClass="p-button-success"/>
        </h:panelGroup>

        <!-- ============== COTISATION BLOCK ============== -->
        <h:panelGroup rendered="#{payC.hasCotisation()}" layout="block">
            <ui:include src="include/include_summary_cotisation.xhtml"/>
            <ui:include src="include/include_cotisation_cart.xhtml"/>

            <h:panelGroup layout="block" styleClass="mt-3" style="text-align:right;">
                <strong>#{msg['tarif.total']}:&#160;
                    <h:outputText value="#{appContext.cotisation.price}">
                        <f:convertNumber type="currency" currencyCode="#{payC.creditcard.creditcardCurrency}" groupingUsed="true"/>
                    </h:outputText></strong>
            </h:panelGroup>
        </h:panelGroup>

        <!-- ============== LESSON BLOCK ============== -->
        <h:panelGroup rendered="#{payC.hasLessons()}" layout="block">
            <ui:include src="include/include_summary_pro.xhtml"/>
            <ui:include src="include/include_lesson_cart.xhtml"/>
        </h:panelGroup>

        <!-- ============== GREENFEE BLOCK ============== -->
        <h:panelGroup rendered="#{payC.hasGreenfees()}" layout="block">
            <ui:include src="include/include_greenfee_cart.xhtml"/>

            <h:panelGroup rendered="#{not empty payC.listGreenfees}"
                          layout="block" styleClass="mt-3" style="text-align:right;">
                <strong>#{msg['tarif.total']}:&#160;
                    <h:outputText value="#{payC.greenfeePrice}">
                        <f:convertNumber type="currency" currencyCode="#{payC.creditcard.creditcardCurrency}" groupingUsed="true"/>
                    </h:outputText></strong>
            </h:panelGroup>
        </h:panelGroup>

        <!-- ============== SUBSCRIPTION BLOCK ============== -->
        <h:panelGroup rendered="#{payC.hasSubscription()}" layout="block">
            <ui:include src="include/include_subscription_cart.xhtml"/>

            <h:panelGroup layout="block" styleClass="mt-3" style="text-align:right;">
                <strong>#{msg['tarif.total']}:&#160;
                    <h:outputText value="#{appContext.subscription.subscriptionAmount}">
                        <f:convertNumber type="currency" currencyCode="#{payC.creditcard.creditcardCurrency}" groupingUsed="true"/>
                    </h:outputText></strong>
            </h:panelGroup>
        </h:panelGroup>

        <!-- ============== TOTAL ============== -->
        <h:panelGroup rendered="#{payC.hasMixedCart()}"
                      layout="block" styleClass="mt-3" style="text-align:right; font-size:1.1rem; border-top:2px solid var(--golf-primary,#1a5632); padding-top:0.5rem;">
            <strong>#{msg['tarif.total']}:&#160;
                <h:outputText value="#{payC.totalCartPrice}">
                    <f:convertNumber type="currency" currencyCode="#{payC.creditcard.creditcardCurrency}" groupingUsed="true"/>
                </h:outputText></strong>
        </h:panelGroup>

        <!-- ============== COMMON BUTTONS ============== -->
        <div class="btn-group" style="margin-top:1rem;">
            <p:commandButton value="#{msg['button.confirm']}"
                             id="commandButtonConfirmFree"
                             rendered="#{payC.hasLessons() and payC.proFree}"
                             ajax="false"
                             icon="pi pi-check"
                             action="#{payC.confirmProFreeLesson()}"
                             styleClass="p-button-success"/>
            <p:commandButton value="#{msg['payment.selected']}"
                             id="commandButtonPayment"
                             rendered="#{not (payC.hasLessons() and payC.proFree)}"
                             ajax="false"
                             icon="pi pi-credit-card"
                             action="#{payC.payMixedCart()}"
                             styleClass="p-button-warning"/>
            <p:commandButton value="#{msg['button.cancel']}"
                             ajax="false"
                             icon="pi pi-times"
                             action="#{payC.cancelCart()}"
                             styleClass="p-button-secondary"
                             immediate="true"/>
            <p:commandButton value="#{msg['cart.clear.button']}"
                             rendered="#{payC.hasMixedCart()}"
                             ajax="false"
                             icon="pi pi-trash"
                             action="#{payC.clearCartAndExit()}"
                             styleClass="p-button-danger p-button-outlined"
                             immediate="true"/>
            <p:button value="#{msg['welcome.back']}"
                      outcome="welcome.xhtml"
                      icon="pi pi-home"
                      styleClass="p-button-secondary p-button-outlined"/>
        </div>

        <p:confirmDialog widgetVar="deleteProductDialog"
                         showEffect="fade"
                         width="300"
                         message="#{msg['lesson.cancel']} ?"
                         header="#{msg['button.confirm']}"
                         severity="warn">
            <p:commandButton value="#{msg['button.no']}"
                             type="button"
                             styleClass="ui-button-secondary"
                             icon="pi pi-times"
                             onclick="PF('deleteProductDialog').hide()"/>
            <p:commandButton value="#{msg['button.yes']}"
                             icon="pi pi-check"
                             actionListener="#{payC.deleteLesson}"
                             process="@this"
                             update="form_cart"
                             oncomplete="PF('deleteProductDialog').hide()"/>
        </p:confirmDialog>

        <ui:include src="include/include_confirmDialog.xhtml"/>
    </h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
