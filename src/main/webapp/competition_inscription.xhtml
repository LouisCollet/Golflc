<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Inscription Competition Page </ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <h1>#{msg['competition.inscription.title']}</h1>
    <h2>#{roundC.competition.competitionDescription.competitionName} </h2>
</f:facet>
<h:form id="inscription_competition">

<ui:include src="include/include_summary_competition.xhtml"/>
<p:panelGrid id="panel"
             columns="2"
             layout="flex"
             columnClasses="col1Flex, col2Flex">

        <h:outputText value="#{msg['inscription.team']} :"   />
        <h:outputText id="competition"
                      value="#{roundC.competition.competitionDescription.competitionId}" />
         <h:outputText value="#{msg['player.first']}"
                    style="width:20%" />
         <h:outputText
                    value = "#{playerC.player.playerFirstName} - #{playerC.player.playerLastName}"/>

      <h:panelGroup id="panelG2" layout="block" >
        <h:outputText value="#{msg['competition.gender']} :" />
                    <span class="ui-inputgroup-addon"><i class="pi pi-user-minus"></i></span>
      </h:panelGroup>

        <h:outputText id="teegender2"
                      value="#{roundC.competition.competitionDescription.competitionGender}" />

        <h:outputText value="#{msg['competition.start.asked']} :"  />
        <p:selectOneMenu id="teestart"
                         value="#{roundC.competition.competitionData.cmpDataAskedStartTime}" >
                    <f:selectItems value="#{roundC.competitionTimeStartList('current_player')}" />
        </p:selectOneMenu>

<f:facet name="footer">
     <p:commandButton id="buttonCreate"
                 value="#{msg['button.inscription.create']}"
                 update="growl-msg"
                 ajax="false"
                 icon="pi pi-pencil"
                 action="#{roundC.createInscriptionCompetition(roundC.competition)}" />
</f:facet>

</p:panelGrid>

</h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
