<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Activation success </ui:define>

<ui:define name="content">

<h:form id="gprc_server"  >

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <h1>gRPC server test</h1>
</f:facet>

<p:panelGrid
    id="panel"
    layout="flex"
    columns="2"
    columnClasses="col1Flex,col2Flex">

   <h:outputText value="Input message" />
   <p:inputText id="name"
            value="#{payC.creditcard.creditCardHolder}"
            placeholder="Input your message"
            required="false"/>

<f:facet name="footer">
        <p:commandButton value="Start gRPC server"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-pencil"
                         action="#{grpcController.startServer()}" />
        <p:commandButton value="Send message to server"
                         ajax="false"
                         update="growl-msg"
                         icon="pi pi-pencil"
                         action="#{grpcController.sendMessage()}" />

        <p:commandButton value="Stop gRPC server"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-pencil"
                         action="#{grpcController.stopServer()}" />
</f:facet>
</p:panelGrid>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
