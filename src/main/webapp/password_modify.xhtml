<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Modify Password Page </ui:define>
<ui:define name="content">
<h:outputScript library="js" name="unmasking.js" target="head"/>

<h:form id="form_password_modify"
        onsubmit="return false;">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header"><h1>#{msg['password.modify.old']}</h1></f:facet>

<ui:include src="include/include_summary_player.xhtml"/>

<p:panelGrid id="panelGrid1"
             layout="flex"
             columns="2"
             columnClasses="col1Flex,col2Flex" >

        <h:outputText value="#{msg['password.old.crypted']}"/>
        <h:outputText value="#{playerC.password.playerPassword}" />

        <h:outputText value="Connections errors"
                      rendered="#{playerC.blocking.blockingAttempts != 0}" />
        <h:outputText value="#{playerC.blocking.blockingAttempts}"
                      rendered="#{playerC.blocking.blockingAttempts != 0}" />

        <h:outputText value="#{msg['password.old.clear']}" />

        <h:panelGroup id="panelGroup2"
                       layout="block" >
             <p:password
                     id="pswG2"
                     value="#{playerC.password.currentPassword}"
                     toggleMask="true"
                     redisplay="true"
                     size="15"
                     lang="#{languageC.locale}"
                     valueChangeListener="#{playerC.playerPasswordListener}" >
                 <p:ajax event="keyup"
                         update="pswG3"
                         listener="#{ajaxListener.keyUpListener}" />
             </p:password>
              <h:outputText id="pswG3"
                            value="#{playerC.password.wrkpasswordVisual}" />
      </h:panelGroup>

<f:facet name="footer">
       <p:commandButton
                         value="#{msg['button.password.modify']}"
                         id="buttonPlayerIdentify"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-key"
                         action="#{playerC.validateExistingPassword()}"/>
</f:facet>
</p:panelGrid>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
