<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Modify Password Page </ui:define>
 <p:log id="log"/>
<ui:define name="content">
<h:outputScript library="js" name="unmasking.js" target="head"/>
<!--  was head  change rien  return false = emp$eche le refresf après la fonction unmasking-->

<div class="card">
<h:form id="form_password_modify" 
        onsubmit="return false;"
        enctype="application/x-www-form-urlencoded" >
<h:graphicImage name="images/changepassword.jpg" alt="image missing :golf_round.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage name="images/changepassword2.png" alt="image missing :golf_round.jpg" style="float: right;"></h:graphicImage>
<!-- <h:message for="RegisterGroupPanel" style="color:red;" /> -->

<ui:include src="include/include_summary_player.xhtml"/>
<p:panelGrid id="panelGrid1"
             layout="tabular"
             columns="2"
             columnClasses="col1,col2" >
<f:facet name="header">
    <h1>#{msg['password.modify.old']}</h1>
</f:facet>
        <h:outputText value="#{msg['password.old.crypted']}"/>
        <h:outputText value="#{courseC.password.playerPassword}" />

        <h:outputText value="Connections errors"
                      rendered="#{courseC.blocking.blockingAttempts != 0}" />
        <h:outputText value="#{courseC.blocking.blockingAttempts}"
                      rendered="#{courseC.blocking.blockingAttempts != 0}" />

        <h:outputText value="#{msg['password.old.clear']}" />

        <h:panelGroup id="panelGroup2"
                       layout="block" >
             <p:password 
                     id="pswG2"
                     value="#{courseC.password.currentPassword}"
                     toggleMask="true"
                     redisplay="true"
                     size="15"
                     lang="#{languageC.locale}"
                     valueChangeListener="#{courseC.playerPasswordListener}"  >
                 <p:ajax event="keyup"
                         update="pswG3" 
                         listener="#{ajaxListener.keyUpListener}">
                 </p:ajax>
             </p:password>
              <h:outputText id="pswG3"
                            value="#{courseC.password.wrkpasswordVisual}" />
      </h:panelGroup>

<f:facet name="footer">
       <p:commandButton
                         value="#{msg['button.password.modify']}"
                         id="buttonPlayerIdentify"
                         ajax="true"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-key"
                         action="#{courseC.validateExistingPassword()}"/>
        <h:outputText value=" " />
</f:facet>
</p:panelGrid> 
<!--<ui:include src="include/include_password.xhtml"/>-->
</h:form>
</div>
</ui:define>
</ui:composition>
