<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Register Page </ui:define>

<ui:define name="content">

<ui:define name="metadata">
    <f:metadata>
        <f:viewAction action="#{playerC.registereIDPlayer()}" />
    </f:metadata>
</ui:define>

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <h1>#{msg['player.register']}</h1>
</f:facet>

<h:form id="register">

<p:panelGrid
    id="panel"
    layout="flex"
    columns="1">

<h:outputText value="Please Register ! " style="font-weight:bold"/>

<h:outputText value="Please insert your eID in the Smartcard Reader ...  "/>

<h:outputText id="txt_count" value=" ... wait #{utilsC.count} seconds ..." />

<h:outputText value=" ... and Click the Register button !"/>

<f:facet name="footer">
        <p:commandButton value="#{msg['button.register.register']}"
                         update="growl-msg"
                         immediate="true"
                         ajax="false"
                         icon="pi pi-database"
                         action="#{playerC.registereIDPlayer()}"/>
</f:facet>

</p:panelGrid>

</h:form>
</p:panel>
</div>

</ui:define>
</ui:composition>
