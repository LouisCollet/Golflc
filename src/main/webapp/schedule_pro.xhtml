<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Schedule Pro Page</ui:define>
<ui:define name="content">

<h:form id="schedule_form" >
<ui:include src="include/include_summary_pro.xhtml"/>

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel id="panelId" styleClass="login-card form-card" style="max-width:100%;">
    <f:facet name="header">
        <h1>#{msg['message.lesson']} </h1>
    </f:facet>
    <c:set var="idplayer" value="#{playerC.player.idplayer}"/>
    <p:outputPanel id="schedulePanel"
                   style="font-size:0.8rem;">
        <p:schedule id="schedule"
                    value="#{schedulerC.scheduleModel}"
                    widgetVar="myschedule"
                    locale="#{languageC.locale}"
                    timeFormat="HH:mm"
                    height="auto"
                    slotDuration="00:30:00"
                    slotLabelInterval="01:00"
                    tooltip="#{msg['message.lesson']}"
                    minTime="09:00:00"
                    maxTime="19:00:00"
                    styleClass="ui-custompanelgrid"
                    view="timeGridWeek"
                    extender="initSchedule"
                    clientTimeZone="Europe/Brussels"
                    timeZone="Europe/Brussels" >
            <p:ajax event="dateSelect"
                    listener="#{schedulerC.dateSelect}"
                    update=":schedule_form:panelId,growl-msg,messages, panelId"
                    oncomplete="PF('eventDialog').show();"/>
            <p:ajax event="eventSelect"
                    listener="#{schedulerC.eventSelect}"
                    update=":schedule_form:panelId,growl-msg,messages,panelId"
                    oncomplete="PF('eventDialog').show();"/>
            <p:ajax event="eventMove"
                    listener="#{schedulerC.moveLesson}"
                    update=":schedule_form:panelId,growl-msg,messages,panelId"/>
        </p:schedule>
    </p:outputPanel>

 <script type="text/javascript">
function initSchedule() {
        this.cfg.options.buttonText = { today : 'Current Date'};
 }
</script>

  <p:staticMessage severity="info" summary="Summary INFO" detail="staticMessage detail Content" style="width: 100%"/>

        <p:dialog id="dialog1"
                  widgetVar="eventDialog"
                  header="Lesson Details"
                  width="30%"
                  modal="true"
                  minimizable="true"
                  maximizable="true"
                  showEffect="fade"
                  responsive="true"
                  hideEffect="fade"  >
        <p:panelGrid id="eventDetails"
                     layout="flex"
                     columns="2"
                     columnClasses="col1Flex,col2Flex"
                     style="font-size:0.8rem; width:90%" >
                <p:outputLabel for="@next" value="Title" />
                <p:inputText id="titleEvent"
                             value="#{schedulerC.scheduleEvent.title}"
                             required="true"
                             style="margin-right:1px;"
                             placeholder="Please complete the lessons's title" />
                <p:outputLabel for="@next" value="Description" />
                <h:outputText id="descriptionEvent"
                              value="#{schedulerC.scheduleEvent.description}"/>

                <p:outputLabel for="@next" value="From" />

                <p:datePicker id="from"
                              value="#{schedulerC.scheduleEvent.startDate}"
                              pattern="dd/MM/yyyy HH:mm"
                              showTime="true"
                              appendTo="@(body)"
                              timeInput="false"
                              stepMinute="30" />

                <p:outputLabel for="@next" value="To" />
                <p:datePicker id="dateEnd"
                              value="#{schedulerC.scheduleEvent.endDate}"
                              pattern="dd/MM/yyyy"
                              showTime="true"
                              appendTo="@(body)"
                              mindate="#{utilsC.localTime(9,30)}"
                              maxdate="#{utilsC.localTime(19,00)}"
                              timeInput="false"
                              stepMinute="30" />

                <p:outputLabel for="@next" value="All Day" />
                <h:selectBooleanCheckbox id="allDay"
                                         value="#{schedulerC.scheduleEvent.allDay}"
                                         disabled="#{schedulerC.isNotProfessional()}"/>

             <f:facet name="footer">
                <p:commandButton id="createButton"
                                 icon="pi pi-check"
                                 value="Reservation Lecon"
                                 process="@form"
                                 action="#{schedulerC.createLesson()}"
                                 update="panelId,growl-msg,messages"
                                 ajax="false"
                                 oncomplete="PF('myschedule').update();PF('eventDialog').hide();"/>
                <p:commandButton id="deleteButton"
                                 icon="pi pi-times"
                                 value="Annulation lecon"
                                 action="#{schedulerC.deleteLesson(idplayer)}"
                                 update="panelId,growl-msg,messages"
                                 ajax="false"
                                 oncomplete="PF('myschedule').update();PF('eventDialog').hide();"/>
              </f:facet>

           </p:panelGrid>

             <p:contextMenu for="schedule">
               <p:menuitem value="Annuler cette lecon"
                           update="messages, growl-msg"
                           action="#{schedulerC.deleteLesson(idplayer)}"
                           oncomplete="PF('myschedule').update();PF('eventDialog').hide();"/>
            </p:contextMenu>
        </p:dialog>

      <f:facet name="footer">
           <p:commandButton value="#{msg['payment.selected']}"
                         id="commandButtonPayment"
                         ajax="false"
                         update="growl-msg"
                         icon="pi pi-credit-card"
                         action="#{payC.manageLesson()}" >
           </p:commandButton>
    </f:facet>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
