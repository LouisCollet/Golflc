<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Activation check </ui:define>

<ui:define name="content">
<h:graphicImage name="images/activate1.jpg" alt="image missing :golf_register.jpg" style="float:left;"></h:graphicImage>
<h:graphicImage name="images/activate2.jpg" alt="image missing :golf_register.jpg" style="float:right;"></h:graphicImage>
    <!-- -->
<h:form id="settingsForm">

    <p:panel header="Application Settings">

        <p:commandButton value="Reload settings"
                         icon="pi pi-refresh"
                         action="#{settingsBean.reload}"
                         update="@form"/>

        <p:spacer height="10"/>

        <h:panelGrid columns="2">
            <h:outputText value="Reload count:"/>
            <p:badge value="#{settingsBean.reloadCount}"/>

            <h:outputText value="Last reload:"/>
            <h:outputText value="#{settingsBean.lastReload}"/>
        </h:panelGrid>

        <p:spacer height="15"/>

        <p:dataTable value="#{settingsBean.settingsSnapshot.entrySet()}"
                     var="entry"
                     stripedRows="true">

            <p:column headerText="Key">
                #{entry.key}
            </p:column>

            <p:column headerText="Value">
                #{entry.value}
            </p:column>

        </p:dataTable>

    </p:panel>

</h:form>
</ui:define>
</ui:composition>
