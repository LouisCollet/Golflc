<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:p="primefaces"
    lang="#{languageC.locale}" 
    xml:lang="#{languageC.locale}">

<ui:insert name="metadata"> </ui:insert>

<h:head id="head_PrimeFlex3">
   <meta name="description" 
         content="GolfLC Application"/> 
   <meta name="author" 
         content="GolfLC - Louis Collet"/> 
   <meta http-equiv="Content-Language" 
         content="#{languageC.locale}" /> 
   <meta http-equiv="X-UA-Compatible" 
         content="IE=edge"/>
   <meta http-equiv="Content-Type" 
         content="text/html; charset=UTF-8"/>
   <meta name="viewport" 
         content="width=device-width, initial-scale=1.0"/>
   <meta http-equiv="refresh" content="#{session.maxInactiveInterval};url=#{request.contextPath}/session_expired.xhtml?cmd=Inactive Interval from masterTemplate"/>
   <title>
       <ui:insert name="title"></ui:insert>
   </title>
<!-- new 27-10-2025  used in creditcard_payment_executed-->
    <meta>
       <ui:insert name="meta"></ui:insert>
   </meta>
      
   <ui:insert name="description" />

    <link href="#{resource['images/golfer.jpg']}" rel="icon" type="image/jpeg" sizes="40x40"/>
    <link href="#{resource['images/golfer.jpg']}" rel="apple-touch-icon"/>
    <h:outputStylesheet library="styles" name="Styles2026.css" />
 <!--   adapter également dialogTemplate.xhtml -->
    <h:outputStylesheet library="styles" name="primeflex/331/primeflex.min.css" />
    <h:outputStylesheet library="styles" name="primeflex/331/primeone-light.css" id="primeone-css"/>
    <h:outputScript library="js" name="forms.js" target="head"/>

    <!-- Anti-FOUC: apply saved theme before first paint -->
    <script>
    (function() {
        var saved = localStorage.getItem('golf-theme');
        if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>

    <ui:insert name="head"> </ui:insert>
</h:head>
    
       <p:tooltip/>
<h:body id="body_PrimeFlex3"> 

    <f:view id="view_master"
            locale="#{languageC.locale}" 
            contentType="text/html;charset=utf-8"
            encoding="UTF-8">

<div class="card">
  <!--
    <p:sidebar id="sidebarTop"
       widgetVar="sidebarTop" 
       position="top" 
       baseZIndex="10000"
       dynamic="true"
       visible="false"
       style="overflow: scroll; height: 300px;"
       showCloseIcon="true">
     <ui:include src="/header.xhtml"/>
    </p:sidebar>
-->
    <p:sidebar id="sidebarIdD"
        widgetVar="sidebarDown" 
        position="bottom" 
        baseZIndex="10000"
        dynamic="true"
        visible="false"
        style="overflow: scroll"
        showCloseIcon="true" >
        <ui:include src="/footer.xhtml"/>
    </p:sidebar>   

    <p:sidebar id="sidebarRight"
        widgetVar="sidebarRight"
        position="right"
        baseZIndex="10000"
        dynamic="true"
        visible="false"
        style="overflow: scroll;color:black"
        showCloseIcon="true" >
        <ui:include src="/help_read.xhtml"/>
     </p:sidebar>

    <!-- Mobile menu sidebar — hidden on desktop, shown via hamburger button
         Uses f:subview to avoid duplicate component ID (form_menu) with desktop menu -->
    <p:sidebar id="sidebarMenu"
        widgetVar="sidebarMenu"
        position="left"
        baseZIndex="10000"
        dynamic="true"
        visible="false"
        style="overflow: auto; width: 280px;"
        showCloseIcon="true">
        <f:subview id="mobileMenu">
            <ui:include src="/menu.xhtml"/>
        </f:subview>
    </p:sidebar>

    <div class="grid">
<!--   North - Header, sticky at top -->
        <div class="col-12" style="position:sticky; top:0; z-index:100; background:var(--surface-ground, #ffffff);">
            <ui:include src="/header.xhtml"/>
        </div>

<!--   West - Menu (hidden on mobile, visible md+) -->
        <div class="hidden md:block col-12 md:col-2">
         <ui:include src="/menu.xhtml"/>
        </div>

<!--   Center - Contenu (full width on mobile, 10 cols on md+) -->
        <div class="col-12 md:col-10">
            <!-- Breadcrumb — shows current view name -->
            <div style="font-size:0.72rem; color:var(--text-color-secondary, #6c757d); margin-bottom:0.5rem;">
                <i class="pi pi-home" style="margin-right:0.3rem;"/>
                <span>GolfLC</span>
                <i class="pi pi-angle-right" style="margin:0 0.3rem; font-size:0.65rem;"/>
                <span style="color:var(--text-color, #495057); font-weight:500;">#{view.viewId.replace('/', '').replace('.xhtml', '')}</span>
            </div>
            <ui:include src="/include/include_messages.xhtml"/>
            <ui:insert name="content"></ui:insert>
        </div>
    </div> <!-- class grid -->
</div>  <!-- class card -->
<!--
<p:ajaxExceptionHandler type="jakarta.faces.application.ViewExpiredException"
                        update="viewExpiredDialog"
                        onexception="PF('viewExpiredDialog').show();" />
        <p:dialog id="viewExpiredDialog"
                  header="Session expired"
                  widgetVar="viewExpiredDialog"
                  height="500px"
                  onShow="document.location.href = document.location.href;">
                    <h3>Reloading page</h3>
                    Message: #{pfExceptionHandler.message} <br/>
                    StackTrace: <h:outputText value="#{pfExceptionHandler.formattedStackTrace}" escape="false" />
        </p:dialog>
-->
<p:ajaxExceptionHandler type="jakarta.faces.application.ViewExpiredException"
                        onexception="window.location.href = '#{request.contextPath}/session_expired.xhtml';" />


</f:view>
</h:body>
</html>
