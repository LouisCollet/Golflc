    <f:view id="view_master"
            locale="#{languageC.locale}" 
            contentType="text/html;charset=utf-8"
            encoding="UTF-8">
 
  <!-- new 04-08-2023 essai correction error FSF1103 The metadata facet must be a direct child of the view in viewId

<!-- 23/11/2022 moved to header.xhtml pour eviter message not in a form
<p:idleMonitor id="idleMonitor_timeout" timeout="500000">
    <p:ajax event="idle"   listener="#{LCUtil.onIdleMonitor()}"   update="growl-msg" />
    <p:ajax event="active" listener="#{LCUtil.onActiveMonitor()}" update="growl-msg" />
</p:idleMonitor>

<div class="card">
    <!-- opacity: 0.2; dans primefacesLC.css  -->
    <p:sidebar id="sidebarRight"
           widgetVar="sidebarRight" 
           position="right" 
           baseZIndex="10000"
           dynamic="true"
           visible="false"
           style="overflow: scroll;color:black"
           showCloseIcon="true" >
        <ui:include src="/help_read.xhtml"/>
     </p:sidebar>

    <p:sidebar id="sidebarIdD"
           widgetVar="sidebarDown" 
           position="bottom" 
           baseZIndex="10000"
           dynamic="true"
           visible="false"
           style="overflow: scroll"
           showCloseIcon="true" >
        <ui:include src="/footer.xhtml"/>
    </p:sidebar>

<ui:insert name="metadata" />

<!-- utilisation de Primeflex 3.0 based on Flexbox : total 12 columns
https://www.primefaces.org/primeflex/migration from 2.0 to 3.0 on 01/03/2022
-->

    <div class="grid">
<!--   North - Header, width = 12 col-->
        <div class="col-12">
            <ui:include src="/header.xhtml"/>
        </div>

<!--   West - Menu -->
        <div class="col-2">
            <ui:include src="/menu.xhtml"/>
        </div>

<!--   Center - Contenu -->
        <div class="col-10">
            <ui:include src="/include/include_messages.xhtml"/>
            <ui:insert name="content"></ui:insert>
        </div>

<!--    South - Footer  remplacé par sidebar 08/03/2022
        <div class="col-12">
            <ui:include src="/footer.xhtml"/>
        </div>-->
    </div> <!-- class p-grid -->
</div>  <!-- class card -->

<p:ajaxExceptionHandler type="jakarta.faces.application.ViewExpiredException"
                        update="viewExpiredDialog"
                        onexception="PF('viewExpiredDialog').show();" />
        <p:dialog id="viewExpiredDialog"
                  header="Session expired"
                  widgetVar="viewExpiredDialog"
                  height="500px"
                  onShow="document.location.href = document.location.href;">
                    <h3>Reloading page</h3>
                    Message: #{pfExceptionHandler.message} <br/>
                    StackTrace: <h:outputText value="#{pfExceptionHandler.formattedStackTrace}" escape="false" />
        </p:dialog>
