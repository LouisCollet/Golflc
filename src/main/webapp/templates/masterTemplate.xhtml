<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"

<h:head id="head_PrimeFlex3">
   <meta name="description" 
         content="GolfLC Application"/> 
   <meta name="author" 
         content="GolfLC - Louis Collet"/> 
   <meta http-equiv="Content-Language" 
         content="#{languageC.locale}" /> 
   <meta http-equiv="X-UA-Compatible" 
         content="IE=edge"/>
   <meta http-equiv="Content-Type" 
         content="text/html; charset=UTF-8"/>

    <h:outputStylesheet library="styles" name="Styles2022.css" />
 <!--   adapter également dialogTemplate.xhtml -->
    <h:outputStylesheet library="styles" name="primeflex/331/primeflex.min.css" /> 
    <h:outputStylesheet library="styles" name="primeflex/331/primeone-light.css" /> 
    <h:outputScript library="js" name="forms.js" target="head"/>

    <ui:insert name="head"> </ui:insert>

    <f:view id="view_master"
            locale="#{languageC.locale}"

    <ui:insert name="metadata"> </ui:insert>
<div class="card">
