<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces" >

<f:view id="view_dialog"
        contentType="text/html"
        locale="#{languageC.locale}">
    
     <!-- new 04-08-2023 essai correction error FSF1103 The metadata facet must be a direct child of the view in viewId -->
         <ui:insert name="metadata"> </ui:insert>

<h:head id="head_PrimeFlex_DialogTemplate">
   <meta http-equiv="Content-Type" content="text/html;charset=utf-8"/>
   <meta http-equiv="Content-Language" content="#{languageC.locale}" />
   <!-- meta refresh removed from dialogTemplate — session timeout is handled by the parent page (masterTemplate).
        Having it here caused premature redirect inside the dialog iframe. 2026-03-19 -->
    <title><ui:insert name="title"> Default title </ui:insert></title>
    <h:outputScript library="js" name="forms.js" target="head"/>
    <!-- https://printjs.crabbly.com/  -->
    <h:outputScript library="js" name="print.min.js" target="head"/>

    <!-- Anti-FOUC: apply saved theme before first paint -->
    <script>
    (function() {
        var saved = localStorage.getItem('golf-theme');
        if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>
</h:head>

<h:body id="body_master_template"> 

<ui:insert name="metadata" />
<h:outputStylesheet library="styles" name="print.min.css" />
<h:outputStylesheet library="styles" name="Styles2026.css" />
<h:outputStylesheet library="styles" name="primeflex/331/primeflex.min.css" />
<h:outputStylesheet library="styles" name="primeflex/331/primeone-light.css" id="primeone-css"/>

<div class="card">
    <div class="grid">
<!--   North - Header 
        <div class="p-col-12">
            
        </div>
-->
<!--   Center - Contenu (full width — no menu in dialogs) -->
        <div class="col-12">
            <ui:include src="/include/include_messages.xhtml"/>
            <ui:insert name="content"></ui:insert>
        </div>

<!--    South - Footer (admin only) -->
        <div class="col-12" rendered="#{playerC.isAdmin()}" style="font-size:0.75rem; color:var(--text-color-secondary);">
            <b>View : </b> #{view.viewId}
            <h:outputText id="fmd" escape="false" value="#{utilsC.ViewModificationDate()}"/>
        </div>
    </div> <!-- class grid -->
</div>  <!-- class card -->

<p:ajaxExceptionHandler type="jakarta.faces.application.ViewExpiredException"
                        onexception="window.location.href = '#{request.contextPath}/session_expired.xhtml';" />

</h:body>
</f:view>
</ui:composition>
