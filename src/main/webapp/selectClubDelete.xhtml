<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

    <ui:define name="title">Delete One Club</ui:define>

    <ui:define name="content">

        <h:form id="form_selectClubDelete">
        <div class="login-container" style="min-height:auto; align-items:flex-start;">
        <p:panel styleClass="login-card form-card" style="max-width:100%;">
            <f:facet name="header">
                <h1>#{msg['message.selectclub.delete']}</h1>
            </f:facet>

            <p:panelGrid
                id="panel2"
                layout="flex"
                columns="2"
                columnClasses="col1Flex, col2Flex">

                <!-- =================== INCLUDE CLUB SELECTOR =================== -->
                <ui:include src="/include/include_club_selector.xhtml" />

            </p:panelGrid>

            <p:commandButton
                value="#{msg['button.club.delete']}"
                id="clubDelete"
                icon="pi pi-database"
                ajax="false"
                action="deleteClubCourseTee.xhtml?faces-redirect=true"/>

        </p:panel>
        </div>
        </h:form>
    </ui:define>
</ui:composition>
