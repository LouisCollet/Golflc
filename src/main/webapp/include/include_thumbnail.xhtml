<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core">

    <p:column id="thumbnail"
              headerText="Thumbnail"
              width="10%"
              style="text-align:center">
        <p:graphicImage id="image_thumbnail"
                        name="images/thumbnails/thumbnail.#{th_photo}"
                        rendered="#{th_photo ne 'nophoto.jpeg' and th_photo ne 'no photo.jpeg'}"
                        alt="Photo: #{th_name}"/>
        <p:graphicImage id="image_thumbnail_unknown"
                        name="images/thumbnails/thumbnail.unknown.jpg"
                        rendered="#{th_photo eq 'nophoto.jpeg' or th_photo eq 'no photo.jpeg'}"
                        alt="No photo: #{th_name}"/>
    </p:column>

</ui:composition>
