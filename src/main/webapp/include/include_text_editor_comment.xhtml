<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">

<!-- ui:param attendus :
     editorValue  — EL binding du champ comment (ex: #{clubC.unavailable.period.comment})
     dialogHeader — titre du dialog preview  (ex: #{msg['title.cotisation.comment']})
-->

<p:textEditor id="textEditor"
              widgetVar="editorVar"
              value="#{editorValue}"
              height="70px"
              styleClass="w-full"
              placeholder="Enter here your content"/>

<p:dialog id="dlgCommentDialog"
          widgetVar="dlgComment"
          header="#{dialogHeader}"
          width="auto" height="auto"
          showEffect="fade" hideEffect="fade">
    <p:outputPanel id="displayComment">
        <h:outputText value="#{editorValue}" escape="false"/>
    </p:outputPanel>
</p:dialog>

<div class="btn-group" style="margin-top:0.5rem;">
    <p:commandButton id="btnSaveComment"
                     value="#{msg['tarif.members.add.comment']}"
                     process="@this textEditor"
                     update="displayComment growl-msg"
                     oncomplete="PF('dlgComment').show()"
                     icon="pi pi-database"
                     styleClass="p-button-outlined"/>
    <p:commandButton value="Clear"
                     type="button"
                     onclick="PF('editorVar').clear();"
                     icon="pi pi-times"
                     styleClass="p-button-outlined"/>
</div>

</ui:composition>
