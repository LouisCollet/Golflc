<!-- attention !!! starts with / if include within include !! -->  
<p:panelGrid
    id="panelgridSummarycotisation"
    layout="tabular"
    columnClasses="col1,col2,col3,col4"
    columns="4" >

<f:facet name="header">
    <h1>#{msg['title.summary.cotisation']}</h1>
</f:facet>

      <h:outputText value="#{msg['start.date']} :"/>
      <h:outputText
            id="startDateCotisation" 
            value="#{courseC.tarifMember.startDate}" >
          <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
      </h:outputText>

      <h:outputText value="#{msg['end.date']} :" />
      <h:outputText
            id="endDateCotisation" 
            value="#{courseC.tarifMember.endDate}" >
          <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
      </h:outputText>

      <h:outputText value="#{msg['handicap.comment']} :" />
      <c:set var="com" value="#{courseC.tarifMember.comment}" />
      <h:outputText
            id="commentCotisation" 
            value="#{of:abbreviate(com, 30)}">
          <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
      </h:outputText>
