<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:of="omnifaces"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core" >

    <ui:include src="/include/include_summary_club.xhtml"/>

    <h:panelGroup layout="block" styleClass="summary-bar">
        <span class="summary-item">
            <span class="summary-label">#{msg['start.date']}</span>
            <span class="summary-value">
                <h:outputText value="#{memC.tarifMember.startDate}">
                    <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
                </h:outputText>
            </span>
        </span>
        <span class="summary-sep">|</span>
        <span class="summary-item">
            <span class="summary-label">#{msg['end.date']}</span>
            <span class="summary-value">
                <h:outputText value="#{memC.tarifMember.endDate}">
                    <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
                </h:outputText>
            </span>
        </span>
        <span class="summary-sep">|</span>
        <span class="summary-item">
            <span class="summary-label">#{msg['handicap.comment']}</span>
            <c:set var="com" value="#{memC.tarifMember.comment}" />
            <span class="summary-value">#{of:abbreviate(com, 30)}</span>
        </span>
    </h:panelGroup>

</ui:composition>
