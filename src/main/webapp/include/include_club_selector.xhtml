<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:p="primefaces"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:h="jakarta.faces.html">

            <p:outputLabel for="@next" value="#{msg['club.id']} :" />
            <h:panelGroup layout="block" styleClass="selector-row" id="containerClub">
                <p:inputNumber id="inputClubId"
                               label="inputClub"
                               value="#{clubC.club.idclub}"
                               size="5"
                               lang="#{languageC.locale}"
                               decimalPlaces="0"
                               emptyValue="0"/>
                <p:commandButton id="ButtonHomeClub"
                                 immediate="true"
                                 value="#{msg['button.player.homeclub']}"
                                 actionListener="#{dialogC.showSelectClub('general')}"
                                 icon="pi pi-search">
                    <p:ajax event="dialogReturn"
                            update="inputClubId,clubName,clubId"/>
                </p:commandButton>
                <h:outputText id="clubName"
                              value="#{clubC.club.clubName}"
                              styleClass="selector-name"/>
                <h:outputText id="clubId"
                              value="#{clubC.club.idclub}"
                              styleClass="selector-id"/>
            </h:panelGroup>
</ui:composition>
