<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">
<h:body>
<p:confirmDialog global="true"
                 showEffect="fade"
                 hideEffect="fade"
                 styleClass="danger-confirm"
                 closable="true"
                 width="250"
                 height="150"
                 header="#{msg['message.confirm.delete']}"
                 message="#{msg['message.confirm.cancel']}" >
        <p:commandButton value="#{msg['button.yes']}"
                         type="button"
                         styleClass="ui-confirmdialog-yes ui-button-danger"
                         icon="pi pi-trash" />
        <p:commandButton value="#{msg['button.no']}"
                         type="button"
                         styleClass="ui-confirmdialog-no ui-button-secondary"
                         icon="pi pi-times" />
</p:confirmDialog>

<p:confirmPopup global="true"
                showEffect="fade" 
                hideEffect="fade"
                message="this is the message"
                icon="pi pi-power-off"
                dismissable="true" >
            <p:commandButton value="No"
                             type="button" 
                             styleClass="ui-confirm-popup-no ui-button-flat" />
            <p:commandButton value="Yes"
                             type="button"
                             styleClass="ui-confirm-popup-yes" />
</p:confirmPopup>
</h:body>
</ui:composition>
