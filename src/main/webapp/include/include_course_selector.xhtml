<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:p="primefaces"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:h="jakarta.faces.html">
    
    <!-- COURSE SELECTOR UNIQUEMENT -->
    <p:outputLabel for="@next" value="#{msg['course.id']} :" />
    <h:panelGroup layout="block" styleClass="selector-row" id="containerCourse">
        <p:inputNumber id="inputCourseId"
                       label="inputCourse"
                       value="#{clubC.course.idcourse}"
                       size="5"
                       decimalPlaces="0"
                       emptyValue="0"/>
        <p:commandButton id="ButtonCourse"
                         immediate="true"
                         value="#{msg['button.course.list']}"
                         actionListener="#{dialogC.showSelectCourse('general',clubC.club.idclub)}"
                         icon="pi pi-search">
            <p:ajax event="dialogReturn"
                    update="inputCourseId,courseName,courseId,growl-msg"/>
        </p:commandButton>
        <h:outputText id="courseName"
                      value="#{clubC.course.courseName}"
                      styleClass="selector-name"/>
        <h:outputText id="courseId"
                      value="#{clubC.course.idcourse}"
                      styleClass="selector-id"/>
    </h:panelGroup>
</ui:composition>
