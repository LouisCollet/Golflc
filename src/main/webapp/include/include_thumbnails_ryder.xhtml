<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core">

    <h:outputText value="#{v.get(i).lastName()} #{v.get(i).firstName()}"/>
    <p:graphicImage value="#{imageView.getThumbnail(thumbnail)}"
                    rendered="#{th_photo ne 'nophoto.jpeg'}"
                    alt="thumbnail missing for : #{v.get(i).firstName()}"/>
    <p:graphicImage name="images/thumbnails/thumbnail.unknown.jpg"
                    rendered="#{th_photo eq 'nophoto.jpeg'}"
                    alt="thumbnail missing for : #{v.get(i).firstName()}"/>

</ui:composition>
