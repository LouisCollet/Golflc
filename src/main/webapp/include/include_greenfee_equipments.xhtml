<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:f="jakarta.faces.core">

    <p:dataTable var="item"
                 value="#{memC.tarifGreenfee.equipmentsList}"
                 emptyMessage="#{msg['message.table.empty']}"
                 styleClass="compact-table">
        <f:facet name="header">
            <h1>#{msg['title.equipments.choice']}</h1>
        </f:facet>

        <p:column headerText="#{msg['tarif.members.item']}"
                  width="12%">
            <h:outputText value="#{item.item}"/>
        </p:column>

        <p:column headerText="#{msg['tarif.season']}"
                  width="8%">
            <h:outputText value="#{item.season}"/>
        </p:column>

        <p:column headerText="#{msg['tarif.period']}"
                  width="14%">
            <h:outputText value="#{memC.periodDatesFor(item.season)}"/>
        </p:column>

        <p:column headerText="#{msg['tarif.slot']}"
                  width="14%"
                  rendered="#{memC.tarifGreenfee.greenfeeType eq 'HO'}">
            <h:outputText value="#{memC.slotNameFor(item.linkedSlotKey)}"/>
        </p:column>

        <p:column headerText="#{msg['tarif.members.price']}"
                  width="12%">
            <h:outputText value="#{item.price}"/>
        </p:column>

        <p:column headerText="#{msg['tarif.members.currency']}"
                  width="12%">
            <h:outputText value="#{memC.tarifGreenfee.currency}"/>
        </p:column>

        <p:column headerText="#{msg['tarif.members.choice']}"
                  width="12%"
                  id="ChoiceEquipment">
            <p:inputNumber value="#{item.quantity}"
                           minValue="0"
                           maxValue="4"
                           required="true"
                           size="1"
                           emptyValue="0"
                           title="#{msg['tooltip.tarif.choice']}"
                           decimalPlaces="0">
                <p:ajax event="change" update="form_price_round_greenfee:totalPricePanel" process="@form"/>
            </p:inputNumber>
        </p:column>

        <f:facet name="footer">
          <div class="btn-group">
            <p:commandButton value="#{msg['tarif.print']}"
                             id="commandButton1"
                             update="growl-msg"
                             icon="pi pi-database"
                             action="#{memC.showTarifGreenfee(clubC.course.idcourse)}"/>
            <p:commandButton value="#{msg['inscription.back']}"
                             id="commandButtonback"
                             ajax="false"
                             update="growl-msg"
                             immediate="true"
                             icon="pi pi-undo"
                             action="inscription.xhtml?faces-redirect=true"/>
            <p:commandButton value="#{msg['payment.selected']}"
                             id="commandButtonPayment"
                             ajax="false"
                             update="growl-msg"
                             icon="pi pi-credit-card"
                             action="#{payC.manageGreenfee()}"/>
          </div>
        </f:facet>
    </p:dataTable>

</ui:composition>
