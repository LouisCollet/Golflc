<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
       xmlns:f="jakarta.faces.core">
 
 <p:dataTable var="item" 
              value="#{memC.tarifGreenfee.teeTimeChoosen}"
              
              emptyMessage="#{msg['message.table.empty']}"
              style="width:40%;text-align: center;margin-left:auto;margin-right:auto;" >
      <f:facet name="header">
          <h:outputText escape="false" value="#{msg['title.greenfee.choice']}" />
      </f:facet> 

        <p:column headerText="#{msg['round.hour']} "
                  width="12%" >
            <h:outputText value="#{courseC.round.roundDate}">
                  <f:convertDateTime type="localDateTime" pattern="HH:mm" />
            </h:outputText>
        </p:column>
        <p:column headerText="#{msg['tarif.hours.start']} "
                  width="12%" >
            <h:outputText value="#{item.startTime}" />
        </p:column>
        <p:column headerText="#{msg['tarif.hours.end']} "
                  width="12%" >
            <h:outputText value="#{item.endTime}" />
        </p:column>
        <p:column headerText="#{msg['tarif.seasons']} "
                  width="8%" >
            <h:outputText value="#{item.season}" />
        </p:column>
     
        <p:column headerText="#{msg['tarif.item']} "
                  width="20%" >
            <h:outputText value="#{item.item}" />
        </p:column>
     
        <p:column headerText="#{msg['tarif.members.price']} " 
                  width="12%">
                 <h:outputText value="#{item.price}" />
        </p:column>
        <p:column headerText="#{msg['tarif.members.choice']}"
                  width="12%"
                  id="ChoiceHours">
            <!--  rendered="#{item.season eq memC.tarifGreenfee.season or item.season eq 'A'}"

            -->
        <p:inputNumber 
			value="#{item.quantity}"
			minValue="0"
                        maxValue="4"
                        required="true"
                   
                        size="1"
                        emptyValue="0"
                        title="#{msg['tooltip.tarif.choice']}"
                        decimalPlaces="0" >  
         </p:inputNumber>
        </p:column>
    </p:dataTable>
</ui:composition>
