<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">
    <p:growl id="growl-msg"
             escape="false"
             sticky="true"
             showDetail="true"
             severity="error"
             skipDetailIfEqualsSummary="true"
             keepAlive="true">
        <p:autoUpdate/>
    </p:growl>

    <p:messages id="messages"
                redisplay="true"
                escape="false"
                skipDetailIfEqualsSummary=""
                showDetail="true"
                globalOnly="true"
                closable="true"
                severity="info,warn,error,fatal">
        <p:autoUpdate/>
    </p:messages>
</ui:composition>
