<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">

    <!-- Basic items -->
    <ui:repeat id="repeat_basic"
               value="#{cartC.cotisationBasicCart}"
               var="b"
               rendered="#{not empty cartC.cotisationBasicCart}">
        <div class="lesson-item-card">
            <p:panelGrid id="panelgrid-cotisation"
                         layout="flex"
                         columns="2"
                         columnClasses="col1Flex,col2Flex">
                <p:outputLabel value="#{msg['club.name']}"/>
                <h:outputText value="#{clubC.club.clubName}"/>

                <p:outputLabel value="#{msg['tarif.members.item']}"/>
                <h:outputText value="#{b.item}"/>

                <p:outputLabel value="#{msg['tarif.members.rangeage']}"/>
                <h:outputText value="#{b.range}"/>

                <p:outputLabel value="#{msg['tarif.members.price']}"/>
                <h:outputText value="#{b.price}">
                    <f:convertNumber type="currency" currencyCode="#{payC.creditcard.creditcardCurrency}" groupingUsed="true"/>
                </h:outputText>

                <p:outputLabel value="#{msg['tarif.members.choice']}"/>
                <h:outputText value="#{b.quantity}"/>

                <p:outputLabel value="Total"/>
                <h:outputText value="#{b.price * b.quantity}">
                    <f:convertNumber type="currency" currencyCode="#{payC.creditcard.creditcardCurrency}" groupingUsed="true"/>
                </h:outputText>
            </p:panelGrid>
            <div class="btn-group" style="margin-top:0.5rem;">
                <p:commandButton icon="pi pi-trash"
                                 value="#{msg['button.cancel']}"
                                 styleClass="p-button-danger p-button-sm"
                                 action="#{cartC.removeCotisationBasicItem(b)}"
                                 update="form_cart"
                                 process="@this"/>
            </div>
        </div>
    </ui:repeat>

    <!-- Equipment items -->
    <ui:repeat id="repeat_equipment"
               value="#{cartC.cotisationEquipCart}"
               var="e"
               rendered="#{not empty cartC.cotisationEquipCart}">
        <div class="lesson-item-card">
            <p:panelGrid layout="flex" columns="2" columnClasses="col1Flex,col2Flex">
                <p:outputLabel value="#{msg['tarif.members.item']}"/>
                <h:outputText value="#{e.item}"/>

                <p:outputLabel value="#{msg['tarif.members.price']}"/>
                <h:outputText value="#{e.price}">
                    <f:convertNumber type="currency" currencyCode="#{payC.creditcard.creditcardCurrency}" groupingUsed="true"/>
                </h:outputText>

                <p:outputLabel value="#{msg['tarif.members.choice']}"/>
                <h:outputText value="#{e.quantity}"/>

                <p:outputLabel value="Total"/>
                <h:outputText value="#{e.price * e.quantity}">
                    <f:convertNumber type="currency" currencyCode="#{payC.creditcard.creditcardCurrency}" groupingUsed="true"/>
                </h:outputText>
            </p:panelGrid>
            <div class="btn-group" style="margin-top:0.5rem;">
                <p:commandButton icon="pi pi-trash"
                                 value="#{msg['button.cancel']}"
                                 styleClass="p-button-danger p-button-sm"
                                 action="#{cartC.removeCotisationEquipmentItem(e)}"
                                 update="form_cart"
                                 process="@this"/>
            </div>
        </div>
    </ui:repeat>

</ui:composition>
