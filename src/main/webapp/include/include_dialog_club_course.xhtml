<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:f="jakarta.faces.core">

    <h:form id="form_club_course">
        <p:panelGrid layout="flex"
                     id="panel1"
                     columns="2"
                     columnClasses="col1Flex, col2Flex">

            <p:outputLabel for="@next" value="#{msg['club.club']} :"/>
            <h:panelGroup layout="block" styleClass="selector-row" id="containerClub">
                <p:inputNumber id="inputClub"
                               label="HomeClub"
                               value="#{clubC.club.idclub}"
                               size="5"
                               decimalPlaces="0"
                               emptyValue="0"/>
                <p:commandButton id="ButtonHomeClub"
                                 immediate="true"
                                 value="#{msg['button.player.homeclub']}"
                                 actionListener="#{dialogC.showSelectClub('unavailable')}"
                                 icon="pi pi-search">
                    <p:ajax event="dialogReturn"
                            update=":form_club_course:inputClub,clubName,ClubId"/>
                </p:commandButton>
                <h:outputText id="clubName"
                              value="#{clubC.club.clubName}"
                              styleClass="selector-name"/>
                <h:outputText id="ClubId"
                              value="#{clubC.club.idclub}"
                              styleClass="selector-id"/>
            </h:panelGroup>

            <p:outputLabel for="@next" value="#{msg['course.course']} :"/>
            <h:panelGroup layout="block" styleClass="selector-row" id="containerCourse">
                <p:inputNumber id="inputCourse"
                               value="#{clubC.course.idcourse}"
                               size="5"
                               decimalPlaces="0"
                               emptyValue="0"/>
                <p:commandButton id="ButtonCourse"
                                 immediate="true"
                                 value="#{msg['button.course.list']}"
                                 actionListener="#{dialogC.showSelectCourse('include',clubC.club.idclub)}"
                                 icon="pi pi-search">
                    <p:ajax event="dialogReturn"
                            update=":form_club_course:inputCourse,courseName,courseId"/>
                </p:commandButton>
                <h:outputText id="courseName"
                              value="#{clubC.course.courseName}"
                              styleClass="selector-name"/>
                <h:outputText id="courseId"
                              value="#{clubC.course.idcourse}"
                              styleClass="selector-id"/>
            </h:panelGroup>

            <f:facet name="footer">
                <p:commandButton value="Continue and Refresh"
                                 id="buttonNext"
                                 update="growl-msg"
                                 immediate="true"
                                 ajax="false"
                                 icon="pi pi-arrow-right"
                                 style="float:right;"
                                 action="unavailable_menu.xhtml?faces-redirect=true"/>
            </f:facet>

        </p:panelGrid>
    </h:form>

</ui:composition>
