<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces" >

<p:panelGrid
    id="panelgridSummaryClub"
    layout="tabular"
    columnClasses="col1,col2,col3,col4"
    columns="4" >

<f:facet name="header">
    <h1>#{msg['title.summary.club']}</h1>
</f:facet>
      <h:outputText value="#{msg['club.name']} :"   />
	<h:outputText
            id="clubsummary" 
            value="#{clubC.club.clubName} (#{clubC.club.idclub})" />

      <h:outputText value="#{msg['course.name']} :"
            rendered="#{clubC.course.courseName ne null}"/>
      <h:outputText
            id="coursesummary"
            value="#{clubC.course.courseName} (#{clubC.course.idcourse})" 
            rendered="#{clubC.course.courseName ne null}"/>

      <h:outputText value="#{msg['club.zoneid']} :"   />
	<h:outputText
            id="clubszoneId" 
            value="#{clubC.club.address.zoneId}" />
        
        <h:outputText value="#{msg['address.city']} :"   />
	<h:outputText id="clubsCity" 
            value="#{clubC.club.address.city} - #{clubC.club.address.country.code}" />  

      <h:outputText value="#{msg['tee.id']} :" 
                    rendered="#{clubC.tee.idtee != null}"/>
      <h:outputText
            id="teesummary"
            value="(#{clubC.tee.idtee}) S=#{clubC.tee.teeGender} ,START=#{clubC.tee.teeStart} ,HP=#{clubC.tee.teeHolesPlayed} ,MT=#{clubC.tee.teeMasterTee} 
                    ,DT=#{clubC.tee.teeDistanceTee} "
            title="#{msg['title.hole.holenumber']}"
            rendered="#{clubC.tee.idtee != null}"/>
</p:panelGrid>
<p:divider layout="horizontal" type="solid" />
</ui:composition>
