<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">
<h:body>
<ui:composition>
  <ui:include src="/include/include_summary_player.xhtml"/>
<!-- attention !!! starts with / if include within include !! -->  
<p:panelGrid 
    id="panel1"
    layout="tabular"
    columns="2"
    columnClasses="col1, col2">

<f:facet name="header" >
    <h1>#{msg['subscription.old']}</h1>
</f:facet>
		<h:outputText value="#{msg['address.city']}" />
		<h:outputText value="#{courseC.player.address.city}" />

                <h:outputText value="#{msg['address.country.code']}" />
                <h:outputText value="#{courseC.player.address.country.extendedName}" />

                <h:outputText value="#{msg['subscription.trial']}"
                              rendered="#{courseC.subscription.trialCount > 0}" />
                <h:outputText value="#{courseC.subscription.trialCount}"
                              rendered="#{courseC.subscription.trialCount > 0}" />

                <h:outputText value="#{msg['subscription.enddate']}" />
                <h:outputText value="#{courseC.subscription.endDate}" >
                    <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
                </h:outputText>
</p:panelGrid>

<!--<p:divider layout="horizontal" type="dashed" />-->

</ui:composition>
</h:body>
</html>
