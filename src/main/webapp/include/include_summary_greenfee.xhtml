<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core">

    <h:panelGroup id="summaryBar" layout="block" styleClass="summary-bar">
        <span class="summary-item">
            <span class="summary-label">#{msg['club.name']}</span>
            <span class="summary-value">#{clubC.club.clubName} (#{clubC.club.idclub})</span>
        </span>
        <span class="summary-sep">|</span>
        <span class="summary-item">
            <span class="summary-label">#{msg['course.name']}</span>
            <span class="summary-value">#{memC.tarifGreenfeeCourseDisplay}</span>
        </span>
        <h:panelGroup rendered="#{not empty memC.tarifGreenfee.tarifHolesList}">
            <span class="summary-sep">|</span>
        </h:panelGroup>
        <h:panelGroup styleClass="summary-item"
                      rendered="#{not empty memC.tarifGreenfee.tarifHolesList}">
            <span class="summary-label">#{msg['tarif.holes']}</span>
            <span class="summary-value">#{memC.tarifGreenfee.tarifHolesDisplay}</span>
        </h:panelGroup>
        <h:panelGroup rendered="#{memC.tarifGreenfee.greenfeeType ne null}">
            <span class="summary-sep">|</span>
        </h:panelGroup>
        <h:panelGroup styleClass="summary-item"
                      rendered="#{memC.tarifGreenfee.greenfeeType ne null}">
            <span class="summary-label">#{msg['tarif.type']}</span>
            <span class="summary-value">#{memC.tarifGreenfee.greenfeeType}</span>
        </h:panelGroup>
        <h:panelGroup rendered="#{memC.tarifGreenfee.datesSeasonsList.size() gt 0}">
            <span class="summary-sep">|</span>
        </h:panelGroup>
        <h:panelGroup styleClass="summary-item"
                      rendered="#{memC.tarifGreenfee.datesSeasonsList.size() gt 0}">
            <span class="summary-label">#{msg['tarif.period']}</span>
            <span class="summary-value">
                <ui:repeat var="item" value="#{memC.tarifGreenfee.datesSeasonsList}">
                    <h:outputText value="#{item.startDate}">
                        <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
                    </h:outputText>
                    -
                    <h:outputText value="#{item.endDate}">
                        <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
                    </h:outputText>
                    - #{item.season}
                </ui:repeat>
            </span>
        </h:panelGroup>
    </h:panelGroup>

</ui:composition>
