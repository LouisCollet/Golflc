<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:p="primefaces"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:h="jakarta.faces.html">
    
        <p:outputLabel for="@next" value="#{msg['professional.title']}" />
        <h:panelGroup layout="block"
                      style="display:flex; align-items:center; gap:0.5rem;"
                      id="containerPlayer"  >
                <p:inputNumber
                       id="inputPlayerId"
                       label="inputPlayer"
                       value="#{playerC.playerTemp.idplayer}" 
                       size="7"
                       decimalPlaces="0"
                       emptyValue="0"
                       style="margin-left:1.5em; margin-right:1.5em;" />
                <p:commandButton 
                        id="ButtonPro"
                        immediate="true"
                        value="#{msg['button.player.list']}"
                        actionListener="#{dialogC.showSelectPlayer('professional')}"
                        icon="pi pi-search" >
                    <p:ajax event="dialogReturn"
                            update="inputPlayerId,playerName,playerId,growl-msg" />
                </p:commandButton>

                <h:outputText id="playerName"
                              value="#{playerC.playerTemp.playerLastName}" 
                              style="font-style:italic;margin-right: 10px;" />
                <h:outputText id="playerId"
                              value="#{playerC.playerTemp.idplayer}"
                              style="font-weight:bold;font-size: 2rem;font-style:italic;color: red;"/>
          </h:panelGroup>
</ui:composition>
