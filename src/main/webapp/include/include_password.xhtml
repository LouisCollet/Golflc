<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:f="jakarta.faces.core">

    <p:panelGrid id="panelGridInclude"
                 layout="flex"
                 columns="2"
                 columnClasses="col1Flex, col2Flex">

        <h:panelGroup layout="block"
                      style="display:flex; align-items:center; gap:0.5rem;">
            <h:outputText value="#{msg['password.new']}"/>
            <i class="pi pi-key"/>
        </h:panelGroup>
        <p:password id="password1"
                    label="Password 1"
                    toggleMask="true"
                    redisplay="true"
                    value="#{playerC.password.wrkpassword}"
                    required="true"
                    promptLabel="this is the promptlabel"
                    requiredMessage="#{msg['password.promptlabel']}"
                    title="#{msg['tooltip.password']}"
                    feedback="true"
                    weakLabel="#{msg['password.weaklabel']}"
                    goodLabel="#{msg['password.goodlabel']}"
                    strongLabel="#{msg['password.stronglabel']}"
                    lang="#{languageC.locale}"/>

        <h:panelGroup layout="block"
                      style="display:flex; align-items:center; gap:0.5rem;">
            <h:outputText value="#{msg['password.new.confirm']}"/>
            <i class="pi pi-key"/>
        </h:panelGroup>
        <p:password id="password2"
                    label="Password 2"
                    toggleMask="true"
                    redisplay="true"
                    value="#{playerC.password.wrkconfirmpassword}"
                    required="true"
                    requiredMessage="#{msg['password.confirm.message']}"
                    title="#{msg['tooltip.password.confirm']}"
                    feedback="true"
                    weakLabel="#{msg['password.weaklabel']}"
                    goodLabel="#{msg['password.goodlabel']}"
                    strongLabel="#{msg['password.stronglabel']}"
                    lang="#{languageC.locale}"/>

    </p:panelGrid>

    <p:commandButton id="buttonRegisterI"
                     value="#{msg['button.password.modify']}"
                     update="growl-msg"
                     ajax="false"
                     icon="pi pi-key"
                     action="#{playerC.modifyPassword()}"/>

</ui:composition>
