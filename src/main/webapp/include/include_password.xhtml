<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:f="jakarta.faces.core"  >
 <p:panelGrid 
    id="panelGridInclude"
    layout="tabular"
    columns="2"
    columnClasses="col1,col2">
<!--  
rendered="#{courseC.password.showCurrentPassword eq true}"
<f:facet name="header1">
    <h1>#{msg['password.modify.old']}</h1>
</f:facet>
  -->   
<f:facet name="header2">
    <h1>#{msg['password.modify.data']}</h1>
</f:facet>
       <h:panelGroup id="panelGroupIncludeG1" layout="block" >
           <h:outputText value="#{msg['password.new']}"  />
                  <span class="ui-inputgroup-addon">
                    <i class="pi pi-key"></i>
                  </span>
       </h:panelGroup>

	<p:password id="password1"
                    label="Password 1"
                    toggleMask="true"
                    redisplay="true"
                    value="#{courseC.password.wrkpassword}" 
                    required="true"
                    match="password2"
                    promptLabel="this is the promptlabel"
                    requiredMessage="Veuillez introduire votre mot de passe"
                    title="#{msg['tooltip.password']}"
                    feedback="true"
                    weakLabel="#{msg['password.weaklabel']}"
                    goodLabel="#{msg['password.goodlabel']}"
                    strongLabel="#{msg['password.stronglabel']}"
                    lang="#{languageC.locale}" >
        </p:password>

        <h:panelGroup id="panelGroupIncludeG2" layout="block" >
           <h:outputText value="#{msg['password.new.confirm']}"  />
                  <span class="ui-inputgroup-addon"><i class="pi pi-key"></i></span>
        </h:panelGroup>

	<p:password id="password2"
                    label="Password 2"
                    toggleMask="true"
                    redisplay="true"
                    value="#{courseC.password.wrkconfirmpassword}"
                    required="true"
                    requiredMessage="#{msg['password.confirm.message']}"
                    validatorMessage="#{msg['password.validator.message']}"
                    title="#{msg['tooltip.password.confirm']}"
                    feedback="true"
                    weakLabel="#{msg['password.weaklabel']}"
                    goodLabel="#{msg['password.goodlabel']}"
                    strongLabel="#{msg['password.stronglabel']}"
                    lang="#{languageC.locale}"  >
	</p:password>

<f:facet name="footer">
<p:commandButton 
                         id="buttonRegisterI"
                         value="#{msg['button.password.modify']}"
                         update="growl-msg"
                         ajax="false"
                         immediate="false"
                         icon="pi pi-key"
                         action="#{courseC.modifyPassword()}"  />
</f:facet>
</p:panelGrid>
</ui:composition>
