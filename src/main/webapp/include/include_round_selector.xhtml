<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:p="primefaces"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:h="jakarta.faces.html">

            <p:outputLabel for="@next" value="#{msg['round.id']} :" />
            <h:panelGroup layout="block" styleClass="selector-row" id="containerRound">
                <p:inputNumber id="inputRoundId"
                               label="inputRound"
                               value="#{roundC.round.idround}"
                               size="5"
                               lang="#{languageC.locale}"
                               decimalPlaces="0"
                               emptyValue="0"/>
                <p:commandButton id="ButtonRound"
                                 immediate="true"
                                 value="#{msg['button.round.list']}"
                                 actionListener="#{dialogC.showSelectRound('round')}"
                                 icon="pi pi-search">
                    <p:ajax event="dialogReturn"
                            update="inputRoundId,roundName,roundId"
                            oncomplete="#{empty autoSubmitButton ? '' : 'document.getElementById(\''.concat(autoSubmitButton).concat('\').click();')}"/>
                </p:commandButton>
                <h:outputText id="roundName"
                              value="#{roundC.round.roundName}"
                              styleClass="selector-name"/>
                <h:outputText id="roundId"
                              value="#{roundC.round.idround}"
                              styleClass="selector-id"/>
            </h:panelGroup>
</ui:composition>
