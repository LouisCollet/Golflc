<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">

    <ui:include src="/include/include_summary_player.xhtml"/>

    <p:panelGrid id="panel1"
                 layout="flex"
                 columns="2"
                 columnClasses="col1Flex, col2Flex">

        <f:facet name="header">
            <h1>#{msg['subscription.old']}</h1>
        </f:facet>

        <h:outputText value="#{msg['address.city']}"/>
        <h:outputText value="#{playerC.player.idplayer}"/>

        <h:outputText value="#{msg['professional.name']}"/>
        <h:outputText value="#{payC.professional.proId}"/>

        <h:outputText value="#{msg['subscription.trial']}"/>
        <h:outputText value="#{payC.professional.proClubId}"/>

    </p:panelGrid>

</ui:composition>
