<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">

    <p:panelGrid id="panel1"
                 layout="flex"
                 columns="2"
                 columnClasses="col1Flex, col2Flex">

        <f:facet name="header">
            <h1>#{msg['title.payment.lesson']}</h1>
        </f:facet>

        <p:outputLabel value="#{msg['professional.name']}"/>
        <h:outputText value="#{payC.playerPro.playerFirstName} #{payC.playerPro.playerLastName}"/>

        <p:outputLabel value="#{msg['lesson.in.cart']}"/>
        <h:outputText value="#{payC.listLessons.size()}"/>

    </p:panelGrid>

</ui:composition>
