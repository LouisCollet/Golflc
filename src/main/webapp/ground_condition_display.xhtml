<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">#{msg['menu.ground.condition']}</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:480px;">
    <f:facet name="header"><h1>#{msg['menu.ground.condition']}</h1></f:facet>

    <h:form id="form_gc_display">
        <div class="selector-row" style="margin-bottom:1rem;">
            <p:commandButton id="btnSelectClub"
                             immediate="true"
                             icon="pi pi-search"
                             styleClass="p-button-outlined p-button-sm"
                             actionListener="#{dialogC.showSelectClub('general')}">
                <p:ajax event="dialogReturn"
                        update=":form_gc_display:clubName :displayPanel"/>
            </p:commandButton>
            <h:outputText id="clubName"
                          value="#{appContext.club.clubName}"
                          styleClass="selector-name"/>
        </div>
    </h:form>

    <p:outputPanel id="displayPanel">
        <ui:include src="include/include_ground_condition_display.xhtml"/>
    </p:outputPanel>

</p:panel>
</div>
</ui:define>
</ui:composition>
