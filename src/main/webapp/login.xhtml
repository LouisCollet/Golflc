<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Login to GolfLC</ui:define>

<ui:define name="metadata">
    <f:metadata>
        <f:viewAction action="#{loginBean.prepareLogin}" onPostback="false"/>
    </f:metadata>
</ui:define>

<ui:define name="content">

    <h:form id="loginForm">
        <div class="login-container">
            <p:panel styleClass="login-card">
                <f:facet name="header">
                    <h1>#{msg['login.welcome']}</h1>
                </f:facet>

                <!-- Returning User -->
                <h:link id="linkReturning" outcome="selectPlayer.xhtml" styleClass="login-option"
                        title="#{msg['login.user.old']}">
                    <span class="login-option-icon returning">
                        <i class="pi pi-user"/>
                    </span>
                    <span class="login-option-text">
                        <span class="login-option-title">#{msg['login.user.old']}</span>
                        <span class="login-option-desc">#{msg['login.welcome.back']}</span>
                    </span>
                    <i class="pi pi-arrow-right login-option-arrow"/>
                </h:link>

                <!-- New User -->
                <h:link id="linkNew" outcome="player.xhtml?cmd=new" styleClass="login-option"
                        title="#{msg['login.user.new']}">
                    <span class="login-option-icon newuser">
                        <i class="pi pi-user-plus"/>
                    </span>
                    <span class="login-option-text">
                        <span class="login-option-title">#{msg['login.user.new']}</span>
                        <span class="login-option-desc">#{msg['login.user.new']}</span>
                    </span>
                    <i class="pi pi-arrow-right login-option-arrow"/>
                </h:link>

                <f:facet name="footer">
                    <h:outputText value="GolfLC" />
                    <h:outputText id="fmd" styleClass="login-version" value="#{infoC.deployVersion()}" />
                </f:facet>
            </p:panel>
        </div>
    </h:form>
</ui:define>

</ui:composition>
