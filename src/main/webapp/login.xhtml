<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition 
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Login to GolfLC</ui:define>

<ui:define name="content">

    <!-- Force l'instanciation du LoginBean et l'appel de prepareLogin() -->
    <!-- ✅ Garde f:viewAction pour appeler prepareLogin() -->
    <f:metadata>
        <f:viewAction action="#{loginBean.prepareLogin}" onPostback="false"/>
    </f:metadata>

    <h:form id="loginForm">
        <p:panelGrid id="panelGridLogin" layout="flex" columns="2" columnClasses="col1Flex, col2Flex">
            <f:facet name="header">
                <h:outputText escape="false" value="#{msg['login.welcome']}" />
            </f:facet>

            <h:outputText value="Jakarta version"/>
            <h:outputText id="fmd" escape="false" value="#{infoC.DeployVersion()}" />

            <h:outputText value="Returning User" />
            <h:outputText value="New User" style="float:right;"/>

            <h:link id="linkReturning" title="#{msg['login.user.old']}" outcome="selectPlayer.xhtml">
                <h:graphicImage name="images/arrow-left-3D.jpg"/>
            </h:link>

            <h:link id="linkNew" title="#{msg['login.user.new']}" outcome="player.xhtml?cmd=new">
                <h:graphicImage name="images/arrow-right-3D.jpg"/>
            </h:link>
        </p:panelGrid>

        <h:graphicImage name="images/welcome3.jpg" />
        <i class="pi pi-check"></i>
    </h:form>
</ui:define>

</ui:composition>
