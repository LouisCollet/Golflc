<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml"
>

<ui:define name="title">Stat Chart Round Page </ui:define>

<ui:define name="content">

    <!-- -->
<h:form id="statdet" enctype="application/x-www-form-urlencoded" >

<p:panelGrid
    id="panelgrid"
    layout="tabular"
    columns="1"  >
<!-- LineModel() removed 2026-02-28 — method never existed, chart page non-functional
<p:chart
         id="newlinear"
         model="#{navC.LineModel()}"
         style="height:400px; width:950px; margin-top:20px"
         widgetVar="chart"
         />
-->

</p:panelGrid>
<p:commandButton type="button"
                 id="button01"
                 value="Reset Zoom"
                 icon="pi pi-ban"
                 onclick="chart.resetZoom()"/>
<!--   onclick="PF('chart').resetZoom()" -->
<p:commandButton type="button" 
                 id="button02"
                 value="Export"
                 icon="pi pi-external-link"
                 onclick="exportChart();"/>

<p:dialog widgetVar="dlg" showEffect="fade" modal="true" header="Chart as an Image">
    <p:panelGrid columns="1"
                 
                 id="output"
                 style="width:500px;height:300px"/>
</p:dialog>


</h:form>
</ui:define>
</ui:composition>
