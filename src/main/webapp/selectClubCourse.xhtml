<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Select Club and Course</ui:define>
<ui:define name="content">

<h:form id="club_course">
    <div class="login-container" style="min-height:auto; align-items:flex-start;">
    <p:panel styleClass="login-card form-card" style="max-width:100%;">
        <f:facet name="header">
            <h1>#{msg[selectionContextBean.purpose.dialogTitleKey]}</h1>
        </f:facet>

        <p:panelGrid
            id="panel1"
            layout="flex"
            columns="2"
            columnClasses="col1Flex, col2Flex">

            <!-- ── Club dropdown ──────────────────────────────────────────── -->
            <p:outputLabel for="clubDropdown" value="#{msg['club.name']} :"/>
            <p:selectOneMenu id="clubDropdown" value="#{clubC.selectedClubId}">
                <f:selectItem itemLabel="-- #{msg['message.selectclub']} --" itemValue="#{null}" noSelectionOption="true"/>
                <f:selectItems value="#{clubC.listClubsDialog('any')}"
                               var="cl"
                               itemLabel="#{cl.clubName}"
                               itemValue="#{cl.idclub}"/>
                <f:validateBean disabled="true"/>
                <p:ajax event="change" update="panel1" process="@this"/>
            </p:selectOneMenu>

            <!-- ── Course dropdown (hidden for tarif-only purposes) ────────── -->
            <p:outputLabel
                rendered="#{selectionContextBean.purpose.code ne 'CreateTarifMember' and selectionContextBean.purpose.code ne 'CreateTarifGreenfee'}"
                for="courseDropdown"
                value="#{msg['course.name']} :"/>
            <p:selectOneMenu id="courseDropdown"
                rendered="#{selectionContextBean.purpose.code ne 'CreateTarifMember' and selectionContextBean.purpose.code ne 'CreateTarifGreenfee'}"
                value="#{clubC.selectedCourseId}">
                <f:selectItem itemLabel="-- #{msg['message.selectcourse']} --" itemValue="#{null}" noSelectionOption="true"/>
                <f:selectItems value="#{clubC.coursesForSelect}"
                               var="c"
                               itemLabel="#{c.courseName}"
                               itemValue="#{c.idcourse}"/>
                <f:validateBean disabled="true"/>
            </p:selectOneMenu>

        </p:panelGrid>

        <div class="btn-group" style="margin-top:1rem;">
            <p:commandButton
                value="#{selectionContextBean.purpose.code eq 'ChartRound' or selectionContextBean.purpose.code eq 'ChartCourse' ? 'Chart' : msg['button.select']}"
                id="selectButton"
                icon="#{selectionContextBean.purpose.code eq 'ChartRound' or selectionContextBean.purpose.code eq 'ChartCourse' ? 'pi pi-chart-bar' : 'pi pi-check'}"
                ajax="false"
                action="#{clubC.clubAndCourseAction()}"/>

            <p:commandButton
                value="#{msg['course.travel']}"
                id="selectTravel"
                icon="pi pi-map-marker"
                ajax="false"
                rendered="#{selectionContextBean.purpose.code eq 'ChartRound' or selectionContextBean.purpose.code eq 'ChartCourse'}"
                action="#{clubC.selectTravel(null)}"/>
        </div>

    </p:panel>
    </div>
</h:form>

</ui:define>
</ui:composition>
