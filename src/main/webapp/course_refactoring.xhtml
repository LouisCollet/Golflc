<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Course Refactoring </ui:define>
<ui:define name="content">
<h:graphicImage name="images/activate1.jpg" alt="image missing :golf_register.jpg" style="float:left;"></h:graphicImage>
<h:graphicImage name="images/activate2.jpg" alt="image missing :golf_register.jpg" style="float:right;"></h:graphicImage>
    <!-- -->
<h:form id="courseForm">
    <p:commandButton value="Rafraîchir"
                     action="#{courseBean.refreshCourses}"
                     update="dataTableCourses" />
    <p:dataTable id="dataTableCourses"
                 value="#{courseBean.courses}"
                 var="c" >
        <p:column headerText="Club">
            #{c.club.clubName}
        </p:column>
        <p:column headerText="Course">
            #{c.course.courseName}
        </p:column>
        <p:column headerText="Tee">
            #{c.tee.idtee}
        </p:column>
    </p:dataTable>
</h:form>

</ui:define>
</ui:composition>
