<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Select Professional With Club</ui:define>

<ui:define name="content">

    <h:form id="form_selectProWithClub">

        <c:set var="idplayer" value="#{playerC.player.idplayer}"/>

        <div class="login-container" style="min-height:auto; align-items:flex-start;">
            <p:panel styleClass="login-card form-card" style="max-width:100%;">
                <f:facet name="header">
                    <h1>#{msg['message.selectclub']} pour un pro</h1>
                </f:facet>

                <p:dataTable id="courses"
                             value="#{clubC.listProfessionalForClub()}"
                             var="c"
                             emptyMessage="#{msg['message.table.empty']}"
                             rowKey="#{c.player.idplayer}"
                             styleClass="compact-table">

                    <p:column id="colClubName"
                              headerText="#{msg['club.name']}"
                              width="20%"
                              filterMatchMode="contains"
                              filterBy="#{c.club.clubName}"
                              sortBy="#{c.club.clubName}"
                              groupRow="true">
                        <h:outputText value="#{c.club.clubName} (#{c.club.idclub})"/>
                    </p:column>

                    <p:column id="colProName"
                              toggleable="false"
                              headerText="#{msg['professional.name']}"
                              width="20%"
                              filterMatchMode="contains"
                              sortBy="#{c.player.playerLastName}"
                              filterBy="#{c.player.playerLastName}">
                        <h:outputText value="#{c.player.playerLastName}, #{c.player.playerFirstName} (#{c.player.idplayer})"/>
                    </p:column>

                    <p:column id="colProAmount"
                              toggleable="false"
                              headerText="#{msg['professional.amount']}"
                              width="8%">
                        <h:outputText value="#{c.professional.proAmount}"/>
                    </p:column>

                    <p:column headerText=""
                              width="5%">
                        <p:commandButton icon="pi pi-pencil"
                                         styleClass="p-button-text p-button-sm"
                                         title="#{msg['button.edit']}"
                                         update=":form_selectProWithClub:editProAmountDialog"
                                         oncomplete="PF('editProAmountDlg').show()"
                                         process="@this">
                            <f:setPropertyActionListener value="#{c.professional}"
                                                         target="#{clubC.selectedProfessional}"/>
                        </p:commandButton>
                    </p:column>

                    <p:column headerText="#{msg['professional.select']}"
                              width="15%">
                        <p:commandButton id="selectButtonProCreate"
                                         action="#{schedulerC.readLessons(c, idplayer)}"
                                         value="#{msg['button.select']}"
                                         icon="pi pi-check"
                                         process="@this"/>
                    </p:column>

                </p:dataTable>

                <p:dialog id="editProAmountDialog"
                          widgetVar="editProAmountDlg"
                          header="#{msg['professional.amount']}"
                          width="320"
                          modal="true"
                          responsive="true"
                          showEffect="fade"
                          hideEffect="fade">
                    <p:panelGrid layout="flex" columns="2" columnClasses="col1Flex,col2Flex">
                        <p:outputLabel for="@next" value="#{msg['professional.amount']}"/>
                        <p:inputNumber id="editAmount"
                                       value="#{clubC.selectedProfessional.proAmount}"
                                       minValue="0.1"
                                       decimalPlaces="2"
                                       required="true"/>
                        <f:facet name="footer">
                            <div class="btn-group">
                                <p:commandButton value="#{msg['button.save']}"
                                                 icon="pi pi-check"
                                                 styleClass="p-button-success"
                                                 process="editProAmountDialog"
                                                 action="#{clubC.updateProAmount()}"
                                                 update=":form_selectProWithClub:courses,:form_selectProWithClub:growl-msg"
                                                 oncomplete="PF('editProAmountDlg').hide()"/>
                                <p:commandButton value="#{msg['button.cancel']}"
                                                 icon="pi pi-times"
                                                 styleClass="p-button-secondary"
                                                 type="button"
                                                 onclick="PF('editProAmountDlg').hide()"/>
                            </div>
                        </f:facet>
                    </p:panelGrid>
                </p:dialog>

            </p:panel>
        </div>

    </h:form>

</ui:define>
</ui:composition>
