<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">#{msg['menu.tarif.pro']}</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
    <f:facet name="header"><h1>#{msg['menu.tarif.pro']}</h1></f:facet>

<h:form id="tarif_pro_wizard">
 <ui:include src="include/include_summary_pro.xhtml"/>
<p:wizard id="wizardTarifPro"
          widgetVar="tarifProWizard"
          styleClass="tarif-wizard"
          flowListener="#{tarifProC.onFlowProcess}"
          onnext="$('.ui-growl-item').remove(); $('.ui-messages').empty();"
          onback="$('.ui-growl-item').remove(); $('.ui-messages').empty();">

    <ui:include src="include/include_tarif_pro_period.xhtml"/>
    <ui:include src="include/include_tarif_pro_pricing.xhtml"/>

</p:wizard>

</h:form>
</p:panel>
</div>

</ui:define>
</ui:composition>
