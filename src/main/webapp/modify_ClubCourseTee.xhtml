<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Modify Club,Course,Tee,Holes Page </ui:define>
<ui:define name="content">
<script>document.addEventListener('DOMContentLoaded', hideMenuFullWidth);</script>

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header">
    <h1>#{msg['message.selectclub.modify']}</h1>
</f:facet>

<h:form id="modifyClubCourseTee">

<p:dataTable id="modifyClubCourseTee"
             value="#{clubC.listClubsCoursesTees('one_club')}"
             var="c"
             rowIndexVar="row"
             emptyMessage="#{msg['message.table.empty']}"
             filteredValue="#{clubC.filteredCourses}"
             rowHover="true"
             styleClass="compact-table"
             size="small" >

<p:column
     headerText="#"
     style="width:2%"
     id="rrow">
             #{row+1}
</p:column>
        <p:column id="colclubname"
                    headerText="#{msg['club.name']}"
                    width="20%"
                    groupRow="true" >
            #{c.club.clubName}
        </p:column>

        <p:column headerText="#{msg['club.detail']}"
                  groupRow="true"
                  width="7%" >
              <p:commandButton
                id="loadClubDetail"
                actionListener="#{dialogC.showClubDetail(c.club)}"
                value="Show Club #{c.club.idclub}" >
             </p:commandButton>
        </p:column>

        <p:column headerText="#{msg['club.modify']}"
                  groupRow="true"
                  width="7%" >
            <p:commandButton
                id="loadClubModify"
                action="#{clubC.loadClub(c)}"
                value="Modify Club #{c.club.idclub}">
             </p:commandButton>
        </p:column>

        <p:column headerText="#{msg['course.add']}"
                  groupRow="true"
                  style="white-space:pre-line"
                  width="7%" >
            <p:commandButton
                id="addCourse"
                action="#{clubC.addCourse(c)}"
                value="Add Course">
             </p:commandButton>
        </p:column>

<p:column id="colcoursename"
                  headerText="#{msg['course.name']}"
                  style="width:20%"
                  groupRow="true">
        #{c.course.courseName}
        </p:column>

        <p:column headerText="#{msg['course.modify']}"
                  groupRow="true"
                  width="7%" >
            <p:commandButton
                id="loadCourse"
                action="#{clubC.loadCourse(c)}"
                value="Modify Course #{c.course.idcourse}">
             </p:commandButton>
        </p:column>

        <p:column headerText="#{msg['tee.add']}"
                  groupRow="true"
                  width="7%" >
            <p:commandButton
                id="addTee"
                action="#{clubC.addTee(c)}"
                value="Add Tee #{c.course.idcourse}">
             </p:commandButton>
        </p:column>

    <p:column id="colTeeStart"
                  headerText="#{msg['tee.start']}"
                  filterMatchMode="contains"
                  filterBy="#{c.tee.teeStart}"
                  width="15%"  >
         <h:outputText value="#{c.tee.teeStart}" style="color:yellow; font-weight:bold; background-color: grey;" rendered="#{c.tee.teeStart eq 'YELLOW'}"/>
         <h:outputText value="#{c.tee.teeStart}" style="color:red; font-weight:bold" rendered="#{c.tee.teeStart eq 'RED'}"/>
         <h:outputText value="#{c.tee.teeStart}" style="color:blue; font-weight:bold" rendered="#{c.tee.teeStart eq 'BLUE'}"/>
         <h:outputText value="#{c.tee.teeStart}" style="color:orange; font-weight:bold" rendered="#{c.tee.teeStart eq 'ORANGE'}"/>
         <h:outputText value="#{c.tee.teeStart}" style="color:black; font-weight:bold" rendered="#{c.tee.teeStart eq 'BLACK'}"/>
         <h:outputText value="#{c.tee.teeStart}" style="color:white; font-weight:bold; background-color: grey;" rendered="#{c.tee.teeStart eq 'WHITE'}"/>
        #{c.tee.teeGender}/#{c.tee.teeHolesPlayed}
    </p:column>

        <p:column headerText="#{msg['tee.modify']}"
                  width="10%"  >
            <p:commandButton
                id="loadTee"
                value="Modify Tee #{c.tee.idtee} MT=#{c.tee.teeMasterTee} Gender=#{c.tee.teeGender} "
                action="#{clubC.loadTee(c)}">
           </p:commandButton>
        </p:column>

        <p:column headerText="#{msg['tee.master.modify']}"
                  width="10%" >
            <p:commandButton
                id="loadHoleMaster"
                value="Create/Modify Holes #{c.tee.teeMasterTee} (MT)"
                action="#{clubC.loadHoles(c, 'global')}">
             </p:commandButton>
        </p:column>

        <p:column headerText="#{msg['tee.distance.modify']}"
                  width="10%" >
            <p:commandButton
                id="loadHoleDistance"
                rendered="#{c.tee.teeHolesPlayed eq '01-18' and c.tee.teeGender eq 'M'}"
                action="#{clubC.loadHoles(c, 'distance')}"
                value="Create/Modify Holes #{c.tee.teeDistanceTee} (DT)">
             </p:commandButton>
        </p:column>

<f:facet name="footer">
    <p:commandButton value="#{msg['welcome.back']}"
                         id="buttonBack"
                         update="growl-msg"
                         immediate="true"
                         ajax="false"
                         action="welcome.xhtml?faces-redirect=true" >
    </p:commandButton>
</f:facet>
</p:dataTable>
</h:form>
</p:panel>
</div>

</ui:define>
</ui:composition>
