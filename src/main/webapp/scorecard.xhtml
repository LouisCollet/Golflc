<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
       xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Scorecard Page </ui:define>

<ui:define name="content">
<h:graphicImage name="images/golf_score_card.png" alt="image missing :golf_club.jpg" style="float:left;"></h:graphicImage>
<h:graphicImage name="images/golf_score_card.png" alt="image missing :golf_club.jpg" style="float:right;"></h:graphicImage>

<h:form id="scorecard" enctype="application/x-www-form-urlencoded" >
<ui:include src="include/include_summary_round.xhtml"/>

<p:panelGrid
    id="panel"
    layout="tabular"
    columns="2" >

     <f:facet name="footer">
        <p:commandButton value="#{msg['button.scorecard']}"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-map"
                         action="#{courseC.show_scorecard()}"/>
     </f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
