<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Mail 3 </ui:define>

<ui:define name="content">
<h:graphicImage name="images/activate1.jpg" alt="image missing :golf_register.jpg" style="float:left;"></h:graphicImage>
<h:graphicImage name="images/activate2.jpg" alt="image missing :golf_register.jpg" style="float:right;"></h:graphicImage>
    <!-- -->
<h:form id="mailForm">
    <!-- Growl pour afficher les notifications temps réel -->


    <h:panelGrid columns="2" columnClasses="label,value" style="margin-bottom:1em;">
        <h:outputLabel for="to" value="Destinataire:" />
        <p:inputText id="to" value="#{mailController.email}" required="true" />

        <h:outputLabel for="subject" value="Objet:" />
        <p:inputText id="subject" value="#{mailController.subject}" required="true" />

        <h:outputLabel for="body" value="Message:" />
        <p:inputTextarea id="body" value="#{mailController.body}" required="true" rows="5" />
    </h:panelGrid>

    <p:commandButton value="Envoyer Mail"
                     action="#{mailController.sendMail()}"
                     update="growl-msg"
                     icon="pi pi-envelope" />

</h:form>
<!-- WebSocket natif pour notifications temps réel -->
<script type="text/javascript">
    // Créer la connexion WebSocket
    var ws = new WebSocket("ws://" + location.host + "#{request.contextPath}/mailChannel");

    ws.onopen = function() {
        console.log("WebSocket connecté pour notifications mail");
    };

    ws.onmessage = function(event) {
        // Afficher notification via PrimeFaces Growl
        var msg = event.data;
        PF('growl').renderMessage({
            summary: 'Notification Mail',
            detail: msg,
            severity: 'info'
        });
    };

    ws.onclose = function() {
        console.log("WebSocket fermé");
    };
</script>
</ui:define>
</ui:composition>
