<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
       xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Tee Restart Page </ui:define>

<ui:define name="content">

<h:form id="form_debit_credit"  >
<h:graphicImage id="graphic1" name="images/golf_tee.jpg" alt="image missing :golf_tee.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage id="graphic2" name="images/golf_tee.jpg" alt="image missing :golf_tee.jpg" style="float: right;"></h:graphicImage>
<p:panelGrid
    id="panel1"
    layout="tabular"
    columns="2"
 >
 <f:facet name="header">
  <h1>Bill Payment CDI Event Tutorial </h1>
 </f:facet>
	<p:outputLabel value="Amount: " for="amt" />
	<p:inputText id="amt" value="#{paymentBean.amount}"
                     required="true"
		requiredMessage="An amount is required."
                maxlength="15"
                />

	<h:outputLabel value="Payment Options:" for="opt" />
	<p:selectOneRadio id="opt" value="#{paymentBean.paymentOption}"
		required="true"
                layout="lineDirection"
                requiredMessage="Select Credit Operation or Debit Operation">
		<f:selectItem id="credit" itemLabel="Credit Operation (+)" itemValue="CREDIT" />
		<f:selectItem id="debit"  itemLabel="Debit Operation (-)"  itemValue="DEBIT" />
	</p:selectOneRadio>

<f:facet name="footer">
        <p:commandButton id="submit" 
                         value="Pay"
                          
                         action="#{paymentBean.pay()}" 
                         update="table1"
                         style="float: left;" />
	<p:commandButton value="Reset" 
                          
                         action="#{paymentHandler.setPaymentsNull()}"
                         style="float: right;"  />
	
</f:facet>
</p:panelGrid>
        
 <p:panelGrid
    id="panel2"
    layout="tabular"
    columns="4"
    >
 <f:facet name="header">
    <h1>Payment Handler Output</h1>
 </f:facet>
 <p:dataTable id="table1"
              var="c"
              value="#{paymentHandler.payments}"
              emptyMessage="#{msg['message.table.empty']}"
              rendered="#{not empty payments}"
          >
<p:column headerText="Date" >
      <h:outputText value="#{c.datetime}"> 
                <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm:ss" />
      </h:outputText>
 </p:column>

<p:column headerText="Movement"  >
      <h:outputText value="#{c.type}"/> 
 </p:column>

 <p:column headerText="Amount" >     
      <h:outputText value="#{c.amount}"/> 
 </p:column>

<p:column headerText="TOTAL" >
      <h:outputText value="#{c.total}"/> 
 </p:column>
</p:dataTable>

</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
