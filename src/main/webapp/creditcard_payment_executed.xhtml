<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Credit Card Payment Executed</ui:define>
<ui:define  name="meta">
        <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
</ui:define>
<script>
    history.pushState(null, "", location.href);
    window.onpopstate = function () { history.go(1); };
</script>

<ui:define name="content">
<f:metadata>
    <f:viewParam name="nonce" value="#{payC.completionNonce}" />
    <f:event type="preRenderView" listener="#{payC.onPaymentCompleted()}" />
</f:metadata>
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header"><h1>#{msg['title.payment.executed']}</h1></f:facet>

<h:form id="creditcard_payment_executed">

 <p:panelGrid
    id="panelGrid1"
    columns="2"
    layout="flex"
    columnClasses="col1Flex,col2Flex">

    <h:outputText  id="Total"
                value="#{msg['creditcard.amountpaid']} :" />
    <h:outputText  id="TotalPrice"
                value="#{payC.creditcard.totalPrice}"
                style="font-size: 3rem;" />

    <h:outputText value="#{msg['tarif.members.currency']} :" />
    <h:outputText value="#{payC.creditcard.creditcardCurrency}"
                  style="font-size: 2em;" />

    <h:outputText value="#{msg['creditcard.communication']} :" />
    <h:outputText id="Communication"
                  value="#{payC.creditcard.communication}"
                  title="#{msg['tooltip.club.clubaddress']}" />

    <h:outputText value="#{msg['creditcard.holder']} :" />
    <h:outputText  id="Holder"
                   value="#{payC.creditcard.creditcardHolder}" />

    <h:outputText  value="#{msg['creditcard.number']} :"/>
    <h:outputText  id="creditcardNumber"
                   value="#{payC.creditcard.creditCardNumberSecret}" />

    <h:outputText id="communication"
                  value="#{msg['creditcard.reference']} : "/>
    <h:outputText id="taskResult"
                  value="#{payC.creditcard.creditcardPaymentReference}"/>

    <f:facet name="footer">
        <div class="btn-group" style="justify-content:center;">
         <p:commandButton value="Back to Welcome screen"
                         id="commandButtonReturn"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-home"
                         rendered="#{not roundC.otherPlayersPaymentFlow}"
                         action="welcome.xhtml?faces-redirect=true" />
         <p:commandButton value="#{msg['button.back.inscriptions']}"
                         id="commandButtonReturnInscriptions"
                         ajax="false"
                         immediate="true"
                         icon="pi pi-users"
                         rendered="#{roundC.otherPlayersPaymentFlow}"
                         action="#{roundC.returnToOtherPlayers()}" />
         <p:commandButton value="Back"
                          icon="pi pi-arrow-left"
                          styleClass="ui-button-secondary"
                          onclick="window.history.back();"/>
        </div>
    </f:facet>
</p:panelGrid>
</h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
