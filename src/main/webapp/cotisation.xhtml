<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml" >
<ui:define name="title">Cotisation Membre</ui:define>
<ui:define name="content">

<h:form id="cotisation">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header"><h1>#{msg['title.cotisation.choice']}</h1></f:facet>

<ui:include src="include/include_summary_cotisation.xhtml"/>

<p:dataTable var="item"
             value="#{memC.tarifMember.basicList}"
             rowIndexVar="row"
             emptyMessage="#{msg['message.table.empty']}"
             styleClass="compact-table">
     <f:facet name="header">
         <h1>#{msg['title.cotisation.choice']}</h1>
</f:facet>

       <p:column headerText="#{msg['tarif.members.item']} "
                 width="12%" >
                <h:outputText value="#{item.item}" />
       </p:column>
       <p:column headerText="#{msg['tarif.members.price']} "
                 width="12%" >
                <h:outputText value="#{item.price}" />
       </p:column>
       <p:column headerText="#{msg['tarif.members.rangeage']} "
                 width="12%" >
           <h:outputText value="#{item.range}" />
       </p:column>
       <p:column headerText="#{msg['tarif.members.choice']}"
                 width="12%"
                 id="ChoiceBasic">
        <p:inputNumber
                       value="#{item.quantity}"
                       minValue="0"
                       maxValue="4"
                       required="true"
                       size="1"
                       emptyValue="0"
                       title="#{msg['tooltip.tarif.choice']}"
                       decimalPlaces="0" />
       </p:column>
</p:dataTable>

<p:dataTable var="item"
             value="#{memC.tarifMember.equipmentsList}"
             rowIndexVar="row"
             emptyMessage="#{msg['message.table.empty']}"
             styleClass="compact-table" >

      <f:facet name="header">
         <h1>#{msg['title.equipments.choice']}</h1>
</f:facet>

       <p:column headerText="#{msg['tarif.members.item']} "
                 width="12%" >
                <h:outputText value="#{item.item}" />
       </p:column>
       <p:column headerText="#{msg['tarif.members.price']} "
                 width="12%" >
                <h:outputText value="#{item.price}" />
       </p:column>
       <p:column headerText="#{msg['tarif.season']} "
                 width="12%" >
           <h:outputText value="#{item.season}" />
       </p:column>
       <p:column headerText="#{msg['tarif.members.choice']}"
                 width="12%"
                 id="ChoiceEquipment">
           <p:inputNumber
                       value="#{item.quantity}"
                       minValue="0"
                       maxValue="4"
                       required="true"
                       size="1"
                       emptyValue="0"
                       title="#{msg['tooltip.tarif.choice']}"
                       decimalPlaces="0" />
       </p:column>

   <f:facet name="footer">
        <p:commandButton value="#{msg['payment.selected']}"
                        id="commandButtonManage"
                        ajax="false"
                        update="growl-msg"
                        icon="pi pi-undo"
                        action="#{payC.manageCotisation()}"/>
   </f:facet>
</p:dataTable>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
