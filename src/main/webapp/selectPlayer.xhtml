<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:o="omnifaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Player List Page</ui:define>
<ui:define name="content">

  <h:outputStylesheet library="styles" name="flags/flags.css" />
  <h:form id="selectPlayer_form">

    <div class="login-container">
      <p:panel styleClass="login-card">
        <f:facet name="header">
            <h:outputText value="#{msg['message.playerslist']}" />
        </f:facet>

        <!-- =================== INCLUDE PLAYER SELECTOR =================== -->
        <h:panelGroup layout="block" style="display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap;">
            <ui:include src="include/include_player_selector.xhtml">
                <ui:param name="playerPurpose" value="login"/>
                <ui:param name="playerLabel" value="#{msg['player.id']}"/>
            </ui:include>
        </h:panelGroup>

        <p:divider layout="horizontal" type="solid"/>

        <p:commandButton id="togglePlayerList"
                         value="#{msg['message.playerslist']}"
                         icon="pi pi-list"
                         action="#{playerC.togglePlayerList()}"
                         update="playerListWrapper"
                         style="width:100%; margin-bottom:0.5em;" />

      </p:panel>
    </div>

    <!-- =================== PLAYER LIST (outside card, full width) =================== -->
    <h:panelGroup id="playerListWrapper">
    <h:panelGroup id="playerListPanel" rendered="#{playerC.showPlayerList}">

    <p:dataTable id="table_players"
                 value="#{playerC.listPlayers()}"
                 var="c"
                 rowIndexVar="row"
                 rowStyleClass="#{(row mod 5) eq 0 ? 'highlight' : null}"
                 filterBy="#{techC.filterMeta}"
                 lazy="false"
                 rowHover="true"
                 rowKey="#{c.player.idplayer}"
                 selectionMode="single"
                 selection="#{playerC.selectedPlayerEPP}" >

        <p:ajax event="rowSelect"
                update=":selectPlayer_form:playerDetail"
                oncomplete="PF('playerDialog').show()"/>

        <f:facet name="emptyMessage">
            <div style="text-align: center; padding: 20px;">
                <i class="pi pi-info-circle" style="font-size: 2rem;"></i>
                <p>#{msg['message.table.empty']}</p>
                <h2 style="color: red;">Please check if MySQL is available !!</h2>
            </div>
        </f:facet>

        <f:facet name="loadingMessage">
            <div style="text-align: center; padding: 20px;">
                <i class="pi pi-spin pi-spinner" style="font-size: 2rem;"></i>
                <p>Chargement en cours...</p>
            </div>
        </f:facet>

        <f:facet name="header">
            <p:commandButton id="toggler"
                             type="button"
                             value="Columns"
                             style="float:right"
                             icon="pi pi-table"
                             global="true"/>
            <h:outputText escape="false" value="#{msg['message.playerslist']}" />
            <p:columnToggler
                id="id001"
                datasource="table_players"
                trigger="toggler" />
        </f:facet>

        <p:column headerText="#" footerText="#" width="3%" id="rrow">
            #{row+1}
        </p:column>

        <p:column id="colPlayerSelected"
                  toggleable="false"
                  headerText="#{msg['player.selected']}"
                  footerText="#{msg['player.selected']}"
                  style="width:20%" >
            <p:commandButton id="selectButton"
                             action="#{playerC.selectPlayer(c)}"
                             value="#{msg['button.select']} - #{c.player.idplayer}"
                             title="Choix du player"
                             icon="pi pi-sign-in" />
        </p:column>

        <p:column id="col001"
                  toggleable="false"
                  headerText="#{msg['player.firstname']}"
                  footerText="#{msg['player.firstname']}"
                  style="width:20%" >
            <h:outputText value="#{c.player.playerFirstName}" />
        </p:column>

        <p:column id="col002"
                  toggleable="false"
                  headerText="#{msg['player.lastname']}"
                  footerText="#{msg['player.lastname']}"
                  width="20%"
                  filterMatchMode="contains"
                  sortBy="#{c.player.playerLastName}"
                  filterBy="#{c.player.playerLastName}" >
            <h:outputText value="#{c.player.playerLastName}" />
        </p:column>

        <ui:include src="include/include_thumbnails.xhtml"/>

        <p:column id="col004"
                  headerText="#{msg['address.country.code']}"
                  footerText="#{msg['address.country.code']}"
                  style="width:20%" >
            <h:outputText value="#{c.player.address.country.extendedName}" />
        </p:column>

    </p:dataTable>

    <!-- Player Detail Dialog -->
    <p:dialog header="Player Info"
              widgetVar="playerDialog"
              modal="true"
              style="width:90%;"
              showEffect="fade"
              hideEffect="fade"
              resizable="false">
        <p:outputPanel id="playerDetail" style="text-align:center;">
            <p:panelGrid columns="2"
                         layout="tabular"
                         style="font-size:0.8rem;"
                         columnClasses="col1,col2">
                <h:outputText value="First Name:"/>
                <h:outputText value="#{playerC.selectedPlayerEPP.player.playerFirstName}" />
                <h:outputText value="Last Name:"/>
                <h:outputText value="#{playerC.selectedPlayerEPP.player.playerLastName}" />
                <h:outputText value="Birth date:"/>
                <h:outputText value="#{playerC.selectedPlayerEPP.player.playerBirthDate}" >
                    <f:convertDateTime type="localDateTime" pattern="dd-MM-yyyy"/>
                </h:outputText>
                <h:outputText value="Email:"/>
                <h:outputText value="#{playerC.selectedPlayerEPP.player.playerEmail}" />
                <h:outputText value="Home Club:"/>
                <h:outputText value="#{playerC.selectedPlayerEPP.player.playerHomeClub}" />
                <h:outputText value="Player ID:"/>
                <h:outputText value="#{playerC.selectedPlayerEPP.player.idplayer}" />
                <h:outputText value="address:"/>
                <h:outputText value="#{playerC.selectedPlayerEPP.player.address.street},#{playerC.selectedPlayerEPP.player.address.city}" />
                <h:outputText value="Date last modification"/>
                <h:outputText value="#{playerC.selectedPlayerEPP.player.playerModificationDate}" >
                    <f:convertDateTime type="dateDateTime" pattern="dd-MM-yyyy HH:mm:ss"/>
                </h:outputText>
                <h:outputText value="Country Flag"/>
                <span class="flag flag-#{playerC.selectedPlayerEPP.player.address.country.code.toLowerCase()}"
                      style="width: 30px; height: 20px"/>
                <h:outputText value="Country"/>
                <h:outputText value="#{playerC.selectedPlayerEPP.player.address.country.extendedName}
                              ( #{playerC.selectedPlayerEPP.player.address.country.code} )" />
            </p:panelGrid>
        </p:outputPanel>
    </p:dialog>

    </h:panelGroup>
    </h:panelGroup>

  </h:form>
</ui:define>
</ui:composition>
