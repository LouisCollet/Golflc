<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Unavailable Menu Page</ui:define>
<ui:define name="content">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
    <p:panel styleClass="login-card form-card">
        <f:facet name="header">
            <h1>#{msg['title.unavailable.structure']}</h1>
        </f:facet>

        <h:form id="start_unavailable_menu">
        </h:form>

        <ui:include src="/include/include_dialog_club_course.xhtml"/>

        <h:panelGroup id="wrapperPanel">
            <h:panelGroup id="tableRenderPanel"
                          rendered="#{clubC.unavailable.structure.menuLaunched eq true}">
                <ui:include src="include/include_summary_club.xhtml"/>
            </h:panelGroup>
        </h:panelGroup>

        <h:form id="unavailable_menu">
            <p:panelMenu id="panel_menu"
                         style="font-size: 1.0em; width:400px; margin:auto;"
                         rendered="#{clubC.unavailable.structure.menuLaunched eq true}"
                         statefulGlobal="true">
                <p:submenu label="Input Etat du terrain"
                           icon="ui-icon-wrench"
                           expanded="true"
                           style="font-size: .8em;font-weight:bold;">
                    <p:submenu label="1. Create Structure Etat du terrain"
                               expanded="true"
                               style="font-size: 1.2em;font-weight:bold;">
                        <p:menuitem value="Structure = "
                                    icon="pi pi-calendar"
                                    outcome="unavailable_structure.xhtml"/>
                    </p:submenu>

                    <p:submenu label="2. Create Periods Etat du terrain"
                               expanded="true"
                               style="font-size: 1.2em;"
                               rendered="#{clubC.unavailable.structure.structureExists eq true}">
                        <p:menuitem value="Periods = "
                                    icon="pi pi-cog"
                                    outcome="unavailable_period.xhtml"/>
                    </p:submenu>

                    <p:submenu label="3. Delete Structure Etat du terrain"
                               expanded="true"
                               style="font-size: 1.2em; margin:auto;color:red">
                        <p:menuitem value="Delete tarifs in one shot">
                            <p:commandButton
                                id="deleteButton"
                                style="color:red"
                                action="#{clubC.modifyClubUnavailableStructure('delete')}"
                                value="#{msg['button.delete']} #{clubC.club.clubName}"
                                icon="pi pi-trash">
                                <p:confirm icon="pi pi-exclamation-triangle"/>
                            </p:commandButton>
                        </p:menuitem>
                    </p:submenu>
                </p:submenu>
            </p:panelMenu>
        </h:form>

        <ui:include src="include/include_confirmDialog.xhtml"/>
    </p:panel>
</div>

</ui:define>
</ui:composition>
