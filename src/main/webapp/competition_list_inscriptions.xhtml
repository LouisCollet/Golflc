<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">List Inscriptions Competition Page </ui:define>
<ui:define name="content">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header"><h1>#{msg['competition.inscriptions.title']}</h1></f:facet>

<h:form id="competition_list_inscriptions">
<ui:include src="include/include_summary_competition.xhtml"/>

<p:dataTable id="competition"
             value="#{roundC.listInscriptionsCompetition()}"
             rowIndexVar="row"
             resizableColumns="true"
             var="c"
             emptyMessage="#{msg['message.table.inscriptions.competition.empty']}"
             styleClass="compact-table"
             >

 <f:facet name="header">
    <h1>#{msg['competition.inscriptions.title']}</h1>
    <h2>#{roundC.competition.competitionDescription.competitionName} </h2>
</f:facet>

        <p:column headerText="#{msg['competition.start.asked']}"
                  width="12%"
                  id="rdate">
            <h:outputText value="#{c.competitionData.cmpDataAskedStartTime}" />
	</p:column>

        <p:column headerText="#{msg['competition.data.id']}"
                  width="12%"
                  id="DataId">
            <h:outputText value="
                           id=#{c.competitionData.cmpDataId}
                          ,ro=#{c.competitionData.cmpDataRoundId}
                          ,fl=#{c.competitionData.cmpDataFlightNumber}
                          "   />
	</p:column>

        <p:column headerText="#{msg['player.id']}"
                  width="12%"
                  id="PlayerId">
            <h:outputText value="#{c.competitionData.cmpDataPlayerId}" />
	</p:column>

        <p:column headerText="#{msg['player.first.last']}"
                  width="12%"
                  id="FirstLastName">
            <h:outputText value="#{c.competitionData.cmpDataPlayerFirstLastName}" />
	</p:column>
        <p:column headerText="#{msg['competition.inscription.canceled']}"
                  width="18%"
                  style="color:red"
                  id="cancelCompetition">
            <p:commandButton
                id="cancelButton"
                action="#{roundC.cancelInscriptionCompetition(c)}"
                rendered="#{playerC.player.idplayer eq c.competitionData.cmpDataPlayerId}"
                value="#{msg['button.delete']} - #{c.competitionData.cmpDataPlayerId}"
                icon="pi pi-trash"
                style="color:red"
                >
                <p:confirm  header="#{msg['message.confirm.delete']}"
                           message="#{msg['message.confirm.delete']} #{c.competitionData.cmpDataPlayerId}"
                           icon="pi pi-exclamation-triangle" />
           </p:commandButton>
            <p:commandButton
                id="cancelButtonempty"
                rendered="#{playerC.player.idplayer ne c.competitionData.cmpDataPlayerId}"
                style="color:red"
                icon="pi pi-ban"
                >
           </p:commandButton>
	</p:column>
       <p:column headerText="#{msg['handicap.whs']}"
                 width="12%"
                 id="Handicap">
           <h:outputText value="#{c.competitionData.cmpDataHandicap}" />
	</p:column>

<f:facet name="footer">
Nombre d'inscrits : #{roundC.listInscriptionsCompetition().size()}
</f:facet>

</p:dataTable>
<ui:include src="include/include_confirmDialog.xhtml"/>
</h:form>

</p:panel>
</div>

</ui:define>
</ui:composition>
