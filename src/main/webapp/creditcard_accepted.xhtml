<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">

    <ui:define name="title">Payment</ui:define>

    <ui:define name="content">
    <div class="login-container" style="min-height:auto; align-items:flex-start;">
    <p:panel styleClass="login-card form-card">
    <f:facet name="header"><h1>#{msg['creditcard.amounttobepaid']}</h1></f:facet>

        <c:if test="#{payC.creditcard.typePayment eq 'GREENFEE'}">
            <ui:include src="include/include_summary_round.xhtml"/>
        </c:if>
        <c:if test="#{payC.creditcard.typePayment eq 'SUBSCRIPTION'}">
            <ui:include src="include/include_subscription.xhtml"/>
        </c:if>
        <c:if test="#{payC.creditcard.typePayment eq 'COTISATION'}">
            <ui:include src="include/include_summary_club.xhtml"/>
        </c:if>

        <h:form id="creditcard_accepted">
            <p:card styleClass="pay-card">

                <f:facet name="header">
                    <div class="pay-hero">
                        <span class="pay-hero-label">
                            <h:outputText value="#{msg['creditcard.amounttobepaid']}"/>
                        </span>
                        <span class="pay-hero-amount">
                            <h:outputText value="#{payC.creditcard.totalPrice}"/>
                        </span>
                        <span class="pay-hero-currency">
                            <h:outputText value="#{payC.creditcard.creditcardCurrency}"/>
                        </span>
                    </div>
                </f:facet>

                <p:panelGrid columns="2" layout="flex"
                             styleClass="pay-grid"
                             columnClasses="pay-grid-key,pay-grid-val">

                    <h:outputText value="#{msg['creditcard.communication']}"/>
                    <h:outputText value="#{payC.creditcard.communication}"
                                  title="#{msg['tooltip.club.clubaddress']}"/>

                    <h:outputText value="#{msg['creditcard.holder']}"/>
                    <h:outputText value="#{payC.creditcard.creditcardHolder}"/>

                    <h:outputText value="#{msg['creditcard.number']}"/>
                    <h:outputText value="#{payC.creditcard.creditCardNumberSecret}"
                                  styleClass="pay-mono"/>
                    <h:outputText value="#{msg['creditcard.type']}"/>
                    <h:outputText value="#{payC.creditcard.creditcardType}"/>

                    <h:outputText value="#{msg['creditcard.expirationdate']}"/>
                    <h:outputText value="#{payC.creditcard.creditCardExpirationDateString}"
                                  styleClass="pay-mono"/>

                </p:panelGrid>

                <f:facet name="footer">

                    <div class="pay-progress-wrap">
                        <p:progressBar id="progressBar2"
                                       widgetVar="pbAjax"
                                       ajax="true"
                                       labelTemplate="{value}%"
                                       value="#{payC.progress1}"
                                       styleClass="pay-progressbar"
                                       global="false"
                                       interval="1000">
                            <p:ajax event="complete"
                                    listener="#{payC.onCompletePayment()}"
                                    oncomplete="PF('startButton2').disable()"/>
                            <p:ajax event="start"
                                    listener="#{payC.onStart}"/>
                        </p:progressBar>
                    </div>

                    <div class="pay-actions">
                        <p:commandButton id="startButton"
                                         widgetVar="startButton2"
                                         value="#{msg['creditcard.payment']}"
                                         type="button"
                                         icon="pi pi-check"
                                         styleClass="pay-btn-pay"
                                         rendered="#{payC.creditcard.paymentOK eq false}"
                                         onclick="PF('startButton2').disable();PF('pbAjax').start();"/>

                        <p:commandButton id="cmdCancel"
                                         value="#{msg['payment.cancel']}"
                                         icon="pi pi-undo"
                                         styleClass="pay-btn-cancel ui-button-outlined"
                                         action="#{payC.cancelProgress()}"
                                         update="growl-msg"
                                         oncomplete="PF('pbAjax').cancel();PF('startButton2').enable()"/>
                    </div>

                </f:facet>

            </p:card>
        </h:form>

    </p:panel>
    </div>
    </ui:define>
</ui:composition>
