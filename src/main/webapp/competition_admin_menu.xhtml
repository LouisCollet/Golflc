<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:my="jakarta.faces.composite/components"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Competition Menu </ui:define>
<ui:define name="content">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header"><h1>Competition Menu</h1></f:facet>

<h:form id="competition_menu" >

 <my:summaryCompetition
    competition="#{roundC.competition.competitionDescription}"
    tee="#{clubC.tee}"
    droppedPlayers="#{playerC.player.droppedPlayers}" />

<p:panelMenu id="panel_menu"
             style="font-size: 1.5rem;">
    <p:submenu
            id="submenu"
            expanded="true"
            label="Choisissez l'action à exécuter"
            icon="pi pi-check"
            style="font-size: 1.5rem;"
       >
         <p:menuitem value ="Competition Status = #{roundC.competition.competitionDescription.competitionStatus}"
                     icon="pi pi-calendar"
                     disabled="true"/>
         <p:menuitem value ="#{msg['competition.inscriptionslist']}"
                     action="#{roundC.beforeListInscriptionsCompetition(roundC.competition.competitionDescription)}"
                     style="font-size: 1.0rem;"
                     title="#{msg['tooltip.inscriptions.on']}"
                     icon="pi pi-calendar" />
         <p:menuitem value="#{msg['competition.startinglist.provisional']}"
                     action="#{roundC.beforeListStartCompetition(roundC.competition.competitionDescription,'PROVISIONAL')}"
                     style="font-size: 1.0rem;"
                     title="#{msg['tooltip.inscriptions.provisional']}"
                     icon="pi pi-sun"/>
         <p:menuitem value="#{msg['competition.startinglist.final']}"
                     rendered="#{roundC.competition.competitionDescription.competitionStatus eq '1'}"
                     action="#{roundC.beforeListStartCompetition(roundC.competition.competitionDescription, 'FINAL')}"
                     title="#{msg['tooltip.inscriptions.final']}"
                     icon="pi pi-sun"/>
         <p:menuitem value ="#{msg['competition.rounds']}"
                     rendered="#{roundC.competition.competitionDescription.competitionStatus eq '1'}"
                     action="#{roundC.createRoundsCompetition(roundC.competition.competitionDescription)}"
                     style="font-size: 1.0rem;"
                     title="tooltip.competition.score"
                     icon="pi pi-clock" />
         <p:menuitem value ="#{msg['competition.score']}"
                     action="#{roundC.beforeListStartCompetition(roundC.competition.competitionDescription,'PROVISIONAL')}"
                     rendered="#{roundC.competition.competitionDescription.competitionStatus eq '3'}"
                     title="tooltip.competition.score"
                     style="font-size: 1.0rem;"
                     icon="pi pi-clock" />
         <p:menuitem value ="#{msg['competition.classment.calculate']}"
                     action="#{roundC.listParticipantsStablefordCompetition(roundC.competition.competitionDescription)}"
                     rendered="#{roundC.competition.competitionDescription.competitionStatus eq '4'}"
                     title="tooltip.competition.score"
                     style="font-size: 1.0rem;"
                     icon="pi pi-clock" />
        </p:submenu>
</p:panelMenu>

</h:form>

</p:panel>
</div>

</ui:define>
</ui:composition>
