<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Modify Global Holes Distance </ui:define>
<ui:define name="content">
<script>document.addEventListener('DOMContentLoaded', hideMenuFullWidth);</script>
<style>
    /* Polices reduites pour tenir les 19 colonnes sans scroll horizontal */
    #form_modify_holes_distance .ui-panelgrid { width: 100%; font-size: 0.70rem; }
    #form_modify_holes_distance .ui-inputnumber { width: 100%; }
    #form_modify_holes_distance .ui-inputfield { font-size: 0.70rem; padding: 0.2rem; text-align: center; }
    #form_modify_holes_distance #panelgrid2 .ui-button { font-size: 0.70rem; padding: 0.3rem 0.5rem; }
    #form_modify_holes_distance #panelgrid4 .ui-button { font-size: 1.0rem; }
</style>
<h:form id="form_modify_holes_distance">
    <ui:include src="include/include_summary_club.xhtml"/>

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header">
    <h1>#{msg['hole.distance']}</h1>
</f:facet>

<p:panelGrid id="panelgrid2"
             layout="flex"
             columns="19"
             style="text-align:center;"
             >
<h:outputText value="#{msg['hole.number']}" style="font-weight:bold;" />
    <c:forEach var="i" begin="01" end="18" step="1">
             <h:outputText  id="holenumber${i}"
                    style="font-weight:bold;"
                    value="#{clubC.holesGlobal.dataHoles[i-1][0]}" />
    </c:forEach>

  <h:outputText value="#{msg['hole.distance']}" style="font-weight:bold;" />
     <c:forEach var="i" begin="01" end="18" step="1">
       <p:inputNumber  id="distance${i}"
                    label="Hole Distance"
                    value="#{clubC.holesGlobal.dataHoles[i-1][3]}"
                    size="3"
                    maxValue="550"
                    emptyValue="0"
                    decimalPlaces="0"
                    required="true"
                    requiredMessage="#{msg['hole.distance.notnull']} : #{i}"
                    validatorMessage="#{msg['hole.distance.minMAX']} : #{i}" >
            <f:validateLongRange minimum="70" maximum="550" />
      </p:inputNumber>
    </c:forEach>

</p:panelGrid >

<p:panelGrid
    id="panelgrid4"
    layout="flex"
    columnClasses="col1Flex,col2Flex"
    columns="2">
<f:facet name="footer">
        <p:commandButton
                         id="buttonCreate"
                         value="#{msg['button.holes.create']}"
                         update="growl-msg"
                         ajax="false"
                         icon="pi pi-database"
                         action="#{clubC.createHolesGlobal('distance')}" />

       <p:commandButton
                         id="buttonBack"
                         value="#{msg['welcome.back']}"
                         immediate="true"
                         ajax="false"
                         action="modify_ClubCourseTee.xhtml?faces-redirect=true" />
</f:facet>
</p:panelGrid>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
