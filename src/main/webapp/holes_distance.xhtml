<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
       xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Modify Global Holes Distance </ui:define>
<ui:define name="content">
<h:graphicImage name="images/golfcard.png" alt="image missing :golf_round.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage name="images/golfcard.png" alt="image missing :golf_round.jpg" style="float: right;"></h:graphicImage>
<h:form id="form_modify_holes_distance"  >
    <ui:include src="include/include_summary_club.xhtml"/>
<p:panelGrid id="panelgrid2"
             layout="tabular"
             columns="19"
             style="text-align:center;"
             columnClasses="col1,col2" >
<!--  complète 1ere ligne avec numéros de trou -->
<h:outputText value="#{msg['hole.number']}"   />
    <c:forEach var="i" begin="01" end="18" step="1">
             <h:outputText  id="holenumber${i}"
                    style="font-size:1.5rem;"
                    value="#{clubC.holesGlobal.dataHoles[i-1][0]}" />
    </c:forEach>
 
   <!--  complète 2e ligne avec distance -->
  <p:outputLabel for="@next" 
                 value="#{msg['hole.distance']}"   />
     <c:forEach var="i" begin="01" end="18" step="1">
       <p:inputNumber  id="distance${i}"
                    label="Hole Distance"
                    value="#{clubC.holesGlobal.dataHoles[i-1][3]}"
                    size="3"
                
                    emptyValue="0"
                    decimalPlaces="0"
                    required="true"
                    requiredMessage="#{msg['hole.distance.notnull']} : #{i}"
                    validatorMessage="#{msg['hole.distance.minMAX']} : #{i}" >
            <f:validateLongRange minimum="70" maximum="550" />
      </p:inputNumber>
    </c:forEach>
  
</p:panelGrid >

<p:panelGrid 
    id="panelgrid4"
    layout="tabular"
    columnClasses="col1,col2"
    columns="2">
<f:facet name="footer">
    <!--   -->
  <!--      <p:commandButton 
                         id="buttonModify"
                         value="#{msg['button.holes.modify']}"
                         update="growl-msg"
                         ajax="false"
                          
                         icon="pi pi-database"
                         action="#{courseC.modifyHolesGlobal}"
           />
  -->
        <p:commandButton 
                         id="buttonCreate"
                         value="#{msg['button.holes.create']}"
                         update="growl-msg"
                         ajax="false"
                          
                         icon="pi pi-database"
                         action="#{courseC.createHolesGlobal('distance')}" />
</f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
