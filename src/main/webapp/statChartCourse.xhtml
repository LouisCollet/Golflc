<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Statistics Chart Course</ui:define>
<ui:define name="content">

<h:form id="stat_course_form" >

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
<f:facet name="header">
    <h1>Statistics Chart Course</h1>
</f:facet>

          <p:chart
              value="#{clubC.getLineModelCourse()}"
              style="width: 100%;height: 500px;margin-top:20px">
              <p:ajax event="itemSelect"
                      listener="#{chartC.itemSelect}"
                      update="growl-msg">
              </p:ajax>
          </p:chart>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
