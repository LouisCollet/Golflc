<ui:define name="title">Select Dialog Round Page </ui:define>
<ui:define name="content">

<h:form id="form_select_round" >
<c:set var="type" value="#{param.type_club}"/>
type = #{type}
param.type_club = #{param.type_club}
<!-- remplacé type par 'type'  -->
<p:dataTable id="select_round"
             value="#{roundC.listInscriptions()}"
             rowIndexVar="row"
             resizableColumns="true"
             var="c"
             emptyMessage="#{msg['message.table.empty']}"
             rowKey="#{c.round.idround}"
             style="border:solid 5px;overflow-x:scroll;"  >
<!-- 
<p:ajax event="rowToggle" 
        listener="#{roundC.onRowToggleCompetition}" />
update=":select_inscription_round:growl-msg"  -->
<f:facet name="header">
    <h1>#{msg['message.selectround']} #{msg['message.for.inscription']}</h1>
</f:facet>

    	<p:column headerText="#{msg['round.selected']}"
                  footerText="#{msg['round.selected']}"
                  width="20%" >
            <p:commandButton
                id="selectButton"
                action="#{roundC.selectRecentInscription(c)}"
                value="#{c.round.idround} - #{msg['button.select']}" 
                icon="pi pi-arrow-left">
             </p:commandButton>
	</p:column>

	<p:column headerText="#{msg['round.date']}"
                  footerText="#{msg['round.date']}"
                  width="20%"
                  id="rdate">
                  <h:outputText value="#{c.round.roundDate}"> 
                      <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
                  </h:outputText>
	</p:column>

        <p:column headerText="#{msg['round.name']}"
                  width="20%"
                  id="competitionColumn" >
                        #{c.round.roundName}
        </p:column>

        <p:column headerText="#{msg['round.holes']}"
                  width="10%"
                  id="RoundHoles" >
            <h:outputText value= "#{c.round.roundHoles} (start = #{c.round.roundStart})"
                          rendered="#{c.round.roundHoles eq 9}"/>
            <h:outputText value= "#{c.round.roundHoles}"
                          rendered="#{c.round.roundHoles eq 18}"/>
        </p:column>

	<p:column   id="colclubname"
                    headerText="#{msg['club.name']}"
                    footerText="#{msg['club.name']}"
                    width="25%"
                    filterMatchMode="contains"
                    filterBy="#{c.club.clubName}" >
            #{c.club.clubName} (#{c.club.idclub})
	</p:column>

	<p:column id="colcoursename"
                  headerText="#{msg['course.name']}"
                  footerText="#{msg['course.name']}"
                  width="25%"
                  filterMatchMode="contains"
                  filterBy="#{c.course.courseName}" >
		#{c.course.courseName} (#{c.course.idcourse})
	</p:column>
