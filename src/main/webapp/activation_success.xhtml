<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Activation success</ui:define>

<ui:define name="content">

<div class="login-container">
    <p:panel styleClass="login-card">
        <f:facet name="header">
            <h1>#{msg['message.for.activation.success']}</h1>
        </f:facet>

        <div class="info-grid">
            <div class="info-row">
                <span class="info-label">#{msg['player.first']}</span>
                <span class="info-value">#{request.getParameter('firstname')}</span>
            </div>
            <div class="info-row">
                <span class="info-label">#{msg['player.lastname']}</span>
                <span class="info-value">#{request.getParameter('lastname')}</span>
            </div>
        </div>

        <f:facet name="footer">
            <h:form id="activation_success">
                <p:commandButton value="#{msg['button.login']}"
                                 ajax="false"
                                 update="growl-msg"
                                 immediate="true"
                                 icon="pi pi-pencil"
                                 action="login.xhtml?faces-redirect=true"/>
            </h:form>
        </f:facet>
    </p:panel>
</div>

</ui:define>
</ui:composition>
