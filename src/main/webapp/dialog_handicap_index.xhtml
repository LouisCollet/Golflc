<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/dialogTemplate.xhtml">
<ui:define name="title">
    Detailed Handicap Index WHS
</ui:define>

<ui:define name="content"> 
<ui:define name="metadata">
    <f:metadata>
        <f:viewAction action="#{courseC.textCalculationIndex()}" />
    </f:metadata>
</ui:define>

<h:form id="dialog_handicap_index"
        style="border:solid 3px" >

   <p:panelGrid  columns="2"
                 style="width:70%"
                 layout="tabular"
                 
                 columnClasses="col1,col2">
     <f:facet name="header">
         <h2>Handicap WHS Header</h2>
     </f:facet>

     <h:outputText id="date_handicap" value="#{msg['handicap.start']}" />
     <h:outputText id="dathcp2" value="#{courseC.handicapIndex.selectedHandicap.handicapIndex.handicapDate}" >
            <f:convertDateTime type="localDateTime" pattern="dd-MM-yyyy HH:mm" />
     </h:outputText>
 
     <h:outputText value="#{msg['round.id']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.round.idround}" />

     <h:outputText value="#{msg['round.game']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.round.roundGame}" />
     
     <h:outputText value="#{msg['round.name']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.round.roundName}" />
     
     <h:outputText value="#{msg['club.name']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.club.clubName}"  style="color:silver" />

     <h:outputText value="#{msg['course.name']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.course.courseName}" style="color:silver" />

     <h:outputText value="#{msg['handicap.sd']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.handicapIndex.handicapScoreDifferential}" />
     
     <h:outputText value="#{msg['handicap.comment']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.handicapIndex.handicapComment}" />
     
     <h:outputText value="#{msg['handicap.cap']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.handicapIndex.handicapSoftHardCap}" />
     
     <h:outputText value="#{msg['handicap.esr']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.handicapIndex.handicapExceptionalScoreReduction}" />

     <h:outputText value="#{msg['handicap.totalstrokes']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.handicapIndex.handicapPlayedStrokes}" />
     
     <h:outputText value="#{msg['handicap.esr']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.handicapIndex.handicapHolesNotPlayed}" />

     <h:outputText value="#{msg['handicap.totalstrokes']}" />
     <h:outputText value="#{courseC.handicapIndex.selectedHandicap.handicapIndex.handicapExpectedSD9Holes}" />
     
     
     <h:outputText value="Calculations detail" />
<!--     <h:outputText value="#{courseC.handicapIndex.calculations}"
                   escape="true" />
 -->    
        <p:commandButton value="Vers détail des calculs Handicap"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-undo"
                         action="dialog_calculations_index.xhtml" />

     <f:facet name="footer">
         <h2> <h:outputText value="Handicap WHS Footer" style="text-align:center;" /></h2>
     </f:facet>
   </p:panelGrid>

</h:form>
</ui:define>
</ui:composition>
