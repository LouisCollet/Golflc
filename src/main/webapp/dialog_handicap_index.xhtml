<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/dialogTemplate.xhtml">
<ui:define name="title">
    Detailed Handicap Index WHS
</ui:define>

<ui:define name="content"> 
<ui:define name="metadata">
    <f:metadata>
        <f:viewAction action="#{playerC.textCalculationIndex()}" />
    </f:metadata>
</ui:define>

<h:form id="dialog_handicap_index">

   <p:panelGrid  columns="2"
                 style="width:70%"
                 layout="flex"
                 columnClasses="col1Flex,col2Flex">
     <f:facet name="header">
         <h2>#{msg['handicap.player']} WHS</h2>
     </f:facet>

     <h:outputText id="date_handicap" value="#{msg['handicap.start']}" />
     <h:outputText id="dathcp2" value="#{playerC.selectedHandicap.handicapIndex.handicapDate}" >
            <f:convertDateTime type="localDateTime" pattern="dd-MM-yyyy HH:mm" />
     </h:outputText>
 <!-- ❌ AVANT 
#{playerC.handicapIndex.selectedHandicap.round.idround}
     #{playerC.handicapIndex.selectedHandicap.round.idround}
<✅ APRÈS — selectedHandicap direct + record accessors avec () 
#{playerC.selectedHandicap.round().idround}-->
     
     
     <h:outputText value="#{msg['round.id']}" />
     <h:outputText value="#{playerC.selectedHandicap.round.idround}" />

     <h:outputText value="#{msg['round.game']}" />
     <h:outputText value="#{playerC.selectedHandicap.round.roundGame}" />
     
     <h:outputText value="#{msg['round.name']}" />
     <h:outputText value="#{playerC.selectedHandicap.round.roundName}" />
     
     <h:outputText value="#{msg['club.name']}" />
     <h:outputText value="#{playerC.selectedHandicap.club.clubName}"  style="color:silver" />

     <h:outputText value="#{msg['course.name']}" />
     <h:outputText value="#{playerC.selectedHandicap.course.courseName}" style="color:silver" />

     <h:outputText value="#{msg['handicap.sd']}" />
     <h:outputText value="#{playerC.selectedHandicap.handicapIndex.handicapScoreDifferential}" />
     
     <h:outputText value="#{msg['handicap.comment']}" />
     <h:outputText value="#{playerC.selectedHandicap.handicapIndex.handicapComment}" />
     
     <h:outputText value="#{msg['handicap.cap']}" />
     <h:outputText value="#{playerC.handicapIndex.handicapSoftHardCap}" />
     
     <h:outputText value="#{msg['handicap.esr']}" />
     <h:outputText value="#{playerC.selectedHandicap.handicapIndex.handicapExceptionalScoreReduction}" />

     <h:outputText value="#{msg['handicap.totalstrokes']}" />
     <h:outputText value="#{playerC.selectedHandicap.handicapIndex.handicapPlayedStrokes}" />
     
     <h:outputText value="#{msg['handicap.esr']}" />
     <h:outputText value="#{playerC.selectedHandicap.handicapIndex.handicapHolesNotPlayed}" />

     <h:outputText value="#{msg['handicap.totalstrokes']}" />
     <h:outputText value="#{playerC.selectedHandicap.handicapIndex.handicapExpectedSD9Holes}" />
     
     <h:outputText value="Calculations detail" />

        <p:commandButton value="Vers détail des calculs Handicap"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-undo"
                         action="dialog_calculations_index.xhtml" />

     <f:facet name="footer">
         <p:commandButton value="#{msg['welcome.back']}"
                          id="buttonBack"
                          immediate="true"
                          ajax="false"
                          icon="pi pi-arrow-left"
                          action="welcome.xhtml?faces-redirect=true" />
     </f:facet>
   </p:panelGrid>

</h:form>
</ui:define>
</ui:composition>
