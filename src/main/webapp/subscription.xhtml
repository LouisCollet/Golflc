<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Souscription Spontanée </ui:define>
<ui:define name="content">

<h:form id="subscription">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header"><h1>#{msg[selectionContextBean.purpose.dialogTitleKey]}</h1></f:facet>

<ui:include src="include/include_subscription.xhtml"/>

<p:panelGrid
    id="panelsub1"
    columns="2"
    layout="flex"
    columnClasses="col1Flex, col2Flex">

    <h:outputText value="#{msg['subscription.new']}" />
    <p:selectOneButton id="subscr5"
              value="#{memC.subscription.subCode}"
              rendered="#{memC.subscription.trialCount le 5
                       or memC.subscription.trialCount eq null}" >
        <f:selectItem itemLabel="#{msg['subscription.trial']}" itemValue="TRIAL" />
        <f:selectItem itemLabel="#{msg['subscription.month']}" itemValue="MONTHLY" />
        <f:selectItem itemLabel="#{msg['subscription.year']}"  itemValue="YEARLY" />
     </p:selectOneButton>

    <p:selectOneButton id="subscr6"
              value="#{memC.subscription.subCode}"
              rendered="#{memC.subscription.trialCount gt 5}" >
         <f:selectItem itemLabel="#{msg['subscription.month']}" itemValue="MONTHLY" />
         <f:selectItem itemLabel="#{msg['subscription.year']}"  itemValue="YEARLY" />
    </p:selectOneButton>

<f:facet name="footer">
    <p:commandButton
         value="#{msg['button.subscription.create']}"
         id="button01"
         ajax="false"
         update="growl-msg"
         icon="pi pi-database"
         action="#{payC.manageSubscription()}" />
</f:facet>
</p:panelGrid>

</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
