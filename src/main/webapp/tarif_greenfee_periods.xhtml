<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
       xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml" >
<ui:define name="title">Tarif Greenfee Periods Page</ui:define>
<ui:define name="content">
<h:graphicImage name="images/tarif1.jpg" alt="image missing :tarif1.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage name="images/tarif2.jpg" alt="image missing :tarif2.jpg"  style="float: right;"></h:graphicImage>
<h:form id="tarifSeasons" enctype="application/x-www-form-urlencoded" >

<ui:include src="include/include_summary_greenfee.xhtml"/>

<p:panelGrid
    id="panel1"
    layout="tabular"
    columns="2"
    columnClasses="col1, col2">

<f:facet name="header">
     <h:outputText escape="false" value="#{msg['title.period.tarif']}" />
</f:facet>
    
    
    <h:panelGroup id="panelPrice" layout="block" >    
        <h:outputText value="#{msg['tarif.season']} " />
        <i class="pi pi-cloud" ></i>
        <i class="pi pi-sun"   ></i>
        #{courseC.tarifGreenfee.datesSeasonsList.size()}
    </h:panelGroup>
    <p:selectOneButton id="Season_High-Medium-Low"
                          required="true"
                          value="#{courseC.tarifGreenfee.season}"  >
            <f:selectItem itemLabel="#{msg['tarif.high']}"   itemValue="H" />
            <f:selectItem itemLabel="#{msg['tarif.medium']}" itemValue="M" />
            <f:selectItem itemLabel="#{msg['tarif.low']}"    itemValue="L" />
    </p:selectOneButton>
       
       <h:outputText  value="#{msg['tarif.period.start']} :"/>
       <p:datePicker    id="start"
                        value="#{courseC.tarifGreenfee.startDate}"
                        size="10"
                        lang="#{languageC.locale}"
                        label="Tarif périodes : startDate"
                        locale="#{languageC.locale}"
                        pattern="dd/MM/yyyy HH:mm"
                        yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                        readonlyInput="true"
                        showTime="false"
                        monthNavigator="true"
                        yearNavigator="true"
                        showIcon="true"
                        showButtonBar="true" />
       
      <h:outputText  value="#{msg['tarif.period.end']} :"/>
                  <p:datePicker
                        value="#{courseC.tarifGreenfee.endDate}"
                        id="end"
                        label="Tarif périodes : endDate"
                        size="10"
                        locale="#{languageC.locale}"
                        pattern="dd/MM/yyyy HH:mm"
                        monthNavigator="true"
                        yearNavigator="true"
                        yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                        readonlyInput="true"
                        showTime="false"
                        showIcon="true"
                        showButtonBar="true" >
                 </p:datePicker>

<f:facet name="footer">
        <p:commandButton value="#{msg['tarif.period.create']}"
                         id="commandButtoninput1"
                         ajax="false"
                         update="growl-msg"
                         immediate="false"
                         style="float: left;"
                         icon="pi pi-database"
                         action="#{courseC.inputTarifGreenfee('PE')}"/>
        <p:commandButton value="#{msg['tarif.back']}"
                         id="commandButtonback"
                         ajax="false"
                         style="float: right;"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-undo"
                         action="tarif_greenfee_menu.xhtml?faces-redirect=true" />
</f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
