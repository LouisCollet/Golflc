<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Tarif Member Wizard Page</ui:define>
<ui:define name="content">
<div class="card">
<h:form id="tarif_member_wizard" enctype="application/x-www-form-urlencoded">

<ui:include src="include/include_summary_cotisation.xhtml"/>

<p:wizard id="wizardTarifMember"
          widgetVar="tarifMemberWizard"
          styleClass="tarif-wizard"
          flowListener="#{memC.onTarifMemberFlow}"
          onnext="$('.ui-growl-item').remove(); $('.ui-messages').empty();"
          onback="$('.ui-growl-item').remove(); $('.ui-messages').empty();">

    <!-- =================== TAB 1: COTISATION (Periods + Items) =================== -->
    <p:tab id="CotisationTab"
           title="Cotisation (#{memC.tarifMember.basicList.size()})"
           titletip="Define member cotisation periods and items">
        <p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h1>#{msg['title.members.tarif']}</h1>
                <p:badge value="#{memC.tarifMember.basicList.size()}" severity="info"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:outputText value="#{msg['tarif.period.start']} :"/>
                <p:datePicker id="startPeriod"
                              value="#{memC.tarifMember.workStartDate}"
                              size="10"
                              showIcon="true"
                              showTime="false"
                              locale="#{languageC.locale}"
                              lang="#{languageC.locale}"
                              pattern="dd-MM-yyyy"
                              yearNavigator="true"
                              monthNavigator="true"
                              yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                              readonlyInput="true"
                              required="false">
                    <f:validateBean disabled="true"/>
                </p:datePicker>

                <h:outputText value="#{msg['tarif.period.end']} :"/>
                <p:datePicker id="endPeriod"
                              value="#{memC.tarifMember.workEndDate}"
                              size="10"
                              showIcon="true"
                              showTime="false"
                              locale="#{languageC.locale}"
                              lang="#{languageC.locale}"
                              pattern="dd-MM-yyyy"
                              yearNavigator="true"
                              monthNavigator="true"
                              yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(2)}"
                              readonlyInput="true"
                              required="false">
                    <f:validateBean disabled="true"/>
                </p:datePicker>

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.members.item']} "/>
                    <i class="pi pi-list"/>
                    <i class="pi pi-pencil"/>
                </h:panelGroup>
                <p:inputText id="MembersText"
                             size="20"
                             title="#{msg['tooltip.tarif.item']}"
                             value="#{memC.tarifMember.workItem}"
                             placeholder="Enter item">
                    <f:validateBean disabled="true"/>
                </p:inputText>

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.members.price']} "/>
                    <i class="pi pi-euro"/>
                </h:panelGroup>
                <p:inputNumber id="MembersAmount"
                               value="#{memC.tarifMember.workPrice}"
                               title="#{msg['tooltip.tarif.price4']}"
                               size="6"
                               decimalPlaces="1"
                               decimalSeparator="."
                               placeholder="9999.9"
                               thousandSeparator=""
                               minValue="0"
                               maxValue="2000.0"
                               lang="#{languageC.locale}">
                    <f:validateBean disabled="true"/>
                </p:inputNumber>

                <h:panelGroup layout="block">
                    <h:outputText value="Age: "/>
                </h:panelGroup>
                <p:inputMask id="MembersAge"
                             value="#{memC.tarifMember.workRangeAge}"
                             title="#{msg['tooltip.tarif.age']}"
                             size="6"
                             lang="#{languageC.locale}"
                             mask="99-99">
                    <f:validateBean disabled="true"/>
                </p:inputMask>
            </p:panelGrid>
            <f:facet name="footer">
                <p:commandButton value="#{msg['tarif.members.add']}"
                                 id="btnAddCotisation"
                                 icon="pi pi-plus"
                                 action="#{memC.inputTarifMemberWizard('CO')}"
                                 update="tarif_member_wizard"
                                 styleClass="p-button-outlined"/>
            </f:facet>
        </p:panel>
    </p:tab>

    <!-- =================== TAB 2: EQUIPMENTS =================== -->
    <p:tab id="EquipmentsTab"
           title="Equipments (#{memC.tarifMember.equipmentsList.size()})"
           titletip="Define equipment items and prices">
        <p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h1>#{msg['title.equipments.tarif']}</h1>
                <p:badge value="#{memC.tarifMember.equipmentsList.size()}" severity="info"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.members.item']} "/>
                    <i class="pi pi-list"/>
                    <i class="pi pi-pencil"/>
                </h:panelGroup>
                <p:inputText id="EquipText"
                             size="20"
                             title="#{msg['tooltip.tarif.item']}"
                             value="#{memC.tarifMember.workItem}"
                             placeholder="Enter equipment">
                    <f:validateBean disabled="true"/>
                </p:inputText>

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.members.price']} "/>
                    <i class="pi pi-euro"/>
                </h:panelGroup>
                <p:inputNumber id="EquipAmount"
                               value="#{memC.tarifMember.workPrice}"
                               title="#{msg['tooltip.tarif.price3']}"
                               size="6"
                               decimalPlaces="1"
                               decimalSeparator="."
                               thousandSeparator=""
                               placeholder="999.9"
                               minValue="0"
                               maxValue="400.0">
                    <f:validateBean disabled="true"/>
                </p:inputNumber>
            </p:panelGrid>
            <f:facet name="footer">
                <p:commandButton value="#{msg['tarif.equipments.create']}"
                                 id="btnAddEquipment"
                                 icon="pi pi-plus"
                                 action="#{memC.inputTarifMemberWizard('EQ')}"
                                 update="tarif_member_wizard"
                                 styleClass="p-button-outlined"/>
            </f:facet>
        </p:panel>
    </p:tab>

    <!-- =================== TAB 3: DISCOUNT =================== -->
    <p:tab id="DiscountTab"
           title="Discount"
           titletip="Define discount for uncomplete year">
        <p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h:outputText value="Discount"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:outputText value="Discount Uncomplete Year :"/>
                <p:selectOneMenu id="discountOption"
                                 value="#{memC.tarifMember.discount}"
                                 style="font-weight:bold;">
                    <f:selectItem itemLabel="Select One"                    itemValue=""/>
                    <f:selectItem itemLabel="Option1 - Complete Year"       itemValue="Year"/>
                    <f:selectItem itemLabel="Option2 - Complete Months"     itemValue="Months"/>
                    <f:selectItem itemLabel="Option3 - Exact days"         itemValue="Days"/>
                    <f:validateBean disabled="true"/>
                </p:selectOneMenu>
            </p:panelGrid>
        </p:panel>
    </p:tab>

    <!-- =================== TAB 4: EDITOR (Comment) =================== -->
    <p:tab id="EditorTab"
           title="Comment"
           titletip="Add a comment to the tarif">
        <p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h1>#{msg['title.cotisation.comment']}</h1>
            </f:facet>

            <p:textEditor id="textEditor"
                          widgetVar="editorVar"
                          value="#{memC.tarifMember.comment}"
                          height="70px"
                          style="width:100%;background-color: whitesmoke;font-weight: normal;"
                          placeholder="Enter here your content"/>

            <p:dialog id="dialog1"
                      width="auto"
                      height="auto"
                      header="Content of comment"
                      footer="this is the footer"
                      widgetVar="dlg"
                      showEffect="fade"
                      hideEffect="fade">
                <p:outputPanel id="displayComment">
                    <h3>Comment registered !</h3>
                    <h:outputText value="#{memC.tarifMember.comment}" escape="false"/>
                </p:outputPanel>
            </p:dialog>

            <f:facet name="footer">
                <p:commandButton id="btnSaveComment"
                                 value="#{msg['tarif.members.add.comment']}"
                                 update="displayComment"
                                 oncomplete="PF('dlg').show()"
                                 icon="pi pi-database"
                                 styleClass="p-button-outlined"/>
                <p:commandButton value="Clear"
                                 type="button"
                                 onclick="PF('editorVar').clear();"
                                 icon="pi pi-times"
                                 styleClass="p-button-outlined"/>
            </f:facet>
        </p:panel>
    </p:tab>

    <!-- =================== TAB 5: CONFIRMATION =================== -->
    <p:tab id="ConfirmationTab"
           title="Confirm"
           titletip="Review and create tarif">
        <p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h:outputText value="Confirmation"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:outputText value="#{msg['club.name']} :"/>
                <h:outputText value="#{appContext.club.clubName} (#{appContext.club.idclub})"/>

                <h:outputText value="Cotisation :"/>
                <h:outputText value="#{memC.tarifMember.basicList.size()}"/>

                <h:outputText value="Equipments :"/>
                <h:outputText value="#{memC.tarifMember.equipmentsList.size()}"/>

                <h:outputText value="Discount :"/>
                <h:outputText value="#{memC.tarifMember.discount}"/>

                <h:outputText value="Comment :"/>
                <h:outputText value="#{memC.tarifMember.comment}" escape="false"/>
            </p:panelGrid>
            <f:facet name="footer">
                <p:commandButton value="#{msg['tarif.print']}"
                                 id="btnShowTarif"
                                 icon="pi pi-list"
                                 action="#{memC.showTarifMembers()}"
                                 update="tarif_member_wizard"
                                 styleClass="p-button-outlined"/>

                <p:commandButton value="#{msg['tarif.create']}"
                                 id="btnCreateAll"
                                 icon="pi pi-database"
                                 action="#{memC.createTarifMember()}"
                                 styleClass="p-button-success"/>

                <p:commandButton id="btnDeleteAll"
                                 value="#{msg['button.delete']}"
                                 icon="pi pi-trash"
                                 action="#{memC.deleteTarifMember()}"
                                 update="tarif_member_wizard"
                                 styleClass="p-button-danger">
                    <p:confirm icon="pi pi-exclamation-triangle"/>
                </p:commandButton>
            </f:facet>
        </p:panel>
    </p:tab>

</p:wizard>

<ui:include src="include/include_confirmDialog.xhtml"/>
</h:form>
</div>
</ui:define>
</ui:composition>
