<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Tarif Member Wizard Page</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:100%;">
    <f:facet name="header"><h1>#{msg['title.members.tarif']}</h1></f:facet>
<h:form id="tarif_member_wizard" enctype="application/x-www-form-urlencoded">

<ui:include src="include/include_summary_cotisation.xhtml"/>

<p:wizard id="wizardTarifMember"
          widgetVar="tarifMemberWizard"
          styleClass="tarif-wizard"
          flowListener="#{memC.onTarifMemberFlow}"
          onnext="$('.ui-growl-item').remove(); $('.ui-messages').empty();"
          onback="$('.ui-growl-item').remove(); $('.ui-messages').empty();">

    <!-- =================== TAB 1: PERIOD (one-and-only) =================== -->
    <p:tab id="PeriodsTab"
           title="📅 Period"
           titletip="Define the single tarif period">
        <div class="tarif-step-border"><p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h1>#{msg['title.period.tarif']}</h1>
            </f:facet>

            <!-- EDIT MODE: no period yet, show inputs -->
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex"
                         rendered="#{memC.tarifMember.startDate == null}">

                <h:outputText value="#{msg['tarif.period.start']} :"/>
                <p:datePicker id="startPeriod"
                              value="#{memC.tarifMember.workStartDate}"
                              size="10"
                              showIcon="true"
                              showTime="false"
                              locale="#{languageC.locale}"
                              lang="#{languageC.locale}"
                              pattern="dd-MM-yyyy"
                              yearNavigator="true"
                              monthNavigator="true"
                              yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                              readonlyInput="true"
                              required="false">
                    <f:validateBean disabled="true"/>
                </p:datePicker>

                <h:outputText value="#{msg['tarif.period.end']} :"/>
                <p:datePicker id="endPeriod"
                              value="#{memC.tarifMember.workEndDate}"
                              size="10"
                              showIcon="true"
                              showTime="false"
                              locale="#{languageC.locale}"
                              lang="#{languageC.locale}"
                              pattern="dd-MM-yyyy"
                              yearNavigator="true"
                              monthNavigator="true"
                              yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(2)}"
                              readonlyInput="true"
                              required="false">
                    <f:validateBean disabled="true"/>
                </p:datePicker>
            </p:panelGrid>

            <!-- VIEW MODE: period created, show chip + edit/delete -->
            <p:dataTable id="periodsTable"
                         value="#{memC.tarifMember.startDate != null ? [memC.tarifMember] : []}"
                         var="pd"
                         rendered="#{memC.tarifMember.startDate != null}"
                         styleClass="compact-table mt-2">
                <p:column headerText="#{msg['tarif.period.start']}" style="width:40%">
                    <h:outputText value="#{pd.startDate}">
                        <f:convertDateTime type="localDateTime" pattern="dd-MM-yyyy"/>
                    </h:outputText>
                </p:column>
                <p:column headerText="#{msg['tarif.period.end']}" style="width:40%">
                    <h:outputText value="#{pd.endDate}">
                        <f:convertDateTime type="localDateTime" pattern="dd-MM-yyyy"/>
                    </h:outputText>
                </p:column>
                <p:column style="width:20%">
                    <p:commandButton icon="pi pi-pencil"
                                     styleClass="p-button-warning p-button-text p-button-sm"
                                     action="#{memC.editMemberPeriod()}"
                                     update="tarif_member_wizard:wizardTarifMember"
                                     process="@this"
                                     disabled="#{not empty memC.tarifMember.basicList or not empty memC.tarifMember.equipmentsList}"
                                     title="Edit period"/>
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="p-button-danger p-button-text p-button-sm"
                                     action="#{memC.deleteMemberPeriod()}"
                                     update="tarif_member_wizard:wizardTarifMember"
                                     process="@this"
                                     disabled="#{not empty memC.tarifMember.basicList or not empty memC.tarifMember.equipmentsList}"
                                     title="Delete period"/>
                </p:column>
            </p:dataTable>

            <f:facet name="footer">
                <p:commandButton value="#{msg['tarif.period.create']}"
                                 id="btnCreatePeriod"
                                 icon="pi pi-plus"
                                 rendered="#{memC.tarifMember.startDate == null}"
                                 action="#{memC.createMemberPeriod()}"
                                 update="tarif_member_wizard:wizardTarifMember"
                                 styleClass="p-button-outlined"/>
            </f:facet>
        </p:panel></div>
    </p:tab>

    <!-- =================== TAB 2: COTISATION ITEMS =================== -->
    <p:tab id="CotisationTab"
           title="💳 Cotisation (#{memC.tarifMember.basicList.size()})"
           titletip="Define member cotisation items">
        <div class="tarif-step-border"><p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h1>#{msg['title.members.tarif']}</h1>
                <p:badge value="#{memC.tarifMember.basicList.size()}" severity="info"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.members.item']} "/>
                    <i class="pi pi-list"/>
                    <i class="pi pi-pencil"/>
                </h:panelGroup>
                <p:inputText id="MembersText"
                             size="20"
                             title="#{msg['tooltip.tarif.item']}"
                             value="#{memC.tarifMember.workItem}"
                             placeholder="Enter item">
                    <f:validateBean disabled="true"/>
                </p:inputText>

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.members.price']} "/>
                    <i class="pi pi-euro"/>
                </h:panelGroup>
                <p:inputNumber id="MembersAmount"
                               value="#{memC.tarifMember.workPrice}"
                               title="#{msg['tooltip.tarif.price4']}"
                               size="6"
                               decimalPlaces="1"
                               decimalSeparator="."
                               placeholder="9999.9"
                               thousandSeparator=""
                               minValue="0"
                               maxValue="2000.0"
                               lang="#{languageC.locale}">
                    <f:validateBean disabled="true"/>
                </p:inputNumber>

                <h:panelGroup layout="block">
                    <h:outputText value="Age: "/>
                </h:panelGroup>
                <p:inputMask id="MembersAge"
                             value="#{memC.tarifMember.workRangeAge}"
                             title="#{msg['tooltip.tarif.age']}"
                             size="6"
                             lang="#{languageC.locale}"
                             mask="99-99">
                    <f:validateBean disabled="true"/>
                </p:inputMask>
            </p:panelGrid>
            <p:commandButton value="#{msg['tarif.members.add']}"
                             id="btnAddCotisation"
                             icon="pi pi-plus"
                             action="#{memC.inputTarifMemberWizard('CO')}"
                             update="tarif_member_wizard"
                             styleClass="p-button-outlined mt-2"/>

            <p:dataTable id="basicTable"
                         value="#{memC.tarifMember.basicList}" var="b"
                         rendered="#{not empty memC.tarifMember.basicList}"
                         editable="true" editMode="row"
                         styleClass="compact-table mt-2">
                <p:ajax event="rowEdit"       update="tarif_member_wizard"/>
                <p:ajax event="rowEditCancel" update="basicTable"/>

                <p:column headerText="#{msg['tarif.members.item']}">
                    <p:cellEditor>
                        <f:facet name="output"><h:outputText value="#{b.item}"/></f:facet>
                        <f:facet name="input">
                            <p:inputText value="#{b.item}" size="20">
                                <f:validateBean disabled="true"/>
                            </p:inputText>
                        </f:facet>
                    </p:cellEditor>
                </p:column>

                <p:column headerText="#{msg['tarif.members.price']}" style="width:15%">
                    <p:cellEditor>
                        <f:facet name="output"><h:outputText value="#{b.price}"/></f:facet>
                        <f:facet name="input">
                            <p:inputNumber value="#{b.price}" size="6"
                                           decimalPlaces="1" decimalSeparator="."
                                           minValue="0" maxValue="2000.0">
                                <f:validateBean disabled="true"/>
                            </p:inputNumber>
                        </f:facet>
                    </p:cellEditor>
                </p:column>

                <p:column headerText="#{msg['tarif.members.rangeage']}" style="width:15%">
                    <p:cellEditor>
                        <f:facet name="output"><h:outputText value="#{b.range}"/></f:facet>
                        <f:facet name="input">
                            <p:inputMask value="#{b.range}" size="6" mask="99-99">
                                <f:validateBean disabled="true"/>
                            </p:inputMask>
                        </f:facet>
                    </p:cellEditor>
                </p:column>

                <p:column style="width:10%"><p:rowEditor/></p:column>
                <p:column style="width:5%">
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="p-button-danger p-button-text p-button-sm"
                                     action="#{memC.removeMemberBasicItem(b)}"
                                     update="tarif_member_wizard"
                                     process="@this"/>
                </p:column>
            </p:dataTable>
        </p:panel></div>
    </p:tab>

    <!-- =================== TAB 2: EQUIPMENTS =================== -->
    <p:tab id="EquipmentsTab"
           title="🎒 Equipments (#{memC.tarifMember.equipmentsList.size()})"
           titletip="Define equipment items and prices">
        <div class="tarif-step-border"><p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h1>#{msg['title.equipments.tarif']}</h1>
                <p:badge value="#{memC.tarifMember.equipmentsList.size()}" severity="info"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.members.item']} "/>
                    <i class="pi pi-list"/>
                    <i class="pi pi-pencil"/>
                </h:panelGroup>
                <p:inputText id="EquipText"
                             size="20"
                             title="#{msg['tooltip.tarif.item']}"
                             value="#{memC.tarifMember.workItem}"
                             placeholder="Enter equipment">
                    <f:validateBean disabled="true"/>
                </p:inputText>

                <h:panelGroup layout="block">
                    <h:outputText value="#{msg['tarif.members.price']} "/>
                    <i class="pi pi-euro"/>
                </h:panelGroup>
                <p:inputNumber id="EquipAmount"
                               value="#{memC.tarifMember.workPrice}"
                               title="#{msg['tooltip.tarif.price3']}"
                               size="6"
                               decimalPlaces="1"
                               decimalSeparator="."
                               thousandSeparator=""
                               placeholder="999.9"
                               minValue="0"
                               maxValue="400.0">
                    <f:validateBean disabled="true"/>
                </p:inputNumber>
            </p:panelGrid>
            <p:commandButton value="#{msg['tarif.equipments.create']}"
                             id="btnAddEquipment"
                             icon="pi pi-plus"
                             action="#{memC.inputTarifMemberWizard('EQ')}"
                             update="tarif_member_wizard"
                             styleClass="p-button-outlined mt-2"/>

            <p:dataTable id="equipTable"
                         value="#{memC.tarifMember.equipmentsList}"
                         var="e"
                         rendered="#{not empty memC.tarifMember.equipmentsList}"
                         editable="true" editMode="row"
                         styleClass="compact-table mt-2">
                <p:ajax event="rowEdit"       update="tarif_member_wizard"/>
                <p:ajax event="rowEditCancel" update="equipTable"/>

                <p:column headerText="#{msg['tarif.members.item']}">
                    <p:cellEditor>
                        <f:facet name="output"><h:outputText value="#{e.item}"/></f:facet>
                        <f:facet name="input">
                            <p:inputText value="#{e.item}" size="20">
                                <f:validateBean disabled="true"/>
                            </p:inputText>
                        </f:facet>
                    </p:cellEditor>
                </p:column>

                <p:column headerText="#{msg['tarif.members.price']}" style="width:15%">
                    <p:cellEditor>
                        <f:facet name="output"><h:outputText value="#{e.price}"/></f:facet>
                        <f:facet name="input">
                            <p:inputNumber value="#{e.price}" size="6"
                                           decimalPlaces="1" decimalSeparator="."
                                           minValue="0" maxValue="400.0">
                                <f:validateBean disabled="true"/>
                            </p:inputNumber>
                        </f:facet>
                    </p:cellEditor>
                </p:column>

                <p:column style="width:10%"><p:rowEditor/></p:column>
                <p:column style="width:5%">
                    <p:commandButton icon="pi pi-trash"
                                     styleClass="p-button-danger p-button-text p-button-sm"
                                     action="#{memC.removeMemberEquipmentItem(e)}"
                                     update="tarif_member_wizard"
                                     process="@this"/>
                </p:column>
            </p:dataTable>
        </p:panel></div>
    </p:tab>

    <!-- =================== TAB 3: DISCOUNT =================== -->
    <p:tab id="DiscountTab"
           title="📉 Discount"
           titletip="Define discount for uncomplete year">
        <div class="tarif-step-border"><p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h:outputText value="Discount"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:outputText value="Discount Uncomplete Year :"/>
                <p:selectOneMenu id="discountOption"
                                 value="#{memC.tarifMember.discount}">
                    <f:selectItem itemLabel="Select One"                    itemValue=""/>
                    <f:selectItem itemLabel="Option1 - Complete Year"       itemValue="Year"/>
                    <f:selectItem itemLabel="Option2 - Complete Months"     itemValue="Months"/>
                    <f:selectItem itemLabel="Option3 - Exact days"         itemValue="Days"/>
                    <f:validateBean disabled="true"/>
                </p:selectOneMenu>
            </p:panelGrid>
        </p:panel></div>
    </p:tab>

    <!-- =================== TAB 4: EDITOR (Comment) =================== -->
    <p:tab id="EditorTab"
           title="💬 Comment"
           titletip="Add a comment to the tarif">
        <div class="tarif-step-border"><p:panel styleClass="tarif-step-panel">
            <f:facet name="header">
                <h1>#{msg['title.cotisation.comment']}</h1>
            </f:facet>

            <p:textEditor id="textEditor"
                          widgetVar="editorVar"
                          value="#{memC.tarifMember.comment}"
                          height="70px"
                          styleClass="w-full"
                          placeholder="Enter here your content"/>

            <p:dialog id="dialog1"
                      width="auto"
                      height="auto"
                      header="Content of comment"
                      footer="this is the footer"
                      widgetVar="dlg"
                      showEffect="fade"
                      hideEffect="fade">
                <p:outputPanel id="displayComment">
                    <h3>Comment registered !</h3>
                    <h:outputText value="#{memC.tarifMember.comment}" escape="false"/>
                </p:outputPanel>
            </p:dialog>

            <f:facet name="footer">
              <div class="btn-group">
                <p:commandButton id="btnSaveComment"
                                 value="#{msg['tarif.members.add.comment']}"
                                 update="displayComment"
                                 oncomplete="PF('dlg').show()"
                                 icon="pi pi-database"
                                 styleClass="p-button-outlined"/>
                <p:commandButton value="Clear"
                                 type="button"
                                 onclick="PF('editorVar').clear();"
                                 icon="pi pi-times"
                                 styleClass="p-button-outlined"/>
              </div>
            </f:facet>
        </p:panel></div>
    </p:tab>

    <!-- =================== TAB 5: CONFIRMATION =================== -->
    <p:tab id="ConfirmationTab"
           title="✅ Confirm"
           titletip="Review and create tarif">
        <div class="tarif-step-border"><p:panel styleClass="tarif-step-panel tarif-step-panel-wide">
            <f:facet name="header">
                <h:outputText value="Confirmation"/>
            </f:facet>
            <p:panelGrid columns="2"
                         layout="flex"
                         columnClasses="col1Flex, col2Flex">

                <h:outputText value="#{msg['club.name']} :"/>
                <h:outputText value="#{appContext.club.clubName} (#{appContext.club.idclub})"/>

                <h:outputText value="Cotisation :"/>
                <h:outputText value="#{memC.tarifMember.basicList.size()}"/>

                <h:outputText value="Equipments :"/>
                <h:outputText value="#{memC.tarifMember.equipmentsList.size()}"/>

                <h:outputText value="Discount :"/>
                <h:outputText value="#{memC.tarifMember.discount}"/>

                <h:outputText value="Comment :"/>
                <h:outputText value="#{memC.tarifMember.comment}"/>
            </p:panelGrid>
            <f:facet name="footer">
              <div class="btn-group">
                <p:commandButton value="#{msg['tarif.print']}"
                                 id="btnShowTarif"
                                 icon="pi pi-list"
                                 action="#{memC.showTarifMembers()}"
                                 update="tarif_member_wizard"
                                 styleClass="p-button-outlined"/>

                <p:commandButton value="#{msg['tarif.create']}"
                                 id="btnCreateAll"
                                 icon="pi pi-database"
                                 action="#{memC.createTarifMember()}"
                                 styleClass="p-button-success"/>

                <p:commandButton id="btnDeleteAll"
                                 value="#{msg['button.delete']}"
                                 icon="pi pi-trash"
                                 action="#{memC.deleteTarifMember()}"
                                 update="tarif_member_wizard"
                                 styleClass="p-button-danger">
                    <p:confirm icon="pi pi-exclamation-triangle"/>
                </p:commandButton>
              </div>
            </f:facet>
        </p:panel></div>
    </p:tab>

</p:wizard>

<ui:include src="include/include_confirmDialog.xhtml"/>
</h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
