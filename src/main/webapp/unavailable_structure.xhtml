<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
       xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
     
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

    <ui:define name="metadata">
    <f:metadata>
        <f:viewAction action="#{clubC.findCourseListForClub()}"/>
    </f:metadata>
</ui:define>
    
<ui:define name="title">Unavailabilities structure registration</ui:define>
<ui:define name="content">
<h:graphicImage name="images/site unavailable.jpg" alt="image missing :site unavailable.jpg" style="float: left;"> </h:graphicImage>
<h:graphicImage name="images/temporarily unavailable.jpg" alt="image missing :temporarily unavailable.jpg" style="float: right;"> </h:graphicImage>
<h:form id="form_unavailable" enctype="application/x-www-form-urlencoded" >

<ui:include src="include/include_summary_club.xhtml"/>
<p:panelGrid
    id="panel1"
    layout="tabular"
    columns="2"
    columnClasses="col1,col2">
<f:facet name="header">
     <h:outputText escape="false" value="#{msg['title.unavailable.structure']}" />
</f:facet>
     <h:panelGroup id="panelGroupPrice" layout="block" >
         <p:outputLabel value="#{msg['course.id']}"/>
         <i class="pi pi-cog"></i>
         <i class="pi pi-list"></i>
         #{clubC.unavailable.structure.structureList.size()}
     </h:panelGroup>
     
     <p:selectOneMenu id="workCourseId"
                      value="#{clubC.unavailable.structure.workCourseId}" >
         <f:selectItem itemLabel="Select One"  itemValue=""/>
         <f:selectItem itemLabel="#{msg['unavailable.structure.allcourses']}" itemValue="9999"/>
         <f:selectItems value="#{clubC.courseListForClub}"
                        var="c"
                        itemLabel="#{c.idcourse}-#{c.courseName}"
                        itemValue="#{c.idcourse}"/>
     </p:selectOneMenu>
     
     <h:outputText value="#{msg['unavailable.structure.cause']}" />
     <p:inputText     id="CauseUnavailable"
                      size="25"
                      title="#{msg['tooltip.tarif.item']}"
                      value="#{clubC.unavailable.structure.workItem}"   />
     
<f:facet name="footer">
            <p:commandButton value="#{msg['unavailable.structure.add']}"
                         id="commandButtonAdd"
                         ajax="false"
                         update="growl-msg"
                          
                         icon="pi pi-plus"
                         action="#{clubC.inputUnvailableStructure()}"/>
            <p:commandButton value="Visualisation"
                         id="commandButtonVisual"
                         ajax="false"
                         update="growl-msg"
                         immediate="true" 
                         icon="pi pi-plus"
                         action="#{clubC.showUnavailableStructure}"/>
    <!-- immediate=true for skip validations  style="float: right;color:red;"
    -->
            <p:commandButton value="#{msg['unavailable.structure.create']}"
                         id="commandButtonCreate"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-database"
                         style="float: right;"
                         rendered="#{clubC.unavailable.structure.itemExists eq true}"
                         action="#{clubC.modifyClubUnavailableStructure('modify')}"/>
            <p:commandButton value="#{msg['tarif.back']}"
                         id="commandButtonback"
                         ajax="false"
                         style="float: right;"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-undo"
                         action="unavailable_menu.xhtml?faces-redirect=true" />

</f:facet>
</p:panelGrid>
</h:form>
</ui:define>
</ui:composition>
