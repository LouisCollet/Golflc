<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:of="omnifaces"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:param name="hideMenu" value="true"/>

<ui:define name="title">Session Expired</ui:define>

<ui:define name="content">
    <h:form id="form_session_expired">

        <div class="login-container">
            <p:panel styleClass="login-card">
                <f:facet name="header">
                    <h1>#{msg['login.welcome.back']}</h1>
                </f:facet>

                <div style="text-align:center; margin-bottom:1rem;">
                    <i class="#{deploymentInfo.recentDeploy ? 'pi pi-refresh' : 'pi pi-clock'}"
                       style="font-size:3rem; color:var(--primary-color);"/>
                    <h2 style="margin:0.5rem 0;">#{msg['session.expired.title']}</h2>
                    <p style="color:var(--text-secondary-color); margin:0;">
                        <h:outputText rendered="#{deploymentInfo.recentDeploy}"
                                      value="#{msg['session.expired.redeployment']}"/>
                        <h:outputText rendered="#{!deploymentInfo.recentDeploy}"
                                      value="#{msg['session.expired.inactivity']}"/>
                    </p>
                </div>

                <div class="info-grid">
                    <div class="info-row">
                        <span class="info-label">Date/time</span>
                        <span class="info-value">#{of:formatDate(now, 'yyyy-MM-dd HH:mm:ss')}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">User IP</span>
                        <span class="info-value">#{request.remoteAddr}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Session Id</span>
                        <span class="info-value">#{session.id}</span>
                    </div>
                </div>

                <f:facet name="footer">
                    <h:link outcome="login.xhtml" styleClass="login-option">
                        <span class="login-option-icon returning">
                            <i class="pi pi-sign-in"/>
                        </span>
                        <span class="login-option-text">
                            <span class="login-option-title">#{msg['login.user.old']}</span>
                            <span class="login-option-desc">#{msg['login.welcome.back']}</span>
                        </span>
                        <i class="pi pi-arrow-right login-option-arrow"/>
                    </h:link>
                </f:facet>
            </p:panel>
        </div>

    </h:form>
</ui:define>
</ui:composition>
