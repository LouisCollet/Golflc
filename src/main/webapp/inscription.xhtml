<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      xmlns:fn="jakarta.tags.functions"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Inscription Page</ui:define>

<ui:define name="content">
    <h:outputStylesheet library="styles" name="meteo.css"/>
    <h:outputScript library="js" name="teecolor.js" target="head"/>

    <h:form id="inscription">

        <ui:include src="include/include_summary_round.xhtml"/>

        <h:panelGroup id="panelGroup1"
                      layout="block"
                      class="marquee-rtl"
                      rendered="#{roundC.inscription.showWeather}">
            <div>
                <h:outputText value="#{roundC.inscription.weather}"
                              escape="false"/>
            </div>
        </h:panelGroup>

        <div class="login-container" style="min-height:auto; align-items:flex-start;">
            <p:panel styleClass="login-card form-card">
                <f:facet name="header">
                    <h1>#{msg['inscription.data']}</h1>
                </f:facet>

                <c:set var="max" value="#{roundC.round.roundGame eq 'MP_SINGLE'? 2 : 4}"/>
                <c:set var="abb" value="${fn:substring(roundC.round.roundGame, 0, 3)}"/>
                <c:set var="player" value="#{playerC.player}"/>

                <p:panelGrid id="panel"
                             columns="2"
                             layout="flex"
                             columnClasses="col1Flex, col2Flex">

                    <p:outputLabel value="#{msg['round.date']} :"/>
                    <h:outputText value="#{roundC.round.roundDate}" style="font-weight:bold; font-size:1.2em;">
                        <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm"/>
                    </h:outputText>

                    <p:outputLabel for="@next" value="#{msg['inscription.team']} :"/>
                    <p:inputText id="inscriptionTeam"
                                 size="35"
                                 value="#{roundC.round.roundTeam}"/>

                    <p:outputLabel for="@next" value="#{msg['inscription.matchplay.team']}"
                                  rendered="#{abb eq 'MP_'}"/>
                    <p:inputText id="matchplay"
                                 size="3"
                                 rendered="#{abb eq 'MP_'}"
                                 value="#{roundC.inscription.inscriptionMatchplayTeam}"/>

                    <p:outputLabel for="@next" value="#{msg['club.web']} :"/>
                    <h:outputLink value="https://#{clubC.club.clubWebsite}/"
                                  title="Club WebPage">
                        <h:outputText value="https://#{clubC.club.clubWebsite}"/>
                    </h:outputLink>

                </p:panelGrid>

                <f:facet name="footer">
                    <h:panelGroup layout="block" style="display:flex; flex-wrap:wrap; gap:0.5rem;">
                        <p:commandButton id="buttonCreate"
                                         value="#{msg['button.inscription.create']}"
                                         update="growl-msg"
                                         ajax="false"
                                         icon="pi pi-pencil"
                                         action="#{roundC.createInscription()}"/>

                        <p:commandButton id="buttonWeather"
                                         value="#{msg['button.weather']}"
                                         update="growl-msg"
                                         ajax="false"
                                         immediate="true"
                                         icon="pi pi-sun"
                                         rendered="#{!roundC.inscription.showWeather}"
                                         action="#{roundC.findWeather()}"/>

                        <p:commandButton id="buttonStopWeather"
                                         value="Stop #{msg['button.weather']}"
                                         ajax="false"
                                         immediate="true"
                                         icon="pi pi-times"
                                         styleClass="p-button-secondary"
                                         rendered="#{roundC.inscription.showWeather}"
                                         action="#{roundC.stopWeather()}"/>

                        <c:set var="idcourse" value="#{clubC.course.idcourse}"/>
                        <p:commandButton id="buttonTarif"
                                         value="#{msg['button.inscription.findtarif']} Greenfee"
                                         update="growl-msg"
                                         process="@this"
                                         icon="pi pi-euro"
                                         action="#{memC.showTarifGreenfee(idcourse)}"/>

                        <p:commandButton id="OtherPlayers"
                                         value="#{msg['button.inscription.otherplayers']} / #{roundC.roundPlayersList().size()}"
                                         update="growl-msg"
                                         ajax="false"
                                         immediate="true"
                                         disabled="#{(!roundC.inscription.inscriptionOK) or (roundC.roundPlayersList().size() gt max)}"
                                         icon="pi pi-user-plus"
                                         action="select_other_players.xhtml?faces-redirect=true"/>

                        <p:commandButton value="Visualisation"
                                         id="commandButtonVisual"
                                         ajax="false"
                                         update="growl-msg"
                                         icon="pi pi-info-circle"
                                         action="#{clubC.showUnavailablePeriod()}"/>
                    </h:panelGroup>
                </f:facet>

            </p:panel>
        </div>

    </h:form>
</ui:define>
</ui:composition>
