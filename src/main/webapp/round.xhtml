<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Round Page</ui:define>

<ui:define name="content">
    <h:form id="form_round">

        <ui:include src="include/include_summary_club.xhtml"/>

        <div class="login-container" style="min-height:auto; align-items:flex-start;">
            <p:panel styleClass="login-card form-card">
                <f:facet name="header">
                    <h1>#{msg['round.data']}</h1>
                </f:facet>

                <p:panelGrid id="panelGridRound"
                             columns="2"
                             layout="flex"
                             columnClasses="col1Flex, col2Flex">

                    <!-- Club selector -->
                    <ui:include src="/include/include_club_selector.xhtml">
                        <ui:param name="clubLabel" value="Club 1"/>
                    </ui:include>

                    <!-- Course selector -->
                    <ui:include src="/include/include_course_selector.xhtml"/>

                    <p:outputLabel for="@next" value="#{msg['round.name']} *"/>
                    <p:inputText id="roundName"
                                 size="45"
                                 title="#{msg['tooltip.round.RoundName']}"
                                 value="#{roundC.round.roundName}"/>

                    <p:outputLabel for="@next" value="#{msg['round.competition']} *"/>
                    <p:inputText id="roundCompetition"
                                 value="#{roundC.round.roundCompetition}"
                                 size="45"
                                 title="#{msg['tooltip.round.RoundCompetition']}"
                                 placeholder="only for regrouping rounds (see help)"/>

                    <p:outputLabel for="@next" value="#{msg['round.game']}"/>
                    <p:selectOneMenu id="gameType"
                                     title="title select one game"
                                     value="#{roundC.round.roundGame}">
                        <f:selectItem itemLabel="#{msg['round.game.select']}"
                                      itemValue=""
                                      noSelectionOption="true"/>
                        <f:selectItems value="#{roundC.round.GameType()}"
                                       var="v"
                                       itemLabel="#{v}"
                                       itemValue="#{v}"/>
                    </p:selectOneMenu>

                    <p:outputLabel for="@next" value="#{msg['round.date']} *"/>
                    <p:datePicker id="RoundDate"
                                  value="#{roundC.round.roundDate}"
                                  immediate="true"
                                  valueChangeListener="#{roundC.roundWorkDate}"
                                  label="Round Date : startDate"
                                  showIcon="true"
                                  showTime="false"
                                  pattern="dd/MM/yyyy HH:mm"
                                  yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(1)}"
                                  locale="#{languageC.locale}"
                                  lang="#{languageC.locale}"
                                  mindate="#{utilsC.localDateWeek(-5)}"
                                  maxdate="#{utilsC.localDateYear(1)}"
                                  title="#{msg['tooltip.round.rounddate']}"
                                  readonlyInput="true"
                                  yearNavigator="true"
                                  monthNavigator="true"
                                  size="10">
                        <f:validateBean disabled="true"/>
                    </p:datePicker>

                    <p:outputLabel for="@next" value="#{msg['round.hour']}"/>
                    <h:panelGroup id="panelG1" layout="block"
                                  style="display:flex; align-items:center; gap:0.5rem;">
                        <p:commandButton id="flightButton"
                                         actionListener="#{dialogC.showFlight()}"
                                         icon="pi pi-sun"
                                         value="#{msg['button.round.start']}"
                                         update="growl-msg"
                                         title="#{msg['tooltip.round.roundtime']}">
                            <p:ajax event="dialogReturn"
                                    update=":form_round:idworkhour :form_round:roundDateComplete"/>
                        </p:commandButton>
                        <h:outputText id="idworkhour"
                                      style="font-weight:bold; font-size:2em; color:red;"
                                      value="#{roundC.round.roundDate}">
                            <f:convertDateTime type="localDateTime" pattern="HH:mm"/>
                        </h:outputText>
                    </h:panelGroup>

                    <h:outputText value="#{msg['round.date']}"/>
                    <h:outputText id="roundDateComplete"
                                  value="#{roundC.round.roundDateTrf}"
                                  style="font-size:1.5em;">
                        <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm"/>
                    </h:outputText>

                    <p:outputLabel for="@next" value="#{msg['round.qualifying']}"/>
                    <h:panelGroup id="panelGroupQualifying"
                                  style="display:flex; align-items:center; gap:0.5rem;">
                        <p:selectOneButton id="qualifying"
                                           value="#{roundC.round.roundQualifying}"
                                           valueChangeListener="#{roundC.qualifyingListener}">
                            <f:selectItems value="#{roundC.availableQualifying}"/>
                            <p:ajax listener="#{roundC.round.ajaxListener}"/>
                        </p:selectOneButton>
                        <p:inputText id="commentQualifying"
                                     size="25"
                                     rendered="#{roundC.round.showQualifying}"
                                     title="#{msg['tooltip.round.RoundName']}"
                                     value="#{playerC.handicapIndex.handicapComment}"/>
                    </h:panelGroup>

                    <p:outputLabel for="@next" value="#{msg['round.holes']} *"/>
                    <p:selectOneButton id="holes"
                                       value="#{roundC.round.roundHoles}">
                        <f:selectItem itemLabel="Holes 9" itemValue="9"/>
                        <f:selectItem itemLabel="Holes 18" itemValue="18"/>
                    </p:selectOneButton>

                    <p:outputLabel for="@next" value="#{msg['round.start']} *"/>
                    <p:selectOneButton id="start"
                                       value="#{roundC.round.roundStart}">
                        <f:selectItem itemLabel="Start 1" itemValue="1"/>
                        <f:selectItem itemLabel="Start 10" itemValue="10"/>
                    </p:selectOneButton>

                </p:panelGrid>

                <f:facet name="footer">
                    <p:commandButton value="#{msg['button.round.create']}"
                                     id="cb1"
                                     update="growl-msg"
                                     ajax="false"
                                     icon="pi pi-database"
                                     action="#{roundC.createRound()}"/>

                    <p:commandButton value="#{msg['button.inscription']}"
                                     id="cb2"
                                     update="growl-msg"
                                     immediate="true"
                                     ajax="false"
                                     rendered="#{roundC.nextInscription}"
                                     icon="pi pi-arrow-right"
                                     style="float:right;"
                                     action="inscription.xhtml?faces-redirect=true"/>
                </f:facet>

            </p:panel>
        </div>

    </h:form>
</ui:define>
</ui:composition>
