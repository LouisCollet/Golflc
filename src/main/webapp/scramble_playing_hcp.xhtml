<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Scramble Playing Handicap</ui:define>

<ui:define name="metadata">
    <f:metadata>
        <f:viewAction action="#{roundC.initInputPlayingHcp(0)}"/>
    </f:metadata>
</ui:define>

<ui:define name="content">
<h:form id="scramble_playing_hcp">
    <div class="login-container" style="min-height:auto; align-items:flex-start;">
    <p:panel styleClass="login-card form-card">
        <f:facet name="header">
            <h1>#{msg['playinghcp.scramble.title']}</h1>
        </f:facet>

        <p:panelGrid
            id="panelG1"
            layout="flex"
            columns="2"
            columnClasses="col1Flex, col2Flex">

            <p:outputLabel for="@next" value="Hcp #{msg['player.message']} 1 :"/>
            <p:inputNumber id="hcpScr1"
                           label="Hcp 1"
                           value="#{roundC.playingHcp.hcpScr[0]}"
                           size="4"
                           required="true"
                           decimalPlaces="0"
                           minValue="0"
                           maxValue="36"
                           validatorMessage="#{msg['handicap.player.minMAX']} : 1"
                           requiredMessage="#{msg['handicap.player.notnull']} : 1">
                <f:validateLongRange minimum="0" maximum="36"/>
            </p:inputNumber>

            <p:outputLabel for="@next" value="Hcp #{msg['player.message']} 2 :"/>
            <p:inputNumber id="hcpScr2"
                           label="Hcp 2"
                           value="#{roundC.playingHcp.hcpScr[1]}"
                           size="4"
                           required="true"
                           decimalPlaces="0"
                           minValue="0"
                           maxValue="36"
                           validatorMessage="#{msg['handicap.player.minMAX']} : 2"
                           requiredMessage="#{msg['handicap.player.notnull']} : 2">
                <f:validateLongRange minimum="0" maximum="36"/>
            </p:inputNumber>

            <p:outputLabel for="@next" value="Hcp #{msg['player.message']} 3 :"/>
            <p:inputNumber id="hcpScr3"
                           label="Hcp 3"
                           value="#{roundC.playingHcp.hcpScr[2]}"
                           size="4"
                           decimalPlaces="0"
                           minValue="0"
                           maxValue="36"
                           validatorMessage="#{msg['handicap.player.minMAX']} : 3"
                           requiredMessage="#{msg['handicap.player.notnull']} : 3">
                <f:validateLongRange minimum="0" maximum="36"/>
            </p:inputNumber>

            <p:outputLabel for="@next" value="Hcp #{msg['player.message']} 4 :"/>
            <p:inputNumber id="hcpScr4"
                           label="Hcp 4"
                           value="#{roundC.playingHcp.hcpScr[3]}"
                           size="4"
                           decimalPlaces="0"
                           minValue="0"
                           maxValue="36"
                           validatorMessage="#{msg['handicap.player.minMAX']} : 4"
                           requiredMessage="#{msg['handicap.player.notnull']} : 4">
                <f:validateLongRange minimum="0" maximum="36"/>
            </p:inputNumber>

            <p:divider layout="horizontal" type="solid"/>
            <p:divider layout="horizontal" type="solid"/>

            <h:outputText value="#{msg['handicap.playing']} :" styleClass="info-label"/>
            <h:outputText value="#{roundC.playingHcp.playingHandicap}"
                          styleClass="playing-hcp-result"/>

        </p:panelGrid>

        <f:facet name="footer">
            <p:commandButton
                id="button01"
                value="#{msg['button.hcp.calculate']}"
                update="growl-msg"
                ajax="false"
                icon="pi pi-calculator"
                action="#{roundC.calculateHcpScramble()}"/>
        </f:facet>
    </p:panel>
    </div>
</h:form>
</ui:define>
</ui:composition>
