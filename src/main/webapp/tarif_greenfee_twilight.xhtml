<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Tarif Page for Twilight</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header"><h1>#{msg['title.hours.tarif']} TWILIGHT</h1></f:facet>
<h:form id="tarifGreenfeeTwilight">

<ui:include src="include/include_summary_greenfee.xhtml"/>

<p:panelGrid
    id="panel1"
    layout="flex"
    columns="2"
    columnClasses="col1Flex,col2Flex">

       <h:outputText  value="#{msg['tarif.hours.start']} :"/>
       <p:datePicker id="TwilightStartTime"
                         value="#{memC.tarifGreenfee.startHour}"
                         timeOnly="true"
                         pattern="HH:mm"
                         label="Tarif tranche horaire : startHour"
                         lang="#{languageC.locale}"
                         locale="#{languageC.locale}"
                         showIcon="true"
                         size="6"
                         mindate="#{utilsC.localTime(12,30)}"
                         maxdate="#{utilsC.localTime(20,45)}">
        </p:datePicker>

     <h:panelGroup id="panelSeason" layout="block">
        <h:outputText value="#{msg['tarif.season']} " />
          <i class="pi pi-cloud"></i>
          <i class="pi pi-sun"></i>
          #{memC.tarifGreenfee.twilightList.size()}
     </h:panelGroup>
     <p:selectOneButton id="Season_High-Medium-Low"
                        required="false"
                        value="#{memC.tarifGreenfee.workSeasonTwilight}">
            <f:selectItem itemLabel="#{msg['tarif.all']}"    itemValue="A" />
            <f:selectItem itemLabel="#{msg['tarif.high']}"   itemValue="H" />
            <f:selectItem itemLabel="#{msg['tarif.medium']}" itemValue="M" />
            <f:selectItem itemLabel="#{msg['tarif.low']}"    itemValue="L" />
       </p:selectOneButton>

       <h:outputText value="#{msg['tarif.twilight.months']}" />
       <p:datePicker id="multiselectMonths"
                      selectionMode="multiple"
                      value="#{memC.tarifGreenfee.multiTwilight}"
                      readonlyInput="true"
                      view="month"
                      pattern="MM/d/yyyy"
                      showIcon="true"
                      yearNavigator="false"
                      size="30"
                      locale="#{languageC.locale}"
                      lang="#{languageC.locale}"
                      yearRange="#{utilsC.dateYear(0)}:#{utilsC.dateYear(0)}">
            <f:convertDateTime  pattern="MM/d/yyyy" type="localDate"/>
        </p:datePicker>

       <f:facet name="footer">
        <p:commandButton value="#{msg['tarif.twilight.create']}"
                         id="commandButton1"
                         ajax="false"
                         update="growl-msg"
                         icon="pi pi-database"
                         action="#{memC.inputTarifGreenfee('TW')}"/>
         <p:commandButton value="#{msg['tarif.back']}"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-undo"
                         action="tarif_greenfee_menu.xhtml?faces-redirect=true" />
</f:facet>

</p:panelGrid>
</h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
