<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Delete Club,Course,Tee,Holes Page </ui:define>
<ui:define name="content">
<h:form id="form_deleteClubCourseTee">

<p:dataTable id="ClubCourseTee"
             value="#{clubC.listClubsCoursesTees('one_club')}"
             var="c"
             rowIndexVar="row"
             emptyMessage="#{msg['message.table.empty']}"
             filteredValue="#{clubC.filteredCourses}"
             rowHover="true" >
     
<f:facet name="header">
    <h:outputText escape="false" value="#{msg['message.selectclub.delete']}" />
</f:facet>

<p:column
     headerText="#"
     footerText="#"
     style="width:2%"
     id="rrow">
             #{row+1}
</p:column>

	<p:column   id="colclubname"
                    headerText="#{msg['club.name']}"
                    footerText="#{msg['club.name']}"
                    width="20%"
                    filterMatchMode="contains"
                    filterBy="#{c.club.clubName}"
                    groupRow="true"  >
            #{c.club.clubName}  (#{c.club.idclub})
	</p:column>

	<p:column headerText="#{msg['club.delete']}"
                  footerText="#{msg['club.delete']}"
                  style="width:10%"
                  groupRow="true">
            <p:commandButton
                id="deleteClub"
                update="messages"
                action="#{clubC.deleteClub(c)}"
                value="#{c.club.idclub}"
                styleClass="ui-button-danger"
                style="color:red;"
                icon="pi pi-trash #{c.course.idcourse gt 0 ? 'colorDeleteRed' : 'colorDeleteBlue' }">
                <p:confirm id="confirmDeleteClub"
                           header="#{msg['message.cancel']}"
                           message="#{msg['message.confirm.delete.club']} CLUB = #{c.club.idclub}"
                           escape="false"
                           type="dialog" />
             </p:commandButton>
            </p:column>

<p:column id="colcoursename"
                  headerText="#{msg['course.name']}"
                  footerText="#{msg['course.name']}"
                  style="width:20%"
                  filterMatchMode="contains"
                  filterBy="#{c.course.courseName}"
                  groupRow="true">
		#{c.course.courseName} (#{c.course.idcourse})
	</p:column>

	<p:column headerText="#{msg['course.delete']}"
                  footerText="#{msg['course.delete']}"
                  style="width:10%" 
                  groupRow="true">
            <p:commandButton
                id="deleteCourse"
                action="#{clubC.deleteCourse(c)}"
                value="#{c.course.idcourse}"
                style="color:red;"
                icon="pi pi-trash">
                <p:confirm header="#{msg['message.cancel']}"
                           message="#{msg['message.confirm.delete.course']} COURSE = #{c.course.idcourse}"
                           icon="pi pi-exclamation-triangle"
                           type="dialog" />
             </p:commandButton>
	</p:column>
    
            <c:if test="#{c.tee.teeStart eq 'YELLOW'}">
               this is yellow
            </c:if>
    this is red
    
	<p:column headerText="#{msg['tee.delete']}"
                  footerText="#{msg['tee.delete']}"
                  style="width:15%" >
            <p:commandButton
                id="deleteTee"
                action="#{clubC.deleteTee(c)}"
                value="#{c.tee.idtee} - #{c.tee.teeStart} - #{c.tee.teeGender} - #{c.tee.teeHolesPlayed}"
                style="color:red;"
                icon="pi pi-trash">
                <p:confirm header="#{msg['message.cancel']}" 
                           message="#{msg['message.confirm.delete.tee']} TEE = #{c.tee.idtee}"
                           type="dialog"
                           icon="pi pi-exclamation-triangle" />
             </p:commandButton>
	</p:column>

<!-- loadHole = 1 hole, loadHoles = multiple holes -->
{c.tee.idtee}

<f:facet name="footer">
          Enjoy the Game
</f:facet>
</p:dataTable>
   <ui:include src="include/include_confirmDialog.xhtml"/>
</h:form>
</ui:define>
</ui:composition>
