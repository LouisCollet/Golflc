<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition 
      template="templates/masterTemplate.xhtml"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core">
<ui:define name="title">Score Statistics Page </ui:define>
<ui:define name="content">
<h:graphicImage name="images/stroke_stats.jpg" alt="image missing :stroke_stats.jpg" style="float: left;"></h:graphicImage>
<h:graphicImage name="images/stroke_stats.jpg" alt="image missing :stroke_stats.jpg" style="float: right;"></h:graphicImage>
<h:form id="score_statistics" enctype="application/x-www-form-urlencoded" >
<ui:include src="include/include_summary_round.xhtml"/>
<!--<ui:include src="include/include_statistics.xhtml" />-->
 <p:dataTable id="statisticsTable"
               var="var"
               rowIndexVar="row"
               rowStyleClass="#{(row mod 5) eq 0 ? 'highlight' : null}"
               value="#{roundC.scoreStableford.statisticsList}"
               editable="true"
               editMode="cell"
               lazy="false"
               style="margin: 0 auto;width:60%;text-align:center;" >
            <p:ajax event="cellEdit"
                    listener="#{roundC.scoreStableford.onCellEdit}"
                    update="growl-msg"/>
     <f:facet name="header">
        <h1>#{msg['title.score.statistics']}</h1>
        <h2>(Black Cell Editing with Click)</h2>
     </f:facet>

        <p:column headerText="#{msg['hole.hole']} "
                  width="12%"
                  style="color:blue;font-size:1.5em;font-weight:bold">
            <h:outputText value="#{var.hole}" />
        </p:column>
 
        <p:column headerText="#{msg['hole.par']} "
                  width="12%" 
                  style="color:blue;">
            <h:outputText value="#{var.par}" />
        </p:column>
 
        <p:column headerText="#{msg['score.gross']} "
                  width="12%"
                  style="color:blue;">
            <h:outputText value="#{var.stroke}" />
        </p:column>
 
            <p:column headerText="#{msg['score.fairway']}"
                      width="12%"
                      >
   <!-- The cellEditor element contains a facet to output the field and a facet for collecting input, when we are editing. 
   -->
                <p:cellEditor>
                    <f:facet name="output">
                        <h:outputText value="#{var.fairway}"/>
                    </f:facet>
                    <f:facet name="input">
                        <p:inputNumber 
                            id="fairways${row}"
                            label="fairway"
                            value="#{var.fairway}"
                            size="1"
                            decimalPlaces="0"
                            minValue="0"
                            maxValue="1"  >
                        </p:inputNumber>
                    </f:facet>
                </p:cellEditor>
            </p:column>

            <p:column headerText="#{msg['score.green']}"
                      width="12%" >
                <p:cellEditor>
                    <f:facet name="output">
                        <h:outputText value="#{var.green}"/>
                    </f:facet>
                    <f:facet name="input">
                        <p:inputNumber  id="green${row}"
                            label="green"
                            value="#{var.green}"
                            size="1"
                            decimalPlaces="0"
                            minValue="0"
                            maxValue="7" >
                        </p:inputNumber>
                    </f:facet>
                </p:cellEditor>
            </p:column>
            
            <p:column headerText="#{msg['score.putts']}"
                      width="12%" >
                <p:cellEditor>
                    <f:facet name="output">
                        <h:outputText value="#{var.putt}"/>
                    </f:facet>
                    <f:facet name="input">
                        <p:inputNumber  id="putts${row}"
                            label="putts"
                            style="width:50%"
                            value="#{var.putt}"
                            size="1"
                            decimalPlaces="0"
                            minValue="0"
                            maxValue="5"  >
                        </p:inputNumber> 
                    </f:facet>
                </p:cellEditor>
            </p:column>

            <p:column headerText="#{msg['score.bunker']}"
                      width="12%">
                <p:cellEditor>
                    <f:facet name="output">
                        <h:outputText value="#{var.bunker}"/>
                    </f:facet>
                    <f:facet name="input">
                        <p:inputNumber  id="bunker${row}"
                            label="scorebunker"
                            value="#{var.bunker}"
                            size="1"
                            decimalPlaces="0"
                            minValue="0"
                            maxValue="5" >
                        </p:inputNumber>
                    </f:facet>
                </p:cellEditor>
            </p:column>
 
             <p:column headerText="#{msg['score.penalty']}"
                       width="12%" >
                <p:cellEditor>
                    <f:facet name="output">
                        <h:outputText value="#{var.penalty}"/>
                    </f:facet>
                    <f:facet name="input">
                       <p:inputNumber  id="penalty${row}"
                            label="scorePenalty"
                            value="#{var.penalty}"
                            size="1"
                            decimalPlaces="0"
                            minValue="0"
                            maxValue="5" >
                       </p:inputNumber>
                    </f:facet>
                </p:cellEditor>
            </p:column>
            
    <f:facet name="footer">
        <p:commandButton 
            id="button01"
            value="#{msg['button.score.statistics']}"
            update="growl-msg"
            ajax="false"
             
            icon="pi pi-database"
            action="#{roundC.createStatisticsStableford()}"/>
        <p:commandButton value="Back Score screen"
                         id="commandButtonback"
                         ajax="false"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-undo"
                         action="score_stableford.xhtml?faces-redirect=true" />
     </f:facet>
  </p:dataTable>
</h:form>
</ui:define>
</ui:composition>
