<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Travel modes in directions</ui:define>
<ui:define name="head"></ui:define>
<ui:define name="content">

<script type="text/javascript">window.GOOGLE_MAPS_API_KEY = '#{settings.getProperty("GOOGLE_MAPS_API_KEY")}';</script>
<h:outputScript library="js" name="maps_travel_modes.js"/>

    <style type="text/css">
      html, body, #map-canvas {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      #panel {
        position: absolute;
        top: 5px;
        left: 50%;
        margin-left: -180px;
        z-index: 5;
        background-color: #fff;
        padding: 5px;
        border: 1px solid #999;
      }

      #panel, .panel {
        font-family: 'Roboto','sans-serif';
        line-height: 30px;
        padding-left: 10px;
      }

      #panel select, #panel input, .panel select, .panel input {
        font-size: 15px;
      }

      #panel select, .panel select {
        width: 100%;
      }

      #panel i, .panel i {
        font-size: 12px;
      }
    </style>

<script type="text/javascript" charset="UTF-8">
   console.info("before onload");
    window.onload = initialize();
   console.info("after onload");
</script>

    <div class="login-container" style="min-height:auto; align-items:flex-start;">
        <p:panel styleClass="login-card form-card" style="max-width:100%;">
            <f:facet name="header">
                <h1>Travel Modes</h1>
            </f:facet>

            <div id="panel">
                <b>Mode of Travel: </b>
                <select id="mode" onchange="calcRoute();">
                    <option value="DRIVING">Driving</option>
                    <option value="WALKING">Walking</option>
                    <option value="BICYCLING">Bicycling</option>
                    <option value="TRANSIT">Transit</option>
                </select>
            </div>
            <div id="map-canvas" style="height: 80%; top:10px; border: 1px solid black;"></div>

            <div id="divlc">
                <p:outputLabel value="Enter latitude" />
                <p:inputText id="latitude" type="text" value="#{playerC.player.idplayer}" size="10"/>
            </div>

            <h:form id="travel_modes">
                <p:panelGrid columns="2"
                             layout="flex">
                    <p:outputLabel value="Enter latitude" />
                    <p:inputText id="latitude2" type="text" value="#{playerC.player.playerFirstName}" size="20"/>
                    <p:outputLabel value="Enter longitude" />
                    <p:inputText id="longitude" type="text" value="#{playerC.player.playerLastName}" size="20"/>
                </p:panelGrid>
            </h:form>
        </p:panel>
    </div>

</ui:define>
</ui:composition>
