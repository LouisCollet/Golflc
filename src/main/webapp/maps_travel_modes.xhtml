<ui:composition template="templates/masterTemplate.xhtml">

<ui:define name="title">Travel modes in directions</ui:define>
<ui:define name="head"></ui:define>
<ui:define name="content">

<script type="text/javascript">window.GOOGLE_MAPS_API_KEY = '#{settings.getProperty("GOOGLE_MAPS_API_KEY")}';</script>
<h:outputScript library="js" name="maps_travel_modes.js"/>
    
    <style type="text/css">
      html, body, #map-canvas {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      #panel {
        position: absolute;
        top: 5px;
        left: 50%;
        margin-left: -180px;
        z-index: 5;
        background-color: #fff;
        padding: 5px;
        border: 1px solid #999;
      }

      /*
      Provide the following styles for both ID and class,
      where ID represents an actual existing "panel" with
      JS bound to its name, and the class is just non-map
      content that may already have a different ID with
      JS bound to its name.
      */

      #panel, .panel {
        font-family: 'Roboto','sans-serif';
        line-height: 30px;
        padding-left: 10px;
      }

      #panel select, #panel input, .panel select, .panel input {
        font-size: 15px;
      }

      #panel select, .panel select {
        width: 100%;
      }

      #panel i, .panel i {
        font-size: 12px;
      }
    </style>
<h:body>

    <div id="panel">
    <b>Mode of Travel: </b>
    <select id="mode" onchange="calcRoute();"> 
        
      <option value="DRIVING">Driving</option>
      <option value="WALKING">Walking</option>
      <option value="BICYCLING">Bicycling</option>
      <option value="TRANSIT">Transit</option>
    </select>
    </div>
    <div id="map-canvas" style="height: 80%; top:10px; border: 1px solid black;"></div>
<div id="divlc">
  <p:outputLabel value="Enter latitude" />
  <p:inputText id="latitude" type="text" value="#{playerC.player.idplayer}" size="10"/>
</div>
    <h:form id="travel_modes">
        <p:panelGrid columns="2"
                     layout="tabular"> 
            <p:outputLabel value="Enter latitude" />
            <p:inputText id="latitude2" type="text" value="#{playerC.player.playerFirstName}" size="20"/>
            <p:outputLabel value="Enter longitude" />
            <p:inputText id="longitude" type="text" value="#{playerC.player.playerLastName}" size="20"/>
        </p:panelGrid>
    </h:form>
