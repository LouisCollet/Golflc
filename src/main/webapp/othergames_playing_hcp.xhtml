<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:c="jakarta.tags.core"
      template="templates/masterTemplate.xhtml">
<ui:define name="title">Scramble Playing Handicap Page </ui:define>

<ui:define name="content">

<ui:define name="metadata">
    <f:metadata>
        <f:viewAction action="#{roundC.initInputPlayingHcp(0)}"/>
    </f:metadata>
</ui:define>

<h:form id="othergames_playing_hcp">

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <h1>#{msg['playinghcp.scramble.title']}</h1>
</f:facet>

<p:panelGrid
    id="panelG1"
    columns="2"
    layout="flex"
    columnClasses="col1Flex, col2Flex"
    style="text-align:center;">

    <h:outputText value="#{msg['round.id']} :"
                  style="font-weight:bold"/>
                   <p:selectOneMenu
                    id="country"
                    value="#{clubC.club.address.country.code}">
                    <f:selectItem
                         itemLabel="??"
                         itemValue="#{null}" />
                    <f:selectItems
                         value="#{listC.countries}"  />
                </p:selectOneMenu>

    <h:outputText value="#{msg['round.id']} :"
                  style="font-weight:bold"/>
    <p:selectOneMenu value="#{roundC.otherGame}"
                     id="lCstatus">
            <f:selectItem itemLabel="??" itemValue="#{null}" />
            <f:selectItems value="#{dataC.statuses}"
                           var="status"
                           itemValue="#{status}"
                           itemLabel="#{msg['data.status.'.concat(status)]}" />
    </p:selectOneMenu>

    <c:forEach var="i" begin="1" end="2" step="1">
      <h:outputText value="Hcp #{msg['player.message']} #{i}" />
   </c:forEach>

    <c:forEach var="i" begin="1" end="2" step="1">
      <p:inputMask  id="LCcpScr1${i}"
                    label="Hcp"
                    value="#{roundC.playingHcp.hcpScr[i-1]}"
                    size="4"
                    slotChar="_"
                    mask="99.9"
                    required="true"
                    validatorMessage="#{msg['handicap.player.minMAX']} : #{i}"
                    requiredMessage="#{msg['handicap.player.notnull']} : #{i}">
            <f:validateLongRange minimum="0" maximum="36" />
      </p:inputMask>
    </c:forEach>

    <c:forEach var="i" begin="3" end="4" step="1">
      <h:outputText value="Hcp #{msg['player.message']} #{i}" />
   </c:forEach>

    <c:forEach var="i" begin="3" end="4" step="1">
      <p:inputMask  id="LCcpScr2${i}"
                    label="Hcp"
                    value="#{roundC.playingHcp.hcpScr[i-1]}"
                    size="4"
                    slotChar="_"
                    mask="99.9"
                    required="true"
                    validatorMessage="#{msg['handicap.player.minMAX']} : #{i}"
                    requiredMessage="#{msg['handicap.player.notnull']} : #{i}">
            <f:validateLongRange minimum="0" maximum="36" />
      </p:inputMask>
    </c:forEach>

    <h:outputText value="#{msg['handicap.playing']}" />
    <h:outputText value="#{roundC.playingHcp.playingHandicap}"
                  style="font-size: 3rem;" />

</p:panelGrid>

<f:facet name="footer">
         <p:commandButton
                         id="button01"
                         value="#{msg['button.hcp.calculate']}"
                         update="growl-msg"
                         ajax="false"
                         icon="pi pi-database"
                         action="#{roundC.calculateHcpScramble()}"/>
</f:facet>
</p:panel>
</div>

</h:form>
</ui:define>
</ui:composition>
