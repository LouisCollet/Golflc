<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:h="jakarta.faces.html"
      template="templates/masterTemplate.xhtml">

<ui:define name="head" />
<ui:define name="title">Player Page </ui:define>

<ui:define name="content">
<ui:define name="metadata">
    <f:metadata>
        <f:viewAction action="#{playerC.to_player_modify('M')}"/>
    </f:metadata>
</ui:define>

<h:outputStylesheet library="styles" name="flags/flags.css" />

<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card">
<f:facet name="header">
    <h1>#{msg['player.modify.data']}</h1>
</f:facet>

<h:form id="form_player_modify">

<p:focus for="idplayer" />

<p:panelGrid
    id="panelGrid1"
    layout="flex"
    columns="2"
    style="margin: 0 auto;width:60%"
    columnClasses="col1Flex, col2Flex">

                <h:outputText value="#{msg['player.id']}" />
                <h:outputText
                        id="idplayer"
                        value="#{playerC.player.idplayer}" />

                <p:outputLabel for="@next" value="#{msg['player.first']}" />
                <p:inputText label="Firstname"
                              id="firstName"
                              placeholder="this is a HTML5 placeholder"
                              size="45"
                              styleClass="noprocess"
                              value="#{playerC.player.playerFirstName}" />

                <p:outputLabel for="@next" value="#{msg['player.lastname']}" />
                <p:inputText label="Lastname"
                              id="lastName"
                              size="45"
                              value="#{playerC.player.playerLastName}" />

                <p:outputLabel for="@next" value="#{msg['player.gender']}" style="font-weight:bold" />
                <p:selectOneButton id="gender"
                                  value="#{playerC.player.playerGender}">
                    <f:selectItem itemLabel="#{msg['player.gent']}" itemValue="M"/>
                    <f:selectItem itemLabel="#{msg['player.lady']}" itemValue="L" />
                </p:selectOneButton>

                <p:outputLabel for="@next" value="#{msg['player.birth']}" />
                <p:datePicker value="#{playerC.player.playerBirthDate}"
                    id="birth"
                    locale="#{languageC.locale}"
                    label="LC label birth marche pas"
                    yearRange="c-50:c-10"
                    showTime="false"
                    pattern="dd/MM/yyyy"
                    yearNavigator="true"
                    monthNavigator="true"
                    readonlyInput="true" />

                <p:outputLabel for="@next" value="#{msg['player.email']}" />
                <p:inputText label="email"
                              id="email"
                              size="45"
                              value="#{playerC.player.playerEmail}" />
        <p:commandButton
                         value="#{msg['button.player.identify']}"
                         id="buttonPlayerIdentify"
                         ajax="false"
                         style="font-weight:normal"
                         update="growl-msg"
                         icon="pi pi-id-card"
                         action="#{playerC.validatePlayer()}"/>
        <h:outputText value=" " />
</p:panelGrid>

<p:panelGrid
    id="panelGrid2"
    layout="flex"
    columns="2"
    style="margin: 0 auto;width:60%"
    rendered="#{playerC.nextPanelPlayer}"
    columnClasses="col1Flex, col2Flex">
                <p:outputLabel value="#{msg['address.country.code']}"
                               for="@next"/>
                <p:autoComplete id="countryCustom"
                                valueChangeListener="#{playerC.player.playerCountryListener}"
                                value="#{playerC.player.address.country.code}"
                                completeMethod="#{countryC.completeCountry}"
                                var="country"
                                itemLabel="#{country}"
                                itemValue="#{country.code}"
                                forceSelection="true"
                                dropdown="true"
                                scrollHeight="250">
                    <p:column>
                        <span class="flag flag-#{country.code}"
                              style="width: 30px; height: 20px"/>
                        <h:outputText style="vertical-align: middle; margin-left: .5em"
                                      value="#{country.name} - #{country.code} - #{country.locale} - #{country.id}" />
                    </p:column>
                </p:autoComplete>

                <p:outputLabel for="@next" value="#{msg['address.street']}" />
                <p:inputText id="street"
                              value="#{playerC.player.address.street}"
                              size="45"
                              immediate="true"
                              valueChangeListener="#{playerC.player.playerStreetListener}" />

                <p:outputLabel for="@next" value="#{msg['address.city']}" />
                <p:inputText
                              id="city"
                              value="#{playerC.player.address.city}"
                              size="45"
                              immediate="true"
                              valueChangeListener="#{playerC.player.playerCityListener}" />

                <p:outputLabel for="@next" value="#{msg['player.language']}" />
                <p:selectOneMenu id="lang"
                                 value="#{playerC.player.playerLanguage}"
                                 immediate="true"
                                 valueChangeListener="#{playerC.playerLanguageListener}">
                    <f:selectItem
                                  itemLabel="?? Select"
                                  noSelectionOption="true"
                                  itemDisabled="true"
                                  itemValue="#{null}" />
                       <f:selectItems value="#{playerC.player.LanguageType()}"
                                   var="v"
                                   itemValue="#{v.label}"
                                   itemLabel="#{v}" />
                </p:selectOneMenu>

                <ui:include src="/include/include_club_selector.xhtml" />

    <h:outputText value="#{msg['player.zoneid']}" />
   <h:panelGroup layout="block" id="container3">
        <h:outputText
                      id="zone"
                      style="margin-right: 20px;"
                      value="#{playerC.player.address.zoneId}" />
   </h:panelGroup>

        <h:outputText value="#{msg['player.latlng']}" />
        <h:outputText value="#{playerC.player.address.latLng.lat} , #{playerC.player.address.latLng.lng}" />

<f:facet name="footer">
        <p:commandButton
                         value="#{msg['button.player.modify']}"
                         id="button01"
                         ajax="false"
                         style="font-weight:normal"
                         update="growl-msg"
                         icon="pi pi-database"
                         action="#{playerC.updatePlayer()}"/>

        <p:commandButton
                         value="#{msg['button.player.image']}"
                         id="button02"
                         ajax="false"
                         rendered="#{playerC.nextPlayer}"
                         update="growl-msg"
                         immediate="true"
                         icon="pi pi-arrow-right"
                         action="player_upload_file.xhtml"/>
</f:facet>
</p:panelGrid>

</h:form>
</p:panel>
</div>

</ui:define>
</ui:composition>
