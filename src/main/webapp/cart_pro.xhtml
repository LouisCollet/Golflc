<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      template="templates/masterTemplate.xhtml">

<ui:define name="title">Select Pro Payment</ui:define>
<ui:define name="content">
<div class="login-container" style="min-height:auto; align-items:flex-start;">
<p:panel styleClass="login-card form-card" style="max-width:960px;">
    <f:facet name="header"><h1>#{msg['title.payment.lesson']}</h1></f:facet>

    <h:form id="form_cart_pro">
        <ui:include src="include/include_summary_pro.xhtml"/>

        <!-- Pro free banner -->
        <h:panelGroup rendered="#{payC.proFree}" layout="block"
                      style="background:var(--golf-primary-light,#e8f5e9); border-left:4px solid var(--golf-primary,#2e7d32); padding:0.75rem 1rem; margin-bottom:1rem; border-radius:4px;">
            <i class="pi pi-check-circle" style="color:var(--golf-primary,#2e7d32); margin-right:0.5rem;"/>
            <strong>#{msg['lesson.pro.free']}</strong>
        </h:panelGroup>

        <!-- Empty state -->
        <h:panelGroup rendered="#{empty payC.listLessons}" layout="block"
                      style="text-align:center; padding:1.5rem; color:var(--text-color-secondary);">
            <i class="pi pi-calendar" style="font-size:2rem; display:block; margin-bottom:0.5rem;"/>
            #{msg['message.table.empty']}
        </h:panelGroup>

        <!-- One card per lesson -->
        <ui:repeat value="#{payC.listLessons}" var="c">
            <div class="lesson-item-card">
                <p:panelGrid layout="flex" columns="2" columnClasses="col1Flex,col2Flex">

                    <p:outputLabel value="#{msg['lesson.startdate']}"/>
                    <h:outputText value="#{c.eventStartDate}">
                        <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm"/>
                    </h:outputText>

                    <p:outputLabel value="#{msg['lesson.enddate']}"/>
                    <h:outputText value="#{c.eventEndDate}">
                        <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm"/>
                    </h:outputText>

                    <p:outputLabel value="#{msg['lesson.title']}"/>
                    <h:outputText value="#{c.eventTitle}"/>

                    <p:outputLabel value="#{msg['lesson.proname']}"/>
                    <h:outputText value="#{c.proName}"/>

                    <p:outputLabel value="#{msg['lesson.studentname']}"/>
                    <h:outputText value="#{c.studentName}"/>

          <!--          <p:outputLabel value="#{msg['lesson.description']}"/>
                    <h:outputText value="#{c.eventDescription}"/>
-->
                    <p:outputLabel value="#{msg['lesson.amount']}"/>
                    <h:outputText value="#{c.lessonAmount}"/>

                </p:panelGrid>
                <div class="btn-group" style="margin-top:0.5rem;">
                    <p:commandButton icon="pi pi-trash"
                                     value="#{msg['lesson.cancel']}"
                                     styleClass="p-button-danger p-button-sm"
                                     process="@this"
                                     oncomplete="PF('deleteProductDialog').show()">
                        <f:setPropertyActionListener value="#{c}" target="#{payC.selectedLesson}"/>
                    </p:commandButton>
                </div>
            </div>
        </ui:repeat>

        <div class="btn-group" style="margin-top:1rem;">
            <p:commandButton value="#{msg['button.confirm']}"
                             id="commandButtonConfirmFree"
                             rendered="#{payC.proFree}"
                             ajax="false"
                             icon="pi pi-check"
                             action="#{payC.confirmProFreeLesson()}"
                             styleClass="p-button-success"/>
            <p:commandButton value="#{msg['payment.selected']}"
                             id="commandButtonPayment"
                             rendered="#{not payC.proFree}"
                             ajax="false"
                             icon="pi pi-credit-card"
                             action="creditcard.xhtml?faces-redirect=true"
                             styleClass="p-button-warning"/>
            <p:commandButton value="#{msg['button.cancel']}"
                             ajax="false"
                             icon="pi pi-times"
                             action="#{payC.cancelCart()}"
                             styleClass="p-button-secondary"
                             immediate="true"/>
        </div>

        <p:confirmDialog widgetVar="deleteProductDialog"
                         showEffect="fade"
                         width="300"
                         message="#{msg['lesson.cancel']} ?"
                         header="#{msg['button.confirm']}"
                         severity="warn">
            <p:commandButton value="#{msg['button.no']}"
                             type="button"
                             styleClass="ui-button-secondary"
                             icon="pi pi-times"
                             onclick="PF('deleteProductDialog').hide()"/>
            <p:commandButton value="#{msg['button.yes']}"
                             icon="pi pi-check"
                             actionListener="#{payC.deleteLesson}"
                             process="@this"
                             update="form_cart_pro"
                             oncomplete="PF('deleteProductDialog').hide()"/>
        </p:confirmDialog>

        <ui:include src="include/include_confirmDialog.xhtml"/>
    </h:form>
</p:panel>
</div>
</ui:define>
</ui:composition>
